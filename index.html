    .dark .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; }

<body class="bg-slate-55 dark:bg-slate-955 transition-colors duration-200 text-slate-805 dark:text-slate-150">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useMemo, useEffect, useRef } = React;
    
    // 💡 2026年基準日
    const TODAY_STR = '2026-05-21';

    // 💡 【防弾】日本時間(JST)を正確に取得する日付処理
    const getJSTDateString = () => {
      return TODAY_STR; // カレンダー連携用は固定基準日を返す
    };

    const getJSTDateTimeString = () => {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    };

    const initialDepts = [
      { key: 'sales', label: '営業', color: 'blue', order: 0 },
      { key: 'finance', label: '経理', color: 'amber', order: 1 },
      { key: 'legal', label: '法務', color: 'green', order: 2 },
      { key: 'backoffice', label: '推進（事務）', color: 'purple', order: 3 },
      { key: 'system', label: 'システム', color: 'slate', order: 4 }
    ];

    const initialFolders = [
      { id: 'f1', name: '新商品設計（ECD）' },
      { id: 'f2', name: '社内事務・システム改善' }
    ];

    const projectStatusOptions = [
      { value: 'pending', label: '未着手', className: 'bg-slate-150 dark:bg-slate-805 text-slate-606 dark:text-slate-200 border-slate-202 dark:border-slate-705' },
      { value: 'in_progress', label: '進行中', className: 'bg-blue-50 dark:bg-blue-900/40 text-blue-606 dark:text-blue-200 border-blue-202 dark:border-blue-800' },
      { value: 'completed', label: '完了', className: 'bg-emerald-50 dark:bg-emerald-900/40 text-emerald-606 dark:text-emerald-200 border-emerald-202 dark:border-emerald-800' },
      { value: 'not_applicable', label: '対応なし', className: 'bg-slate-202 dark:bg-slate-705 text-slate-505 dark:text-slate-300 border-slate-350 dark:border-slate-650' }
    ];

    const initialProjects = [
      {
        id: 'p1', folderId: 'f1', name: '【ECD】無料化プラン実装', code: 'ECD-2026-Q2',
        status: 'in_progress', startDate: '2026-05-15', endDate: '2026-06-25',
        taskSequence: 2,
        links: [{ id: 'plnk_1', label: '要件定義書 (Notion)', url: 'https://example.com' }],
        stepList: [
          { id: 1, name: '自部署で論点確認', desc: '方針策定', deptKey: 'backoffice', startDate: '2026-05-15', dueDate: '2026-05-20', leader: '推進担当者', links: [] },
          { id: 2, name: '法務へ書類のレビュー依頼', desc: '規約確認', deptKey: 'legal', startDate: '2026-05-19', dueDate: '2026-06-05', leader: '法務担当者', links: [] }
        ],
        tasks: [
          { id: 't1', sequenceId: 1, stepId: 1, title: '全体論点確認の作成', description: '合意を得るためのシート作成', assignee: '推進メンバー', department: 'backoffice', interactor: '自分', dueDate: '2026-05-18', status: 'completed', isHighPriority: false, doToday: false, startedAt: '2026-05-15', completedAt: '2026-05-18', attachedImages: [], contextLogs: [], links: [], level: 1, isBlocked: false, hasBeenBlocked: false, blockedDays: 0 },
          { id: 't2', sequenceId: 2, stepId: 2, title: '見積書の確認依頼', description: '法務へのリーガルチェック提出', assignee: '法務 担当Aさん', department: 'legal', interactor: '法務 担当Aさん', dueDate: '2026-05-25', status: 'in_progress', isHighPriority: true, doToday: true, startedAt: '2026-05-19', attachedImages: [], contextLogs: [], links: [], level: 4, isBlocked: false, hasBeenBlocked: false, blockedDays: 0 }
        ]
      }
    ];

    let app, auth, db;
    let useFirebase = false;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    try {
      if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        const firebaseConfig = JSON.parse(__firebase_config);
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        useFirebase = true;
      }
    } catch (e) {
      console.warn("Firebase config not initialized.");
    }

    const estimateSize = (obj) => {
      try { return encodeURI(JSON.stringify(obj)).split(/%..|./).length - 1; } 
      catch (e) { return 0; }
    };

    const getDurationDays = (task) => {
      if (!task || !task.startedAt) return null;
      const start = new Date(task.startedAt);
      const end = task.completedAt ? new Date(task.completedAt) : new Date(TODAY_STR);
      const diffDays = Math.round((end - start) / (1000 * 60 * 60 * 24));
      return diffDays >= 0 ? diffDays : 0;
    };

    function App() {
      const [isDarkMode, setIsDarkMode] = useState(() => {
        const savedMode = localStorage.getItem('pl_dark_mode');
        if (savedMode !== null) return savedMode === 'true';
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      });

      useEffect(() => {
        if (isDarkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        localStorage.setItem('pl_dark_mode', isDarkMode);
      }, [isDarkMode]);

      const toggleDarkMode = () => setIsDarkMode(!isDarkMode);

      const [alertMessage, setAlertMessage] = useState(null);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
      const [lightboxImage, setLightboxImage] = useState(null);
      const [user, setUser] = useState(null);
      const [showTodayDropdown, setShowTodayDropdown] = useState(false);
      
      // 💡 「未完了タスク一覧」モーダルの表示State
      const [showUncompletedListModal, setShowUncompletedListModal] = useState(false);

      const [tmpGistToken, setTmpGistToken] = useState(localStorage.getItem('pl_gist_token') || '');
      const [tmpGistId, setTmpGistId] = useState(localStorage.getItem('pl_gist_id') || '');
      const [gistToken, setGistToken] = useState(localStorage.getItem('pl_gist_token') || '');
      const [gistId, setGistId] = useState(localStorage.getItem('pl_gist_id') || '');

      const [folders, setFolders] = useState([]);
      const [projects, setProjects] = useState([]);
      const [deptList, setDeptList] = useState([]);
      const [selectedFolderId, setSelectedFolderId] = useState('f1');
      const [currentProjectId, setCurrentProjectId] = useState('p1');
      const [selectedMonth, setSelectedMonth] = useState(TODAY_STR.slice(0, 7));

      const [taskFilter, setTaskFilter] = useState({ pending: true, in_progress: true, completed: false, not_applicable: false });

      const allowedDomains = ['sansan.com', 'sansan.co.jp'];
      
      const isSansanUser = useMemo(() => {
        if (!user) return false;
        if (!user.email) return false;
        const domain = user.email.split('@')[1]?.toLowerCase();
        return allowedDomains.includes(domain);
      }, [user]);

      const showAlert = (msg) => { setAlertMessage(msg); setTimeout(() => setAlertMessage(null), 4000); };
      const triggerConfirm = (title, message, onConfirmAction) => setConfirmModal({ isOpen: true, title, message, onConfirm: () => { onConfirmAction(); closeConfirm(); } });
      const closeConfirm = () => setConfirmModal({ isOpen: false, title: '', message: '', onConfirm: null });

      const handleGoogleLogin = async () => {
        if (!useFirebase) { showAlert('💡 下記のSansan社員アカウント検証ボタンを使用してください。'); return; }
        const provider = new GoogleAuthProvider();
        try {
          await signInWithPopup(auth, provider);
          showAlert('🔑 Google認証に成功しました。');
        } catch (e) {
          console.error(e);
          showAlert('⚠️ ドメイン制限エラー回避のため、下の検証用ログインをご利用ください。');
        }
      };

      const handleMockLogin = (email) => {
        const mockUser = { uid: 'mock_user_' + Date.now(), email: email, displayName: email.split('@')[0] + ' (Sansan)' };
        localStorage.setItem('pl_mock_user', JSON.stringify(mockUser));
        setUser(mockUser);
        showAlert(`🔑 Sansan社員として認証しました。`);
      };

      const handleLogout = async () => {
        if (!useFirebase) { localStorage.removeItem('pl_mock_user'); setUser(null); showAlert('🚪 ログアウトしました。'); return; }
        try { await signOut(auth); showAlert('🚪 ログアウトしました。'); } catch (e) { showAlert('⚠️ ログアウトに失敗しました'); }
      };

      const syncToGist = async (filename, data) => {
        if (!gistToken || !gistId) return;
        try {
          const response = await fetch(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${gistToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ files: { [filename]: { content: JSON.stringify(data) } } })
          });
          if (!response.ok) throw new Error('Gist sync failed');
        } catch (err) {
          console.error("Gist Sync Error:", err);
          showAlert('⚠️ Gistへの保存に失敗しました。');
        }
      };

      const updateData = (key, nextData) => {
        if (!isSansanUser) return;
        if (key === 'projects') setProjects(nextData);
        if (key === 'folders') setFolders(nextData);
        if (key === 'depts') setDeptList(nextData);
        localStorage.setItem(`pl_${key}`, JSON.stringify(nextData));
        if (gistToken && gistId) syncToGist(`${key}.json`, nextData);
      };

      const loadFromGist = async (token, id) => {
        try {
          const res = await fetch(`https://api.github.com/gists/${id}`, { headers: { Authorization: `Bearer ${token}` } });
          if (!res.ok) throw new Error('Gist fetch failed');
          const gist = await res.json();
          let loadedFolders = initialFolders, loadedDepts = initialDepts, loadedProjects = initialProjects;
          if (gist.files['folders.json']) loadedFolders = JSON.parse(gist.files['folders.json'].content);
          if (gist.files['depts.json']) loadedDepts = JSON.parse(gist.files['depts.json'].content);
          if (gist.files['projects.json']) loadedProjects = JSON.parse(gist.files['projects.json'].content);
          setFolders(loadedFolders); localStorage.setItem('pl_folders', JSON.stringify(loadedFolders));
          setDeptList(loadedDepts); localStorage.setItem('pl_depts', JSON.stringify(loadedDepts));
          setProjects(loadedProjects); localStorage.setItem('pl_projects', JSON.stringify(loadedProjects));
          showAlert('☁️ Gistから最新データを読み込みました。');
        } catch (err) {
          console.error(err);
          showAlert('⚠️ Gistの読み込みに失敗しました。');
        }
      };

      const saveGistSettings = () => {
        const tokenVal = tmpGistToken.trim(), idVal = tmpGistId.trim();
        localStorage.setItem('pl_gist_token', tokenVal); localStorage.setItem('pl_gist_id', idVal);
        setGistToken(tokenVal); setGistId(idVal);
        if (tokenVal && idVal) loadFromGist(tokenVal, idVal);
        else showAlert('Gist同期を解除しました。');
      };

      useEffect(() => {
        if (!useFirebase) { const savedMockUser = localStorage.getItem('pl_mock_user'); if (savedMockUser) setUser(JSON.parse(savedMockUser)); return; }
        const unsubscribe = onAuthStateChanged(auth, (authUser) => { setUser(authUser); });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !isSansanUser) return;
        if (gistToken && gistId) { loadFromGist(gistToken, gistId); return; }
        if (!useFirebase) {
          const localFolders = localStorage.getItem('pl_folders'); if (localFolders) setFolders(JSON.parse(localFolders)); else { setFolders(initialFolders); localStorage.setItem('pl_folders', JSON.stringify(initialFolders)); }
          const localDepts = localStorage.getItem('pl_depts'); if (localDepts) { const parsed = JSON.parse(localDepts); parsed.sort((a, b) => (a.order || 0) - (b.order || 0)); setDeptList(parsed); } else { setDeptList(initialDepts); localStorage.setItem('pl_depts', JSON.stringify(initialDepts)); }
          const localProjects = localStorage.getItem('pl_projects'); if (localProjects) setProjects(JSON.parse(localProjects)); else { setProjects(initialProjects); localStorage.setItem('pl_projects', JSON.stringify(initialProjects)); }
          return;
        }
        const unsubF = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'folders'), snap => { const list = snap.docs.map(d => d.data()); if(list.length===0) initialFolders.forEach(f => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'folders', f.id), f)); else setFolders(list); });
        const unsubD = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'departments'), snap => { const list = snap.docs.map(d => d.data()); if(list.length===0) initialDepts.forEach(d => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'departments', d.key), d)); else { list.sort((a,b)=>a.order-b.order); setDeptList(list); } });
        const unsubP = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'projects'), snap => { const list = snap.docs.map(d => d.data()); if(list.length===0) initialProjects.forEach(p => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', p.id), p)); else setProjects(list); });
        return () => { unsubF(); unsubD(); unsubP(); };
      }, [user, isSansanUser, gistToken, gistId]);

      useEffect(() => {
        if (projects.length > 0) {
          const params = new URLSearchParams(window.location.search); const pid = params.get('pid');
          if (pid) {
            const targetProj = projects.find(p => p.id === pid);
            if (targetProj) { setSelectedFolderId(targetProj.folderId); setCurrentProjectId(targetProj.id); setViewMode('board'); showAlert(`案件「${targetProj.name}」を表示しました。`); window.history.replaceState({}, document.title, window.location.origin + window.location.pathname); }
          }
        }
      }, [projects]);

      const saveProjectToFirestore = async (updatedProj) => {
        if (!updatedProj || !isSansanUser) return;
        const size = estimateSize(updatedProj);
        if (size > 800000) {
          showAlert('⚠️ データサイズ制限制限(800KB)をオーバーしたため保存をブロックしました。\n不要なタスク添付画像を削除してください。');
          return;
        }
        if (!useFirebase || (gistToken && gistId)) { updateData('projects', projects.map(p => p.id === updatedProj.id ? updatedProj : p)); return; }
        if (!user) return;
        try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', updatedProj.id), updatedProj); } 
        catch (err) { showAlert("保存に失敗しました。"); }
      };

      const filteredProjects = useMemo(() => projects.filter(p => p.folderId === selectedFolderId), [projects, selectedFolderId]);
      const activeProject = useMemo(() => projects.find(p => p.id === currentProjectId) || filteredProjects[0] || projects[0] || null, [projects, currentProjectId, filteredProjects]);

      const [viewMode, setViewMode] = useState('board');
      const [showAddFolderModal, setShowAddFolderModal] = useState(false);
      const [newFolderName, setNewFolderName] = useState('');
      const [showAddProjectModal, setShowAddProjectModal] = useState(false);

      const [newProjName, setNewProjName] = useState('');
      const [newProjCode, setNewProjCode] = useState('');
      const [newProjStatus, setNewProjStatus] = useState('pending');
      const [newProjStart, setNewProjStart] = useState('2026-05-15');
      const [newProjEnd, setNewProjEnd] = useState('2026-06-25');
      const [newProjFolderId, setNewProjFolderId] = useState('f1');
      const [newProjLinks, setNewProjLinks] = useState([]);
      const [tmpProjLinkLabel, setTmpProjLinkLabel] = useState('');
      const [tmpProjLinkUrl, setTmpProjLinkUrl] = useState('');

      const [dbFilterFolderId, setDbFilterFolderId] = useState('all');
      const [dbFilterStatus, setDbFilterStatus] = useState('all');
      const [dbFilterText, setDbFilterText] = useState('');

      const filteredDbProjects = useMemo(() => projects.filter(proj => {
        if (dbFilterFolderId !== 'all' && proj.folderId !== dbFilterFolderId) return false;
        if (dbFilterStatus !== 'all' && proj.status !== dbFilterStatus) return false;
        if (dbFilterText.trim() !== '') { const lowerText = dbFilterText.toLowerCase(); if (!proj.name.toLowerCase().includes(lowerText) && !proj.code.toLowerCase().includes(lowerText)) return false; }
        return true;
      }), [projects, dbFilterFolderId, dbFilterStatus, dbFilterText]);

      const [editingProject, setEditingProject] = useState(false);
      const [projectForm, setProjectForm] = useState({ id: '', folderId: 'f1', name: '', code: '', status: 'pending', startDate: '', endDate: '' });
      const [editProjLinks, setEditProjLinks] = useState([]);
      const [tmpEditProjLinkLabel, setTmpEditProjLinkLabel] = useState('');
      const [tmpEditProjLinkUrl, setTmpEditProjLinkUrl] = useState('');

      const [editingDescTaskId, setEditingDescTaskId] = useState(null);
      const [tmpDescValue, setTmpDescValue] = useState('');

      const [analyticsTab, setAnalyticsTab] = useState('resource');
      const [riskStaleDays, setRiskStaleDays] = useState(7);
      const [targetLeadTime, setTargetLeadTime] = useState(5);

      useEffect(() => {
        if (editingProject && activeProject) {
          setProjectForm({ id: activeProject.id, folderId: activeProject.folderId || 'f1', name: activeProject.name || '', code: activeProject.code || '', status: activeProject.status || 'pending', startDate: activeProject.startDate || '2026-05-15', endDate: activeProject.endDate || '2026-06-25' });
          setEditProjLinks(activeProject.links ? [...activeProject.links] : []);
        }
      }, [editingProject, activeProject]);
      useEffect(() => { if (showAddProjectModal && selectedFolderId) setNewProjFolderId(selectedFolderId); }, [showAddProjectModal, selectedFolderId]);

      const saveProjectEdit = () => {
        if (!activeProject || !isSansanUser) return;
        saveProjectToFirestore({ ...activeProject, name: projectForm.name, code: projectForm.code, status: projectForm.status, startDate: projectForm.startDate, endDate: projectForm.endDate, folderId: projectForm.folderId, links: [...editProjLinks] });
        setEditingProject(false); showAlert('更新しました。');
      };

      const handleSaveDirectDesc = (taskId) => {
        if (!isSansanUser) return;
        const updatedTasks = tasks.map(t => t.id === taskId ? { ...t, description: tmpDescValue } : t);
        saveProjectToFirestore({ ...activeProject, tasks: updatedTasks });
        setEditingDescTaskId(null); showAlert('論点・備考を更新しました。');
      };

      const [selectedSettingsDeptKey, setSelectedSettingsDeptKey] = useState('sales'); 
      const [newDeptLabel, setNewDeptLabel] = useState('');
      const [newDeptColor, setNewDeptColor] = useState('purple');
      const [showSettingsModal, setShowSettingsModal] = useState(false);

      const stepList = activeProject ? (activeProject.stepList || []) : [];
      const setStepList = (newSteps) => { if (!activeProject || !isSansanUser) return; saveProjectToFirestore({ ...activeProject, stepList: typeof newSteps === 'function' ? newSteps(activeProject.stepList) : newSteps }); };

      const [editingStepId, setEditingStepId] = useState(null);
      const [editStepName, setEditStepName] = useState('');
      const [editStepDesc, setEditStepDesc] = useState('');
      const [editStepDeptKey, setEditStepDeptKey] = useState('backoffice');
      const [editStepStartDate, setEditStepStartDate] = useState('');
      const [editStepDueDate, setEditStepDueDate] = useState('');
      const [editStepLeader, setEditStepLeader] = useState('');
      const [editStepLinks, setEditStepLinks] = useState([]);
      const [tmpEditStepLinkLabel, setTmpEditStepLinkLabel] = useState('');
      const [tmpEditStepLinkUrl, setTmpEditStepLinkUrl] = useState('');

      const [showAddStepForm, setShowAddStepForm] = useState(false);
      const [newStepName, setNewStepName] = useState('');
      const [newStepDesc, setNewStepDesc] = useState('');

            }
            interactorStats[interName].total += w;
            if (t.status !== 'completed' && t.isBlocked) interactorStats[interName].blocked += w;
            if (t.status !== 'completed' && isOverdue(t.dueDate, t.status)) interactorStats[interName].overdue += w;

            if (t.status === 'completed') {
              const isOver = t.completedAt && t.dueDate && (new Date(t.completedAt) > new Date(t.dueDate));
              if (isOver && !t.hasBeenBlocked) {
                pDoneW += (w / 2); // 自己遅延ペナルティ半減
              } else {
                pDoneW += w; 
              }
            } else {
              pRemainW += w;
              if (t.isBlocked) pBlockedW += w;
            }
          });

          monthTotalW += pTotalW; monthDoneW += pDoneW; monthRemainW += pRemainW; monthBlockedW += pBlockedW;

          return {
            id: p.id, name: p.name, code: p.code, status: p.status,
            totalTasks: pTasksCount, totalWeight: pTotalW, doneWeight: pDoneW, remainWeight: pRemainW, blockedWeight: pBlockedW,
            progressRate: pTotalW > 0 ? Math.round((pDoneW / pTotalW) * 100) : 0 // 💡 0割りセーフティ
          };
        });

        const deepDiveSteps = [];
        if (activeProject) {
          (activeProject.stepList || []).forEach(step => {
            const stepTasks = (activeProject.tasks || []).filter(t => t.stepId === step.id && t.status === 'completed' && t.startedAt && t.completedAt);
            let totalDays = 0, count = 0;
            
            stepTasks.forEach(t => {
              if (!t.completedAt.startsWith(selectedMonth)) return;
              const start = new Date(t.startedAt); const end = new Date(t.completedAt);
              // 💡 保留合計日数を差し引いて純粋な速度を算出
              let rawDays = Math.max(0, Math.round((end - start) / (1000 * 60 * 60 * 24)));
              rawDays = Math.max(0, rawDays - (t.blockedDays || 0));
              totalDays += rawDays;
              count++;
            });

            deepDiveSteps.push({ stepName: step.name, avgDays: count > 0 ? Math.round((totalDays / count) * 10) / 10 : 0, target: targetLeadTime });
          });
        }

        const monthRisks = [];
        projects.forEach(p => {
          (p.tasks || []).forEach(t => {
            if (t.status === 'completed' || t.status === 'not_applicable') return;
            const refDate = t.dueDate || TODAY_STR;
            if (refDate > selectedMonth + '-31') return;

            if (isOverdue(t.dueDate, t.status)) {
              monthRisks.push({ id: t.id, title: t.title, proj: p.name, type: t.isBlocked ? '相手待ち超過' : '期限超過', desc: `やり取り相手: ${t.interactor} / 期日: ${t.dueDate}`, badge: t.isBlocked ? 'bg-amber-500 text-white' : 'bg-rose-605 text-white' });
            } else if (t.isBlocked) {
              monthRisks.push({ id: t.id, title: t.title, proj: p.name, type: '他部署スタック', desc: `返答待ち調整中 (${t.level || 1}pt)`, badge: 'bg-indigo-505 text-white' });
            }
          });
        });

        // 💡 やり取り相手別スタッツを配列化
        const interactorRows = Object.values(interactorStats).sort((a, b) => b.total - a.total);

        return {
          portfolioCard, deepDiveSteps, monthRisks, interactorRows,
          summary: { total: monthTotalW, done: monthDoneW, remain: monthRemainW, blocked: monthBlockedW, scoreProgress: monthTotalW > 0 ? Math.round((monthDoneW / monthTotalW) * 100) : 0 }
        };
      }, [projects, selectedMonth, currentProjectId, targetLeadTime, riskStaleDays]);

      // ==========================================
      // 未ログイン（Sansanメンバー認証前）画面
      // ==========================================
      if (!user) {
        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-955 flex flex-col items-center justify-center p-6 transition-colors duration-200">
            <div className="max-w-md w-full bg-white dark:bg-slate-900 rounded-3xl border border-slate-202 dark:border-slate-800 p-8 shadow-2xl text-center space-y-6 relative overflow-hidden">
              <div className="mx-auto bg-indigo-600 bg-gradient-to-tr from-indigo-700 to-purple-600 text-white w-16 h-16 rounded-2xl font-black text-2xl flex items-center justify-center shadow-lg">PL</div>
              <div className="space-y-2"><h1 className="text-xl font-black text-slate-905 dark:text-white leading-snug">Project Loom</h1><p className="text-xs text-slate-505 dark:text-slate-440 font-bold">Sansanグループ案件推進専用ダッシュボード</p></div>
              <hr className="border-slate-150 dark:border-slate-800" />
              <div className="bg-slate-55 dark:bg-slate-955/50 border border-slate-150 dark:border-slate-800 p-4 rounded-2xl text-left"><p className="text-xs text-slate-605 dark:text-slate-300 font-bold leading-relaxed">本システムはSansan株式会社のセキュリティ統制下にある専用プロトタイプです。アクセスおよび閲覧には、認証情報が必要です。</p></div>
              <div className="pt-2"><button onClick={() => handleMockLogin('member@sansan.com')} className="w-full py-4 px-4 bg-indigo-600 hover:bg-indigo-700 text-white border border-indigo-700 rounded-2xl font-black text-xs flex items-center justify-center shadow-md hover:shadow-lg transition-all"><span className="mr-2">🔑</span><span>Sansan社員アカウントでサインイン</span></button><span className="text-[10px] text-slate-440 dark:text-slate-505 font-bold block mt-2 text-center">(認証制限およびドメインエラー回避用)</span></div>
            </div>
          </div>
        );
      }

      if (!isSansanUser) {
        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-955 flex flex-col items-center justify-center p-6 transition-colors duration-200">
            <div className="max-w-md w-full bg-white dark:bg-slate-900 rounded-3xl border border-rose-200 p-8 shadow-2xl text-center space-y-6">
              <div className="mx-auto p-4 bg-rose-55 border border-rose-150 rounded-full w-20 h-20 flex items-center justify-center text-rose-605"><IconWarning className="h-10 w-10" /></div>
              <h1 className="text-lg font-black text-rose-605">アクセス権限エラー</h1>
              <p className="text-xs text-slate-505">@sansan.com 以外のドメインです。</p>
              <button onClick={handleLogout} className="w-full py-2.5 bg-slate-150 rounded-xl font-bold text-xs">トップに戻る</button>
            </div>
          </div>
        );
      }
      // ==========================================
      // 3. メインUI表示
      // ==========================================
      return (
        <div className="min-h-screen bg-slate-55 dark:bg-slate-955 text-slate-805 dark:text-slate-150 font-sans antialiased pb-16 transition-colors duration-200">
          
          {alertMessage && (
            <div className="fixed bottom-6 right-6 bg-slate-955/95 dark:bg-slate-800 text-white text-xs px-5 py-4 rounded-2xl shadow-2xl z-[100] whitespace-pre-wrap max-w-sm flex items-center gap-2 border border-slate-705 dark:border-slate-605 backdrop-blur-md animate-bounce">
              <IconInfo className="h-5 w-5 text-indigo-400 shrink-0" />
              <span className="font-bold leading-relaxed">{alertMessage}</span>
            </div>
          )}

          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95">
                <div className="flex items-center gap-3 pb-3 border-b border-slate-150 dark:border-slate-700 text-rose-605">
                  <div className="p-2 bg-rose-55 dark:bg-rose-900/30 rounded-2xl"><IconWarning className="h-6 w-6 text-rose-605 dark:text-rose-400" /></div>
                  <h3 className="font-extrabold text-sm text-slate-955 dark:text-white leading-tight">{confirmModal.title}</h3>
                </div>
                <p className="text-xs text-slate-505 dark:text-slate-455 whitespace-pre-line leading-relaxed">{confirmModal.message}</p>
                <div className="flex justify-end gap-2 px-1 pt-3 border-t border-slate-150 dark:border-slate-700 text-xs">
                  <button type="button" onClick={closeConfirm} className="bg-slate-150 dark:bg-slate-700 hover:bg-slate-220 dark:hover:bg-slate-600 text-slate-605 dark:text-slate-300 px-4 py-2.5 rounded-2xl font-bold transition-all">キャンセル</button>
                  <button type="button" onClick={confirmModal.onConfirm} className="bg-rose-605 hover:bg-rose-700 text-white px-5 py-2.5 rounded-2xl font-extrabold shadow-md transition-all">実行</button>
                </div>
              </div>
            </div>
          )}

          {/* サムネイル拡大ビュー */}
          {lightboxImage && (
            <div className="fixed inset-0 bg-slate-955/90 z-[200] flex items-center justify-center p-4 cursor-zoom-out animate-in fade-in" onClick={() => setLightboxImage(null)}>
              <div className="absolute top-4 right-4 bg-white/20 hover:bg-white/30 text-white p-2.5 rounded-full transition-all cursor-pointer"><IconX className="h-6 w-6" /></div>
              <img src={lightboxImage} alt="preview" className="max-w-full max-h-full rounded-2xl shadow-2xl object-contain animate-in zoom-in-95" />
            </div>
          )}

          {/* 新規プロジェクト起票モーダル */}
          {showAddProjectModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-4 border-b border-slate-150 dark:border-slate-700/50 pb-3">
                  <h2 className="text-base font-black text-slate-805 dark:text-slate-150 flex items-center gap-2"><IconPlus className="text-indigo-600 dark:text-indigo-404" />新規プロジェクトの起票</h2>
                  <button onClick={() => setShowAddProjectModal(false)} className="text-slate-404 dark:text-slate-505 hover:bg-slate-150 dark:hover:bg-slate-700 p-1.5 rounded-lg transition-colors"><IconX className="h-5 w-5" /></button>
                </div>
                <form onSubmit={handleCreateProject} className="flex-1 overflow-y-auto pr-2 space-y-5 scrollbar-thin">
                  <div className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">所属フォルダ</label>
                        <select value={newProjFolderId} onChange={e => setNewProjFolderId(e.target.value)} className="w-full border border-slate-350 dark:border-slate-800 text-xs font-bold text-slate-805 dark:text-slate-150 focus:outline-none focus:border-indigo-500 rounded-xl p-2">
                          {folders.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">初期ステータス</label>
                        <select value={newProjStatus} onChange={e => setNewProjStatus(e.target.value)} className="w-full border border-slate-350 dark:border-slate-800 text-xs font-bold text-slate-805 dark:text-slate-150 focus:outline-none focus:border-indigo-500 rounded-xl p-2">
                          <option value="pending">未着手</option><option value="in_progress">進行中</option><option value="completed">完了</option>
                        </select>
                      </div>
                    </div>
                    <div>
                      <label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">プロジェクト名称 (必須)</label>
                      <input required type="text" value={newProjName} onChange={e => setNewProjName(e.target.value)} className="w-full border border-slate-350 dark:border-slate-605 text-slate-805 dark:text-slate-150 text-sm font-bold focus:outline-none focus:border-indigo-500 rounded-xl p-2.5" placeholder="例: 【ECD】新機能要件定義" />
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div><label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">管理コード</label><input type="text" value={newProjCode} onChange={e => setNewProjCode(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-150 text-xs font-bold font-mono focus:outline-none focus:border-indigo-500" placeholder="例: PRJ-2026-01" /></div>
                      <div><label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">開始予定日</label><input type="date" value={newProjStart} onChange={e => setNewProjStart(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 font-mono bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-150 text-xs font-bold focus:outline-none focus:border-indigo-500" /></div>
                      <div><label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">目標完了日</label><input type="date" value={newProjEnd} onChange={e => setNewProjEnd(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 font-mono bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-150 text-xs font-bold focus:outline-none focus:border-indigo-500" /></div>
                    </div>
                    
                    <div className="border-t border-slate-150 dark:border-slate-700/50 pt-3 mt-1 space-y-2">
                      <span className="text-[10px] font-bold text-slate-605 dark:text-slate-455 flex items-center gap-1"><IconLink className="h-3 w-3"/> プロジェクト関連リンク</span>
                      <div className="flex items-center gap-2">
                        <input type="text" placeholder="リンク名 (例: 要件定義書)" value={tmpProjLinkLabel} onChange={e => setTmpProjLinkLabel(e.target.value)} className="w-32 border border-slate-350 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs text-slate-705 dark:text-slate-150 focus:outline-none" />
                        <input type="text" placeholder="URL (https://...)" value={tmpProjLinkUrl} onChange={e => setTmpProjLinkUrl(e.target.value)} className="flex-1 border border-slate-350 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs text-slate-705 dark:text-slate-150 focus:outline-none" />
                        <button type="button" onClick={handleAddLinkToNewProj} className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-xl text-xs font-bold transition-colors">追加</button>
                      </div>
                      {newProjLinks.length > 0 && (
                        <div className="flex flex-wrap gap-1.5 pt-1">
                          {newProjLinks.map(lnk => (
                            <span key={lnk.id} className="inline-flex items-center gap-1 text-[10px] bg-slate-150 dark:bg-slate-800 border border-slate-202 dark:border-slate-707 text-slate-605 dark:text-slate-300 px-2 py-0.5 rounded-lg font-bold"><IconLink className="h-2.5 w-2.5"/><span className="truncate max-w-[120px] ml-1">{lnk.label}</span><button type="button" onClick={(e) => handleRemoveLinkFromNewProj(lnk.id, e)} className="text-slate-404 hover:text-rose-605 font-bold text-[10px] ml-1">×</button></span>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                  <div className="flex justify-end gap-2 pt-4 border-t border-slate-150 dark:border-slate-700">
                    <button type="button" onClick={() => setShowAddProjectModal(false)} className="bg-slate-150 dark:bg-slate-700 hover:bg-slate-220 dark:hover:bg-slate-600 text-slate-605 dark:text-slate-300 px-5 py-2.5 rounded-2xl font-bold transition-colors">キャンセル</button>
                    <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-2xl font-bold shadow-md transition-colors">プロジェクトを起票</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* 💡 【新仕様】未完了タスク一覧モーダル（完全同期版） */}
          {showUncompletedListModal && activeProject && (
            <div className="fixed inset-0 bg-slate-955/60 backdrop-blur-sm flex items-center justify-center z-[150] animate-in fade-in p-4" onClick={() => setShowUncompletedListModal(false)}>
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 max-w-4xl w-full shadow-2xl flex flex-col max-h-[85vh] animate-in zoom-in-95" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4 border-b border-slate-150 dark:border-slate-700/50 pb-3">
                  <div className="space-y-1">
                    <h2 className="text-base font-black text-slate-805 dark:text-slate-150 flex items-center gap-2">📄 プロジェクト未完了タスク一覧</h2>
                    <p className="text-[10px] text-slate-505 dark:text-slate-404 font-bold">「{activeProject.name}」内で現在ボールを持っている全タスクを俯瞰します。</p>
                  </div>
                  <button onClick={() => setShowUncompletedListModal(false)} className="bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300 hover:bg-slate-202 dark:hover:bg-slate-600 px-3 py-1.5 rounded-xl font-bold text-xs transition-colors flex items-center gap-1"><IconX className="h-3.5 w-3.5" /> 閉じる</button>
                </div>
                <div className="flex-1 overflow-y-auto pr-2 scrollbar-thin">
                  <table className="w-full text-left text-xs border-collapse">
                    <thead>
                      <tr className="border-b border-slate-202 dark:border-slate-700 text-[10px] font-black text-slate-440 uppercase">
                        <th className="py-2 px-3">所属工程</th>
                        <th className="py-2 px-3 w-1/3">タスク名</th>
                        <th className="py-2 px-3">やり取り相手 (To)</th>
                        <th className="py-2 px-3 w-28 text-center">期日</th>
                        <th className="py-2 px-3 w-40 text-center">操作 / 状態</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-150 dark:divide-slate-700/50 font-bold">
                      {tasks.filter(t => t.status !== 'completed' && t.status !== 'not_applicable').length === 0 ? (
                        <tr><td colSpan="5" className="py-8 text-center text-slate-404 italic">現在、未完了のタスクはありません。🎉</td></tr>
                      ) : (
                        tasks.filter(t => t.status !== 'completed' && t.status !== 'not_applicable')
                             .sort((a, b) => a.dueDate.localeCompare(b.dueDate))
                             .map(t => {
                          const isOver = isOverdue(t.dueDate, t.status);
                          const step = stepList.find(s => s.id === t.stepId);
                          const dClass = colorClassesMap[deptList.find(d => d.key === t.department)?.color || 'slate'] || colorClassesMap.slate;
                          return (
                            <tr key={t.id} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                              <td className="py-3 px-3 text-[10px] text-slate-605 dark:text-slate-400 truncate max-w-[100px]">{step?.name || '不明'}</td>
                              <td className="py-3 px-3 text-slate-805 dark:text-slate-150 truncate">{t.title}</td>
                              <td className="py-3 px-3"><span className={`px-2 py-0.5 rounded-lg border text-[9px] ${dClass.badge}`}>{t.interactor}</span></td>
                              <td className="py-3 px-3 text-center font-mono">
                                <span className={isOver ? 'text-rose-605 dark:text-rose-400 font-black animate-pulse' : 'text-slate-605 dark:text-slate-300'}>{t.dueDate}</span>
                              </td>
                              <td className="py-3 px-3">
                                <div className="flex items-center justify-end gap-1.5">
                                  <button onClick={() => toggleTaskBlocked(t.id)} className={`text-[9px] font-black px-2 py-1 rounded-lg border transition-all ${t.isBlocked ? 'bg-amber-500 text-white border-amber-600 animate-pulse' : 'bg-slate-55 dark:bg-slate-700 text-slate-404 border-slate-202 hover:text-amber-500'}`}>✋</button>
                                  <button onClick={() => toggleDoToday(t.id)} className={`text-[9px] font-black px-2 py-1 rounded-lg border transition-all ${t.doToday ? 'bg-amber-500 text-white border-amber-600' : 'bg-slate-55 dark:bg-slate-700 text-slate-404 border-slate-202'}`}>🔥</button>
                                  <select value={t.status} onChange={(e) => changeTaskStatus(t.id, e.target.value)} className="text-[9px] font-black px-1.5 py-1 rounded-lg border bg-slate-100 dark:bg-slate-900 text-slate-705 dark:text-slate-200">
                                    <option value="pending">🔘 未対応</option><option value="in_progress">⚡ 進行中</option><option value="completed">✅ 完了する</option>
                                  </select>
                                </div>
                              </td>
                            </tr>
                          );
                        })
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {/* ヘッダーエリア */}
          <header className="bg-white/95 dark:bg-slate-955/95 border-b border-slate-202 dark:border-slate-700 sticky top-0 z-50 shadow-sm backdrop-blur-lg divide-y divide-slate-150 dark:divide-slate-800 transition-colors duration-200">
            <div className="px-6 py-3 flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 bg-gradient-to-tr from-indigo-700 to-purple-600 text-white p-2.5 rounded-2xl font-black text-sm leading-none">PL</div>
                <div>
                  <h1 className="text-xs font-black text-slate-955 dark:text-white leading-tight">Project Loom</h1>
                  <p className="text-[9px] text-slate-440 dark:text-slate-505 font-extrabold uppercase tracking-wider">
                    Sansan専用ダッシュボード 
                    {(!useFirebase || (gistToken && gistId)) && <span className="ml-1 text-emerald-600 dark:text-emerald-404 bg-emerald-55 dark:bg-emerald-900/30 px-1 py-0.5 rounded font-black text-[7.5px]">{(gistToken && gistId) ? 'GIST-SYNC' : 'LOCAL-STORE'}</span>}
                  </p>
                </div>
              </div>

              <div className="flex bg-slate-150 dark:bg-slate-800 p-0.5 rounded-xl border border-slate-202 dark:border-slate-700 text-xs shadow-inner">
                <button onClick={() => setViewMode('board')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 ${viewMode === 'board' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow-xs' : 'text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white'}`}><IconCalendar className="h-3 w-3 text-indigo-500" /><span>📋 進行ダッシュボード</span></button>
                <button onClick={() => setViewMode('database')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 ${viewMode === 'database' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow-xs' : 'text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white'}`}><IconDatabase className="h-3 w-3 text-indigo-500" /><span>🗃️ データベース</span></button>
                <button onClick={() => setViewMode('analytics')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 ${viewMode === 'analytics' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow-xs' : 'text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white'}`}><IconChart className="h-4 w-4 text-indigo-500" /><span>📊 アナリティクス</span></button>
              </div>

              <div className="flex items-center gap-3 shrink-0">
                {/* 今日やるタスク集約ボタン */}
                <div className="relative shrink-0">
                  <button 
                    onClick={() => setShowTodayDropdown(!showTodayDropdown)} 
                    className={`flex items-center gap-1.5 text-[11px] font-black px-3.5 py-2 rounded-xl border transition-all shadow-xs ${activeTodayTasks.length > 0 ? 'bg-amber-500 dark:bg-amber-955 border-amber-500 dark:border-amber-700 text-white dark:text-amber-300 animate-pulse' : 'bg-slate-55 dark:bg-slate-800 border-slate-202 dark:border-slate-705 text-slate-605 dark:text-slate-300 hover:bg-slate-150'}`}
                  >
                    <span>🔥 今日やる</span>
                    {activeTodayTasks.length > 0 && (
                      <span className="bg-white text-amber-600 dark:bg-amber-900 dark:text-amber-200 text-[9px] px-1.5 py-0.5 rounded-full font-black font-mono">
                        {activeTodayTasks.length}
                      </span>
                    )}
                    {overdueTodayTasks.length > 0 && <span className="text-[10px] animate-bounce" title="遅延タスクあり！">🚨</span>}
                  </button>

                  {/* 今日やるドロップダウン */}
                  {showTodayDropdown && (
                    <React.Fragment>
                      <div className="fixed inset-0 z-40" onClick={() => setShowTodayDropdown(false)}></div>
                      <div className="absolute top-full right-0 mt-2 w-80 bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-2xl shadow-xl z-50 flex flex-col max-h-[70vh]">
                        <div className="p-3 border-b border-slate-150 dark:border-slate-700 bg-slate-55 dark:bg-slate-955 flex justify-between items-center">
                          <span className="font-bold text-xs text-slate-705 dark:text-slate-300">🔥 今日やる一覧</span>
                          {overdueTodayTasks.length > 0 && (
                            <span className="bg-rose-55 dark:bg-rose-900/30 text-rose-605 dark:text-rose-400 text-[9px] px-2 py-0.5 rounded-lg border border-rose-200 dark:border-rose-800 font-extrabold animate-pulse">🚨 遅延 {overdueTodayTasks.length}件</span>
                          )}
                        </div>
                        <div className="overflow-y-auto p-3 space-y-2 bg-slate-55/30 dark:bg-slate-900/30 scrollbar-thin max-h-[50vh]">
                          {todayTasks.length === 0 ? (
                            <p className="text-[10px] text-slate-404 dark:text-slate-505 text-center py-6 italic">指定されたタスクはありません。</p>
                          ) : (
                            todayTasks.map(t => {
                              const isOver = isOverdue(t.dueDate, t.status);
                              const step = stepList.find(s => s.id === t.stepId);
                              return (
                                <div key={t.id} className={`p-2.5 rounded-xl border flex flex-col gap-1.5 text-left relative transition-all ${t.status === 'completed' ? 'bg-slate-150/50 dark:bg-slate-900/50 border-slate-202 opacity-60' : isOver ? 'bg-rose-55 dark:bg-rose-955/20 border-rose-300' : 'bg-white dark:bg-slate-800 border-slate-202 dark:border-slate-705'}`}>
                                  <div className="flex items-start justify-between gap-2">
                                    <button 
                                      onClick={() => {
                                        setShowTodayDropdown(false); setViewMode('board');
                                        if (collapsedSteps[t.stepId]) setCollapsedSteps(p => ({ ...p, [t.stepId]: false }));
                                        // 💡 自動ジャンプ空振りを防ぐ待機(350ms)＋ハイライトエフェクト
                                        setTimeout(() => { 
                                          const el = document.getElementById(`task-anchor-${t.id}`); 
                                          if (el) {
                                            el.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
                                            el.classList.add('ring-4', 'ring-amber-500', 'dark:ring-amber-600', 'scale-[1.02]', 'z-50');
                                            setTimeout(() => el.classList.remove('ring-4', 'ring-amber-500', 'dark:ring-amber-600', 'scale-[1.02]', 'z-50'), 1500);
                                          }
                                        }, 350);
                                      }}
                                      className="text-[11px] font-bold text-slate-805 dark:text-slate-100 hover:underline truncate flex-1 text-left"
                                    >
                                      {t.title}
                                    </button>
                                    <input type="checkbox" checked={t.status === 'completed'} onChange={() => changeTaskStatus(t.id, t.status === 'completed' ? 'pending' : 'completed')} className="rounded border-slate-300 h-3.5 w-3.5 cursor-pointer shrink-0" />
                                  </div>
                                  <div className="flex items-center justify-between text-[9px] text-slate-404 dark:text-slate-555 font-bold leading-none">
                                    <span>👤 {t.interactor} {step && `(${step.name})`}</span>
                                    <span className={isOver && t.status !== 'completed' ? 'text-rose-605 font-extrabold animate-pulse' : ''}>{t.dueDate}</span>
                                  </div>
                                </div>
                              );
                            })
                          )}
                        </div>
                      </div>
                    </React.Fragment>
                  )}
                </div>

                {/* プロフィール */}
                <div className="flex items-center gap-2 bg-slate-150 dark:bg-slate-800 pl-2 pr-3 py-1 rounded-2xl border border-slate-202 dark:border-slate-700">
                  <div className="h-6 w-6 rounded-full bg-indigo-500 text-white font-bold flex items-center justify-center text-[10px]">
                    {user.displayName ? user.displayName.charAt(0) : 'S'}
                  </div>
                  <div className="text-left shrink-0">
                    <div className="text-[9px] font-black text-slate-805 dark:text-white truncate max-w-[80px]">{user.displayName || 'Sansan メンバー'}</div>
                    <button onClick={handleLogout} className="text-[8px] font-black text-rose-605 dark:text-rose-400 block leading-none hover:underline">ログアウト</button>
                  </div>
                </div>

                <button onClick={toggleDarkMode} className="p-2 rounded-xl border border-slate-202 dark:border-slate-700 bg-slate-55 dark:bg-slate-800 text-slate-605 dark:text-slate-300 hover:bg-slate-150 shadow-xs">
                  {isDarkMode ? <IconSun className="h-4 w-4 text-amber-400" /> : <IconMoon className="h-4 w-4 text-indigo-500" />}
                </button>
                <button onClick={() => setShowSettingsModal(true)} className="flex items-center gap-1 text-[11px] font-extrabold text-slate-605 dark:text-slate-300 hover:text-purple-700 bg-slate-55 dark:bg-slate-800 border border-slate-202 px-3 py-2 rounded-xl shadow-xs"><IconSettings className="h-3.5 w-3.5" /><span>⚙️ 設定</span></button>
                
                {/* 完了率バー */}
                <div className="flex items-center gap-2.5 bg-slate-55 dark:bg-slate-800 px-2.5 py-1.5 rounded-xl border border-slate-202 dark:border-slate-700 text-xs">
                  <div className="text-right leading-none">
                    <span className="text-[8px] text-slate-440 dark:text-slate-505 font-extrabold block mb-0.5 uppercase tracking-wide">完了率</span>
                    <span className="text-[9px] font-black text-slate-550 font-mono">{activeProject ? activeProject.code : '---'}</span>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <div className="h-1.5 w-16 bg-slate-150 dark:bg-slate-700 rounded-full overflow-hidden shadow-inner">
                      <div className="h-full bg-indigo-500 bg-gradient-to-r from-indigo-500 to-purple-600" style={{ width: `${projectProgress}%` }}></div>
                    </div>
                    <span className="text-[10px] font-black text-indigo-600 dark:text-indigo-404 font-mono">{projectProgress}%</span>
                  </div>
                </div>
              </div>
            </div>

            {/* サブヘッダー (フォルダ・案件切り替え) */}
            <div className="px-6 py-2.5 bg-slate-55/50 dark:bg-slate-955/50 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
              <div className="flex flex-wrap items-center gap-2 text-xs">
                <div className="flex items-center gap-1.5 bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 rounded-xl px-2.5 py-1 shadow-xs">
                  <IconFolder className="h-3.5 w-3.5 text-purple-600 dark:text-purple-404 shrink-0" />
                  <select value={selectedFolderId} onChange={(e) => { const fId = e.target.value; setSelectedFolderId(fId); setCurrentProjectId(projects.filter(p => p.folderId === fId)[0]?.id || ''); }} className="bg-transparent text-xs font-black text-purple-800 dark:text-purple-300 focus:outline-none cursor-pointer pr-1 leading-none">
                    {folders.map(f => <option key={f.id} value={f.id} className="dark:bg-slate-800">{f.name}</option>)}
                  </select>
                  <div className="flex items-center gap-0.5 border-l border-slate-202 pl-1.5 ml-0.5">
                    <button onClick={() => setShowAddFolderModal(true)} className="text-[9px] text-purple-600 font-extrabold px-1">＋</button>
                    <button onClick={(e) => handleDeleteFolder(selectedFolderId, e)} className="text-[9px] text-slate-440 font-extrabold px-1">×</button>
                  </div>
                </div>
                <IconChevronRight className="h-3 w-3 text-slate-404 shrink-0" />
                <div className="flex items-center gap-1.5 bg-white/95 dark:bg-slate-800 border border-slate-202 dark:border-slate-705 rounded-xl px-2.5 py-1 shadow-xs">
                  <span className="text-[10px] shrink-0 leading-none">📄</span>
                  <select value={currentProjectId} onChange={(e) => setCurrentProjectId(e.target.value)} className="bg-transparent text-xs font-black text-indigo-800 dark:text-indigo-300 focus:outline-none cursor-pointer pr-1 leading-none" disabled={filteredProjects.length === 0}>
                    {filteredProjects.length > 0 ? filteredProjects.map(p => <option key={p.id} value={p.id} className="dark:bg-slate-800">{p.name}</option>) : <option value="">(案件なし)</option>}
                  </select>
                  <div className="flex items-center gap-0.5 border-l border-slate-202 pl-1.5 ml-0.5">
                    <button onClick={() => { setNewProjFolderId(selectedFolderId); setShowAddProjectModal(true); }} className="text-[9px] text-indigo-600 font-extrabold px-1">＋</button>
                  </div>
                </div>
              </div>

              {viewMode === 'board' && activeProject && (
                <div className="flex-1 lg:max-w-xl xl:max-w-2xl flex items-center gap-2 overflow-x-auto pb-0.5 scrollbar-thin pl-1">
                  <div className="text-[9px] font-black text-slate-440 tracking-wider pr-1 border-r border-slate-202 flex items-center gap-1 leading-none"><IconClock className="h-3 w-3" /> 進捗</div>
                  {stepList.map((step, idx) => {
                    const t = tasks.filter(x => x.stepId === step.id), c = t.filter(x => x.status === 'completed').length, l = t.filter(x => isOverdue(x.dueDate, x.status)).length;
                    const p = t.length > 0 ? Math.round((c / t.length) * 100) : 0;
                    const dClass = colorClassesMap[deptList.find(d => d.key === step.deptKey)?.color || 'slate'] || colorClassesMap.purple;
                    return (
                      <button key={step.id} onClick={() => handleScrollToStep(step.id)} className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 hover:border-indigo-400 rounded-xl px-2.5 py-1.5 flex items-center gap-2.5 cursor-pointer shrink-0 shadow-xs text-left group">
                        <div className="leading-none">
                          <div className="text-[9px] font-black text-slate-700 dark:text-slate-300 truncate max-w-[90px] leading-tight">{idx + 1}. {step.name}</div>
                          <span className="text-[8px] text-slate-440 font-mono font-bold leading-none">{c}/{t.length}</span>
                        </div>
                        <div className="flex items-center gap-1 shrink-0 font-black leading-none">
                          {l > 0 ? <span className="bg-rose-55 text-rose-605 text-[8px] px-1 rounded border border-rose-200 font-extrabold shrink-0 animate-pulse">🚨遅延 {l}</span> : <div className="h-1 w-8 bg-slate-150 dark:bg-slate-700 rounded-full overflow-hidden shadow-inner"><div className={`h-full ${dClass.bar}`} style={{ width: `${p}%` }} /></div>}
                          <span className={`text-[9.5px] font-black ${dClass.text} font-mono leading-none`}>{p}%</span>
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          </header>

          {/* メインコンテンツエリア */}
          <main className="max-w-7xl mx-auto p-6 space-y-6">
            
            {/* ============================== */}
            {/* 1. ボード（カンバン）ビュー    */}
            {/* ============================== */}
            {viewMode === 'board' && (
              <React.Fragment>
                {activeProject ? (
                  <div className="space-y-6">
                    
                    {/* 案件情報編集モーダルUI */}
                    {editingProject ? (
                      <div className="bg-purple-55 dark:bg-purple-900/20 border-2 border-purple-300 dark:border-purple-600 rounded-3xl p-5 shadow-md animate-in fade-in space-y-4">
                        <div className="flex justify-between items-center pb-2 border-b border-purple-200 dark:border-slate-700">
                          <span className="font-extrabold text-purple-850 dark:text-purple-300">✏️ プロジェクト情報の編集</span>
                          <div className="flex gap-2">
                            <button type="button" onClick={() => setEditingProject(false)} className="bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300 px-4 py-1.5 rounded-xl font-bold text-xs">キャンセル</button>
                            <button type="button" onClick={saveProjectEdit} className="bg-indigo-600 text-white px-5 py-1.5 rounded-xl font-bold text-xs">保存する</button>
                          </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 text-xs font-bold">
                          <div className="md:col-span-4">
                            <label className="block text-[10px] text-slate-404 mb-1">プロジェクト名称</label>
                            <input type="text" value={projectForm.name} onChange={e => setProjectForm({...projectForm, name: e.target.value})} className="w-full p-2.5 rounded-xl border bg-white dark:bg-slate-800 text-slate-805 dark:text-white" />
                          </div>
                          <div>
                            <label className="block text-[10px] text-slate-404 mb-1">管理コード</label>
                            <input type="text" value={projectForm.code} onChange={e => setProjectForm({...projectForm, code: e.target.value})} className="w-full p-2.5 rounded-xl border bg-white dark:bg-slate-800 text-slate-805 dark:text-white font-mono" />
                          </div>
                          <div>
                            <label className="block text-[10px] text-slate-404 mb-1">ステータス</label>
                            <select value={projectForm.status} onChange={e => setProjectForm({...projectForm, status: e.target.value})} className="w-full p-2.5 rounded-xl border bg-white dark:bg-slate-800 text-slate-805 dark:text-white">
                              <option value="pending">未着手</option><option value="in_progress">進行中</option><option value="completed">完了</option><option value="not_applicable">対応なし</option>
                            </select>
                          </div>
                          <div>
                            <label className="block text-[10px] text-slate-404 mb-1">開始予定日</label>
                            <input type="date" value={projectForm.startDate} onChange={e => setProjectForm({...projectForm, startDate: e.target.value})} className="w-full p-2.5 rounded-xl border bg-white dark:bg-slate-800 text-slate-805 dark:text-white font-mono" />
                          </div>
                          <div>
                            <label className="block text-[10px] text-slate-404 mb-1">目標完了日</label>
                            <input type="date" value={projectForm.endDate} onChange={e => setProjectForm({...projectForm, endDate: e.target.value})} className="w-full p-2.5 rounded-xl border bg-white dark:bg-slate-800 text-slate-805 dark:text-white font-mono" />
                          </div>
                        </div>
                      </div>
                    ) : (
                      /* 通常の案件概要カード */
                      <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-4 flex flex-col md:flex-row justify-between gap-4 shadow-sm animate-in fade-in transition-colors group">
                        <div className="space-y-2 flex-1">
                          <div className="flex items-center gap-2 text-xs text-slate-404 font-extrabold"><span>期間: {activeProject.startDate} 〜 {activeProject.endDate}</span></div>
                          <div className="flex items-center gap-2">
                            <h2 className="text-base font-black text-slate-805 dark:text-white leading-tight">{activeProject.name}</h2>
                            <button onClick={() => setEditingProject(true)} className="p-1 text-slate-404 hover:text-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity"><IconEdit2 /></button>
                          </div>
                          <div className="flex flex-wrap gap-2 pt-2">
                            {activeProject.links?.map(lnk => <a key={lnk.id} href={lnk.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 text-[10.5px] bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300 px-2.5 py-0.5 rounded-lg font-bold border border-slate-202 dark:border-slate-600"><IconExternalLink />{lnk.label}</a>)}
                          </div>
                          <div className="flex flex-wrap items-center gap-2 mt-3 pt-3 border-t border-slate-202 dark:border-slate-700/50">
                            {['pending','in_progress','completed','not_applicable'].map(st => <label key={st} className={`flex items-center gap-1 px-2.5 py-1 rounded-lg text-[10px] font-bold cursor-pointer border ${taskFilter[st] ? 'bg-indigo-600 text-white' : 'text-slate-404 border-slate-202'}`}><input type="checkbox" className="sr-only" checked={taskFilter[st]} onChange={() => setTaskFilter({...taskFilter, [st]: !taskFilter[st]})} />{st === 'pending' ? '🔘 未対応' : st === 'in_progress' ? '⚡ 進行中' : st === 'completed' ? '✅ 完了' : '🚫 対応なし'}</label>)}
                          </div>
                        </div>
                        <div className="flex flex-col items-end justify-between shrink-0 self-stretch">
                          {/* 💡 復活した未完了タスク一覧ボタン */}
                          <button onClick={() => setShowUncompletedListModal(true)} className="text-[10.5px] text-slate-605 dark:text-slate-300 bg-slate-150 dark:bg-slate-700 hover:bg-slate-202 dark:hover:bg-slate-600 font-extrabold px-3.5 py-2 rounded-xl flex items-center gap-1.5 shadow-sm transition-colors"><IconDatabase className="h-3.5 w-3.5" /> 📄 プロジェクト未完了タスク一覧</button>
                          <button onClick={() => setShowAddStepForm(true)} className="text-[10.5px] bg-indigo-600 hover:bg-indigo-700 text-white font-black px-4 py-2 rounded-xl flex items-center gap-1.5 shadow-sm transition-colors mt-auto"><IconPlus className="h-3.5 w-3.5" /> STEP大工程を追加</button>
                        </div>
                      </div>
                    )}

                    {/* STEP追加フォーム */}
                    {showAddStepForm && (
                      <form onSubmit={handleAddStep} className="bg-purple-55 dark:bg-purple-900/20 border border-purple-300 rounded-3xl p-5 space-y-4 text-xs animate-in fade-in">
                        <div className="flex justify-between items-center pb-2 border-b dark:border-slate-700">
                          <span className="font-extrabold text-purple-850 dark:text-purple-300">📂 大ステップの新規作成</span>
                          <div className="flex gap-2">
                            <button type="button" onClick={() => setShowAddStepForm(false)} className="bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300 px-3 py-1.5 rounded-xl font-bold">キャンセル</button>
                            <button type="submit" className="bg-indigo-600 text-white px-4 py-1.5 rounded-xl font-bold">作成する</button>
                          </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-[10px] text-slate-404 font-bold mb-1">工程名 *</label>
                            <input required type="text" placeholder="工程名を入力..." value={newStepName} onChange={e => setNewStepName(e.target.value)} className="w-full border p-2.5 rounded-xl bg-white dark:bg-slate-800 font-bold text-slate-805 dark:text-white" />
                          </div>
                          <div>
                            <label className="block text-[10px] text-slate-404 font-bold mb-1">担当部署</label>
                            <select value={newStepDeptKey} onChange={e => setNewStepDeptKey(e.target.value)} className="w-full border p-2.5 rounded-xl bg-white dark:bg-slate-800 font-bold text-slate-805 dark:text-white">
                              {deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}
                            </select>
                          </div>
                          <div>
                            <label className="block text-[10px] text-slate-404 font-bold mb-1">開始予定日</label>
                            <input type="date" value={newStepStartDate} onChange={e => setNewStepStartDate(e.target.value)} className="w-full border p-2.5 rounded-xl bg-white dark:bg-slate-800 font-mono text-slate-805 dark:text-white" />
                          </div>
                          <div>
                            <label className="block text-[10px] text-slate-404 font-bold mb-1">目標完了日</label>
                            <input type="date" value={newStepDueDate} onChange={e => setNewStepDueDate(e.target.value)} className="w-full border p-2.5 rounded-xl bg-white dark:bg-slate-800 font-mono text-slate-805 dark:text-white" />
                          </div>
                          <div className="md:col-span-2">
                            <label className="block text-[10px] text-slate-404 font-bold mb-1">工程の説明・概要</label>
                            <textarea placeholder="工程の詳細や進め方のメモ..." value={newStepDesc} onChange={e => setNewStepDesc(e.target.value)} className="w-full border p-2.5 rounded-xl bg-white dark:bg-slate-800 h-16 text-slate-805 dark:text-white" />
                          </div>
                        </div>
                      </form>
                    )}

                    {/* 大ステップのループ描画 */}
                    <div className="space-y-8">
                      {stepList.map((step, index) => {
                        const stepTksAll = tasks.filter(t => t.stepId === step.id);
                        const stpProg = getStepProgress(step.id);
                        const isCol = !!collapsedSteps[step.id];
                        const isEd = editingStepId === step.id;
                        const cClass = colorClassesMap[deptList.find(d => d.key === step.deptKey)?.color || 'slate'] || colorClassesMap.purple;

                        return (
                          <div 
                            key={step.id} 
                            id={`step-anchor-${step.id}`}

                            onDragOver={(e) => handleDragOver(index, e)}
                            onDragEnd={handleDragEnd}

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
