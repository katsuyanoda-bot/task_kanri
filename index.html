    // Gistファイル情報の保存処理関数（App内でブラウザ保存の値と連動するように修正）
    const compressImage = (file, maxWidth = 800) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image(); img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width, height = img.height;
            if (width > maxWidth) { height = (maxWidth * height) / width; width = maxWidth; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.onerror = reject;
        };
        reader.onerror = reject;
      });
    };

    const getDurationDays = (task) => {

      };

      const changeTaskStatus = (taskId, newStat) => {
        const next = tasks.map(t => {
          if (t.id !== taskId) return t;
          const now = new Date(); const dStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
          const upd = { ...t, status: newStat }; const dOnly = dStr.split(' ')[0];
          if (newStat === 'in_progress') { if (!t.startedAt) upd.startedAt = dOnly; upd.completedAt = null; upd.contextLogs = [{ id: `sys_${Date.now()}`, date: dStr, text: '⚡ 進行中に変更', links: [], completed: false, isSystem: true }, ...(t.contextLogs || [])]; } 
          else if (newStat === 'completed') { upd.completedAt = dOnly; if (!t.startedAt) upd.startedAt = dOnly; upd.contextLogs = [{ id: `sys_${Date.now()}`, date: dStr, text: '✅ 完了に変更', links: [], completed: true, isSystem: true }, ...(t.contextLogs || [])]; } 
          else if (newStat === 'not_applicable') { upd.completedAt = dOnly; if (!t.startedAt) upd.startedAt = dOnly; upd.contextLogs = [{ id: `sys_${Date.now()}`, date: dStr, text: '🚫 対応なしに変更', links: [], completed: true, isSystem: true }, ...(t.contextLogs || [])]; } 
          else if (newStat === 'pending') { upd.startedAt = null; upd.completedAt = null; }
          return upd;
        });
        updateActiveProject({ ...activeProject, tasks: next });
      };

      const handleAddTask = (stepId, e) => { e.preventDefault(); if (!newTaskTitle.trim()) return; const tk = { id: `t_${Date.now()}`, stepId, title: newTaskTitle.trim(), description: newTaskDesc.trim() || '', assignee: newTaskAssignee.trim(), department: newTaskDept, dueDate: newTaskDueDate || new Date().toISOString().split('T')[0], status: 'pending', isHighPriority: false, startedAt: null, completedAt: null, attachedImages: [...newTaskImages], contextLogs: [] }; updateActiveProject({ ...activeProject, tasks: [...tasks, tk] }); setNewTaskTitle(''); setNewTaskDesc(''); setNewTaskImages([]); setAddingTaskStepId(null); showAlert(`タスクを登録しました。`); };
      const startEditing = (task) => { setEditingTaskId(task.id); setEditTaskImages(task.attachedImages ? [...task.attachedImages] : []); setEditFormData({ title: task.title, description: task.description || '', assignee: task.assignee, department: task.department, dueDate: task.dueDate }); };
      const saveEdit = (taskId) => { updateActiveProject({ ...activeProject, tasks: tasks.map(t => t.id === taskId ? { ...t, title: editFormData.title, description: editFormData.description, assignee: editFormData.assignee, department: editFormData.department, dueDate: editFormData.dueDate, attachedImages: [...editTaskImages] } : t) }); setEditingTaskId(null); showAlert('タスクを保存しました。'); };

      const handleCopyToClipboard = (text, successMsg) => {
        if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(() => showAlert(successMsg || 'コピーしました！')); } 
        else { const tx = document.createElement("textarea"); tx.value = text; document.body.appendChild(tx); tx.select(); document.execCommand('copy'); document.body.removeChild(tx); showAlert(successMsg || 'コピーしました！'); }
      };

      const handleCreateDept = (e) => { e.preventDefault(); if (!newDeptLabel.trim()) return; const key = `dept_${Date.now()}`; setDeptList(p => [...p, { key, label: newDeptLabel.trim(), color: newDeptColor, order: p.length }]); setNewDeptLabel(''); showAlert(`部署を登録しました。`); };
      const handleDeleteDept = (key) => {
        if (deptList.length <= 1) { showAlert('少なくとも1つの部署を残す必要があります。'); return; }
        triggerConfirm('部署の削除', '削除しますか？(関連は初期部署にリセットされます)', () => {
          const rem = deptList.filter(d => d.key !== key); const fb = rem[0].key; setDeptList(rem);
          setProjects(p => p.map(proj => ({ ...proj, tasks: (proj.tasks||[]).map(t => t.department === key ? { ...t, department: fb } : t), stepList: (proj.stepList||[]).map(s => s.deptKey === key ? { ...s, deptKey: fb } : s) })));
        });
      };

        return (

          {alertMessage && (
            <div className="fixed bottom-6 right-6 bg-slate-900/95 dark:bg-slate-800 text-white text-xs px-5 py-4 rounded-2xl shadow-2xl z-[100] flex items-center gap-2 border border-slate-700 dark:border-slate-600 backdrop-blur-md animate-bounce">
              <IconInfo className="h-5 w-5 text-indigo-400 shrink-0" />
              <span className="font-bold leading-relaxed">{alertMessage}</span>
            </div>

          {/* 確認モーダル */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/70 backdrop-blur-sm flex items-center justify-center z-[100]">

                <div className="flex items-center gap-3 pb-3 border-b border-slate-100 dark:border-slate-700 text-rose-600 dark:text-rose-400">
                  <div className="p-2 bg-rose-50 dark:bg-rose-900/30 rounded-2xl"><IconWarning className="h-6 w-6" /></div>
                  <h3 className="font-extrabold text-sm text-slate-900 dark:text-slate-100 leading-tight">{confirmModal.title}</h3>
                </div>
                <p className="text-xs text-slate-500 dark:text-slate-400 whitespace-pre-line leading-relaxed">{confirmModal.message}</p>
                <div className="flex justify-end gap-2 px-1 pt-3 border-t border-slate-100 dark:border-slate-700 text-xs">
                  <button type="button" onClick={closeConfirm} className="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 px-4 py-2.5 rounded-2xl font-bold">キャンセル</button>
                  <button type="button" onClick={confirmModal.onConfirm} className="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2.5 rounded-2xl font-extrabold shadow-md">実行する</button>
                </div>

            </div>

          {/* 画像ライトボックス */}
          {lightboxImage && (
            <div className="fixed inset-0 bg-slate-900/90 z-[200] flex items-center justify-center p-4 cursor-zoom-out" onClick={() => setLightboxImage(null)}>
              <div className="absolute top-4 right-4 bg-white/20 p-2.5 rounded-full"><IconX className="h-6 w-6 text-white" /></div>
              <img src={lightboxImage} alt="拡大" className="max-w-full max-h-full rounded-2xl object-contain shadow-2xl" />
            </div>

          {/* ヘッダー */}
          <header className="bg-white/95 dark:bg-slate-900/95 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-50 shadow-sm backdrop-blur-lg divide-y divide-slate-100 dark:divide-slate-800">
            <div className="px-6 py-3 flex flex-wrap items-center justify-between gap-4">

                  <h1 className="text-xs font-black text-slate-900 dark:text-white leading-tight">Project Loom</h1>

              </div>

              <div className="flex bg-slate-100 dark:bg-slate-800/80 p-0.5 rounded-xl border border-slate-200 dark:border-slate-700 text-xs shadow-inner">
                <button onClick={() => setViewMode('board')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all ${viewMode === 'board' ? 'bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-400 shadow-sm' : 'text-slate-600 dark:text-slate-400'}`}><IconCalendar className="h-3 w-3 text-indigo-500" /><span>📋 ダッシュボード</span></button>
                <button onClick={() => setViewMode('database')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all ${viewMode === 'database' ? 'bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-400 shadow-sm' : 'text-slate-600 dark:text-slate-400'}`}><IconDatabase className="h-3 w-3 text-indigo-500" /><span>🗃️ データベース</span></button>

                    <span className="text-[8px] text-slate-400 font-extrabold block mb-0.5">完了率</span>

                  <div className="flex items-center gap-1.5">
                    <div className="h-1.5 w-16 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-indigo-500" style={{ width: `${projectProgress}%` }}></div></div>

                  <select value={selectedFolderId} onChange={(e) => { const fId = e.target.value; setSelectedFolderId(fId); const av = projects.filter(p => p.folderId === fId); setCurrentProjectId(av.length > 0 ? av[0].id : ''); setEditingProject(false); }} className="bg-transparent text-xs font-black text-purple-800 dark:text-purple-300 focus:outline-none cursor-pointer pr-1 leading-none">
                    {folders.map(f => <option key={f.id} value={f.id} className="dark:bg-slate-800">{f.name}</option>)}

                    <button onClick={(e) => handleDeleteFolder(selectedFolderId, e)} className="text-[9px] text-slate-400 hover:text-rose-600 font-extrabold px-1">×</button>
                  </div>
                </div>
                <IconChevronRight className="h-3 w-3 text-slate-400 shrink-0" />
                <div className="flex items-center gap-1.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-2.5 py-1 shadow-xs">
                  <span className="text-[10px]">📄</span>
                  <select value={currentProjectId} onChange={(e) => { setCurrentProjectId(e.target.value); setEditingProject(false); }} className="bg-transparent text-xs font-black text-indigo-800 dark:text-indigo-300 focus:outline-none cursor-pointer pr-1 leading-none" disabled={filteredProjects.length === 0}>
                    {filteredProjects.length > 0 ? filteredProjects.map(p => <option key={p.id} value={p.id} className="dark:bg-slate-800">{p.name}</option>) : <option value="">(案件なし)</option>}
                  </select>
                  <div className="flex items-center gap-0.5 border-l border-slate-200 dark:border-slate-700 pl-1.5 ml-0.5">
                    <button onClick={() => { setNewProjFolderId(selectedFolderId); setShowAddProjectModal(true); }} className="text-[9px] text-indigo-600 dark:text-indigo-400 font-extrabold px-1">＋</button>
                  </div>
                </div>
              </div>

              {viewMode === 'board' && activeProject && (

                  <div className="text-[9px] font-black text-slate-400 shrink-0 uppercase tracking-wider pr-1 border-r border-slate-200 dark:border-slate-700 flex items-center gap-1"><IconClock className="h-3 w-3" /> 進捗</div>
                  {stepList.map((step, idx) => {
                    const totalSub = tasks.filter(t => t.stepId === step.id).length;
                    const compSub = tasks.filter(t => t.stepId === step.id && t.status === 'completed').length;
                    const progress = totalSub > 0 ? Math.round((compSub / totalSub) * 100) : 0;
                    const lates = tasks.filter(t => t.stepId === step.id && isOverdue(t.dueDate, t.status)).length;
                    const dClass = colorClassesMap[deptList.find(d => d.key === step.deptKey)?.color || 'slate'] || colorClassesMap.purple;

                    return (
                      <button key={step.id} onClick={() => handleScrollToStep(step.id)} className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-indigo-400 rounded-xl px-2.5 py-1.5 flex items-center gap-2.5 cursor-pointer shrink-0 shadow-xs text-left group">
                        <div className="leading-none">
                          <div className="text-[9px] font-black text-slate-700 dark:text-slate-300 truncate max-w-[90px]">{idx + 1}. {step.name}</div>
                          <span className="text-[8px] text-slate-400 font-mono font-bold">{compSub}/{totalSub}</span>
                        </div>
                        <div className="flex items-center gap-1 shrink-0">
                          {lates > 0 ? <span className="bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 text-[8px] px-1 rounded border border-rose-200 dark:border-rose-800 font-extrabold shrink-0">🚨遅延 {lates}</span> : <div className="h-1 w-8 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden shadow-inner"><div className={`h-full ${dClass.bar}`} style={{ width: `${progress}%` }} /></div>}
                          <span className={`text-[9.5px] font-black ${dClass.text} font-mono`}>{progress}%</span>
                        </div>
                      </button>
                    );

            {viewMode === 'board' && (
              <React.Fragment>
                {activeProject ? (
                  <div className="sticky top-[116px] z-40 bg-white/95 dark:bg-slate-800/95 border border-slate-200 dark:border-slate-700 rounded-3xl p-4 flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-sm backdrop-blur-md">
                    <div className="space-y-2">
                      {editingProject ? (
                        <div className="space-y-3.5 bg-slate-50/60 dark:bg-slate-900/40 p-4 rounded-3xl border border-slate-200 dark:border-slate-700 text-xs shadow-inner">
                          <span className="font-extrabold text-indigo-600 dark:text-indigo-400 block mb-1">✏️ 案件情報の変更</span>
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="text-[10px] text-slate-400 font-bold block mb-0.5">所属大分類フォルダ</label>

                                <option value="pending">未着手</option><option value="in_progress">進行中</option><option value="completed">完了</option><option value="not_applicable">対応なし</option>
                              </select>
                            </div>
                          </div>
                          <div className="grid grid-cols-2 gap-3">
                            <div><label className="text-[10px] text-slate-400 font-bold block mb-0.5">案件プロジェクト名</label><input type="text" value={projectForm.name} onChange={e => setProjectForm({...projectForm, name: e.target.value})} className="w-full border border-slate-300 dark:border-slate-600 rounded-xl p-2 bg-white dark:bg-slate-800 text-xs font-bold focus:outline-none" /></div>
                            <div><label className="text-[10px] text-slate-400 font-bold block mb-0.5">案件コード</label><input type="text" value={projectForm.code} onChange={e => setProjectForm({...projectForm, code: e.target.value})} className="w-full border border-slate-300 dark:border-slate-600 rounded-xl p-2 bg-white dark:bg-slate-800 text-xs font-bold font-mono focus:outline-none" /></div>
                          </div>

                            <div><label className="font-bold text-slate-400 block mb-0.5">目標完了日</label><input type="date" value={projectForm.endDate} onChange={e => setProjectForm({...projectForm, endDate: e.target.value})} className="w-full border border-slate-300 dark:border-slate-600 rounded-xl p-2 font-mono text-xs bg-white dark:bg-slate-800 font-bold focus:outline-none" /></div>
                          </div>
                          <div className="flex justify-end gap-1.5 pt-1.5 border-t border-slate-200 dark:border-slate-700">
                            <button type="button" onClick={() => setEditingProject(false)} className="text-[10px] text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 px-3 py-1.5 rounded-xl font-bold">戻る</button>
                            <button type="button" onClick={saveProjectEdit} className="text-[10px] bg-indigo-600 text-white px-4 py-1.5 rounded-xl font-bold shadow-md shadow-indigo-100 dark:shadow-none">変更を適用</button>
                          </div>
                        </div>
                      ) : (
                        <div>
                          <div className="flex items-center gap-2 text-xs text-slate-400 font-extrabold flex-wrap">
                            <IconCalendar />
                            <span>期間: {activeProject.startDate} 〜 {activeProject.endDate}</span>
                            <span className="ml-1 bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 font-black border border-purple-200 dark:border-purple-800 rounded-xl px-2 py-0.5 text-[9.5px] shadow-xs">📁 {folders.find(f => f.id === activeProject.folderId)?.name || '未分類'}</span>
                            <span className={`ml-1 px-2 py-0.5 rounded-xl text-[9.5px] font-black border shadow-xs ${projectStatusOptions.find(o => o.value === (activeProject.status || 'pending'))?.className}`}>{projectStatusOptions.find(o => o.value === (activeProject.status || 'pending'))?.label}</span>
                          </div>
                          <div className="flex items-center gap-2 mt-1.5 flex-wrap">
                            <h2 className="text-base font-black text-slate-800 dark:text-slate-100 leading-tight">{activeProject.name}</h2>
                            <button onClick={() => handleCopyToClipboard(activeProject.name, '案件名をコピーしました！')} className="p-1 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-300 rounded-lg text-[9px] font-bold shadow-xs">📋 コピー</button>
                            <button onClick={handleDeleteProject} className="text-slate-300 dark:text-slate-500 hover:text-rose-600 p-1 rounded-xl"><IconTrash2 className="h-4 w-4" /></button>
                          </div>
                        </div>
                      )}
                    </div>

                    {!editingProject && (
                      <div className="flex items-center gap-2 shrink-0 self-end md:self-auto">
                        <div className="relative">
                          <button onClick={() => setShowTaskDropdown(!showTaskDropdown)} className="text-[10px] text-slate-700 dark:text-slate-300 font-black flex items-center gap-1.5 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 px-3 py-2 rounded-xl shadow-xs">
                            <IconList className="h-3.5 w-3.5" /> <span>未完了タスク</span>
                            {tasks.filter(t => t.status === 'pending' || t.status === 'in_progress').length > 0 && <span className="bg-rose-500 text-white text-[9px] px-1.5 py-0.5 rounded-full font-black leading-none ml-0.5">{tasks.filter(t => t.status === 'pending' || t.status === 'in_progress').length}</span>}
                          </button>

                            <React.Fragment>

                                          <div className="flex justify-between items-center text-[10px] text-slate-400 select-none">
                                            <span>💬 時系列状況メモ</span>
                                            {addingLogTaskId !== task.id && !isCompleted && !isTaskNA && <button onClick={()=>setAddingLogTaskId(task.id)} className="text-indigo-600 font-bold">＋追記</button>}
                                          </div>
                                          {addingLogTaskId === task.id && (
                                            <div className="space-y-2 bg-slate-50 dark:bg-slate-900 p-2 rounded-xl border dark:border-slate-700">
                                              <textarea value={newLogText} onChange={e=>setNewLogText(e.target.value)} onPaste={e=>handlePasteOnTextInput(e, setNewLogImages)} placeholder="メモ文を入力... (画像コピペ可)" className="w-full p-1.5 text-xs bg-white dark:bg-slate-800 rounded" />
                                              {newLogImages.map((src, i)=><img key={i} src={src} className="w-8 h-8 object-cover rounded inline-block mr-1" />)}
                                              <div className="flex justify-end gap-1.5"><button onClick={()=>addLog(task.id)} className="bg-indigo-600 text-white text-[10px] px-2 py-1 rounded font-bold">追加</button></div>
                                            </div>
                                          )}
                                          <div className="space-y-1.5 max-h-32 overflow-y-auto scrollbar-thin">
                                            {sortedLogs.map(log => (
                                              <div key={log.id} className={`text-[11px] p-2 rounded-lg border dark:border-slate-700 relative ${log.isHighlighted ? 'bg-amber-50 dark:bg-amber-900/20 border-amber-200' : 'bg-white dark:bg-slate-800'}`}>
                                                <div className="text-[8px] text-slate-400 font-mono flex justify-between"><span>⏱ {log.date}</span><div className="flex gap-1"><button onClick={()=>toggleLogHighlight(task.id, log.id)}>📌</button><button onClick={()=>deleteLog(task.id, log.id)}>×</button></div></div>
                                                <p className="whitespace-pre-wrap select-text text-slate-700 dark:text-slate-300 font-bold mt-0.5">{log.text}</p>
                                                {log.attachedImages && log.attachedImages.map((img, i)=><img key={i} src={img} onClick={()=>setLightboxImage(img)} className="w-10 h-10 object-cover rounded mt-1 inline-block mr-1 cursor-zoom-in" />)}
                                              </div>
                                            ))}
                                          </div>
                                        </div>
                                      )}
                                    </div>
                                  )}
                                </div>
                              );
                            }) : (
                              <div className="col-span-2 text-center py-6 text-slate-400 dark:text-slate-500 font-bold border border-dashed dark:border-slate-700 rounded-2xl text-xs">タスクカードはありません</div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </React.Fragment>
            )}

            {/* --- DBビュー --- */}
            {viewMode === 'database' && (
              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 space-y-5 shadow-xs overflow-hidden">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b dark:border-slate-700">
                  <div className="space-y-1">
                    <h2 className="text-base font-black text-slate-800 dark:text-slate-100 flex items-center gap-2"><IconDatabase className="text-indigo-600 dark:text-indigo-400" />ECD案件データベース</h2>
                  </div>
                  <button onClick={() => setShowAddProjectModal(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-xs px-4 py-2.5 rounded-2xl shadow-md">➕ 新規案件を起票する</button>
                </div>
                <div className="flex gap-3">
                  <select value={dbFilterFolderId} onChange={(e) => setDbFilterFolderId(e.target.value)} className="border dark:border-slate-700 rounded-xl p-2 bg-slate-50 dark:bg-slate-900 text-xs font-bold text-slate-600 dark:text-slate-300 focus:outline-none">{folders.map(f => (<option key={f.id} value={f.id}>📁 {f.name}</option>))}</select>
                  <input type="text" placeholder="リアルタイム検索..." value={dbFilterText} onChange={(e) => setDbFilterText(e.target.value)} className="flex-1 border dark:border-slate-700 rounded-xl p-2 text-xs bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 focus:outline-none" />
                </div>
                <div className="overflow-x-auto rounded-2xl border dark:border-slate-700">
                  <table className="w-full text-xs text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-50 dark:bg-slate-800/80 border-b dark:border-slate-700 text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider">
                        <th className="py-3 px-4">ステータス</th><th className="py-3 px-4">案件プロジェクト名称</th><th className="py-3 px-4">コード</th><th className="py-3 px-4">進捗率</th><th className="py-3 px-4 text-center">アクション</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y dark:divide-slate-700">
                      {filteredDbProjects.map(proj => {
                        const prog = calculateProjectProgressById(proj);
                        const statusObj = projectStatusOptions.find(o => o.value === (proj.status || 'pending'));
                        return (
                          <tr key={proj.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/50">
                            <td className="py-3.5 px-4"><span className={`inline-flex px-2 py-0.5 rounded-xl font-black text-[9px] border ${statusObj?.className}`}>{statusObj?.label}</span></td>
                            <td className="py-3.5 px-4 font-black text-slate-900 dark:text-slate-100">{proj.name}</td>
                            <td className="py-3.5 px-4 font-mono font-bold text-slate-500">{proj.code}</td>
                            <td className="py-3.5 px-4"><div className="flex items-center gap-2 w-28"><div className="h-1.5 flex-1 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-indigo-500" style={{ width: `${prog}%` }} /></div><span className="font-mono text-indigo-600 dark:text-indigo-400">{prog}%</span></div></td>
                            <td className="py-3.5 px-4 text-center"><button onClick={() => handleOpenProjectFromDb(proj)} className="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-800 font-black px-2.5 py-1 rounded-xl text-[10px]">開く</button></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>

          {/* 設定モーダル */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/70 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-base font-black text-slate-800 dark:text-slate-100">⚙️ 設定</h2>
                  <button onClick={() => setShowSettingsModal(false)}><IconX className="text-slate-400" /></button>
                </div>
                <div className="flex-1 overflow-y-auto space-y-6 pr-1 scrollbar-thin">
                  
                  {/* (新規追加) 安全なGistクラウド同期設定エリア */}
                  <div className="space-y-4">
                    <span className="text-xs font-black text-slate-500 dark:text-slate-300 block border-b pb-1 dark:border-slate-700 flex items-center gap-1.5">☁️ クラウド同期設定 (GitHub Gist)</span>
                    <p className="text-[10px] text-slate-400 dark:text-slate-500 leading-relaxed">
                      ここに設定情報を入力すると、プロジェクトのデータがあなたのGitHub Gistと安全に自動同期されます。<br />
                      ※秘密の鍵はブラウザ（ローカルストレージ）にのみ安全に保存され、ソースコードやGitHubリポジトリ上には一切保存されないため、スキャンによるセキュリティ警告が発生しなくなります。
                    </p>
                    <div className="space-y-3 text-xs bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-700">
                      <div>
                        <label className="block text-[10px] text-slate-400 font-bold mb-1">GitHub アクセストークン (ghp_...)</label>
                        <input 
                          type="password" 
                          placeholder="ghp_から始まるトークンを入力" 
                          value={tempToken} 
                          onChange={e => setTempToken(e.target.value)} 
                          className="w-full border border-slate-200 dark:border-slate-700 rounded-xl p-2 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-bold focus:outline-none" 
                        />
                      </div>
                      <div>
                        <label className="block text-[10px] text-slate-400 font-bold mb-1">Gist ID (32文字の英数字)</label>
                        <input 
                          type="text" 
                          placeholder="GistのURLに含まれるIDを入力" 
                          value={tempGistId} 
                          onChange={e => setTempGistId(e.target.value)} 
                          className="w-full border border-slate-200 dark:border-slate-700 rounded-xl p-2 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-bold focus:outline-none" 
                        />
                      </div>
                      <div className="flex justify-end gap-2 pt-1">
                        <button 
                          type="button" 
                          onClick={handleSaveGistSettings} 
                          className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-4 py-2 rounded-xl font-extrabold shadow-sm shadow-indigo-100 dark:shadow-none"
                        >
                          同期設定を保存して接続
                        </button>
                      </div>
                    </div>
                  </div>

                  {/* 部署の管理 */}
                  <div className="space-y-4">
                    <span className="text-xs font-black text-slate-500 block border-b pb-1 dark:border-slate-700">担当部署の管理</span>
                    {deptList.map((dept, idx) => (
                      <div key={dept.key} className="flex gap-2 items-center bg-slate-50 dark:bg-slate-900 p-2 rounded-xl border dark:border-slate-700">
                        <div className="flex flex-col"><button onClick={()=>moveDeptOrder(idx,-1)}>▲</button><button onClick={()=>moveDeptOrder(idx,1)}>▼</button></div>
                        <input type="text" value={dept.label} onChange={(e) => handleRenameDeptChange(dept.key, e.target.value)} onBlur={() => handleRenameDeptSave(dept.key)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-800 border dark:border-slate-700 p-1.5 rounded-lg text-slate-800 dark:text-slate-100 focus:outline-none" />
                        <select value={dept.color} onChange={(e) => updateDeptColorSetting(dept.key, e.target.value)} className="text-xs border dark:border-slate-700 p-1 rounded-lg bg-white dark:bg-slate-800">{Object.keys(colorClassesMap).map(c=><option key={c} value={c}>{c}色</option>)}</select>
                        <button onClick={() => handleDeleteDept(dept.key)} className="text-slate-400 hover:text-rose-500 font-bold px-1">×</button>
                      </div>
                    ))}
                    <form onSubmit={handleCreateDept} className="flex gap-2 pt-2 border-t dark:border-slate-700">
                      <input type="text" placeholder="新規部署名..." value={newDeptLabel} onChange={e=>setNewDeptLabel(e.target.value)} className="flex-1 border dark:border-slate-700 rounded-xl p-2 text-xs bg-white dark:bg-slate-900 focus:outline-none" />
                      <button type="submit" className="bg-indigo-600 text-white text-xs px-3 py-2 rounded-xl font-bold">登録</button>
                    </form>
                  </div>

                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
