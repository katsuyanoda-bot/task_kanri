              <div className="pt-2">
                <button onClick={() => handleMockLogin('member@sansan.com')} className="w-full py-4 px-4 bg-indigo-600 hover:bg-indigo-700 text-white border border-indigo-700 rounded-2xl font-black text-xs flex items-center justify-center shadow-md hover:shadow-lg transition-all">
                  <span className="mr-2">🔑</span><span>Sansan社員アカウントでサインイン</span>
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (!isSansanUser) {
        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-955 flex flex-col items-center justify-center p-6 transition-colors duration-200">
            <div className="max-w-md w-full bg-white dark:bg-slate-900 rounded-3xl border border-rose-200 p-8 shadow-2xl text-center space-y-6">
              <div className="mx-auto p-4 bg-rose-55 border border-rose-150 rounded-full w-20 h-20 flex items-center justify-center text-rose-605"><IconWarning className="h-10 w-10" /></div>
              <h1 className="text-lg font-black text-rose-605">アクセス権限エラー</h1>
              <p className="text-xs text-slate-505">@sansan.com 以外のドメインです。</p>
              <button onClick={handleLogout} className="w-full py-2.5 bg-slate-150 rounded-xl font-bold text-xs">トップに戻る</button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-55 dark:bg-slate-955 text-slate-805 dark:text-slate-150 font-sans antialiased pb-16 transition-colors duration-200">
          {alertMessage && (
            <div className="fixed bottom-6 right-6 bg-slate-955/95 dark:bg-slate-805 text-white text-xs px-5 py-4 rounded-2xl shadow-2xl z-[100] whitespace-pre-wrap max-w-sm flex items-center gap-2 border border-slate-705 dark:border-slate-600 backdrop-blur-md animate-bounce">
              <IconInfo className="h-5 w-5 text-indigo-400 shrink-0" />
              <span className="font-bold leading-relaxed">{alertMessage}</span>
            </div>
          )}

          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
                <div className="flex items-center gap-3 pb-3 border-b border-slate-150 dark:border-slate-700 text-rose-605">
                  <div className="p-2 bg-rose-55 dark:bg-rose-900/30 rounded-2xl"><IconWarning className="h-6 w-6 text-rose-605 dark:text-rose-400" /></div>
                  <h3 className="font-extrabold text-sm text-slate-955 dark:text-white leading-tight">{confirmModal.title}</h3>
                </div>
                <p className="text-xs text-slate-505 dark:text-slate-455 whitespace-pre-line leading-relaxed">{confirmModal.message}</p>
                <div className="flex justify-end gap-2 px-1 pt-3 border-t border-slate-150 dark:border-slate-700 text-xs">
                  <button type="button" onClick={closeConfirm} className="bg-slate-150 dark:bg-slate-700 hover:bg-slate-202 dark:hover:bg-slate-600 text-slate-605 dark:text-slate-300 px-4 py-2.5 rounded-2xl font-bold">キャンセル</button>
                  <button type="button" onClick={confirmModal.onConfirm} className="bg-rose-605 hover:bg-rose-700 text-white px-5 py-2.5 rounded-2xl font-extrabold shadow-md">実行</button>
                </div>
              </div>
            </div>
          )}

          {lightboxImage && (
            <div className="fixed inset-0 bg-slate-955/90 z-[200] flex items-center justify-center p-4 cursor-zoom-out" onClick={() => setLightboxImage(null)}>
              <div className="absolute top-4 right-4 bg-white/20 hover:bg-white/30 text-white p-2.5 rounded-full transition-all cursor-pointer"><IconX className="h-6 w-6" /></div>
              <img src={lightboxImage} alt="preview" className="max-w-full max-h-full rounded-2xl shadow-2xl object-contain" />
            </div>
          )}

          <header className="bg-white/95 dark:bg-slate-955/95 border-b border-slate-202 dark:border-slate-700 sticky top-0 z-50 shadow-sm backdrop-blur-lg divide-y divide-slate-150 dark:divide-slate-800 transition-colors duration-200">
            <div className="px-6 py-3 flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 bg-gradient-to-tr from-indigo-700 to-purple-600 text-white p-2.5 rounded-2xl font-black text-sm leading-none">PL</div>
                <div>
                  <h1 className="text-xs font-black text-slate-955 dark:text-white leading-tight">Project Loom</h1>
                  <p className="text-[9px] text-slate-440 dark:text-slate-505 font-extrabold uppercase tracking-wider">Sansan専用ダッシュボード</p>
                </div>
              </div>

              {/* 👥 パターンB: 第3の分析独立タブボタン */}
              <div className="flex bg-slate-150 dark:bg-slate-800 p-0.5 rounded-xl border border-slate-202 dark:border-slate-700 text-xs shadow-inner">
                <button onClick={() => setViewMode('board')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black tracking-wide ${viewMode === 'board' ? 'bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-300 shadow-sm' : 'text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white'}`}><IconCalendar className="h-3 w-3 text-indigo-500" /><span>📋 進行ダッシュボード</span></button>
                <button onClick={() => setViewMode('database')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black tracking-wide ${viewMode === 'database' ? 'bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-300 shadow-sm' : 'text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white'}`}><IconDatabase className="h-3 w-3 text-indigo-500" /><span>🗃️ データベース</span></button>
                <button onClick={() => setViewMode('analytics')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black tracking-wide ${viewMode === 'analytics' ? 'bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-300 shadow-sm' : 'text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white'}`}><IconChart className="h-4 w-4 text-indigo-500" /><span>📊 アナリティクス</span></button>
              </div>

              <div className="flex items-center gap-3 shrink-0">
                <div className="relative shrink-0">
                  <button onClick={() => setShowTodayDropdown(!showTodayDropdown)} className={`flex items-center gap-1.5 text-[11px] font-black px-3.5 py-2 rounded-xl border transition-all ${activeTodayTasks.length > 0 ? 'bg-amber-500 dark:bg-amber-955 border-amber-500 dark:border-amber-700 text-white dark:text-amber-300 animate-pulse' : 'bg-slate-55 dark:bg-slate-800 border-slate-202 dark:border-slate-705 text-slate-605 dark:text-slate-300'}`}>
                    <span>🔥 今日やる</span>
                    {activeTodayTasks.length > 0 && <span className="bg-white text-amber-600 dark:bg-amber-900 dark:text-amber-200 text-[9px] px-1.5 py-0.5 rounded-full font-black font-mono">{activeTodayTasks.length}</span>}
                  </button>
                  {showTodayDropdown && (
                    <React.Fragment>
                      <div className="fixed inset-0 z-40" onClick={() => setShowTodayDropdown(false)}></div>
                      <div className="absolute top-full right-0 mt-2 w-80 bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-2xl shadow-xl z-50 flex flex-col max-h-[70vh]">
                        <div className="p-3 border-b border-slate-150 dark:border-slate-700 bg-slate-55 dark:bg-slate-955 flex justify-between items-center"><span className="font-bold text-xs text-slate-705 dark:text-slate-300">🔥 今日やるタスク一覧</span></div>
                        <div className="overflow-y-auto p-3 space-y-2 bg-slate-55/30 dark:bg-slate-900/30 scrollbar-thin max-h-[50vh]">
                          {todayTasks.length === 0 ? <p className="text-[10px] text-slate-404 dark:text-slate-505 text-center py-6 italic">「今日やる」タスクはありません。</p> : todayTasks.map(t => (
                            <div key={t.id} className="p-2.5 rounded-xl border border-slate-202 bg-white dark:bg-slate-800 text-left text-xs space-y-1">
                              <div className="flex justify-between items-start gap-2">
                                <span className="font-bold text-slate-805 dark:text-slate-100 truncate">{t.title}</span>
                                <input type="checkbox" checked={t.status === 'completed'} onChange={() => changeTaskStatus(t.id, t.status==='completed'?'pending':'completed')} className="rounded h-3.5 w-3.5" />
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </React.Fragment>
                  )}
                </div>

                <div className="flex items-center gap-2 bg-slate-150 dark:bg-slate-800 pl-2 pr-3 py-1 rounded-2xl border border-slate-202 dark:border-slate-700">
                  <div className="h-6 w-6 rounded-full bg-indigo-500 text-white font-bold flex items-center justify-center text-[10px]">{user.displayName ? user.displayName.charAt(0) : 'S'}</div>
                  <div className="text-left shrink-0">
                    <div className="text-[9px] font-black text-slate-805 dark:text-white truncate max-w-[80px]">{user.displayName || 'Sansan メンバー'}</div>
                    <button onClick={handleLogout} className="text-[8px] font-black text-rose-605 block leading-none">ログアウト</button>
                  </div>
                </div>
                <button onClick={toggleDarkMode} className="p-2 rounded-xl border border-slate-202 dark:border-slate-700 bg-slate-55 dark:bg-slate-800 text-slate-605 dark:text-slate-300">{isDarkMode ? '☀️' : '🌙'}</button>
                <button onClick={() => setShowSettingsModal(true)} className="flex items-center gap-1 text-[11px] font-extrabold text-slate-605 bg-slate-55 dark:bg-slate-800 px-3 py-2 rounded-xl border border-slate-202 dark:border-slate-700 shadow-xs"><IconSettings /><span>⚙️ 設定</span></button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto p-6 space-y-6">
            
            {/* ビュー1: 📋 進行ボード */}
            {viewMode === 'board' && (
              <React.Fragment>
                {activeProject ? (
                  <div className="space-y-6">
                    <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-4 flex flex-col md:flex-row justify-between gap-4 shadow-sm animate-in fade-in transition-colors">
                      <div className="space-y-2 flex-1">
                        <div className="flex items-center gap-2 text-xs text-slate-404 font-extrabold"><span>期間: {activeProject.startDate} 〜 {activeProject.endDate}</span></div>
                        <h2 className="text-base font-black text-slate-805 dark:text-white leading-tight">{activeProject.name}</h2>
                        <div className="flex flex-wrap gap-2 pt-2">
                          {activeProject.links?.map(lnk => <a key={lnk.id} href={lnk.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 text-[10.5px] bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300 px-2.5 py-0.5 rounded-lg font-bold border border-slate-202 dark:border-slate-600"><IconExternalLink />{lnk.label}</a>)}
                        </div>
                        <div className="flex flex-wrap items-center gap-2 pt-3 border-t border-slate-150 dark:border-slate-700">
                          {['pending','in_progress','completed','not_applicable'].map(st => <label key={st} className={`flex items-center gap-1 px-2.5 py-1 rounded-lg text-[10px] font-bold cursor-pointer border ${taskFilter[st] ? 'bg-indigo-600 text-white' : 'text-slate-404 border-slate-202'}`}><input type="checkbox" className="sr-only" checked={taskFilter[st]} onChange={() => setTaskFilter({...taskFilter, [st]: !taskFilter[st]})} />{st === 'pending' ? '🔘 未対応' : st === 'in_progress' ? '⚡ 進行中' : st === 'completed' ? '✅ 完了' : '🚫 対応なし'}</label>)}
                        </div>
                      </div>
                      <div className="flex flex-col items-end gap-2 shrink-0 self-start">
                        <button onClick={() => setShowAddStepForm(true)} className="text-[10px] bg-indigo-600 hover:bg-indigo-700 text-white font-black px-3 py-2 rounded-xl flex items-center gap-1 shadow-xs"><IconPlus /> STEP追加</button>
                      </div>
                    </div>

                    {showAddStepForm && (
                      <form onSubmit={handleAddStep} className="bg-purple-55 dark:bg-purple-900/20 border border-purple-300 rounded-3xl p-5 space-y-4 text-xs">
                        <div className="flex justify-between items-center"><span className="font-extrabold text-purple-850 dark:text-purple-300">大ステップの新規作成</span><button type="submit" className="bg-indigo-600 text-white px-4 py-1.5 rounded-xl font-bold">作成する</button></div>
                        <div className="grid grid-cols-2 gap-4">
                          <input required type="text" placeholder="工程名 *" value={newStepName} onChange={e => setNewStepName(e.target.value)} className="border p-2.5 rounded-xl bg-white dark:bg-slate-800" />
                          <select value={newStepDeptKey} onChange={e => setNewStepDeptKey(e.target.value)} className="border p-2.5 rounded-xl bg-white dark:bg-slate-800">{deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}</select>
                        </div>
                      </form>
                    )}

                    <div className="space-y-8">
                      {stepList.map((step, index) => {
                        const stepTksAll = tasks.filter(t => t.stepId === step.id);
                        const stpProg = getStepProgress(step.id);
                        const isCol = !!collapsedSteps[step.id];
                        const cClass = colorClassesMap[deptList.find(d => d.key === step.deptKey)?.color || 'slate'] || colorClassesMap.purple;
                        return (
                          <div key={step.id} className={`bg-white dark:bg-slate-800 rounded-3xl shadow-xs border-4 overflow-hidden ${isCol ? 'border-slate-202' : cClass.borderStrong}`}>
                            <div onClick={() => toggleStepCollapse(step.id)} className={`p-4 border-b flex flex-col md:flex-row justify-between items-start md:items-center gap-4 cursor-pointer ${cClass.bg}`}>
                              <div className="flex items-center gap-3">
                                <span className={`${cClass.bar} text-white font-black text-[10px] px-2.5 py-0.5 rounded shadow-xs`}>STEP {index + 1}</span>
                                <h3 className="font-black text-sm text-slate-805 dark:text-slate-150">{step.name}</h3>
                                {renderStepDeadlineBadge(step, stpProg)}
                              </div>
                              <div className="flex items-center gap-4 shrink-0" onClick={e => e.stopPropagation()}>
                                <div className="text-right"><div className="text-xs font-black text-slate-705 dark:text-slate-300">{stpProg}%</div></div>
                                <button onClick={() => { setAddingTaskStepId(step.id); setNewTaskTitle(''); setNewTaskDesc(''); }} className="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-xl font-black"><IconPlus /> タスク追加</button>
                                <button onClick={() => toggleStepCollapse(step.id)} className="text-slate-404">{isCol ? '▼' : '▲'}</button>
                              </div>
                            </div>

                            {!isCol && (
                              <div className="p-4 space-y-4">
                                {addingTaskStepId === step.id && (
                                  <form onSubmit={(e) => handleAddTask(step.id, e)} className="p-4 bg-slate-55 dark:bg-slate-900 border rounded-2xl space-y-3 text-xs">
                                    <input required type="text" placeholder="タスク名を入力..." value={newTaskTitle} onChange={e => setNewTaskTitle(e.target.value)} className="w-full p-2 border rounded-xl dark:bg-slate-800" />
                                    <textarea placeholder="詳細・備考を入力..." value={newTaskDesc} onChange={e => setNewTaskDesc(e.target.value)} className="w-full p-2 border rounded-xl dark:bg-slate-800" />
                                    <div className="flex justify-end gap-2"><button type="button" onClick={() => setAddingTaskStepId(null)} className="px-3 py-1 bg-slate-202 rounded-lg">キャンセル</button><button type="submit" className="px-4 py-1 bg-indigo-600 text-white rounded-lg">追加</button></div>
                                  </form>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                  {stepTksAll.map((task, taskIndex) => {
                                    if (!taskFilter[task.status]) return null;
                                    const d = task.status === 'completed', w = task.status === 'in_progress', na = task.status === 'not_applicable';
                                    const tkCls = colorClassesMap[deptList.find(dl => dl.key === task.department)?.color || 'slate'] || colorClassesMap.slate;
                                    const dDays = getDurationDays(task);
                                    return (
                                      <div key={task.id} className={`relative border-4 rounded-3xl p-5 bg-white dark:bg-slate-800 shadow-sm flex flex-col justify-between overflow-hidden min-h-[160px] ${d || na ? 'border-slate-202 opacity-60 bg-slate-55/40 dark:bg-slate-800/40' : task.doToday ? 'border-amber-400 bg-amber-50/10 ring-1 ring-amber-300' : tkCls.borderStrong}`}>
                                        
                                        {/* ① 識別ナンバーをカードの左上（絶対配置）に美しく固定 */}
                                        <span className="absolute top-4 left-4 text-[10px] px-2 py-0.5 rounded-lg font-mono font-bold bg-slate-150 dark:bg-slate-900 border border-slate-202 dark:border-slate-700 text-slate-805 dark:text-slate-200 select-none">
                                          #{index+1}-{taskIndex+1}-<span className="font-black">{task.sequenceId || '?'}</span>
                                        </span>

                                        {/* 右上のコントロール群 */}
                                        <div className="absolute top-3.5 right-3.5 flex items-center gap-1.5 z-10" onClick={e => e.stopPropagation()}>
                                          <button onClick={() => toggleDoToday(task.id)} className={`text-[9px] font-black px-2.5 py-1.5 rounded-xl border ${task.doToday ? 'bg-amber-500 text-white border-amber-600 shadow-md' : 'bg-slate-55 dark:bg-slate-700 text-slate-605 dark:text-slate-300 border-slate-202'}`}>🔥 {task.doToday ? '今日やる中' : '今日やる'}</button>
                                          <select value={task.status} onChange={(e) => changeTaskStatus(task.id, e.target.value)} className="text-[9px] font-black px-2 py-1 rounded-xl border bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300">
                                            <option value="pending">🔘 未対応</option><option value="in_progress">⚡ 進行中</option><option value="completed">✅ 完了マーク</option><option value="not_applicable">🚫 対応なし</option>
                                          </select>
                                          <button onClick={() => deleteTask(task.id)} className="text-slate-404 hover:text-rose-605 font-bold text-sm ml-1">×</button>
                                        </div>

                                        {/* ② 文字被りを完全に防ぐため、コントロール下の位置（mt-10）から幅いっぱいに表示 */}
                                        <div className="mt-10 space-y-3 flex-1 flex flex-col justify-between">
                                          <div className="space-y-2">
                                            <h4 className="font-extrabold text-sm text-slate-805 dark:text-slate-150 select-text cursor-text leading-snug">{task.title}</h4>
                                            <div className="flex flex-wrap items-center gap-2 text-[10px] font-bold text-slate-550 dark:text-slate-400">
                                              <span className={`px-2 py-0.5 rounded border ${tkCls.badge}`}>{deptList.find(dl => dl.key === task.department)?.label || '未設定'} : {task.assignee}</span>
                                              <span className="font-mono">⌛ 期日: {task.dueDate}</span>
                                              {task.startedAt && <span className="font-mono text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 px-1.5 py-0.5 rounded border border-indigo-100 dark:border-indigo-900/40">⏱️ {d ? `${task.startedAt} 〜 ${task.completedAt} (${dDays} 営業日)` : `${task.startedAt} 着手 (${dDays} 営業日目)`}</span>}
                                            </div>
                                          </div>

                                          {/* 直接編集が可能な論点・備考エリア */}
                                          <div className="relative group/desc space-y-1" onClick={e => e.stopPropagation()}>
                                            <div className="text-[9.5px] font-bold text-slate-404 flex items-center justify-between"><span><IconInfo className="inline h-3 w-3 mr-0.5" />論点・備考 <span className="text-[8px] font-normal">(クリックで直接編集)</span></span></div>
                                            {editingDescTaskId === task.id ? (
                                              <textarea value={tmpDescValue} onChange={e => setTmpDescValue(e.target.value)} onBlur={() => handleSaveDirectDesc(task.id)} className="w-full text-xs bg-white dark:bg-slate-900 border-2 border-indigo-500 rounded-xl p-2 text-slate-805 dark:text-slate-100 min-h-[50px]" autoFocus />
                                            ) : (
                                              <p onClick={() => { setEditingDescTaskId(task.id); setTmpDescValue(task.description || ''); }} className={`text-xs p-2.5 border rounded-2xl bg-slate-55 dark:bg-slate-900/40 border-slate-202 dark:border-slate-700 whitespace-pre-wrap cursor-pointer hover:border-indigo-400 ${task.description ? 'text-slate-606 dark:text-slate-300' : 'text-slate-404 italic'}`}>{task.description || '入力なし'}</p>
                                            )}
                                          </div>
                                        </div>

                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ) : (
                  <p className="text-slate-404 text-xs italic bg-white p-6 border rounded-3xl text-center shadow-xs">案件プロジェクトが選択されていません。</p>
                )}
              </React.Fragment>
            )}

            {/* ビュー2: 🗃️ データベースビュー */}
            {viewMode === 'database' && (
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl shadow-xs overflow-hidden p-6 space-y-5 animate-in fade-in transition-colors">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-202 dark:border-slate-700">
                  <div className="space-y-1">
                    <h2 className="text-base font-black text-slate-805 dark:text-white flex items-center gap-2"><IconDatabase className="text-indigo-600 dark:text-indigo-400" />ECD案件一覧データベース</h2>
                    <p className="text-xs text-slate-404 dark:text-slate-505">案件・プロジェクトを横断して進捗・ヘルス状況を俯瞰します。</p>
                  </div>
                  <button onClick={() => { setNewProjFolderId(selectedFolderId); setShowAddProjectModal(true); }} className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-xs px-4.5 py-3 rounded-2xl flex items-center gap-1.5"><IconPlus /> 新規案件を起票</button>
                </div>
                <div className="flex flex-col sm:flex-row gap-3 pt-1">
                  <select value={dbFilterFolderId} onChange={(e) => setDbFilterFolderId(e.target.value)} className="border border-slate-202 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-605 dark:text-slate-300 bg-slate-55 dark:bg-slate-900 focus:outline-none">
                    <option value="all">📁 すべてのフォルダ</option>{folders.map(f => (<option key={f.id} value={f.id}>📁 {f.name}</option>))}
                  </select>
                  <select value={dbFilterStatus} onChange={(e) => setDbFilterStatus(e.target.value)} className="border border-slate-202 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-605 dark:text-slate-300 bg-slate-55 dark:bg-slate-900 focus:outline-none">

            {/* ========================================================== */}
            {/* ビュー3: 📊 アナリティクスビュー (パターンBによる独立統合)    */}

              <div className="max-w-7xl mx-auto space-y-6 animate-in fade-in transition-colors">
                
                {/* 分析マクロ・ミクロ切り替えヘッダーパネル */}

                    <h2 className="text-base font-black text-slate-805 dark:text-white flex items-center gap-2"><IconChart className="text-indigo-600 dark:text-indigo-400" />組織・案件推進状況アナリティクス</h2>

              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95">
                <div className="flex justify-between items-center pb-3 border-b border-slate-150 dark:border-slate-700/50">
                  <h3 className="font-extrabold text-sm text-slate-955 dark:text-white flex items-center gap-1.5"><IconFolder className="h-4 w-4 text-indigo-600" />大分類フォルダの追加</h3>
                  <button onClick={() => setShowAddFolderModal(false)} className="text-slate-404"><IconX /></button>
                </div>

                  <button onClick={() => setShowSettingsModal(false)} className="text-slate-404"><IconX className="h-5 w-5" /></button>
                </div>
                <div className="flex-1 overflow-y-auto pr-2 space-y-6 scrollbar-thin">
                  
                  {/* ⑥ 可変基準値しきい値調整インプットコントロール */}
                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-605 dark:text-slate-440 border-b border-slate-202 pb-2">📊 アナリティクス基準値（変数しきい値）の変更</h3>
                    <div className="bg-slate-55 dark:bg-slate-900/50 p-4 rounded-2xl border border-slate-202 shadow-sm grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-605 mb-1">放置判定基準 (営業日)</label>
                        <input type="number" value={riskThresholdDays} onChange={e => { const val = Math.max(1, Number(e.target.value)); setRiskThresholdDays(val); localStorage.setItem('pl_cfg_risk_days', val); }} className="w-full border rounded-xl p-2 bg-white dark:bg-slate-800 font-bold font-mono text-slate-805 focus:border-indigo-400" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-605 mb-1">目標完了日数 (営業日)</label>
                        <input type="number" value={targetLeadTimeDays} onChange={e => { const val = Math.max(1, Number(e.target.value)); setTargetLeadTimeDays(val); localStorage.setItem('pl_cfg_target_lt', val); }} className="w-full border rounded-xl p-2 bg-white dark:bg-slate-800 font-bold font-mono text-slate-805 focus:border-indigo-400" />
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-605 border-b border-slate-202 pb-2">☁️ クラウド同期 (GitHub Gist)</h3>
                    <div className="bg-slate-55 dark:bg-slate-900/50 p-4 rounded-2xl border border-slate-202 shadow-sm space-y-3">
                      <div className="space-y-2">
                        <input type="password" value={tmpGistToken} onChange={e => setTmpGistToken(e.target.value)} className="w-full border rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-805" placeholder="GitHub Personal Access Token" />
                        <input type="text" value={tmpGistId} onChange={e => setTmpGistId(e.target.value)} className="w-full border rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-805 font-mono" placeholder="Gist ID" />
                      </div>
                      <div className="flex justify-end"><button onClick={saveGistSettings} className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md">保存して接続</button></div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-605 border-b border-slate-202 pb-2">担当部署の管理</h3>
                    <div className="space-y-2.5">
                      {deptList.map((dept, idx) => (
                        <div key={dept.key} className="flex items-center gap-2 bg-slate-55 dark:bg-slate-900/50 p-2.5 rounded-2xl border border-slate-202 shadow-sm group">
                          <div className="flex flex-col gap-0.5">
                            <button onClick={() => moveDeptOrder(idx, -1)} disabled={idx === 0} className="p-0.5 rounded text-slate-404"><IconArrowUp /></button>
                            <button onClick={() => moveDeptOrder(idx, 1)} disabled={idx === deptList.length - 1} className="p-0.5 rounded text-slate-404"><IconArrowDown /></button>
                          </div>
                          <input type="text" value={dept.label} onChange={(e) => handleRenameDeptChange(dept.key, e.target.value)} onBlur={() => handleRenameDeptSave(dept.key)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-800 border rounded-xl p-2 text-slate-805 focus:outline-none" />
                          <button onClick={() => handleDeleteDept(dept.key)} className="p-2 text-slate-404 hover:text-rose-605"><IconTrash2 className="h-4 w-4" /></button>
                        </div>
                      ))}
                    </div>
                    <form onSubmit={handleCreateDept} className="flex items-center gap-2 mt-4 bg-indigo-50/50 p-3 rounded-2xl border border-indigo-100 shadow-inner">
                      <input type="text" placeholder="部署名..." value={newDeptLabel} onChange={e => setNewDeptLabel(e.target.value)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-800 border text-slate-805 rounded-xl p-2" />
                      <button type="submit" disabled={!newDeptLabel.trim()} className="bg-indigo-600 text-white disabled:bg-slate-150 px-4 py-2 rounded-xl text-xs font-bold shadow-md">登録</button>
                    </form>
                  </div>

                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
