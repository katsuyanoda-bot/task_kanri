                                stepTasks.map((task, taskIndex) => {
                                  const isBlocked = task.status === 'blocked';
                                  const isCompleted = task.status === 'completed';
                                  const isInProgress = task.status === 'in_progress';
                                  const isLate = isOverdue(task.dueDate, task.status);
                                  
                                  const assignedDeptColorKey = deptList.find(d => d.key === task.department)?.color || 'slate';
                                  const dClass = colorClassesMap[assignedDeptColorKey] || colorClassesMap.slate;
                                  
                                  // クロスブラウザでの不整合を解決した文字列 localeCompare ソート
                                  const sortedLogs = task.contextLogs ? [...task.contextLogs].sort((a, b) => b.date.localeCompare(a.date)) : [];
                                  
                                  // 完了タスクはデフォルトで折り畳み、未完了タスクはデフォルト展開
                                  const isTaskCollapsed = collapsedTasks[task.id] !== undefined 
                                    ? collapsedTasks[task.id] 
                                    : isCompleted;

                                  // 実働日数/経過日数の計算
                                  const durationDays = getDurationDays(task);

                                  return (
                                    <div 
                                      key={task.id}
                                      draggable={editingTaskId !== task.id}
                                      onDragStart={(e) => handleTaskDragStart(step.id, taskIndex, e)}
                                      onDragOver={(e) => handleTaskDragOver(step.id, taskIndex, e)}
                                      onDragEnd={handleTaskDragEnd}
                                      onClick={() => toggleTaskCollapse(task.id)}
                                      className={`group relative border-4 rounded-3xl p-4 transition-all duration-300 flex flex-col justify-between overflow-hidden shadow-xs hover:shadow-md cursor-pointer select-none ${
                                        isCompleted 
                                          ? 'border-slate-200 opacity-60 bg-slate-50/70 shadow-inner' 
                                          : task.isHighPriority 
                                            ? 'border-rose-400 bg-gradient-to-br from-rose-50/10 via-white to-white ring-1 ring-rose-400/5 shadow-sm'
                                            : `${dClass.borderStrong} bg-white` 
                                      } ${draggedTaskInfo?.stepId === step.id && draggedTaskInfo?.index === taskIndex ? 'drag-ghost' : ''}`}
                                    >
                                      {/* タスク右上のホバーアクションエリア */}
                                      <div className="absolute top-3.5 right-3.5 flex items-center gap-1.5 z-10" onClick={(e) => e.stopPropagation()}>
                                        
                                        {/* ホバー時に表示される並び替え＆編集操作ボタン */}
                                        {!isCompleted && (
                                          <div className="opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1 mr-1 bg-white/90 border border-slate-100 p-0.5 rounded-lg backdrop-blur-xs">
                                            <button 
                                              onClick={(e) => { e.stopPropagation(); moveTaskOrder(step.id, taskIndex, -1, e); }}
                                              disabled={taskIndex === 0}
                                              className={`p-1 bg-white border border-slate-200 rounded-md transition shadow-xs ${taskIndex === 0 ? 'opacity-25 cursor-not-allowed' : 'text-slate-400 hover:text-indigo-605'}`}
                                              title="この大ステップ内で上（前）に移動"
                                            >
                                              <IconDragHandle />
                                            </button>
                                            <button 
                                              onClick={(e) => { e.stopPropagation(); startEditing(task); }} 
                                              className="p-1 text-slate-400 hover:text-indigo-606 hover:bg-slate-50 rounded-md transition" 
                                              title="詳細・期日などをインライン編集"
                                            >
                                              <IconEdit2 className="h-3.5 w-3.5" />
                                            </button>
                                            <button 
                                              onClick={(e) => { e.stopPropagation(); deleteTask(task.id); }} 
                                              className="p-1 text-slate-400 hover:text-rose-650 hover:bg-slate-50 rounded-md transition" 
                                              title="このタスクカードを削除"
                                            >
                                              <IconTrash2 className="h-3.5 w-3.5" />
                                            </button>
                                          </div>
                                        )}

                                        {/* 常時表示の「優先度トグル」 */}
                                        <button 
                                          onClick={(e) => { e.stopPropagation(); toggleTaskPriority(task.id); }}
                                          className={`flex items-center gap-0.5 text-[9px] font-black px-2.5 py-1.5 rounded-xl transition-all shadow-xs border ${
                                            task.isHighPriority 
                                              ? 'bg-rose-550 text-white border-rose-600 bg-rose-500 shadow-md shadow-rose-100' 
                                              : 'bg-rose-50/70 text-rose-600 border-rose-200 hover:bg-rose-100/50'
                                          }`}
                                        >
                                          <IconFlag className="h-2.5 w-2.5" />
                                          {task.isHighPriority ? '最優先' : '優先度'}
                                        </button>

                                        {/* 進行状況(ステータス)直接選択セレクトUI */}
                                        <select
                                          value={task.status}
                                          onClick={(e) => e.stopPropagation()} 
                                          onChange={(e) => changeTaskStatus(task.id, e.target.value)}
                                          className={`text-[9px] font-black px-2.5 py-1.5 rounded-xl border cursor-pointer focus:outline-none transition-all ${
                                            task.status === 'completed' 
                                              ? 'bg-emerald-500 text-white border-emerald-600 shadow-md shadow-emerald-100' 
                                              : task.status === 'in_progress'
                                                ? 'bg-blue-500 text-white border-blue-600 shadow-md shadow-blue-100'
                                                : 'bg-slate-100 text-slate-700 border-slate-200 hover:bg-slate-200'
                                          }`}
                                        >
                                          <option value="pending" className="bg-white text-slate-800">🔘 未対応</option>
                                          <option value="in_progress" className="bg-white text-slate-800">⚡ 進行中</option>
                                          <option value="completed" className="bg-white text-slate-800">✅ 完了マーク</option>
                                        </select>

                                        {/* タスク個別アコーディオン開閉ボタン */}
                                        {editingTaskId !== task.id && (
                                          <button 
                                            onClick={(e) => { e.stopPropagation(); toggleTaskCollapse(task.id); }}
                                            className="p-1 text-slate-400 hover:text-indigo-650 hover:bg-slate-100 rounded-lg transition ml-0.5"
                                            title={isTaskCollapsed ? '展開する' : '折りたたむ'}
                                          >
                                            {isTaskCollapsed ? <IconChevronRight className="h-4.5 w-4.5" /> : <IconChevronDown className="h-4.5 w-4.5" />}
                                          </button>
                                        )}
                                      </div>

                                      {/* 1. タスクインライン編集モード */}
                                      {editingTaskId === task.id ? (
                                        <div className="space-y-3.5 text-xs w-full pl-1 pr-4 mt-6 animate-in fade-in duration-150" onClick={(e) => e.stopPropagation()}>
                                          <span className="font-extrabold text-indigo-600 block mb-1">✏️ タスクの詳細編集 (# {index + 1}-{taskIndex + 1})</span>
                                          <input 
                                            type="text" 
                                            value={editFormData.title} 
                                            onChange={e => setEditFormData({...editFormData, title: e.target.value})}
                                            className="w-full font-bold border border-slate-300 rounded-xl p-2.5 focus:border-indigo-500 focus:outline-none"
                                            placeholder="タスク名"
                                          />
                                          <textarea 
                                            value={editFormData.description} 
                                            onChange={e => setEditFormData({...editFormData, description: e.target.value})}
                                            className="w-full border border-slate-300 rounded-xl p-2.5 focus:border-indigo-500 focus:outline-none"
                                            rows={2.5}
                                            placeholder="詳細や論点・調整要件..."
                                          />
                                          <div className="grid grid-cols-3 gap-2">
                                            <div>
                                              <label className="text-[10px] text-slate-400 font-bold block mb-0.5">担当部署</label>
                                              <select 
                                                value={editFormData.department} 
                                                onChange={e => {
                                                  const dKey = e.target.value;
                                                  const found = deptList.find(d => d.key === dKey);
                                                  const updatedAssignee = dKey === 'backoffice' ? '自分 (事務)' : (found ? `${found.label}担当` : '担当者');
                                                  setEditFormData({ ...editFormData, department: dKey, assignee: updatedAssignee });
                                                }}
                                                className="w-full border border-slate-300 rounded-xl p-2 text-xs bg-white focus:outline-none font-bold"
                                              >
                                                {deptList.map(d => (
                                                  <option key={d.key} value={d.key}>{d.label}</option>
                                                ))}
                                              </select>
                                            </div>
                                            <div>
                                              <label className="text-[10px] text-slate-400 font-bold block mb-0.5">担当者名</label>
                                              <input 
                                                type="text"
                                                value={editFormData.assignee}
                                                onChange={e => setEditFormData({...editFormData, assignee: e.target.value})}
                                                className="w-full border border-slate-300 rounded-xl p-2 text-xs focus:outline-none font-bold"
                                                placeholder="例: 経理 (田中)"
                                              />
                                            </div>
                                            <div>
                                              <label className="text-[10px] text-slate-400 font-bold block mb-0.5">完了期日</label>
                                              <input 
                                                type="date" 
                                                value={editFormData.dueDate} 
                                                onChange={e => setEditFormData({...editFormData, dueDate: e.target.value})}
                                                className="w-full border border-slate-300 rounded-xl p-2 text-xs focus:outline-none font-mono font-bold"
                                              />
                                            </div>
                                          </div>
                                          <div className="flex flex-wrap justify-end gap-1.5 pt-2 border-t border-slate-100">
                                            <button onClick={() => setEditingTaskId(null)} className="bg-slate-100 hover:bg-slate-200 text-slate-500 px-3 py-1.5 rounded-xl font-bold">戻る</button>
                                            <button onClick={() => saveEdit(task.id)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-xl font-bold shadow-md shadow-indigo-100">保存</button>
                                          </div>
                                        </div>
                                      ) : (
                                        // 2. タスク通常表示
                                        <div className="space-y-3.5 flex-1 flex flex-col justify-between pl-1 pr-4 mt-6">
                                          <div className="space-y-2.5">
                                            <h4 className="font-extrabold text-sm text-slate-800 leading-snug flex items-start gap-1.5 pr-24">
                                              <span className={`text-[10px] px-2 py-0.5 rounded-lg font-mono font-bold ${dClass.bg} ${dClass.text} shrink-0 mt-0.5`}>#{index + 1}-{taskIndex + 1}</span>
                                              <span>{task.title}</span>
                                            </h4>
                                            
                                            <div className="flex flex-wrap items-center gap-2 pt-0.5">
                                              <span className={`text-[9.5px] font-black px-2.5 py-0.5 rounded-full border shadow-xs ${dClass.badge}`}>
                                                {task.assignee}
                                              </span>
                                              <div className="flex items-center gap-1 text-[10.5px] text-slate-400 font-mono font-bold">
                                                <IconCalendar />
                                                <span className={isLate ? 'text-rose-600 font-black animate-pulse' : ''}>{task.dueDate}</span>
                                              </div>

                                              {/* 🕒 着手リードタイム/経過日数の可視化マイクロバッジ */}
                                              {task.startedAt && (
                                                <span className={`inline-flex items-center gap-1 text-[9px] font-black px-2.5 py-0.5 rounded-lg border shadow-xs ${
                                                  isCompleted 
                                                    ? 'bg-emerald-50 text-emerald-700 border-emerald-200' 
                                                    : 'bg-blue-50 text-blue-700 border-blue-200 animate-pulse'
                                                }`}>
                                                  <IconClock className="h-2.5 w-2.5" />
                                                  <span>
                                                    {isCompleted 
                                                      ? `${task.startedAt.split('-').slice(1).join('/')} 〜 ${task.completedAt.split('-').slice(1).join('/')} (所要 ${durationDays} 日)`
                                                      : `${task.startedAt.split('-').slice(1).join('/')} 着手 (${durationDays} 日経過)`
                                                    }
                                                  </span>
                                                </span>
                                              )}
                                            </div>

                                            {!isTaskCollapsed && task.description && (
                                              <p className="text-[11px] text-slate-600 leading-relaxed whitespace-pre-wrap bg-slate-50 border border-slate-200 rounded-2xl p-3 shadow-inner mt-2.5">
                                                {task.description}
                                              </p>
                                            )}
                                          </div>

                                          {/* アコーディオン展開時に表示する「状況時系列メモ」 */}
                                          {!isTaskCollapsed && (
                                            <div className="space-y-3 pt-2 animate-in fade-in" onClick={(e) => e.stopPropagation()}>
                                              <div className="bg-slate-50 border border-slate-200 rounded-2xl p-3 space-y-2.5 shadow-inner">
                                                <div className="flex justify-between items-center pb-1.5 border-b border-slate-200">
                                                  <span className="text-[9.5px] font-black text-slate-400 uppercase flex items-center gap-1 tracking-wider">
                                                    <IconClock /> 調整・状況時系列メモ
                                                  </span>
                                                  {addingLogTaskId !== task.id && !isCompleted && (
                                                    <button 
                                                      onClick={() => {
                                                        setAddingLogTaskId(task.id);
                                                        setNewLogText('');
                                                        setNewLogTo('');
                                                        setNewLogDueDate('');
                                                        setNewLogLinks([]);
                                                        setTmpLinkLabel('');
                                                        setTmpLinkUrl('');
                                                      }}
                                                      className="text-[9.5px] font-black text-indigo-600 hover:text-indigo-800 flex items-center gap-0.5"
                                                    >
                                                      <IconPlus /> 新しく追記
                                                    </button>
                                                  )}
                                                </div>

                                                {/* インライン時系列メモ追加フォーム */}
                                                {addingLogTaskId === task.id && (
                                                  <div className="bg-white border border-indigo-200 rounded-2xl p-3 space-y-3 text-xs shadow-md animate-in zoom-in-95">
                                                    <textarea 
                                                      value={newLogText} 
                                                      onChange={e => setNewLogText(e.target.value)} 
                                                      placeholder="現在の調整状況や次のタスクをメモ..."
                                                      className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs text-slate-700 font-bold focus:outline-none focus:border-indigo-400" 
                                                      rows={2.5} 
                                                    />
                                                    
                                                    <div className="grid grid-cols-2 gap-2 text-[10px]">
                                                      <div>
                                                        <label className="block text-slate-400 font-bold mb-0.5">TO (依頼先部門)</label>
                                                        <select value={newLogTo} onChange={e=>setNewLogTo(e.target.value)} className="w-full border border-slate-200 rounded-lg p-1.5 bg-white font-bold text-slate-600">
                                                          <option value="">指定なし</option>
                                                          {deptList.map(d => (
                                                            <option key={d.key} value={d.label}>{d.label}</option>
                                                          ))}

                                                        </select>
                                                      </div>
                                                      <div>
                                                        <label className="block text-slate-400 font-bold mb-0.5">回答期限など</label>
                                                        <input type="date" value={newLogDueDate} onChange={e=>setNewLogDueDate(e.target.value)} className="w-full border border-slate-200 rounded-lg p-1 font-mono font-bold" />
                                                      </div>
                                                    </div>

                                                    {/* 複数リンク追加 */}
                                                    <div className="border-t border-slate-100 pt-2 space-y-2">
                                                      <span className="text-[9px] font-bold text-slate-400 block uppercase">🔗 関連リンク（Notion、kintoneなど）</span>
                                                      <div className="flex items-center gap-1">
                                                        <IconLink />
                                                        <input type="text" placeholder="リンク名" value={tmpLinkLabel} onChange={e=>setTmpLinkLabel(e.target.value)} className="w-24 border border-slate-200 rounded-lg px-2 py-1 text-[9px] font-bold" />
                                                        <input type="text" placeholder="URL" value={tmpLinkUrl} onChange={e=>setTmpLinkUrl(e.target.value)} className="flex-1 border border-slate-200 rounded-lg px-2 py-1 text-[9px]" />
                                                        <button onClick={handleAddLinkToNewLog} className="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 px-2.5 py-1 rounded-lg text-[9px] font-black shrink-0">追加</button>
                                                      </div>

                                                      {/* ストック中の一時リンク一覧表示 */}
                                                      {newLogLinks.length > 0 && (
                                                        <div className="flex flex-wrap gap-1.5 pt-1">
                                                          {newLogLinks.map(lnk => (
                                                            <span key={lnk.id} className="inline-flex items-center gap-1 text-[9px] bg-slate-100 border border-slate-200 text-slate-600 px-2 py-0.5 rounded-lg font-bold">
                                                              <span className="truncate max-w-[85px]">{lnk.label}</span>
                                                              <button onClick={(e) => handleRemoveLinkFromNewLog(lnk.id, e)} className="text-slate-400 hover:text-rose-600 font-bold text-[10px]">×</button>
                                                            </span>
                                                          ))}
                                                        </div>
                                                      )}
                                                    </div>

                                                    <div className="flex flex-wrap justify-end gap-1.5 mt-1 pt-2 border-t border-slate-100">
                                                      <button onClick={() => setAddingLogTaskId(null)} className="text-[9px] text-slate-400 hover:bg-slate-50 px-2.5 py-1.5 rounded-lg font-bold">キャンセル</button>
                                                      <button onClick={() => addLog(task.id)} className="text-[9px] bg-indigo-600 hover:bg-indigo-700 text-white px-3.5 py-1.5 rounded-lg font-black">メモを追加</button>
                                                    </div>
                                                  </div>
                                                )}

                                                {/* メモ履歴の一覧 */}
                                                <div className="space-y-2 max-h-[170px] overflow-y-auto pr-1 scrollbar-thin">
                                                  {sortedLogs.length > 0 ? (
                                                    sortedLogs.map(log => {
                                                      const isEditingThisLog = editingLogId === log.id;

                                                      return (
                                                        <div 
                                                          key={log.id} 
                                                          className={`group/log relative border rounded-xl p-3 shadow-xs transition flex flex-col gap-1.5 ${
                                                            log.completed ? 'opacity-40 bg-emerald-50/10 border-emerald-100' : 
                                                            log.isHighlighted ? 'bg-amber-50/35 border-amber-300 ring-1 ring-amber-300/10' : 'bg-white border-slate-200'
                                                          }`}
                                                        >
                                                          {isEditingThisLog ? (
                                                            /* --- メモのインライン編集モード --- */
                                                            <div className="space-y-2.5 text-xs w-full bg-slate-50/60 p-2.5 rounded-xl border border-slate-200">
                                                              <span className="font-bold text-[10px] text-indigo-600 block">✏️ メモをインライン編集</span>
                                                              <textarea 
                                                                value={editLogText} 
                                                                onChange={e => setEditLogText(e.target.value)}
                                                                className="w-full bg-white border border-slate-300 rounded-xl p-2 text-xs text-slate-700 focus:outline-none font-bold"
                                                                rows={2}
                                                               />
                                                              
                                                              <div className="grid grid-cols-2 gap-2 text-[9px]">
                                                                <div>
                                                                  <label className="block text-slate-400 font-bold mb-0.5">TO (担当)</label>
                                                                  <select value={editLogTo} onChange={e=>setEditLogTo(e.target.value)} className="w-full border border-slate-200 bg-white p-1 font-bold rounded">
                                                                    <option value="">指定なし</option>
                                                                    {deptList.map(d => (
                                                                      <option key={d.key} value={d.label}>{d.label}</option>
                                                                    ))}
                                                                    <option value="全員">全員</option>
                                                                  </select>
                                                                </div>
                                                                <div>
                                                                  <label className="block text-slate-400 font-bold mb-0.5">期限日</label>
                                                                  <input type="date" value={editLogDueDate} onChange={e=>setEditLogDueDate(e.target.value)} className="w-full border border-slate-200 p-0.5 font-mono font-bold rounded" />
                                                                </div>
                                                              </div>

                                                              {/* 関連リンク編集 */}
                                                              <div className="border-t border-slate-200 pt-2 space-y-1.5">
                                                                <span className="text-[9px] font-bold text-slate-400 block uppercase">関連リンク編集</span>
                                                                <div className="flex items-center gap-1">
                                                                  <IconLink />
                                                                  <input type="text" placeholder="名前" value={tmpEditLinkLabel} onChange={e=>setTmpEditLinkLabel(e.target.value)} className="w-16 border border-slate-200 rounded px-1.5 py-0.5 text-[9px] font-bold" />
                                                                  <input type="text" placeholder="URL" value={tmpEditLinkUrl} onChange={e=>setTmpEditLinkUrl(e.target.value)} className="flex-1 border border-slate-200 rounded px-1.5 py-0.5 text-[9px]" />
                                                                  <button onClick={handleAddLinkToEditLog} className="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 px-2 py-0.5 rounded text-[9px] font-black">追加</button>
                                                                </div>

                                                                {/* リンク一覧 */}
                                                                {editLogLinks.length > 0 && (
                                                                  <div className="flex flex-wrap gap-1.5 pt-1">
                                                                    {editLogLinks.map(lnk => (
                                                                      <span key={lnk.id} className="inline-flex items-center gap-1 text-[9px] bg-slate-100 border border-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-bold">
                                                                        <span className="truncate max-w-[85px]">{lnk.label}</span>
                                                                        <button onClick={(e) => handleRemoveLinkFromEditLog(lnk.id, e)} className="text-slate-405 hover:text-rose-650 font-bold text-[10px]">×</button>
                                                                      </span>
                                                                    ))}
                                                                  </div>
                                                                )}
                                                              </div>

                                                              <div className="flex flex-wrap justify-end gap-1.5 pt-1.5 border-t border-slate-200">
                                                                <button onClick={() => setEditingLogId(null)} className="text-[9px] text-slate-555 px-2 py-0.5">キャンセル</button>
                                                                <button onClick={() => saveLogEdit(task.id, log.id)} className="text-[9px] bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1 rounded font-bold">更新する</button>
                                                              </div>
                                                            </div>
                                                          ) : (
                                                            /* --- メモの通常表示モード --- */
                                                            <React.Fragment>
                                                              <div className="flex justify-between items-center border-b border-slate-100 pb-1">
                                                                <span className="text-[8px] font-mono text-slate-400 font-bold flex items-center gap-0.5 leading-none">
                                                                  <IconClock /> {log.date}
                                                                  {log.isHighlighted && <span className="ml-1.5 bg-amber-100 text-amber-800 border border-amber-300 text-[7.5px] px-1.5 py-0.5 rounded font-bold">📌 重要・ピン留め</span>}
                                                                </span>
                                                                
                                                                <div className="opacity-0 group-hover/log:opacity-100 transition-opacity flex items-center gap-1.5 bg-white/95 border border-slate-200 rounded-lg p-0.5 z-10 shadow-xs absolute top-2 right-2">
                                                                  <button 
                                                                    onClick={() => startEditingLog(log)}
                                                                    className="p-1 text-slate-400 hover:text-indigo-600 rounded transition"
                                                                    title="このメモ内容を編集"
                                                                  >
                                                                    <IconEdit2 className="h-3 w-3" />
                                                                  </button>
                                                                  <button 
                                                                    onClick={() => toggleLogHighlight(task.id, log.id)}
                                                                    className={`p-1 rounded transition ${log.isHighlighted ? 'text-amber-500 bg-amber-50' : 'text-slate-400 hover:text-amber-500 hover:bg-slate-55'}`}
                                                                    title={log.isHighlighted ? 'ピン留め解除' : '重要な状況としてピン留めする'}
                                                                  >
                                                                    <IconPin className="h-3 w-3" />
                                                                  </button>
                                                                  <button onClick={() => toggleLogComplete(task.id, log.id)} className={`p-1 rounded hover:bg-slate-55 ${log.completed ? 'text-slate-300 hover:text-emerald-555' : 'text-slate-400 hover:text-emerald-600'}`} title={log.completed ? '未完了に戻す' : '対応完了マークにする'}>
                                                                    <IconCheck className="h-3 w-3" />
                                                                  </button>
                                                                  <button onClick={() => deleteLog(task.id, log.id)} className="p-1 text-slate-400 hover:text-rose-500 hover:bg-slate-55 rounded shadow-xs" title="この時系列メモを削除">
                                                                    <IconTrash2 className="h-3 w-3" />
                                                                  </button>
                                                                </div>
                                                              </div>

                                                              <p className={`text-[11px] text-slate-655 leading-relaxed font-bold whitespace-pre-wrap ${log.completed ? 'line-through text-slate-300 font-medium' : ''}`}>{log.text}</p>
                                                              
                                                              <div className="flex flex-wrap items-center gap-1.5 mt-0.5">
                                                                {log.to && (
                                                                  <span className="inline-flex items-center gap-1 text-[9px] bg-indigo-50 hover:bg-indigo-150 border border-indigo-200 text-indigo-700 px-2 py-0.5 rounded-lg transition font-black">
                                                                    <span>TO: {log.to}</span>
                                                                    {!isCompleted && (
                                                                      <button onClick={() => clearLogField(task.id, log.id, 'to')} className="text-indigo-400 hover:text-rose-600 font-bold text-[10px] ml-1">×</button>
                                                                    )}
                                                                  </span>
                                                                )}

                                                                {log.dueDate && (
                                                                  <span className="inline-flex items-center gap-1 text-[9px] bg-rose-50 hover:bg-rose-100 text-rose-700 px-2 py-0.5 rounded-lg border border-rose-200 transition font-mono font-bold">
                                                                    <span>期日: {log.dueDate}</span>
                                                                    {!isCompleted && (
                                                                      <button onClick={() => clearLogField(task.id, log.id, 'dueDate')} className="text-rose-400 hover:text-rose-600 font-bold text-[10px] ml-1">×</button>
                                                                    )}
                                                                  </span>
                                                                )}

                                                                {/* 複数登録リンク */}
                                                                {log.links && log.links.map(lnk => (
                                                                  <span key={lnk.id} className="inline-flex items-center gap-1 text-[9px] bg-slate-100 hover:bg-slate-150 border border-slate-200 text-slate-600 px-2 py-0.5 rounded-lg transition">
                                                                    <a href={lnk.url} target="_blank" rel="noopener noreferrer" className="flex items-center gap-0.5 font-bold">
                                                                      <IconExternalLink /> {lnk.label}
                                                                    </a>
                                                                    {!isCompleted && (
                                                                      <button onClick={() => removeSingleLinkFromLog(task.id, log.id, lnk.id)} className="text-slate-400 hover:text-rose-600 font-bold text-[10px] ml-1" title="リンクのみ削除">×</button>
                                                                    )}
                                                                  </span>
                                                                ))}
                                                              </div>
                                                            </React.Fragment>
                                                          )}
                                                        </div>
                                                      );
                                                    })
                                                  ) : (
                                                    <p className="text-[10px] text-slate-400 font-bold text-center py-4 bg-white border border-dashed border-slate-200 rounded-xl">時系列の議論・メモ履歴は空です</p>
                                                  )}
                                                </div>
                                              </div>
                                            </div>
                                          )}
                                        </div>
                                      )}

                                    </div>
                                  );
                                })
                              ) : (
                                <div className="col-span-2 text-center py-10 bg-white border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-xs font-bold leading-relaxed">
                                  現在、このステップに登録されている確認タスクはありません。<br />
                                  右上の「＋ タスク追加」ボタンから最初の確認事項を起票しましょう！
                                </div>
                              )}
                            </div>
                          </div>
                        )}

                      </div>
                    );
                  })}
                </div>
              </React.Fragment>
            )}

            {/* --- VIEW：🗃️ 案件一覧データベース (DBビュー) --- */}
            {viewMode === 'database' && (
              <div className="bg-white border border-slate-200 rounded-3xl shadow-xs overflow-hidden p-6 space-y-5 animate-in fade-in duration-150">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-200">
                  <div className="space-y-1">
                    <h2 className="text-base font-black text-slate-800 flex items-center gap-2">
                      <IconDatabase className="text-indigo-600" />
                      ECD案件一覧データベース (Notion風ビュー)
                    </h2>
                    <p className="text-xs text-slate-400">登録されているすべての調整案件・プロジェクトを横断して進捗・ヘルス状況を俯瞰します。</p>
                  </div>
                  <button 
                    onClick={() => {
                      setNewProjFolderId(selectedFolderId);
                      setShowAddProjectModal(true);
                    }}
                    className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-xs px-4.5 py-3 rounded-2xl flex items-center gap-1.5 transition-all shadow-md shadow-indigo-100 shrink-0"
                  >
                    <IconPlus /> 新規案件を起票する
                  </button>
                </div>

                {/* フィルタコントロール */}
                <div className="flex flex-col sm:flex-row gap-3 pt-1">
                  <select
                    value={dbFilterFolderId}
                    onChange={(e) => setDbFilterFolderId(e.target.value)}
                    className="border border-slate-200 rounded-xl p-2.5 text-xs font-bold text-slate-600 bg-slate-50 focus:outline-none focus:border-indigo-400 cursor-pointer shadow-xs"
                  >
                    <option value="all">📁 すべてのフォルダ</option>
                    {folders.map(f => (
                      <option key={f.id} value={f.id}>📁 {f.name}</option>
                    ))}
                  </select>

                  {/* ステータスフィルタ */}
                  <select
                    value={dbFilterStatus}
                    onChange={(e) => setDbFilterStatus(e.target.value)}
                    className="border border-slate-200 rounded-xl p-2.5 text-xs font-bold text-slate-600 bg-slate-50 focus:outline-none focus:border-indigo-400 cursor-pointer shadow-xs"
                  >
                    <option value="all">🚥 すべての進捗状況</option>
                    <option value="pending">未着手</option>
                    <option value="in_progress">進行中</option>
                    <option value="completed">完了</option>
                  </select>

                  <div className="flex-1 relative">
                    <input
                      type="text"
                      placeholder="案件名やECD管理コードでリアルタイム検索..."
                      value={dbFilterText}
                      onChange={(e) => setDbFilterText(e.target.value)}
                      className="w-full border border-slate-200 rounded-xl p-2.5 pl-3.5 text-xs text-slate-700 font-bold bg-white focus:outline-none focus:border-indigo-400 shadow-xs"
                    />
                  </div>
                </div>

                <div className="overflow-x-auto rounded-2xl border border-slate-200">
                  <table className="w-full text-xs text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-50 border-b border-slate-200 text-slate-600 font-black text-[10.5px] uppercase tracking-wider">
                        <th className="py-3 px-4 border border-slate-200 text-center w-28">ステータス</th>
                        <th className="py-3 px-4 border border-slate-200">所属大分類</th>
                        <th className="py-3 px-4 border border-slate-200">案件プロジェクト名称</th>
                        <th className="py-3 px-4 border border-slate-200 w-32">コード</th>
                        <th className="py-3 px-4 border border-slate-200 w-44">開始 〜 目標期日</th>
                        <th className="py-2.5 px-4 border border-slate-200 text-center w-28">タスク内訳</th>
                        <th className="py-3 px-4 border border-slate-200 w-40">進捗率</th>
                        <th className="py-3 px-4 border border-slate-200 w-36">アラート・ヘルス</th>
                        <th className="py-3 px-4 border border-slate-200 text-center w-32">アクション</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200">
                      {filteredDbProjects.length > 0 ? filteredDbProjects.map(proj => {
                        const prog = calculateProjectProgressById(proj);
                        const lates = countLateTasksByProject(proj);
                        const folderName = folders.find(f => f.id === proj.folderId)?.name || '未分類';
                        const { completed, inProgress, notStarted, total } = countTaskStatus(proj);
                        const statusObj = projectStatusOptions.find(o => o.value === (proj.status || 'pending'));

                        return (
                          <tr key={proj.id} className="hover:bg-slate-50/50 transition-colors">
                            {/* 🚥 ステータス */}
                            <td className="py-3.5 px-4 border border-slate-200 text-center">
                              <span className={`inline-flex items-center px-2.5 py-0.5 rounded-xl font-black text-[9.5px] border shadow-xs ${statusObj?.className}`}>
                                {statusObj?.label}
                              </span>
                            </td>
                            {/* 📁 大分類フォルダ */}
                            <td className="py-3.5 px-4 border border-slate-200 font-black text-slate-500">
                              <span className="inline-flex items-center gap-1">
                                <IconFolder className="h-3.5 w-3.5 text-purple-600" />
                                {folderName}
                              </span>
                            </td>
                            {/* 📄 案件名 */}
                            <td className="py-3.5 px-4 border border-slate-200 font-black text-slate-900 text-sm max-w-xs truncate">
                              {proj.name}
                            </td>
                            {/* 🏷️ コード */}
                            <td className="py-3.5 px-4 border border-slate-200 font-mono text-slate-500 font-bold uppercase tracking-wider">
                              {proj.code}
                            </td>
                            {/* 📅 期間 */}
                            <td className="py-3.5 px-4 border border-slate-200 font-mono text-slate-500 font-bold">
                              {proj.startDate} 〜 {proj.endDate}
                            </td>
                            {/* 📋 タスク内訳 */}
                            <td className="py-2 px-4 border border-slate-200 align-middle">
                              <div className="flex flex-col gap-0.5 text-[9.5px] w-20 mx-auto font-mono font-bold leading-none">
                                <div className="flex justify-between items-center text-slate-500 bg-slate-50 px-1 py-0.5 rounded border border-slate-100">
                                  <span>未着手</span><span>{notStarted}</span>
                                </div>
                                <div className="flex justify-between items-center text-blue-600 bg-blue-50 px-1 py-0.5 rounded border border-blue-100">
                                  <span>進行中</span><span>{inProgress}</span>
                                </div>
                                <div className="flex justify-between items-center text-emerald-600 bg-emerald-50 px-1 py-0.5 rounded border border-emerald-100">
                                  <span>完了</span><span>{completed}</span>
                                </div>
                              </div>
                            </td>
                            {/* 📊 進捗率 */}
                            <td className="py-3.5 px-4 border border-slate-200">
                              <div className="flex items-center gap-2 min-w-[120px]">
                                <div className="h-2 flex-1 bg-slate-100 border border-slate-200 rounded-full overflow-hidden shadow-inner">
                                  <div className="h-full bg-indigo-500 bg-gradient-to-r from-indigo-500 to-purple-500" style={{ width: `${prog}%` }} />
                                </div>
                                <span className="font-black font-mono text-indigo-600 w-8 text-right text-xs">{prog}%</span>
                              </div>
                            </td>
                            {/* 🚨 アラート */}
                            <td className="py-3.5 px-4 border border-slate-200">
                              {lates > 0 ? (
                                <span className="inline-flex items-center gap-1 bg-rose-50 text-rose-700 border border-rose-200 font-black text-[9.5px] px-2.5 py-0.5 rounded-full shadow-sm animate-pulse">
                                  ⚠️ 遅延 {lates} 件あり
                                </span>
                              ) : (
                                <span className="inline-flex items-center gap-1 bg-emerald-50 text-emerald-700 border border-emerald-200 font-black text-[9.5px] px-2.5 py-0.5 rounded-full shadow-xs">
                                  ✅ 順調
                                </span>
                              )}
                            </td>
                            {/* ⚙️ 開く ＆ アクション */}
                            <td className="py-3.5 px-4 border border-slate-200 text-center">
                              <div className="flex items-center justify-center gap-1.5">
                                <button 
                                  onClick={() => handleOpenProjectFromDb(proj)}
                                  className="flex items-center gap-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 font-black px-2.5 py-1.5 rounded-xl transition-all shadow-xs text-[11px]"
                                  title="この案件を進行ダッシュボードで開く"
                                >
                                  <IconEye className="h-3.5 w-3.5" />
                                  <span>開く</span>
                                </button>
                                <button 
                                  onClick={(e) => handleCopyProjectUrl(proj.id, e)}
                                  className="flex items-center gap-1 bg-white hover:bg-slate-100 text-slate-600 border border-slate-300 font-bold px-2 py-1.5 rounded-xl transition-all shadow-xs"
                                  title="Notion・社内共有用のURLをコピー"
                                >
                                  <IconLink className="h-3.5 w-3.5 text-slate-400" />
                                </button>
                                <button 
                                  onClick={(e) => handleDeleteProjectByList(proj.id, e)}
                                  className="text-slate-405 hover:text-rose-600 p-1.5 hover:bg-rose-50 border border-transparent hover:border-rose-100 rounded-xl transition-all"
                                  title="この案件を完全に削除"
                                >
                                  <IconTrash2 className="h-4 w-4" />
                                </button>
                              </div>
                            </td>
                          </tr>
                        );
                      }) : (
                        <tr>
                          <td colSpan="9" className="py-12 text-center text-slate-400 font-bold">条件に一致する調整案件がありません。</td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    // ReactをDOMにレンダリングする処理 (CDN環境用)
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
