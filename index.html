            setProjects(initialProjects);

        const foldersRef = collection(db, 'artifacts', appId, 'public', 'data', 'folders');
        const unsubscribeFolders = onSnapshot(foldersRef, (snapshot) => {
          const list = snapshot.docs.map(doc => doc.data());
          if (list.length === 0) {

              setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'folders', f.id), f);

        }, (err) => console.error("Firestore folders error: ", err));

        const deptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'departments');

        const projectsRef = collection(db, 'artifacts', appId, 'public', 'data', 'projects');

      // クラウド保存 or ローカル保存 of 抽象化ハンドラー

        } catch (err) {
          console.error("Firestore save error: ", err);

      // 選択中フォルダ（親）の案件だけを絞り込む (ダッシュボード用)

      // --- プロジェクト情報の保存 ---

              return false;

          return true;

      }, [projects, dbFilterFolderId, dbFilterStatus, dbFilterText]);

      // 編集用プロジェクト情報 (クラッシュガード付き安全構造で初期化)

      const [projectForm, setProjectForm] = useState({

      // STEPとタスクの開閉状態

      // タスクカードインライン編集

      const [editFormData, setEditFormData] = useState({});

      const isOverdue = (dueDate, status) => {
        if (status === 'completed') return false;
        return new Date(dueDate) < new Date(TODAY_STR); 
      };

      const projectProgress = useMemo(() => {
        if (tasks.length === 0) return 0;
        const completed = tasks.filter(t => t.status === 'completed').length;
        return Math.round((completed / tasks.length) * 100);
      }, [tasks]);

      const getStepProgress = (stepId) => {
        const stepTasks = tasks.filter(t => t.stepId === stepId);
        if (stepTasks.length === 0) return 0;
        const completed = stepTasks.filter(t => t.status === 'completed').length;
        return Math.round((completed / stepTasks.length) * 100);
      };

      const calculateProjectProgressById = (proj) => {
        const pTasks = proj.tasks || [];
        if (pTasks.length === 0) return 0;
        const completed = pTasks.filter(t => t.status === 'completed').length;
        return Math.round((completed / pTasks.length) * 100);
      };

      const countLateTasksByProject = (proj) => {
        const pTasks = proj.tasks || [];
        return pTasks.filter(t => isOverdue(t.dueDate, t.status)).length;
      };

      // DBビュー用：ステータスごとのタスク数を計算する
      const countTaskStatus = (proj) => {
        const pTasks = proj.tasks || [];
        const completed = pTasks.filter(t => t.status === 'completed').length;
        const inProgress = pTasks.filter(t => t.status === 'in_progress').length;
        const notStarted = pTasks.filter(t => t.status === 'pending' || t.status === 'blocked').length;
        return { completed, inProgress, notStarted, total: pTasks.length };
      };

      // --- STEPの残り期限日数計算とバッジ生成 ---
      const renderStepDeadlineBadge = (step, progress) => {
        if (progress === 100) {
          return (
            <span className="bg-emerald-55 text-emerald-800 border border-emerald-200 font-extrabold text-[10px] px-2.5 py-0.5 rounded-full shadow-sm">
              ✅ STEP完了
            </span>
          );
        }
        if (!step.dueDate) return null;

        const diffTime = new Date(step.dueDate) - new Date(TODAY_STR);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        const assocDeptColorKey = deptList.find(d => d.key === step.deptKey)?.color || 'slate';
        const dClass = colorClassesMap[assocDeptColorKey] || colorClassesMap.slate;

        if (diffDays < 0) {
          return (
            <span className="bg-rose-50 text-rose-800 border border-rose-300 font-extrabold text-[10px] px-2.5 py-0.5 rounded-full animate-pulse shadow-sm">
              🚨 期限超過 ({-diffDays}日経過)
            </span>
          );
        } else if (diffDays === 0) {
          return (
            <span className="bg-amber-50 text-amber-900 border border-amber-300 font-extrabold text-[10px] px-2.5 py-0.5 rounded-full shadow-sm">
              ⚠️ 本日締切！
            </span>
          );
        } else {
          return (
            <span className={`${dClass.badge} ${dClass.borderStrong} border font-extrabold text-[10px] px-2.5 py-0.5 rounded-full shadow-xs`}>
              ⌛ 残り {diffDays} 日
            </span>
          );
        }
      };

      // --- 折りたたみ操作 ---
      const toggleStepCollapse = (stepId) => {
        setCollapsedSteps(prev => ({ ...prev, [stepId]: !prev[stepId] }));
      };

      const toggleTaskCollapse = (taskId) => {
        setCollapsedTasks(prev => ({ ...prev, [taskId]: !prev[taskId] }));
      };

      // --- ドラッグ＆ドロップ並び替えロジック ---
      const handleDragStart = (index, e) => {
        setDraggedStepIndex(index);
        e.dataTransfer.effectAllowed = 'move';
      };

      const handleDragOver = (index, e) => {
        e.preventDefault();
        if (draggedStepIndex === null || draggedStepIndex === index) return;

        const updatedSteps = [...stepList];
        const draggedItem = updatedSteps[draggedStepIndex];
        
        updatedSteps.splice(draggedStepIndex, 1);
        updatedSteps.splice(index, 0, draggedItem);
        
        setDraggedStepIndex(index);
        setStepList(updatedSteps);
      };

      const handleDragEnd = () => {
        setDraggedStepIndex(null);
      };

      const moveStepOrder = (index, direction, e) => {
        e.stopPropagation();
        const targetIndex = index + direction;
        if (targetIndex < 0 || targetIndex >= stepList.length) return;

        const updatedSteps = [...stepList];
        const temp = updatedSteps[index];
        updatedSteps[index] = updatedSteps[targetIndex];
        updatedSteps[targetIndex] = temp;
        setStepList(updatedSteps);
      };

      // --- ドラッグ＆ドロップ並び替えロジック (タスク用) ---
      const handleTaskDragStart = (stepId, index, e) => {
        e.stopPropagation();
        setDraggedTaskInfo({ stepId, index });
        e.dataTransfer.effectAllowed = 'move';
      };

      const handleTaskDragOver = (stepId, index, e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!draggedTaskInfo || draggedTaskInfo.stepId !== stepId || draggedTaskInfo.index === index) return;

        const currentStepTasks = tasks.filter(t => t.stepId === stepId);
        const draggedTask = currentStepTasks[draggedTaskInfo.index];
        
        const newStepTasks = [...currentStepTasks];
        newStepTasks.splice(draggedTaskInfo.index, 1);
        newStepTasks.splice(index, 0, draggedTask);

        const otherTasks = tasks.filter(t => t.stepId !== stepId);
        setTasks([...otherTasks, ...newStepTasks]);
        setDraggedTaskInfo({ stepId, index });
      };

      const handleTaskDragEnd = (e) => {
        e.stopPropagation();
        setDraggedTaskInfo(null);
      };

      const moveTaskOrder = (stepId, index, direction, e) => {
        e.stopPropagation();
        const currentStepTasks = tasks.filter(t => t.stepId === stepId);
        const targetIndex = index + direction;
        if (targetIndex < 0 || targetIndex >= currentStepTasks.length) return;

        const newStepTasks = [...currentStepTasks];
        const temp = newStepTasks[index];
        newStepTasks[index] = newStepTasks[targetIndex];
        newStepTasks[targetIndex] = temp;

        const otherTasks = tasks.filter(t => t.stepId !== stepId);
        setTasks([...otherTasks, ...newStepTasks]);
      };

      const handleScrollToStep = (stepId) => {
        if (collapsedSteps[stepId]) {
          setCollapsedSteps(prev => ({ ...prev, [stepId]: false }));
        }
        setTimeout(() => {
          const element = document.getElementById(`step-anchor-${stepId}`);
          if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 150);
      };

      // --- 新規大分類フォルダの追加 ＆ 削除 ---
      const handleCreateFolder = async (e) => {
        e.preventDefault();
        if (!newFolderName.trim()) return;

        const newId = `f_${Date.now()}`;
        const newFolder = {
          id: newId,
          name: newFolderName.trim()
        };

        if (!useFirebase) {
          setFolders(prev => {
            const next = [...prev, newFolder];
            localStorage.setItem('pl_folders', JSON.stringify(next));
            return next;
          });
          setSelectedFolderId(newId);
          setNewFolderName('');
          setShowAddFolderModal(false);
          showAlert(`大分類フォルダ「${newFolder.name}」を作成しました。`);
          return;
        }

        if (!user) return;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'folders', newId), newFolder);
          setSelectedFolderId(newId);
          setNewFolderName('');
          setShowAddFolderModal(false);
          showAlert(`大分類フォルダ「${newFolder.name}」を作成しました。`);

            }

            try {
              await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'departments', deptKey));
              
              for (const proj of projects) {
                let modified = false;
                const updatedTasks = (proj.tasks || []).map(t => {
                  if (t.department === deptKey) {
                    modified = true;
                    return { ...t, department: fallbackDeptKey };
                  }
                  return t;
                });
                const updatedSteps = (proj.stepList || []).map(s => {
                  if (s.deptKey === deptKey) {
                    modified = true;
                    return { ...s, deptKey: fallbackDeptKey };
                  }
                  return s;
                });
                if (modified) {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', proj.id), {
                    ...proj,
                    tasks: updatedTasks,
                    stepList: updatedSteps
                  });
                }
              }
              
              if (selectedSettingsDeptKey === deptKey) {
                setSelectedSettingsDeptKey(fallbackDeptKey);
              }
              showAlert('部署マスタを削除し、関連データを更新しました。');
            } catch (err) {
              console.error(err);
              showAlert('エラー: 部署マスタの削除に失敗しました。');
            }
          }
        );
      };

      const updateDeptColorSetting = async (deptKey, newColorKey) => {
        const found = deptList.find(d => d.key === deptKey);
        if (!found) return;

        if (!useFirebase) {
          const next = deptList.map(d => d.key === deptKey ? { ...d, color: newColorKey } : d);
          setDeptList(next);
          localStorage.setItem('pl_depts', JSON.stringify(next));
          return;
        }

        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'departments', deptKey), {
            ...found,
            color: newColorKey
          });
        } catch (err) {
          console.error(err);
        }
      };

      const handleRenameDept = async (deptKey, newName) => {
        if (!newName.trim()) return;
        const found = deptList.find(d => d.key === deptKey);
        if (!found) return;

        if (!useFirebase) {
          const next = deptList.map(d => d.key === deptKey ? { ...d, label: newName.trim() } : d);
          setDeptList(next);
          localStorage.setItem('pl_depts', JSON.stringify(next));
          return;
        }

        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'departments', deptKey), {
            ...found,
            label: newName.trim()
          });
        } catch (err) {
          console.error(err);
        }
      };

      const handleCopyProjectUrl = (projId, e) => {
        if (e) e.stopPropagation();
        const baseUrl = window.location.origin + window.location.pathname;
        const projectUrl = `${baseUrl}?pid=${projId}`;

        const copyWithExecCommand = () => {
          const textArea = document.createElement("textarea");
          textArea.value = projectUrl;
          textArea.style.top = "0";
          textArea.style.left = "0";
          textArea.style.position = "fixed";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try {
            const successful = document.execCommand('copy');
            if (successful) {
              showAlert(`案件の共有用URLをクリップボードにコピーしました！ Notion等に貼ってご活用ください。`);
            } else {
              showAlert(`URLの自動コピーに失敗しました。以下をご利用ください: ${projectUrl}`);
            }
          } catch (err) {
            showAlert(`URLの自動コピーに失敗しました。以下をご利用ください: ${projectUrl}`);
          }
          document.body.removeChild(textArea);
        };

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(projectUrl)
            .then(() => {
              showAlert(`案件の共有用URLをクリップボードにコピーしました！ Notion等に貼ってご活用ください。`);
            })
            .catch(() => {
              copyWithExecCommand();
            });
        } else {
          copyWithExecCommand();
        }
      };

      const handleOpenProjectFromDb = (proj) => {
        setSelectedFolderId(proj.folderId);
        setCurrentProjectId(proj.id);
        setViewMode('board');
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-805 font-sans antialiased pb-16">
          
          {/* A. トースト（アラート）メッセージの常設通知ボックス */}
          {alertMessage && (
            <div className="fixed bottom-6 right-6 bg-slate-900/95 text-white text-xs px-5 py-4 rounded-2xl shadow-2xl z-[100] whitespace-pre-wrap max-w-sm flex items-center gap-2 border border-slate-700 backdrop-blur-md animate-bounce">
              <IconInfo className="h-5 w-5 text-indigo-450 shrink-0" />
              <span className="font-bold leading-relaxed">{alertMessage}</span>
            </div>
          )}

          {/* B. アプリケーションワイドのカスタム確認モーダル */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-xs flex items-center justify-center z-[100] animate-in fade-in duration-200">
              <div className="bg-white border border-slate-200 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95 duration-200 mx-4">
                <div className="flex items-center gap-3 pb-3 border-b border-slate-100 text-rose-650">
                  <div className="p-2 bg-rose-50 rounded-2xl">
                    <IconWarning className="h-6 w-6 text-rose-600" />
                  </div>
                  <h3 className="font-extrabold text-sm text-slate-900 leading-tight">
                    {confirmModal.title}
                  </h3>
                </div>
                <p className="text-xs text-slate-500 whitespace-pre-line leading-relaxed">
                  {confirmModal.message}
                </p>
                <div className="flex justify-end gap-2 px-1 pt-3 border-t border-slate-100 text-xs">
                  <button 
                    type="button" 
                    onClick={closeConfirm} 
                    className="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2.5 rounded-2xl font-bold transition-all"
                  >
                    キャンセル
                  </button>
                  <button 
                    type="button" 
                    onClick={confirmModal.onConfirm} 
                    className="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2.5 rounded-2xl font-extrabold shadow-md shadow-rose-200 transition-all"
                  >
                    実行する
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 1. ナビゲーションヘッダー（固定2段式。案件選択と進捗サマリーを集約） */}
          <header className="bg-white/95 border-b border-slate-200 sticky top-0 z-50 shadow-sm backdrop-blur-lg divide-y divide-slate-100">
            {/* 1段目: アプリロゴ、ビュー切替、マスタ設定 */}
            <div className="px-6 py-3 flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 bg-gradient-to-tr from-indigo-700 to-purple-600 text-white p-2.5 rounded-2xl font-black text-sm shadow-md shadow-indigo-100 leading-none">
                  PL
                </div>
                <div>
                  <h1 className="text-xs font-black text-slate-900 leading-tight">Project Loom</h1>
                  <p className="text-[9px] text-slate-400 font-extrabold uppercase tracking-wider">
                    マイ・プロジェクト ECDダッシュボード 
                    {!useFirebase && <span className="ml-1 text-emerald-600 bg-emerald-50 px-1 py-0.2 rounded font-black text-[7.5px] tracking-normal">LOCAL-STORE</span>}
                  </p>
                </div>
              </div>

              {/* View切り替えタブメニュー */}
              <div className="flex bg-slate-100 p-0.5 rounded-xl border border-slate-200 text-xs shadow-inner">
                <button
                  onClick={() => setViewMode('board')}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 ${
                    viewMode === 'board' 
                      ? 'bg-white text-indigo-700 shadow-sm' 
                      : 'text-slate-600 hover:text-slate-900'
                  }`}
                >
                  <IconCalendar className="h-3 w-3 text-indigo-500" />
                  <span>📋 進行ダッシュボード</span>
                </button>
                <button
                  onClick={() => setViewMode('database')}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 ${
                    viewMode === 'database' 
                      ? 'bg-white text-indigo-700 shadow-sm' 
                      : 'text-slate-600 hover:text-slate-900'
                  }`}
                >
                  <IconDatabase className="h-3 w-3 text-indigo-500" />
                  <span>🗃️ 案件データベース</span>
                </button>
              </div>

              <div className="flex items-center gap-3 shrink-0">
                {/* ⚙️ 部署・カラー設定トリガー */}
                <button 
                  onClick={() => setShowSettingsModal(true)}
                  className="flex items-center gap-1 text-[11px] font-extrabold text-slate-600 hover:text-purple-755 bg-slate-50 hover:bg-purple-50/60 border border-slate-200 hover:border-purple-300 px-3 py-2 rounded-xl transition-all shadow-xs"
                >
                  <IconSettings className="h-3.5 w-3.5" />
                  <span>⚙️ マスタ設定</span>
                </button>

                {/* フォルダ全体の進捗バー */}
                <div className="flex items-center gap-2.5 bg-slate-50 px-2.5 py-1.5 rounded-xl border border-slate-200 text-xs">
                  <div className="text-right leading-none">
                    <span className="text-[8px] text-slate-400 font-extrabold block mb-0.5 uppercase tracking-wide">完了率</span>
                    <span className="text-[9px] font-black text-slate-500 font-mono">{activeProject ? activeProject.code : '---'}</span>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <div className="h-1.5 w-16 bg-slate-200 rounded-full overflow-hidden shadow-inner">
                      <div 
                        className="h-full bg-indigo-500 bg-gradient-to-r from-indigo-500 to-purple-600" 
                        style={{ width: `${projectProgress}%` }}
                      ></div>
                    </div>
                    <span className="text-[10px] font-black text-indigo-655 font-mono">{projectProgress}%</span>
                  </div>
                </div>
              </div>
            </div>

            {/* 2段目: 📁連結大分類 ＞ 📄案件 セレクション ＆ 🧭 Board時はステップ進捗サマリー */}
            <div className="px-6 py-2.5 bg-slate-50/50 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
              {/* 連結パンくず型 案件セレクター */}
              <div className="flex flex-wrap items-center gap-2 text-xs">
                {/* 1. 大分類選択 */}
                <div className="flex items-center gap-1.5 bg-white border border-slate-250 rounded-xl px-2.5 py-1 shadow-xs hover:border-purple-300 transition-colors">
                  <IconFolder className="h-3.5 w-3.5 text-purple-600 shrink-0" />
                  <select 
                    value={selectedFolderId} 
                    onChange={(e) => {
                      const fId = e.target.value;
                      setSelectedFolderId(fId);
                      const available = projects.filter(p => p.folderId === fId);
                      if (available.length > 0) {
                        setCurrentProjectId(available[0].id);
                      } else {
                        setCurrentProjectId('');
                      }
                      setEditingProject(false);
                    }}
                    className="bg-transparent text-xs font-black text-purple-800 focus:outline-none cursor-pointer pr-1 leading-none"
                  >
                    {folders.map(f => (
                      <option key={f.id} value={f.id}>{f.name}</option>
                    ))}
                  </select>
                  <div className="flex items-center gap-0.5 border-l border-slate-200 pl-1.5 ml-0.5">
                    <button onClick={() => setShowAddFolderModal(true)} className="text-[9px] text-purple-600 hover:text-purple-800 font-extrabold px-1" title="大分類フォルダを新規作成">＋</button>
                    <button onClick={(e) => handleDeleteFolder(selectedFolderId, e)} className="text-[9px] text-slate-400 hover:text-rose-600 font-extrabold px-1" title="選択中のフォルダを削除">×</button>
                  </div>
                </div>

                <IconChevronRight className="h-3 w-3 text-slate-400 shrink-0" />

                {/* 2. 案件プロジェクト選択 */}
                <div className="flex items-center gap-1.5 bg-white border border-slate-250 rounded-xl px-2.5 py-1 shadow-xs hover:border-indigo-300 transition-colors">
                  <span className="text-[10px] shrink-0 leading-none">📄</span>
                  <select 
                    value={currentProjectId} 
                    onChange={(e) => {
                      setCurrentProjectId(e.target.value);
                      setEditingProject(false);
                    }}
                    className="bg-transparent text-xs font-black text-indigo-800 focus:outline-none cursor-pointer pr-1 leading-none"
                    disabled={filteredProjects.length === 0}
                  >
                    {filteredProjects.length > 0 ? (
                      filteredProjects.map(p => (
                        <option key={p.id} value={p.id}>{p.name}</option>
                      ))
                    ) : (
                      <option value="">(案件なし: フォルダ内が空です)</option>
                    )}
                  </select>
                  <div className="flex items-center gap-0.5 border-l border-slate-200 pl-1.5 ml-0.5">
                    <button onClick={() => { setNewProjFolderId(selectedFolderId); setShowAddProjectModal(true); }} className="text-[9px] text-indigo-600 hover:text-indigo-800 font-extrabold px-1" title="新規プロジェクトを起票">＋</button>
                  </div>
                </div>
              </div>

              {/* 3. Boardモード時のみ、ステップ状況ミニサマリーを水平コンジット表示 */}
              {viewMode === 'board' && activeProject && (
                <div className="flex-1 lg:max-w-xl xl:max-w-2xl flex items-center gap-2 overflow-x-auto pb-0.5 scrollbar-thin pl-1">
                  <div className="text-[9px] font-black text-slate-400 shrink-0 uppercase tracking-wider pr-1 border-r border-slate-200 flex items-center gap-1 leading-none">
                    <IconClock className="h-3 w-3" /> 進捗
                  </div>
                  {stepList.map((step, idx) => {
                    const totalSub = tasks.filter(t => t.stepId === step.id).length;
                    const completedSub = tasks.filter(t => t.stepId === step.id && t.status === 'completed').length;
                    const progress = totalSub > 0 ? Math.round((completedSub / totalSub) * 100) : 0;
                    const lates = tasks.filter(t => t.stepId === step.id && isOverdue(t.dueDate, t.status)).length;

                    const assocDeptColorKey = deptList.find(d => d.key === step.deptKey)?.color || 'slate';
                    const dClass = colorClassesMap[assocDeptColorKey] || colorClassesMap.purple;

                    return (
                      <button 
                        key={step.id} 
                        onClick={() => handleScrollToStep(step.id)}
                        className={`bg-white border border-slate-200 hover:border-indigo-400 rounded-xl px-2.5 py-1.5 flex items-center gap-2.5 cursor-pointer shrink-0 shadow-xs hover:shadow-sm transition-all text-left group`}
                      >
                        <div className="leading-none">
                          <div className="text-[9px] font-black text-slate-700 truncate max-w-[90px] leading-tight">
                            {idx + 1}. {step.name}
                          </div>
                          <span className="text-[8px] text-slate-400 font-mono font-bold leading-none">{completedSub}/{totalSub}</span>
                        </div>

                        <div className="flex items-center gap-1 shrink-0 leading-none">
                          {lates > 0 ? (
                            <span className="bg-rose-50 text-rose-600 text-[8px] px-1 rounded border border-rose-200 font-extrabold shrink-0 animate-pulse">
                              🚨遅延 {lates}
                            </span>
                          ) : (
                            <div className="h-1 w-8 bg-slate-100 rounded-full overflow-hidden shadow-inner w-8">
                              <div className={`h-full ${dClass.bar}`} style={{ width: `${progress}%` }} />
                            </div>
                          )}
                          <span className={`text-[9.5px] font-black ${dClass.text} font-mono leading-none`}>{progress}%</span>
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          </header>

          <main className="max-w-7xl mx-auto p-6 space-y-6">

            {/* 大分類フォルダ追加モーダル */}
            {showAddFolderModal && (
              <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-xs flex items-center justify-center z-50 animate-in fade-in duration-200">
                <div className="bg-white border border-slate-200 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95 duration-200">
                  <div className="flex justify-between items-center pb-2.5 border-b border-slate-100">
                    <h3 className="font-extrabold text-sm text-slate-900 flex items-center gap-2">
                      <IconFolder className="text-purple-650" />
                      大分類フォルダの新規追加
                    </h3>
                    <button onClick={() => setShowAddFolderModal(false)} className="text-slate-400 hover:text-slate-600 p-1"><IconX /></button>
                  </div>
                  <form onSubmit={handleCreateFolder} className="space-y-4 text-xs">
                    <div>
                      <label className="block text-slate-500 font-bold mb-1">フォルダ名称 <span className="text-rose-500">*</span></label>
                      <input required type="text" placeholder="例: 新規開発プロジェクト" value={newFolderName} onChange={e=>setNewFolderName(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 bg-white text-slate-700 focus:border-indigo-500 focus:outline-none" />
                    </div>
                    <div className="flex justify-end gap-2 pt-3 border-t border-slate-100">
                      <button type="button" onClick={() => setShowAddFolderModal(false)} className="bg-slate-100 text-slate-600 px-4 py-2.5 rounded-2xl">キャンセル</button>
                      <button type="submit" className="bg-indigo-600 text-white font-bold px-4 py-2.5 rounded-2xl shadow-md shadow-indigo-100">フォルダを作成</button>
                    </div>
                  </form>
                </div>
              </div>
            )}

            {/* 新規案件フォルダの追加モーダル */}
            {showAddProjectModal && (
              <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-xs flex items-center justify-center z-50 animate-in fade-in duration-200">
                <div className="bg-white border border-slate-200 rounded-3xl p-6 max-w-md w-full shadow-2xl space-y-4 animate-in zoom-in-95 duration-200 max-h-[90vh] overflow-y-auto scrollbar-thin">
                  <div className="flex justify-between items-center pb-2.5 border-b border-slate-100">
                    <h3 className="font-extrabold text-sm text-slate-900 flex items-center gap-2">
                      <IconPlus className="text-indigo-600" />
                      新規案件プロジェクトの起票
                    </h3>
                    <button onClick={() => setShowAddProjectModal(false)} className="text-slate-400 hover:text-slate-600 p-1"><IconX /></button>
                  </div>

                  <form onSubmit={handleCreateProject} className="space-y-4 text-xs">
                    <div>
                      <label className="block text-slate-500 font-bold mb-1">作成先フォルダ階層 (大分類) <span className="text-rose-500">*</span></label>
                      <select 
                        value={newProjFolderId} 
                        onChange={e => setNewProjFolderId(e.target.value)}
                        className="w-full border border-slate-200 rounded-xl p-2.5 bg-white text-slate-700 font-bold focus:outline-none"
                      >
                        {folders.map(f => (
                          <option key={f.id} value={f.id}>{f.name}</option>
                        ))}
                      </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                      <div className="md:col-span-2">
                        <label className="block text-slate-500 font-bold mb-1">案件プロジェクト名称 <span className="text-rose-500">*</span></label>
                        <input required type="text" placeholder="例: 【ECD】新紹介料率の導入" value={newProjName} onChange={e=>setNewProjName(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 bg-white text-slate-700 focus:border-indigo-500 focus:outline-none" />
                      </div>
                      <div>
                        <label className="block text-slate-500 font-bold mb-1">ECDコード</label>
                        <input type="text" placeholder="例: ECD-2026-Q3" value={newProjCode} onChange={e=>setNewProjCode(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 bg-white text-slate-700 focus:border-indigo-500 focus:outline-none" />
                      </div>
                    </div>

                    <div className="grid grid-cols-3 gap-3">
                      <div>
                        <label className="block text-slate-500 font-bold mb-1">ステータス</label>
                        <select value={newProjStatus} onChange={e=>setNewProjStatus(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 bg-white text-slate-700 font-bold focus:outline-none">
                          <option value="pending">未着手</option>
                          <option value="in_progress">進行中</option>
                          <option value="completed">完了</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-slate-500 font-bold mb-1">開始日</label>
                        <input type="date" value={newProjStart} onChange={e=>setNewProjStart(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 bg-white text-slate-700 font-mono focus:border-indigo-500 focus:outline-none" />
                      </div>
                      <div>
                        <label className="block text-slate-500 font-bold mb-1">終了目標日</label>
                        <input type="date" value={newProjEnd} onChange={e=>setNewProjEnd(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 bg-white text-slate-700 font-mono focus:outline-none" />
                      </div>
                    </div>

                    <div className="flex justify-end gap-2 pt-3 border-t border-slate-100">
                      <button type="button" onClick={() => setShowAddProjectModal(false)} className="bg-slate-100 text-slate-600 px-4 py-2.5 rounded-2xl">キャンセル</button>
                      <button type="submit" className="bg-indigo-600 text-white font-bold px-4 py-2.5 rounded-2xl shadow-md shadow-indigo-100">案件を起票する</button>
                    </div>
                  </form>
                </div>
              </div>
            )}

            {/* ⚙️ 部署＆カラーのマスタ設定モーダル */}
            {showSettingsModal && (
              <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-xs flex items-center justify-center z-50 animate-in fade-in duration-200">
                <div className="bg-white border border-slate-200 rounded-3xl p-6 max-w-lg w-full shadow-2xl space-y-5 animate-in zoom-in-95 duration-200 max-h-[90vh] overflow-y-auto scrollbar-thin">
                  <div className="flex justify-between items-center pb-2.5 border-b border-slate-100">
                    <h3 className="font-extrabold text-sm text-slate-900 flex items-center gap-2">
                      <IconSettings className="text-purple-650" />
                      部署 ＆ カラーマスタ設定
                    </h3>
                    <button onClick={() => setShowSettingsModal(false)} className="text-slate-400 hover:text-slate-600 p-1"><IconX /></button>
                  </div>

                  <p className="text-xs text-slate-550 leading-relaxed">
                    プロジェクトに紐づく「部署」を追加・変更・削除できます。部署を選択して、タスクカードやステップの外枠として美しく色分けするカラーをカスタマイズしてください。
                  </p>

                  <div className="grid grid-cols-1 md:grid-cols-12 gap-5 pt-1">
                    {/* 左側：部署一覧の追加と選択リスト */}
                    <div className="md:col-span-5 space-y-3">
                      <span className="block text-[10px] font-black text-slate-400 uppercase tracking-wider">📁 登録部署リスト</span>
                      <div className="space-y-1.5 max-h-[170px] overflow-y-auto pr-1 scrollbar-thin">
                        {deptList.map(dept => {
                          const isSelected = selectedSettingsDeptKey === dept.key;
                          const dColorInfo = colorClassesMap[dept.color] || colorClassesMap.slate;
                          return (
                            <div 
                              key={dept.key}
                              onClick={() => setSelectedSettingsDeptKey(dept.key)}
                              className={`p-2.5 rounded-xl border text-xs font-bold flex items-center justify-between cursor-pointer transition-all ${
                                isSelected 
                                  ? 'border-indigo-400 bg-indigo-50/30 shadow-xs' 
                                  : 'border-slate-100 bg-slate-55 hover:bg-slate-100/55'
                              }`}
                            >
                              <div className="flex items-center gap-2.5 truncate">
                                <span className={`w-3 h-3 rounded-full ${dColorInfo.bar}`} />
                                <span className="truncate text-slate-800">{dept.label}</span>
                              </div>
                              <button 
                                type="button" 
                                onClick={(e) => { e.stopPropagation(); handleDeleteDept(dept.key); }}
                                className="text-slate-400 hover:text-rose-650 p-1"
                                title="この部署を削除する"
                              >
                                <IconX className="h-3.5 w-3.5" />
                              </button>
                            </div>
                          );
                        })}
                      </div>

                      {/* 部署の新規作成フォーム */}
                      <form onSubmit={handleCreateDept} className="border-t border-slate-100 pt-3 space-y-2">
                        <span className="block text-[10px] font-black text-slate-400 uppercase tracking-wider">➕ 新規部署を追加</span>
                        <div className="flex gap-1.5">
                          <input 
                            required
                            type="text" 
                            placeholder="部署・担当名..." 
                            value={newDeptLabel}
                            onChange={e => setNewDeptLabel(e.target.value)}
                            className="flex-1 border border-slate-200 rounded-xl p-2 text-xs focus:outline-none focus:border-indigo-400"
                          />
                          <button 
                            type="submit"
                            className="bg-purple-600 hover:bg-purple-700 text-white font-bold px-4 rounded-xl text-xs transition"
                          >
                            追加
                          </button>
                        </div>
                      </form>
                    </div>

                    {/* 右側：選択した部署に対する「設定編集（カラー選択＆名前変更）」 */}
                    <div className="md:col-span-7 bg-slate-50 border border-slate-150 rounded-2xl p-4 space-y-4">
                      {selectedSettingsDeptKey && deptList.find(d => d.key === selectedSettingsDeptKey) ? (
                        (() => {
                          const activeDept = deptList.find(d => d.key === selectedSettingsDeptKey);
                          const currentSelectedColor = activeDept.color;
                          return (
                            <div className="space-y-4 text-xs">
                              <span className="block font-black text-slate-800 border-b border-slate-200 pb-1.5">
                                📝 「{activeDept.label}」の詳細設定
                              </span>

                              {/* 部署名のインライン書き換え */}
                              <div>
                                <label className="block text-[10px] text-slate-400 font-bold mb-1">部署名・担当名</label>
                                <input 
                                  type="text" 
                                  value={activeDept.label}
                                  onChange={e => handleRenameDept(activeDept.key, e.target.value)}
                                  className="w-full bg-white border border-slate-200 rounded-xl p-2.5 text-slate-700 font-bold focus:outline-none focus:border-indigo-400"
                                />
                              </div>

                              {/* 部署へのカラー紐づけ */}
                              <div>
                                <label className="block text-[10px] text-slate-400 font-bold mb-1">ラベルに紐づけるテーマカラー</label>
                                <div className="grid grid-cols-2 gap-2">
                                  {Object.keys(colorClassesMap).map(colorKey => {
                                    const isSelected = currentSelectedColor === colorKey;
                                    const cMap = colorClassesMap[colorKey];
                                    return (
                                      <button
                                        key={colorKey}
                                        type="button"
                                        onClick={() => updateDeptColorSetting(activeDept.key, colorKey)}
                                        className={`w-full p-2.5 rounded-xl text-left font-extrabold text-[11px] border flex items-center gap-2 transition-all ${
                                          isSelected 
                                            ? `${cMap.bg} ${cMap.text} ${cMap.borderStrong} ring-1 ring-indigo-500/20 shadow-sm`
                                            : 'bg-white border-slate-200 text-slate-500 hover:border-slate-350'
                                        }`}
                                      >
                                        <span className={`w-3 h-3 rounded-full ${cMap.bar}`} />
                                        <span className="capitalize">{colorKey}</span>
                                      </button>
                                    );
                                  })}
                                </div>
                              </div>
                            </div>
                          );
                        })()
                      ) : (
                        <p className="text-slate-400 text-center py-12 text-xs">部署を選択してください。</p>
                      )}
                    </div>
                  </div>

                  <div className="flex justify-end pt-3.5 border-t border-slate-100">
                    <button 
                      onClick={() => setShowSettingsModal(false)}
                      className="bg-indigo-650 hover:bg-indigo-700 text-white font-extrabold px-5 py-3 rounded-2xl text-xs shadow-md shadow-indigo-100 transition"
                    >
                      マスタを確定して反映
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* 📋 進行ダッシュボード */}
            {viewMode === 'board' && (
              <React.Fragment>
                {/* 選択中の案件メタ情報薄型バー */}
                {activeProject ? (
                  <div className="bg-white border border-slate-200 rounded-3xl p-4 flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-xs animate-in fade-in duration-200">
                    
                    {/* 左側：案件プロジェクトのステータス・日付・名称 */}
                    <div className="space-y-2">
                      {editingProject ? (
                        <div className="space-y-3.5 bg-slate-50/60 p-4 rounded-3xl border border-slate-200 text-xs shadow-inner animate-in fade-in duration-150">
                          <span className="font-extrabold text-indigo-655 block mb-1">✏️ 案件プロジェクト階層・情報の変更</span>
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="text-[10px] text-slate-400 font-bold block mb-0.5">所属大分類フォルダ</label>
                              <select 
                                value={projectForm.folderId} 
                                onChange={e => setProjectForm({...projectForm, folderId: e.target.value})} 
                                className="w-full border border-slate-300 rounded-xl p-2 bg-white text-xs font-bold focus:outline-none"
                              >
                                {folders.map(f => (
                                  <option key={f.id} value={f.id}>{f.name}</option>
                                ))}
                              </select>
                            </div>
                            <div>
                              <label className="text-[10px] text-slate-400 font-bold block mb-0.5">ステータス</label>
                              <select 
                                value={projectForm.status || 'pending'} 
                                onChange={e => setProjectForm({...projectForm, status: e.target.value})} 
                                className="w-full border border-slate-300 rounded-xl p-2 bg-white text-xs font-bold focus:outline-none"
                              >
                                <option value="pending">未着手</option>
                                <option value="in_progress">進行中</option>
                                <option value="completed">完了</option>
                              </select>
                            </div>
                          </div>
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="text-[10px] text-slate-400 font-bold block mb-0.5">案件プロジェクト名</label>
                              <input type="text" value={projectForm.name} onChange={e => setProjectForm({...projectForm, name: e.target.value})} className="w-full border border-slate-300 rounded-xl p-2 focus:border-indigo-500 focus:outline-none bg-white text-xs font-bold" />
                            </div>
                            <div>
                              <label className="text-[10px] text-slate-400 font-bold block mb-0.5">案件コード</label>
                              <input type="text" value={projectForm.code} onChange={e => setProjectForm({...projectForm, code: e.target.value})} className="w-full border border-slate-300 rounded-xl p-2 focus:border-indigo-500 focus:outline-none bg-white text-xs font-bold font-mono" />
                            </div>
                          </div>
                          <div className="grid grid-cols-2 gap-3 text-[10px]">
                            <div>
                              <label className="font-bold text-slate-400 block mb-0.5">開始予定日</label>
                              <input type="date" value={projectForm.startDate} onChange={e => setProjectForm({...projectForm, startDate: e.target.value})} className="w-full border border-slate-300 rounded-xl p-2 font-mono text-xs focus:outline-none bg-white font-bold" />
                            </div>
                            <div>
                              <label className="font-bold text-slate-400 block mb-0.5">目標完了日</label>
                              <input type="date" value={projectForm.endDate} onChange={e => setProjectForm({...projectForm, endDate: e.target.value})} className="w-full border border-slate-300 rounded-xl p-2 font-mono text-xs focus:outline-none bg-white font-bold" />
                            </div>
                          </div>
                          <div className="flex justify-end gap-1.5 pt-1.5 border-t border-slate-200">
                            <button type="button" onClick={() => setEditingProject(false)} className="text-[10px] text-slate-550 hover:bg-slate-100 px-3 py-1.5 rounded-xl font-bold transition">戻る</button>
                            <button type="button" onClick={saveProjectEdit} className="text-[10px] bg-indigo-600 text-white px-4 py-1.5 rounded-xl font-bold shadow-md shadow-indigo-100">変更を適用</button>
                          </div>
                        </div>
                      ) : (
                        <div>
                          <div className="flex items-center gap-2 text-xs text-slate-400 font-extrabold flex-wrap">
                            <IconCalendar />
                            <span>期間: {activeProject.startDate} 〜 {activeProject.endDate}</span>
                            <span className="ml-1 bg-purple-100 text-purple-700 font-black border border-purple-200 rounded-xl px-2 py-0.5 text-[9.5px] shadow-xs">
                              📁 {folders.find(f => f.id === activeProject.folderId)?.name || '未分類'}
                            </span>
                            <span className={`ml-1 px-2 py-0.5 rounded-xl text-[9.5px] font-black border shadow-xs ${projectStatusOptions.find(o => o.value === (activeProject.status || 'pending'))?.className}`}>
                              {projectStatusOptions.find(o => o.value === (activeProject.status || 'pending'))?.label}
                            </span>
                          </div>
                          <h2 className="text-base font-black text-slate-805 leading-tight flex items-center gap-2 mt-1.5 flex-wrap">
                            {activeProject.name}
                            <button 
                              onClick={handleDeleteProject}
                              className="text-slate-300 hover:text-rose-600 p-1 rounded-xl transition-all"
                              title="この案件プロジェクトを削除する"
                            >
                              <IconTrash2 className="h-4.5 w-4.5" />
                            </button>
                          </h2>
                        </div>
                      )}
                    </div>

                    {/* 右側：案件のアクション（編集、URL共有） */}
                    {!editingProject && (
                      <div className="flex items-center gap-2 shrink-0 self-end md:self-auto">
                        <button 
                          onClick={() => { setEditingProject(true); setProjectForm(activeProject); }}
                          className="text-[10px] text-indigo-600 hover:text-indigo-800 font-black flex items-center gap-1 bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 px-3 py-2 rounded-xl transition shadow-xs"
                        >
                          <IconEdit2 className="h-3 w-3" /> 案件の編集・移動
                        </button>
                        <button 
                          onClick={(e) => handleCopyProjectUrl(activeProject.id, e)}
                          className="text-[10px] text-slate-605 hover:text-slate-850 font-black flex items-center gap-1 bg-white border border-slate-300 hover:bg-slate-50 px-3 py-2 rounded-xl transition shadow-xs"
                          title="この案件の直リンクURLをコピーする"
                        >
                          <IconLink className="h-3 w-3 text-slate-400" /> コピー共有
                        </button>
                      </div>
                    )}

                  </div>
                ) : (
                  <p className="text-slate-400 text-xs italic bg-white p-6 border rounded-3xl text-center shadow-xs">案件プロジェクトが未作成、または選択されていません。上部ヘッダーの「＋」ボタンから追加してください。</p>
                )}

                {/* 大ステップ（STEP）の動的追加ボタン */}
                <div className="flex justify-end">
                  {activeProject && !showAddStepForm ? (
                    <button 
                      onClick={() => {
                        setShowAddStepForm(true);
                        setNewStepName('');
                        setNewStepDesc('');
                        setNewStepStartDate(activeProject.startDate);
                        setNewStepDueDate(activeProject.endDate);
                        setNewStepLinks([]);
                        setTmpStepLinkLabel('');
                        setTmpStepLinkUrl('');
                      }}
                      className="bg-purple-55/15 hover:bg-purple-100 text-purple-700 font-black border border-purple-200 text-xs px-4 py-3 rounded-2xl flex items-center gap-1.5 transition-all shadow-xs"
                    >
                      <IconPlus /> 新しい大ステップ（大工程）を追加
                    </button>
                  ) : activeProject ? (
                    <form onSubmit={handleAddStep} className="w-full bg-purple-50/20 border border-purple-300 rounded-3xl p-5 space-y-4 text-xs animate-in fade-in duration-200">
                      <div className="flex justify-between items-center pb-1.5 border-b border-purple-100">
                        <span className="font-extrabold text-purple-800">➕ 新規大ステップ（STEP）の作成</span>
                        <button type="button" onClick={() => setShowAddStepForm(false)} className="text-slate-400 hover:text-slate-600 p-1"><IconX /></button>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-slate-600 font-bold mb-1">大ステップ名称（工程名） <span className="text-rose-500">*</span></label>
                          <input required type="text" placeholder="例: テスト運用 ＆ 最終調整" value={newStepName} onChange={e => setNewStepName(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 text-slate-700 bg-white focus:outline-none" />
                        </div>
                        <div>
                          <label className="block text-slate-600 font-bold mb-1">ステップ詳細説明・進捗目標など</label>
                          <input type="text" placeholder="例: 実際の取引先アカウントを用いた検証" value={newStepDesc} onChange={e => setNewStepDesc(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 text-slate-700 bg-white focus:outline-none" />
                        </div>
                      </div>

                      {/* 開始日と期限の設定 */}
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-slate-600 font-bold mb-1">予定開始日</label>
                          <input type="date" value={newStepStartDate} onChange={e => setNewStepStartDate(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 text-slate-700 font-mono font-bold" />
                        </div>
                        <div>
                          <label className="block text-slate-600 font-bold mb-1">完了予定日(締切)</label>
                          <input type="date" value={newStepDueDate} onChange={e => setNewStepDueDate(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 text-slate-700 font-mono font-bold" />
                        </div>
                      </div>

                      {/* 部署カラー連動 */}
                      <div className="space-y-1">
                        <span className="block text-slate-600 font-bold">関連付ける主担当部署 (部署カラーと自動同期されます)</span>
                        <select 
                          value={newStepDeptKey} 
                          onChange={e => setNewStepDeptKey(e.target.value)} 
                          className="w-full border border-slate-300 rounded-xl p-2.5 bg-white text-slate-700 text-xs font-bold focus:outline-none"
                        >
                          {deptList.map(d => (
                            <option key={d.key} value={d.key}>{d.label}</option>
                          ))}
                        </select>
                      </div>

                      {/* 大ステップ：複数URL登録UI */}
                      <div className="border-t border-purple-100 pt-3 space-y-2">
                        <span className="block text-purple-900 font-extrabold text-xs">🔗 大ステップに関連付ける複数URLリンクの作成</span>
                        <div className="flex flex-wrap items-center gap-2">
                          <input 
                            type="text" 
                            placeholder="例: 社内要件定義書" 
                            value={tmpStepLinkLabel} 
                            onChange={e => setTmpStepLinkLabel(e.target.value)} 
                            className="w-40 border border-slate-200 bg-white rounded-xl p-2 focus:outline-none"
                          />
                          <input 
                            type="text" 
                            placeholder="例: https://notion.so/..." 
                            value={tmpStepLinkUrl} 
                            onChange={e => setTmpStepLinkUrl(e.target.value)} 
                            className="flex-1 border border-slate-200 bg-white rounded-xl p-2 focus:outline-none"
                          />
                          <button 
                            type="button" 
                            onClick={handleAddLinkToNewStep} 
                            className="bg-purple-100 hover:bg-purple-200 text-purple-700 font-black px-4 py-2 rounded-xl shadow-xs"
                          >
                            追加
                          </button>
                        </div>

                        {/* 登録予定のリンク一覧表示 */}
                        {newStepLinks.length > 0 && (
                          <div className="flex flex-wrap gap-2 pt-1">
                            {newStepLinks.map(lnk => (
                              <span key={lnk.id} className="inline-flex items-center gap-1.5 text-xs bg-purple-100 text-purple-800 border border-purple-200 px-3 py-1 rounded-full font-bold shadow-xs">
                                <IconLink className="h-3 w-3" />
                                <span>{lnk.label}</span>
                                <button type="button" onClick={(e) => handleRemoveLinkFromNewStep(lnk.id, e)} className="text-purple-400 hover:text-purple-800 font-extrabold text-xs ml-1">×</button>
                              </span>
                            ))}
                          </div>
                        )}
                      </div>

                      <div className="flex flex-wrap justify-end gap-2 pt-2 border-t border-purple-100">
                        <button type="button" onClick={() => setShowAddStepForm(false)} className="bg-slate-100 text-slate-600 px-4 py-2 rounded-2xl font-bold">キャンセル</button>
                        <button type="submit" className="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-2xl font-bold shadow-md shadow-purple-100">ステップを作成</button>
                      </div>
                    </form>
                  ) : null}
                </div>

                {/* STEPコンテナ */}
                <div className="space-y-8">
                  {activeProject && stepList.map((step, index) => {
                    const stepTasks = tasks.filter(t => t.stepId === step.id);
                    const stepProgress = getStepProgress(step.id);
                    const isStepCollapsed = !!collapsedSteps[step.id];
                    const isEditingThisStep = editingStepId === step.id;

                    // 関連付けられた部署の特定からカラーを動的に逆引き
                    const assocDeptColorKey = deptList.find(d => d.key === step.deptKey)?.color || 'slate';
                    const stepClasses = colorClassesMap[assocDeptColorKey] || colorClassesMap.purple;

                    return (
                      <div 
                        key={step.id} 
                        id={`step-anchor-${step.id}`}
                        draggable={!isEditingThisStep}
                        onDragStart={(e) => handleDragStart(index, e)}
                        onDragOver={(e) => handleDragOver(index, e)}
                        onDragEnd={handleDragEnd}
                        className={`bg-white rounded-3xl shadow-xs overflow-hidden border-4 transition-all duration-300 ${
                          isStepCollapsed ? 'border-slate-200' : stepClasses.borderStrong
                        } ${draggedStepIndex === index ? 'drag-ghost' : ''}`}
                      >
                        
                        {/* STEPヘッダー */}
                        {isEditingThisStep ? (
                          <div 
                            onClick={(e) => e.stopPropagation()} 
                            className="p-5 bg-purple-50/25 border-b border-purple-100 flex flex-col gap-4 animate-in fade-in"
                          >
                            <div className="flex items-center gap-3">
                              <span className="bg-purple-600 text-white font-black text-[10px] px-3 py-1 rounded-lg shrink-0">STEP {index + 1} 編集</span>
                              <input 
                                required
                                type="text" 
                                placeholder="ステップ名を入力..." 
                                value={editStepName} 
                                onChange={e => setEditStepName(e.target.value)} 
                                className="flex-1 font-bold text-sm border border-purple-200 rounded-xl p-2 focus:border-purple-500 focus:outline-none bg-white shadow-inner"
                              />
                            </div>
                            <input 
                              type="text" 
                              placeholder="ステップの簡潔な説明・進捗目安..." 
                              value={editStepDesc} 
                              onChange={e => setEditStepDesc(e.target.value)} 
                              className="w-full text-xs border border-purple-200 rounded-xl p-2 focus:border-purple-500 focus:outline-none bg-white shadow-inner"
                            />

                            {/* 開始日・期限の編集 */}
                            <div className="grid grid-cols-2 gap-4 text-xs">
                              <div>
                                <label className="block text-slate-600 font-bold mb-0.5">開始予定日</label>
                                <input type="date" value={editStepStartDate} onChange={e => setEditStepStartDate(e.target.value)} className="w-full border border-purple-200 rounded-xl p-2 font-mono text-xs focus:outline-none bg-white font-bold" />
                              </div>
                              <div>
                                <label className="block text-slate-600 font-bold mb-0.5">完了予定日(期日)</label>
                                <input type="date" value={editStepDueDate} onChange={e => setEditStepDueDate(e.target.value)} className="w-full border border-purple-200 rounded-xl p-2 font-mono text-xs focus:outline-none bg-white font-bold" />
                              </div>
                            </div>

                            {/* 部署カラーの変更紐づき */}
                            <div className="space-y-1 text-xs">
                              <span className="block text-slate-600 font-bold">関連付ける主担当部署</span>
                              <select 
                                value={editStepDeptKey} 
                                onChange={e => setEditStepDeptKey(e.target.value)} 
                                className="w-full border border-purple-200 rounded-xl p-2 bg-white focus:outline-none text-xs font-bold"
                              >
                                {deptList.map(d => (
                                  <option key={d.key} value={d.key}>{d.label}</option>
                                ))}
                              </select>
                            </div>

                            {/* 大ステップ編集時：参考リンク編集用インラインUI */}
                            <div className="border-t border-purple-100 pt-3 space-y-2">
                              <span className="block text-purple-900 font-extrabold text-xs">🔗 大ステップに関連する複数URLリンクの編集</span>
                              <div className="flex items-center gap-2">
                                <input 
                                  type="text" 
                                  placeholder="リンク名" 
                                  value={tmpEditStepLinkLabel} 
                                  onChange={e => setTmpEditStepLinkLabel(e.target.value)} 
                                  className="w-32 border border-slate-200 bg-white rounded-xl p-2 text-xs font-bold focus:outline-none"
                                />
                                <input 
                                  type="text" 
                                  placeholder="URL" 
                                  value={tmpEditStepLinkUrl} 
                                  onChange={e => setTmpEditStepLinkUrl(e.target.value)} 
                                  className="flex-1 border border-slate-200 bg-white rounded-xl p-2 text-xs focus:outline-none"
                                />
                                <button 
                                  type="button" 
                                  onClick={handleAddLinkToEditStep} 
                                  className="bg-purple-100 hover:bg-purple-200 text-purple-700 font-black px-3 py-2 rounded-xl text-xs"
                                >
                                  追加
                                </button>
                              </div>

                              {/* 現在登録されているリンク */}
                              {editStepLinks.length > 0 && (
                                <div className="flex flex-wrap gap-2 pt-1">
                                  {editStepLinks.map(lnk => (
                                    <span key={lnk.id} className="inline-flex items-center gap-1.5 text-[11px] bg-purple-100 text-purple-805 border border-purple-200 px-2.5 py-1 rounded-full font-bold shadow-xs">
                                      <IconLink className="h-3 w-3" />
                                      <span className="truncate max-w-[120px]">{lnk.label}</span>
                                      <button type="button" onClick={(e) => handleRemoveLinkFromEditStep(lnk.id, e)} className="text-purple-400 hover:text-rose-605 font-extrabold text-xs ml-1">×</button>
                                    </span>
                                  ))}
                                </div>
                              )}
                            </div>

                            <div className="flex flex-wrap justify-end gap-2 pt-1.5 border-t border-purple-100">
                              <button type="button" onClick={() => setEditingStepId(null)} className="text-xs text-slate-605 px-4 py-2 bg-white border border-slate-200 rounded-xl font-bold transition">キャンセル</button>
                              <button type="button" onClick={(e) => saveStepEdit(step.id, e)} className="text-xs bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 rounded-xl font-bold shadow-md transition">変更を確定</button>
                            </div>
                          </div>
                        ) : (
                          <div 
                            onClick={() => toggleStepCollapse(step.id)}
                            className={`p-4 border-b flex flex-col md:flex-row md:items-center justify-between gap-4 cursor-pointer select-none transition-all duration-300 border-slate-200 ${
                              isStepCollapsed ? 'bg-slate-50/50' : `${stepClasses.bg}`
                            }`}
                          >
                            <div className="space-y-2 flex-1">
                              <div className="flex items-center gap-3 flex-wrap">
                                {/* ドラッグ用ハンドル */}
                                <div className="p-1 hover:bg-white/80 rounded-lg transition cursor-grab active:cursor-grabbing" title="ドラッグしてこの大ステップを並び替え">
                                  <IconDragHandle />
                                </div>

                                <span className={`${stepClasses.bar} text-white font-black text-[10px] px-2.5 py-0.5 rounded shadow-xs`}>STEP {index + 1}</span>
                                
                                <h3 className="font-black text-sm text-slate-805 flex items-center gap-1.5 leading-none">
                                  {step.name}
                                  <span className="text-slate-400">
                                    {isStepCollapsed ? <IconChevronRight className="h-4.5 w-4.5" /> : <IconChevronDown className="h-4.5 w-4.5" />}
                                  </span>
                                </h3>
                                
                                {/* 期日カウントダウン表示 */}
                                {renderStepDeadlineBadge(step, stepProgress)}

                                {/* STEP移動・編集・削除ボタン */}
                                <div className="flex items-center gap-1" onClick={(e) => e.stopPropagation()}>
                                  <button 
                                    onClick={(e) => moveStepOrder(index, -1, e)}
                                    disabled={index === 0}
                                    className={`p-1.5 rounded-lg transition border border-transparent hover:border-slate-200 hover:bg-white ${index === 0 ? 'opacity-25 cursor-not-allowed' : 'text-slate-500'}`}
                                    title="上（前）に移動"
                                  >
                                    <IconArrowUp />
                                  </button>
                                  <button 
                                    onClick={(e) => moveStepOrder(index, 1, e)}
                                    disabled={index === stepList.length - 1}
                                    className={`p-1.5 rounded-lg transition border border-transparent hover:border-slate-200 hover:bg-white ${index === stepList.length - 1 ? 'opacity-25 cursor-not-allowed' : 'text-slate-500'}`}
                                    title="下（後）に移動"
                                  >
                                    <IconArrowDown />
                                  </button>

                                  <button 
                                    onClick={(e) => startEditingStep(step, e)}
                                    className="p-1.5 text-slate-400 hover:text-purple-600 hover:bg-white hover:border-slate-200 border border-transparent rounded-lg transition"
                                    title="ステップの詳細・主担当・期日・関連URLを変更"
                                  >
                                    <IconEdit2 className="h-3.5 w-3.5" />
                                  </button>
                                  <button 
                                    onClick={(e) => handleDeleteStep(step.id, step.name, e)}
                                    className="p-1.5 text-slate-400 hover:text-rose-650 hover:bg-white hover:border-slate-200 border border-transparent rounded-lg transition"
                                    title="この大ステップを配下タスクごと全削除"
                                  >
                                    <IconTrash2 className="h-3.5 w-3.5" />
                                  </button>
                                </div>
                              </div>
                              
                              <div className="flex flex-col gap-2 pl-8">
                                <p className="text-slate-605 font-bold text-xs">{step.desc}</p>
                                
                                <div className="flex items-center gap-3 flex-wrap">
                                  {step.startDate && step.dueDate && (
                                    <div className="flex items-center gap-1.5 text-[10.5px] text-slate-600 font-mono font-bold bg-white/80 px-2.5 py-0.5 rounded-lg border border-slate-200">
                                      <IconCalendar className="h-3 w-3 text-slate-400" />
                                      <span>{step.startDate} 〜 {step.dueDate}</span>
                                    </div>
                                  )}

                                  {/* 大ステップ：登録済み参考リンクバッジ表示 */}
                                  {step.links && step.links.length > 0 && (
                                    <div className="flex items-center gap-1.5 flex-wrap">
                                      {step.links.map(lnk => (
                                        <a 
                                          key={lnk.id} 
                                          href={lnk.url} 
                                          target="_blank" 
                                          rel="noopener noreferrer" 
                                          onClick={(e) => e.stopPropagation()}
                                          className="inline-flex items-center gap-1 text-[10.5px] bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 px-2.5 py-0.5 rounded-lg transition font-black shadow-xs animate-in fade-in"
                                        >
                                          <IconExternalLink className="h-2.5 w-2.5" />
                                          <span>{lnk.label}</span>
                                        </a>
                                      ))}
                                    </div>
                                  )}
                                </div>
                              </div>
                            </div>
                            
                            {/* STEP個別の進捗率と追加ボタン */}
                            <div className="flex items-center gap-4 pl-8 md:pl-0" onClick={(e) => e.stopPropagation()}>
                              <div className="flex items-center gap-2">
                                <span className="text-[10px] text-slate-400 font-extrabold uppercase">進捗</span>
                                <div className="h-2 w-20 bg-slate-200 rounded-full overflow-hidden shadow-inner">
                                  <div className={`h-full ${stepClasses.bar} transition-all duration-300`} style={{ width: `${stepProgress}%` }}></div>
                                </div>
                                <span className={`text-xs font-black ${stepClasses.text}`}>{stepProgress}%</span>
                              </div>

                              {addingTaskStepId !== step.id && (
                                <button 
                                  onClick={() => {
                                    setAddingTaskStepId(step.id);
                                    setNewTaskTitle('');
                                    setNewTaskDesc('');
                                    const fallbackDept = deptList[0]?.key || 'backoffice';
                                    setNewTaskDept(fallbackDept);
                                    setNewTaskAssignee(fallbackDept === 'backoffice' ? '自分 (事務)' : '担当者');
                                  }}
                                  className="bg-white hover:bg-slate-50 border border-slate-200 hover:border-slate-300 text-slate-800 font-black text-xs px-3 py-2 rounded-xl flex items-center gap-1 transition shadow-xs"
                                >
                                  <IconPlus /> タスク追加
                                </button>
                              )}
                            </div>
                          </div>
                        )}

                        {/* タスクエリア */}
                        {!isStepCollapsed && (
                          <div className="bg-slate-50/20">
                            {/* 新規タスク追加フォーム */}
                            {addingTaskStepId === step.id && (
                              <form onSubmit={(e) => handleAddTask(step.id, e)} className="p-5 bg-purple-50/10 border-b border-slate-200 space-y-4 text-xs animate-in slide-in-from-top-2 duration-200">
                                <div className="flex justify-between items-center pb-2 border-b border-slate-200">
                                  <span className="font-black text-purple-800">➕ STEP {index + 1} の中にタスクを新規作成</span>
                                  <button type="button" onClick={() => setAddingTaskStepId(null)} className="text-slate-400 hover:text-slate-600 p-1"><IconX /></button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                  <div className="space-y-3">
                                    <input required type="text" placeholder="タスク名を入力してください..." value={newTaskTitle} onChange={e => setNewTaskTitle(e.target.value)} className="w-full border border-slate-200 bg-white rounded-xl p-2.5 text-slate-700 font-bold focus:outline-none focus:border-indigo-400 shadow-inner" />
                                    <textarea placeholder="詳細論点・前提となる確認事項などを記入..." value={newTaskDesc} onChange={e => setNewTaskDesc(e.target.value)} className="w-full border border-slate-200 bg-white rounded-xl p-2.5 text-slate-700 focus:outline-none focus:border-indigo-400 shadow-inner" rows={3} />
                                  </div>
                                  <div className="grid grid-cols-2 gap-3 self-start">
                                    <div>
                                      <label className="block text-slate-400 font-bold mb-1">担当部署</label>
                                      <select value={newTaskDept} onChange={e => {
                                        const dept = e.target.value;
                                        const found = deptList.find(d => d.key === dept);
                                        let defaultName = '担当者';
                                        if (dept === 'backoffice') defaultName = '自分 (事務)';
                                        else if (found) defaultName = `${found.label}担当`;
                                        setNewTaskDept(dept);
                                        setNewTaskAssignee(defaultName);
                                      }} className="w-full border border-slate-200 rounded-xl p-2 bg-white text-slate-700 font-bold">
                                        {deptList.map(d => (
                                          <option key={d.key} value={d.key}>{d.label}</option>
                                        ))}
                                      </select>
                                    </div>
                                    <div>
                                      <label className="block text-slate-400 font-bold mb-1">担当個人・チーム名</label>
                                      <input type="text" value={newTaskAssignee} onChange={e => setNewTaskAssignee(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2 text-slate-700 font-bold focus:outline-none focus:border-indigo-400" />
                                    </div>
                                    <div className="col-span-2">
                                      <label className="block text-slate-400 font-bold mb-1">完了期日(デッドライン)</label>
                                      <input type="date" value={newTaskDueDate} onChange={e => setNewTaskDueDate(e.target.value)} className="w-full border border-slate-200 rounded-xl p-2 text-slate-700 font-mono font-bold" />
                                    </div>
                                  </div>
                                </div>
                                <div className="flex flex-wrap justify-end gap-2 pt-2 border-t border-slate-100">
                                  <button type="button" onClick={() => setAddingTaskStepId(null)} className="bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-2xl font-bold">キャンセル</button>
                                  <button type="submit" className="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-2xl font-bold shadow-md shadow-purple-100">作成する</button>
                                </div>
                              </form>
                            )}

                            {/* タスクカード一覧 */}
                            <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                              {stepTasks.length > 0 ? (
