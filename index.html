    const compressImage = (file, maxWidth = 800) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = (maxWidth * height) / width;
              width = maxWidth;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (err) => reject(err);
      });
    };

            <div className="max-w-md w-full bg-white dark:bg-slate-900 rounded-3xl border border-slate-202 dark:border-slate-800 p-8 shadow-2xl text-center space-y-6 relative overflow-hidden">
              
              {/* ロゴグラフィック */}
              <div className="mx-auto bg-indigo-600 bg-gradient-to-tr from-indigo-700 to-purple-600 text-white w-16 h-16 rounded-2xl font-black text-2xl flex items-center justify-center shadow-lg">
                PL
              </div>
              
              <div className="space-y-2">
                <h1 className="text-xl font-black text-slate-905 dark:text-white leading-snug">Project Loom</h1>
                <p className="text-xs text-slate-505 dark:text-slate-440 font-bold">Sansanグループ案件推進専用ダッシュボード</p>
              </div>

              <hr className="border-slate-150 dark:border-slate-800" />

              <div className="bg-slate-55 dark:bg-slate-955/50 border border-slate-150 dark:border-slate-800 p-4 rounded-2xl text-left">
                <p className="text-xs text-slate-605 dark:text-slate-300 font-bold leading-relaxed">
                  本システムはSansan株式会社のセキュリティ統制下にある専用プロトタイプです。アクセスおよび閲覧には、認証情報が必要です。
                </p>
              </div>

              {/* 検証用ログイン（ワンプッシュ） */}
              <div className="pt-2">
                <button 
                  onClick={() => handleMockLogin('member@sansan.com')}
                  className="w-full py-4 px-4 bg-indigo-600 hover:bg-indigo-700 text-white border border-indigo-700 rounded-2xl font-black text-xs flex items-center justify-center shadow-md hover:shadow-lg transition-all"
                >
                  <span className="mr-2">🔑</span>
                  <span>Sansan社員アカウントでサインイン</span>
                </button>
                <span className="text-[10px] text-slate-440 dark:text-slate-505 font-bold block mt-2 text-center">
                  (認証制限およびドメインエラー回避用)
                </span>
              </div>

            </div>
          </div>
        );
      }

      // ドメイン不適合時ガードガード（※通常上記モック経由では通り抜けますがセーフティとして残備）
      if (!isSansanUser) {
        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-955 flex flex-col items-center justify-center p-6 transition-colors duration-200">
            <div className="max-w-md w-full bg-white dark:bg-slate-900 rounded-3xl border border-rose-200 p-8 shadow-2xl text-center space-y-6">
              <div className="mx-auto p-4 bg-rose-55 border border-rose-150 rounded-full w-20 h-20 flex items-center justify-center text-rose-605">
                <IconWarning className="h-10 w-10" />
              </div>
              <h1 className="text-lg font-black text-rose-605">アクセス権限エラー</h1>
              <p className="text-xs text-slate-505">@sansan.com 以外のドメインです。</p>
              <button onClick={handleLogout} className="w-full py-2.5 bg-slate-150 rounded-xl font-bold text-xs">トップに戻る</button>
            </div>
          </div>
        );
      }

      // 3. メインUI
      return (
        <div className="min-h-screen bg-slate-55 dark:bg-slate-955 text-slate-805 dark:text-slate-150 font-sans antialiased pb-16 transition-colors duration-200">
          
          {alertMessage && (
            <div className="fixed bottom-6 right-6 bg-slate-955/95 dark:bg-slate-805 text-white text-xs px-5 py-4 rounded-2xl shadow-2xl z-[100] whitespace-pre-wrap max-w-sm flex items-center gap-2 border border-slate-705 dark:border-slate-605 backdrop-blur-md animate-bounce">
              <IconInfo className="h-5 w-5 text-indigo-400 shrink-0" />
              <span className="font-bold leading-relaxed">{alertMessage}</span>
            </div>
          )}

          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95">
                <div className="flex items-center gap-3 pb-3 border-b border-slate-150 dark:border-slate-700 text-rose-605">
                  <div className="p-2 bg-rose-55 dark:bg-rose-900/30 rounded-2xl"><IconWarning className="h-6 w-6 text-rose-605 dark:text-rose-400" /></div>
                  <h3 className="font-extrabold text-sm text-slate-955 dark:text-white leading-tight">{confirmModal.title}</h3>
                </div>
                <p className="text-xs text-slate-505 dark:text-slate-455 whitespace-pre-line leading-relaxed">{confirmModal.message}</p>
                <div className="flex justify-end gap-2 px-1 pt-3 border-t border-slate-150 dark:border-slate-700 text-xs">
                  <button type="button" onClick={closeConfirm} className="bg-slate-150 dark:bg-slate-700 hover:bg-slate-220 dark:hover:bg-slate-600 text-slate-605 dark:text-slate-300 px-4 py-2.5 rounded-2xl font-bold transition-all">キャンセル</button>
                  <button type="button" onClick={confirmModal.onConfirm} className="bg-rose-605 hover:bg-rose-700 text-white px-5 py-2.5 rounded-2xl font-extrabold shadow-md transition-all">実行</button>
                </div>
              </div>
            </div>
          )}

          {lightboxImage && (
            <div className="fixed inset-0 bg-slate-955/90 z-[200] flex items-center justify-center p-4 cursor-zoom-out animate-in fade-in" onClick={() => setLightboxImage(null)}>
              <div className="absolute top-4 right-4 bg-white/20 hover:bg-white/30 text-white p-2.5 rounded-full transition-all cursor-pointer"><IconX className="h-6 w-6" /></div>
              <img src={lightboxImage} alt="preview" className="max-w-full max-h-full rounded-2xl shadow-2xl object-contain animate-in zoom-in-95" />
            </div>
          )}

          {/* 新規プロジェクト起票モーダル */}
          {showAddProjectModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-4 border-b border-slate-150 dark:border-slate-700/50 pb-3">
                  <h2 className="text-base font-black text-slate-805 dark:text-slate-150 flex items-center gap-2"><IconPlus className="text-indigo-600 dark:text-indigo-404" />新規プロジェクトの起票</h2>
                  <button onClick={() => setShowAddProjectModal(false)} className="text-slate-404 dark:text-slate-505 hover:bg-slate-150 dark:hover:bg-slate-700 p-1.5 rounded-lg transition-colors"><IconX className="h-5 w-5" /></button>
                </div>
                <form onSubmit={handleCreateProject} className="flex-1 overflow-y-auto pr-2 space-y-5 scrollbar-thin">
                  <div className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">所属フォルダ</label>
                        <select value={newProjFolderId} onChange={e => setNewProjFolderId(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 bg-white dark:bg-slate-800 text-xs font-bold text-slate-805 dark:text-slate-150 focus:outline-none focus:border-indigo-500">
                          {folders.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">初期ステータス</label>
                        <select value={newProjStatus} onChange={e => setNewProjStatus(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 bg-white dark:bg-slate-800 text-xs font-bold text-slate-805 dark:text-slate-150 focus:outline-none focus:border-indigo-500">
                          <option value="pending">未着手</option><option value="in_progress">進行中</option><option value="completed">完了</option>
                        </select>
                      </div>
                    </div>
                    <div>
                      <label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">プロジェクト名称 (必須)</label>
                      <input required type="text" value={newProjName} onChange={e => setNewProjName(e.target.value)} className="w-full border border-slate-350 dark:border-slate-605 text-slate-805 dark:text-slate-150 text-sm font-bold focus:outline-none focus:border-indigo-500" placeholder="例: 【ECD】新機能要件定義" />
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div><label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">管理コード</label><input type="text" value={newProjCode} onChange={e => setNewProjCode(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 bg-white dark:bg-slate-808 text-slate-805 dark:text-slate-150 text-xs font-bold font-mono focus:outline-none focus:border-indigo-500" placeholder="例: PRJ-2026-01" /></div>
                      <div><label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">開始予定日</label><input type="date" value={newProjStart} onChange={e => setNewProjStart(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 font-mono bg-white dark:bg-slate-808 text-slate-805 dark:text-slate-150 text-xs font-bold focus:outline-none focus:border-indigo-500" /></div>
                      <div><label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">目標完了日</label><input type="date" value={newProjEnd} onChange={e => setNewProjEnd(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 font-mono bg-white dark:bg-slate-808 text-slate-805 dark:text-slate-150 text-xs font-bold focus:outline-none focus:border-indigo-500" /></div>
                    </div>
                    
                    <div className="border-t border-slate-150 dark:border-slate-700/50 pt-3 mt-1 space-y-2">
                      <span className="text-[10px] font-bold text-slate-605 dark:text-slate-455 flex items-center gap-1"><IconLink className="h-3 w-3"/> プロジェクト関連リンク</span>
                      <div className="flex items-center gap-2">
                        <input type="text" placeholder="リンク名 (例: 要件定義書)" value={tmpProjLinkLabel} onChange={e => setTmpProjLinkLabel(e.target.value)} className="w-32 border border-slate-350 dark:border-slate-600 bg-white dark:bg-slate-955 rounded-xl p-2.5 text-xs text-slate-705 dark:text-slate-150 focus:outline-none" />
                        <input type="text" placeholder="URL (https://...)" value={tmpProjLinkUrl} onChange={e => setTmpLinkUrl(e.target.value)} className="flex-1 border border-slate-350 dark:border-slate-600 bg-white dark:bg-slate-955 rounded-xl p-2.5 text-xs text-slate-705 dark:text-slate-150 focus:outline-none" />
                        <button type="button" onClick={handleAddLinkToNewProj} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition-colors">追加</button>
                      </div>
                      {newProjLinks.length > 0 && (
                        <div className="flex flex-wrap gap-1.5 pt-1">
                          {newProjLinks.map(lnk => (
                            <span key={lnk.id} className="inline-flex items-center gap-1 text-[10px] bg-slate-150 dark:bg-slate-800 border border-slate-202 dark:border-slate-707 text-slate-605 dark:text-slate-300 px-2 py-0.5 rounded-lg font-bold"><IconLink className="h-2.5 w-2.5"/><span className="truncate max-w-[120px] ml-1">{lnk.label}</span><button type="button" onClick={(e) => handleRemoveLinkFromNewProj(lnk.id, e)} className="text-slate-404 hover:text-rose-605 font-bold text-[10px] ml-1">×</button></span>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                  <div className="flex justify-end gap-2 pt-4 border-t border-slate-150 dark:border-slate-700">
                    <button type="button" onClick={() => setShowAddProjectModal(false)} className="bg-slate-150 dark:bg-slate-700 hover:bg-slate-220 dark:hover:bg-slate-600 text-slate-605 dark:text-slate-300 px-5 py-2.5 rounded-2xl font-bold transition-colors">キャンセル</button>
                    <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-2xl font-bold shadow-md transition-colors">プロジェクトを起票</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <header className="bg-white/95 dark:bg-slate-955/95 border-b border-slate-202 dark:border-slate-700 sticky top-0 z-50 shadow-sm backdrop-blur-lg divide-y divide-slate-150 dark:divide-slate-800 transition-colors duration-200">
            <div className="px-6 py-3 flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 bg-gradient-to-tr from-indigo-700 to-purple-600 text-white p-2.5 rounded-2xl font-black text-sm leading-none">PL</div>
                <div>
                  <h1 className="text-xs font-black text-slate-955 dark:text-white leading-tight">Project Loom</h1>
                  <p className="text-[9px] text-slate-440 dark:text-slate-505 font-extrabold uppercase tracking-wider">
                    Sansan専用ダッシュボード 
                    {(!useFirebase || (gistToken && gistId)) && <span className="ml-1 text-emerald-600 dark:text-emerald-404 bg-emerald-55 dark:bg-emerald-900/30 px-1 py-0.5 rounded font-black text-[7.5px]">{(gistToken && gistId) ? 'GIST-SYNC' : 'LOCAL-STORE'}</span>}
                  </p>
                </div>
              </div>

              {/* 👥 パターンB: ヘッダー部分に独立した第3の「アナリティクス」切替タブを実装 */}
              <div className="flex bg-slate-150 dark:bg-slate-800 p-0.5 rounded-xl border border-slate-202 dark:border-slate-700 text-xs shadow-inner">
                <button onClick={() => setViewMode('board')} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white"><IconCalendar className="h-3 w-3 text-indigo-500" /><span>📋 進行ダッシュボード</span></button>
                <button onClick={() => setViewMode('database')} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white"><IconDatabase className="h-3 w-3 text-indigo-500" /><span>🗃️ データベース</span></button>
                <button onClick={() => setViewMode('analytics')} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white"><IconChart className="h-4 w-4 text-indigo-500" /><span>📊 アナリティクス</span></button>
              </div>

              <div className="flex items-center gap-3 shrink-0">
                
                {/* 🔥 今日やるタスク集約アコーディオンボタン */}
                <div className="relative shrink-0">
                  <button 
                    onClick={() => setShowTodayDropdown(!showTodayDropdown)} 
                    className={`flex items-center gap-1.5 text-[11px] font-black px-3.5 py-2 rounded-xl border transition-all shadow-xs ${activeTodayTasks.length > 0 ? 'bg-amber-500 dark:bg-amber-955 border-amber-500 dark:border-amber-700 text-white dark:text-amber-300 animate-pulse' : 'bg-slate-55 dark:bg-slate-800 border-slate-202 dark:border-slate-705 text-slate-605 dark:text-slate-300 hover:bg-slate-150'}`}
                  >
                    <span>🔥 今日やる</span>
                    {activeTodayTasks.length > 0 && (
                      <span className="bg-white text-amber-600 dark:bg-amber-900 dark:text-amber-200 text-[9px] px-1.5 py-0.5 rounded-full font-black font-mono">
                        {activeTodayTasks.length}
                      </span>
                    )}
                    {overdueTodayTasks.length > 0 && (
                      <span className="text-[10px] animate-bounce" title="本日中に完了していない期限超過タスクがあります！">🚨</span>
                    )}
                  </button>

                  {/* 今日やるタスク一覧ドロップダウン */}
                  {showTodayDropdown && (
                    <React.Fragment>
                      <div className="fixed inset-0 z-40" onClick={() => setShowTodayDropdown(false)}></div>
                      <div className="absolute top-full right-0 mt-2 w-80 bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-2xl shadow-xl z-50 flex flex-col max-h-[70vh]">
                        <div className="p-3 border-b border-slate-150 dark:border-slate-700 bg-slate-55 dark:bg-slate-955 flex justify-between items-center">
                          <span className="font-bold text-xs text-slate-705 dark:text-slate-300 flex items-center gap-1.5">🔥 今日やるタスク一覧</span>
                          {overdueTodayTasks.length > 0 && (
                            <span className="bg-rose-55 dark:bg-rose-900/30 text-rose-605 dark:text-rose-400 text-[9px] px-2 py-0.5 rounded-lg border border-rose-200 dark:border-rose-800 font-extrabold animate-pulse">
                              🚨 期限超過 {overdueTodayTasks.length}件
                            </span>
                          )}
                        </div>
                        <div className="overflow-y-auto p-3 space-y-2 bg-slate-55/30 dark:bg-slate-900/30 scrollbar-thin max-h-[50vh]">
                          {todayTasks.length === 0 ? (
                            <p className="text-[10px] text-slate-404 dark:text-slate-505 text-center py-6 italic">「今日やる」に指定されたタスクはありません。</p>
                          ) : (
                            todayTasks.map(t => {
                              const isOver = isOverdue(t.dueDate, t.status);
                              const step = stepList.find(s => s.id === t.stepId);
                              return (
                                <div 
                                  key={t.id} 
                                  className={`p-2.5 rounded-xl border flex flex-col gap-1.5 text-left relative transition-all ${t.status === 'completed' ? 'bg-slate-150/50 dark:bg-slate-900/50 border-slate-202 opacity-60' : isOver ? 'bg-rose-55 dark:bg-rose-955/20 border-rose-300' : 'bg-white dark:bg-slate-800 border-slate-202 dark:border-slate-705'}`}
                                >
                                  <div className="flex items-start justify-between gap-2">
                                    <button 
                                      onClick={() => {
                                        setShowTodayDropdown(false);
                                        setViewMode('board');
                                        if (collapsedSteps[t.stepId]) setCollapsedSteps(p => ({ ...p, [t.stepId]: false }));
                                        setCollapsedTasks(p => ({ ...p, [t.id]: false }));
                                        setTimeout(() => {
                                          const el = document.getElementById(`task-anchor-${t.id}`);
                                          if (el) {
                                            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                            el.classList.add('ring-4', 'ring-amber-500', 'scale-[1.02]');
                                            setTimeout(() => el.classList.remove('ring-4', 'ring-amber-500', 'scale-[1.02]'), 1500);
                                          }
                                        }, 250);
                                      }}
                                      className="text-[11px] font-bold text-slate-805 dark:text-slate-100 hover:underline hover:text-indigo-600 dark:hover:text-indigo-404 truncate leading-tight flex-1 text-left"
                                    >
                                      {t.isHighPriority && <span className="text-rose-605 mr-0.5">!</span>}
                                      {t.title}
                                    </button>
                                    <input 
                                      type="checkbox" 
                                      checked={t.status === 'completed'} 
                                      onChange={() => changeTaskStatus(t.id, t.status === 'completed' ? 'pending' : 'completed')}
                                      onClick={(e) => e.stopPropagation()}
                                      className="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 shrink-0 h-3.5 w-3.5 cursor-pointer"
                                    />
                                  </div>
                                  <div className="flex items-center justify-between text-[9px] text-slate-404 dark:text-slate-555 font-bold leading-none">
                                    <span>👤 {t.assignee} {step && `(${step.name})`}</span>
                                    <span className={isOver && t.status !== 'completed' ? 'text-rose-605 dark:text-rose-400 font-extrabold animate-pulse' : ''}>
                                      {isOver && t.status !== 'completed' ? '🚨 期限超過: ' : ''}{t.dueDate}
                                    </span>
                                  </div>
                                </div>
                              );
                            })
                          )}
                        </div>
                      </div>
                    </React.Fragment>
                  )}
                </div>

                {/* ユーザープロフィールインジケータ */}
                <div className="flex items-center gap-2 bg-slate-150 dark:bg-slate-800 pl-2 pr-3 py-1 rounded-2xl border border-slate-202 dark:border-slate-700">
                  <div className="h-6 w-6 rounded-full bg-indigo-500 text-white font-bold flex items-center justify-center text-[10px]">
                    {user.displayName ? user.displayName.charAt(0) : 'S'}
                  </div>
                  <div className="text-left shrink-0">
                    <div className="text-[9px] font-black text-slate-805 dark:text-white truncate max-w-[80px]" title={user.email}>
                      {user.displayName || 'Sansan メンバー'}
                    </div>
                    <button 
                      onClick={handleLogout}
                      className="text-[8px] font-black text-rose-605 dark:text-rose-400 block leading-none hover:underline"
                    >
                      ログアウト
                    </button>
                  </div>
                </div>

                <button onClick={toggleDarkMode} className="p-2 rounded-xl border border-slate-202 dark:border-slate-700 bg-slate-55 dark:bg-slate-800 text-slate-605 dark:text-slate-300 hover:bg-slate-150 dark:hover:bg-slate-700 transition-colors shadow-xs">
                  {isDarkMode ? <IconSun className="h-4 w-4 text-amber-400" /> : <IconMoon className="h-4 w-4 text-indigo-500" />}
                </button>
                <button onClick={() => setShowSettingsModal(true)} className="flex items-center gap-1 text-[11px] font-extrabold text-slate-605 dark:text-slate-300 hover:text-purple-700 dark:hover:text-purple-300 bg-slate-55 dark:bg-slate-800 hover:bg-purple-55 border border-slate-202 dark:border-slate-700 px-3 py-2 rounded-xl transition-all shadow-xs"><IconSettings className="h-3.5 w-3.5" /><span>⚙️ 設定</span></button>
                <div className="flex items-center gap-2.5 bg-slate-55 dark:bg-slate-800 px-2.5 py-1.5 rounded-xl border border-slate-202 dark:border-slate-700 text-xs">
                  <div className="text-right leading-none">
                    <span className="text-[8px] text-slate-440 dark:text-slate-505 font-extrabold block mb-0.5 uppercase tracking-wide">完了率</span>
                    <span className="text-[9px] font-black text-slate-550 dark:text-slate-455 font-mono">{activeProject ? activeProject.code : '---'}</span>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <div className="h-1.5 w-16 bg-slate-150 dark:bg-slate-700 rounded-full overflow-hidden shadow-inner">
                      <div className="h-full bg-indigo-500 bg-gradient-to-r from-indigo-500 to-purple-600" style={{ width: `${projectProgress}%` }}></div>
                    </div>
                    <span className="text-[10px] font-black text-indigo-600 dark:text-indigo-404 font-mono">{projectProgress}%</span>
                  </div>
                </div>
              </div>

          </header>

            {/* 1. ボード（カンバン）ビュー    */}

                                  <span className="font-extrabold text-purple-800 dark:text-purple-300">✏️ STEP {index + 1} の情報を編集</span>
                                  <div className="flex items-center gap-2">
                                    <button type="button" onClick={() => setEditingStepId(null)} className="bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300 px-3 py-1.5 rounded-xl font-bold">キャンセル</button>
                                    <button type="button" onClick={(e) => saveStepEdit(step.id, e)} className="bg-indigo-600 text-white px-4 py-1.5 rounded-xl font-bold">保存する</button>
                                  </div>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                  <div>
                                    <label className="block text-[10px] text-slate-404 font-bold mb-1">工程名 *</label>

                                  </div>
                                  <div>
                                    <label className="block text-[10px] text-slate-440 font-bold mb-1">担当部署</label>
                                    <select value={editStepDeptKey} onChange={e => setEditStepDeptKey(e.target.value)} className="w-full border p-2 rounded-xl bg-white dark:bg-slate-900 text-slate-805 dark:text-white font-bold">

                                  </div>
                                  <div className="sm:col-span-2">
                                    <label className="block text-[10px] text-slate-404 font-bold mb-1">工程の説明・概要</label>
                                    <textarea value={editStepDesc} onChange={e => setEditStepDesc(e.target.value)} className="w-full border p-2 rounded-xl bg-white dark:bg-slate-900 text-slate-805 dark:text-white h-16" />

                                  <div className="sm:col-span-2 border-t dark:border-slate-700 pt-3 space-y-2">
                                    <label className="block text-[10px] text-slate-404 font-bold">📢 工程関連リンク</label>
                                    <div className="flex gap-2">
                                      <input type="text" placeholder="リンク名" value={tmpEditStepLinkLabel} onChange={e => setTmpEditStepLinkLabel(e.target.value)} className="w-1/3 border p-2 rounded-xl bg-white dark:bg-slate-900 text-slate-805 dark:text-white" />
                                      <input type="text" placeholder="URL" value={tmpEditStepLinkUrl} onChange={e => setTmpEditStepLinkUrl(e.target.value)} className="flex-1 border p-2 rounded-xl bg-white dark:bg-slate-900 text-slate-805 dark:text-white" />

                                            <button type="button" onClick={(e) => handleRemoveLinkFromEditStep(lnk.id, e)} className="text-slate-404 hover:text-rose-605 font-bold ml-1">×</button>

                                      </div>

                                  </div>
                                </div>

                              <div onClick={() => toggleStepCollapse(step.id)} className={`p-4 border-b flex flex-col md:flex-row justify-between items-start md:items-center gap-4 cursor-pointer ${cClass.bg}`}>

                                  <span className={`${cClass.bar} text-white font-black text-[10px] px-2.5 py-0.5 rounded shadow-xs`}>STEP {index + 1}</span>
                                  <h3 className="font-black text-sm text-slate-805 dark:text-slate-150">{step.name}</h3>
                                  {renderStepDeadlineBadge(step, stpProg)}
                                </div>
                                <div className="flex items-center gap-4 shrink-0" onClick={e => e.stopPropagation()}>

                                  <button onClick={() => toggleStepCollapse(step.id)} className="text-slate-404 ml-1">{isCol ? '▼' : '▲'}</button>
                                </div>
                              </div>

                            {/* 下半分のタスク一覧表示エリア */}
                            {!isCol && (
                              <div className="bg-slate-55/20 dark:bg-slate-900/20 p-4 space-y-4">
                            {addingTaskStepId === step.id && (

                                <div className="flex justify-between items-center pb-2 border-b dark:border-slate-700">
                                  <span className="font-extrabold text-indigo-600 dark:text-indigo-400">➕ 新規タスクの追加</span>
                                  <div className="flex justify-end gap-2">
                                    <button type="button" onClick={() => setAddingTaskStepId(null)} className="bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300 px-3 py-1.5 rounded-xl font-bold transition-colors">キャンセル</button>
                                    <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-xl font-bold transition-colors">追加する</button>
                                  </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                  <div className="md:col-span-3">
                                    <label className="block text-[10px] text-slate-404 font-bold mb-1">タスク名 *</label>

                                  </div>
                                  <div>
                                    <label className="block text-[10px] text-slate-404 font-bold mb-1">担当部署</label>

                                  </div>
                                  <div>
                                    <label className="block text-[10px] text-slate-404 font-bold mb-1">期日</label>
                                    <input type="date" value={newTaskDueDate} onChange={e => setNewTaskDueDate(e.target.value)} className="w-full p-2.5 border rounded-xl bg-white dark:bg-slate-800 text-slate-805 dark:text-white font-mono font-bold" />
                                  </div>
                                  <div className="md:col-span-3">
                                    <label className="block text-[10px] text-slate-404 font-bold mb-1">詳細・備考</label>
                                    <textarea placeholder="詳細・備考を入力..." value={newTaskDesc} onChange={e => setNewTaskDesc(e.target.value)} className="w-full p-2.5 border rounded-xl bg-white dark:bg-slate-800 text-slate-805 dark:text-white h-16" />
                                  </div>
                                </div>
                              </form>
                            )}

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                                    const tkCls = colorClassesMap[deptList.find(dl => dl.key === task.department)?.color || 'slate'] || colorClassesMap.slate;
                                    const dDays = getDurationDays(task);

                                        </span>
                                        <div className="absolute top-3.5 right-3.5 flex items-center gap-1.5 z-10" onClick={e => e.stopPropagation()}>
                                          <button onClick={() => toggleDoToday(task.id)} className={`text-[9px] font-black px-2.5 py-1.5 rounded-xl border ${task.doToday ? 'bg-amber-500 text-white border-amber-600 shadow-md' : 'bg-slate-55 dark:bg-slate-700 text-slate-605 dark:text-slate-300 border-slate-202'}`}>🔥 {task.doToday ? '今日やる中' : '今日やる'}</button>
                                          <select value={task.status} onChange={(e) => changeTaskStatus(task.id, e.target.value)} className="text-[9px] font-black px-2 py-1 rounded-xl border bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300">
                                            <option value="pending">🔘 未対応</option><option value="in_progress">⚡ 進行中</option><option value="completed">✅ 完了マーク</option><option value="not_applicable">🚫 対応なし</option>
                                          </select>
                                          <button onClick={() => deleteTask(task.id)} className="text-slate-404 hover:text-rose-605 font-bold text-sm ml-1">×</button>
                                        </div>
                                        <div className="mt-10 space-y-3 flex-1 flex flex-col justify-between">
                                          <div className="space-y-2">
                                            <h4 className="font-extrabold text-sm text-slate-805 dark:text-slate-150 select-text cursor-text leading-snug">{task.title}</h4>
                                            <div className="flex flex-wrap items-center gap-2 text-[10px] font-bold text-slate-550 dark:text-slate-404">
                                              <span className={`px-2 py-0.5 rounded border ${tkCls.badge}`}>{deptList.find(dl => dl.key === task.department)?.label || '未設定'} : {task.assignee}</span>
                                              <span className="font-mono">⌛ 期日: {task.dueDate}</span>
                                              {task.startedAt && <span className="font-mono text-indigo-600 dark:text-indigo-404 bg-indigo-50 dark:bg-indigo-900/30 px-1.5 py-0.5 rounded border border-indigo-100 dark:border-indigo-900/40">⏱️ {d ? `${task.startedAt} 〜 ${task.completedAt} (${dDays} 日)` : `${task.startedAt} 着手 (${dDays} 日)`}</span>}
                                            </div>
                                          </div>
                                          <div className="relative group/desc space-y-1" onClick={e => e.stopPropagation()}>
                                            <div className="text-[9.5px] font-bold text-slate-440 flex items-center justify-between"><span><IconInfo className="inline h-3 w-3 mr-0.5" />論点・備考</span></div>
                                            {editingDescTaskId === task.id ? (
                                              <textarea value={tmpDescValue} onChange={e => setTmpDescValue(e.target.value)} onBlur={() => handleSaveDirectDesc(task.id)} className="w-full text-xs bg-white dark:bg-slate-900 border-2 border-indigo-500 rounded-xl p-2 text-slate-805 dark:text-slate-100 min-h-[50px]" autoFocus />
                                            ) : (
                                              <p onClick={() => { setEditingDescTaskId(task.id); setTmpDescValue(task.description || ''); }} className={`text-xs p-2.5 border rounded-2xl bg-slate-55 dark:bg-slate-900/40 border-slate-202 dark:border-slate-700 whitespace-pre-wrap cursor-pointer hover:border-indigo-400 ${task.description ? 'text-slate-606 dark:text-slate-300' : 'text-slate-440 italic'}`}>{task.description || '入力なし'}</p>
                                            )}
                                          </div>
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ) : (
                  <p className="text-slate-404 text-xs italic bg-white p-6 border rounded-3xl text-center shadow-xs">案件プロジェクトが選択されていません。</p>
                )}
              </React.Fragment>
            )}

            {/* ============================== */}
            {/* 2. 🗃️ データベースビュー       */}
            {/* ============================== */}
            {viewMode === 'database' && (
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl shadow-xs overflow-hidden p-6 space-y-5 animate-in fade-in transition-colors">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-202 dark:border-slate-700">
                  <div className="space-y-1">
                    <h2 className="text-base font-black text-slate-805 dark:text-white flex items-center gap-2"><IconDatabase className="text-indigo-600 dark:text-indigo-404" />ECD案件一覧データベース</h2>
                    <p className="text-xs text-slate-404 dark:text-slate-505">案件・プロジェクトを横断して進捗・ヘルス状況を俯瞰します。</p>
                  </div>
                  <button onClick={() => { setNewProjFolderId(selectedFolderId); setShowAddProjectModal(true); }} className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-xs px-4.5 py-3 rounded-2xl flex items-center gap-1.5"><IconPlus /> 新規案件を起票</button>
                </div>
                <div className="flex flex-col sm:flex-row gap-3 pt-1">
                  <select value={dbFilterFolderId} onChange={(e) => setDbFilterFolderId(e.target.value)} className="border border-slate-202 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-605 dark:text-slate-300 bg-slate-55 dark:bg-slate-900 focus:outline-none">
                    <option value="all">📁 すべてのフォルダ</option>{folders.map(f => (<option key={f.id} value={f.id}>📁 {f.name}</option>))}
                  </select>
                  <select value={dbFilterStatus} onChange={(e) => setDbFilterStatus(e.target.value)} className="border border-slate-202 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-605 dark:text-slate-300 bg-slate-55 dark:bg-slate-900 focus:outline-none">
                    <option value="all">🚥 すべての進捗状況</option><option value="pending">未着手</option><option value="in_progress">進行中</option><option value="completed">完了</option>
                  </select>
                  <div className="flex-1 relative">
                    <input type="text" placeholder="案件名やコードでリアルタイム検索..." value={dbFilterText} onChange={(e) => setDbFilterText(e.target.value)} className="w-full border border-slate-202 dark:border-slate-755 text-slate-705 dark:text-slate-200 font-bold bg-white dark:bg-slate-900 focus:outline-none" />
                  </div>
                </div>
                <div className="overflow-x-auto rounded-2xl border border-slate-202 dark:border-slate-700">
                  <table className="w-full text-xs text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-55 dark:bg-slate-900 border-b border-slate-202 dark:border-slate-700 text-slate-605 dark:text-slate-440 font-black text-[10.5px] uppercase tracking-wider">
                        <th className="py-3 px-4 border border-slate-202 dark:border-slate-700 text-center w-28">状態</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700">フォルダ</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700">案件名</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700 w-32">コード</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700 w-44">開始〜目標</th><th className="py-2.5 px-4 border border-slate-202 dark:border-slate-700 text-center w-28">タスク内訳</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700 w-40">進捗率</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700 w-36">アラート</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700 text-center w-32">操作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-202 dark:divide-slate-700">
                      {filteredDbProjects.map(proj => {
                        const prog = calculateProjectProgressById(proj), lates = countLateTasksByProject(proj);
                        const folderName = folders.find(f => f.id === proj.folderId)?.name || '未分類';
                        const { completed, inProgress, notStarted, notApplicable } = countTaskStatus(proj);
                        const statusObj = projectStatusOptions.find(o => o.value === (proj.status || 'pending'));
                        return (
                          <tr key={proj.id} className="hover:bg-slate-55/50 dark:hover:bg-slate-700/30 transition-colors">
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 text-center"><span className={`inline-flex items-center px-2.5 py-0.5 rounded-xl font-black text-[9.5px] border shadow-xs ${statusObj?.className}`}>{statusObj?.label}</span></td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 font-black text-slate-550 dark:text-slate-455"><span>{folderName}</span></td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 font-black text-slate-955 dark:text-slate-100 text-sm max-w-xs truncate">{proj.name}</td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 font-mono text-slate-505 dark:text-slate-455 font-bold uppercase tracking-wider">{proj.code}</td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 font-mono text-slate-505 dark:text-slate-455 font-bold">{proj.startDate} 〜 {proj.endDate}</td>
                            <td className="py-2 px-4 border border-slate-202 dark:border-slate-700 align-middle">
                              <div className="flex flex-col gap-0.5 text-[9.5px] w-24 mx-auto font-mono font-bold leading-none">
                                <div className="flex justify-between items-center text-slate-505 bg-slate-55 dark:bg-slate-800 px-1 py-0.5 rounded border border-slate-150"><span>未着手</span><span>{notStarted}</span></div>
                                <div className="flex justify-between items-center text-blue-600 bg-blue-50 dark:bg-blue-900/30 px-1 py-0.5 rounded border border-blue-100"><span>進行中</span><span>{inProgress}</span></div>
                                <div className="flex justify-between items-center text-emerald-600 bg-emerald-55 dark:bg-emerald-900/30 px-1 py-0.5 rounded border border-emerald-100"><span>完了</span><span>{completed}</span></div>
                              </div>
                            </td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700">
                              <div className="flex items-center gap-2 min-w-[120px]"><div className="h-2 flex-1 bg-slate-150 dark:bg-slate-700 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-indigo-500" style={{ width: `${prog}%` }} /></div><span className="font-black font-mono text-indigo-600 dark:text-indigo-404 w-8 text-right text-xs">{prog}%</span></div>
                            </td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700">
                              {lates > 0 ? <span className="inline-flex items-center gap-1 bg-rose-55 dark:bg-rose-900/30 text-rose-700 dark:text-rose-400 border border-rose-200 font-black text-[9.5px] px-2.5 py-0.5 rounded-full shadow-sm animate-pulse">⚠️ 遅延 {lates}件</span> : <span className="inline-flex items-center gap-1 bg-emerald-55 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 border border-emerald-200 font-black text-[9.5px] px-2.5 py-0.5 rounded-full shadow-xs">✅ 順調</span>}
                            </td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 text-center">
                              <div className="flex items-center justify-center gap-1.5">
                                <button onClick={() => handleOpenProjectFromDb(proj)} className="flex items-center gap-1 bg-indigo-50 dark:bg-indigo-900/30 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 border border-indigo-200 dark:border-indigo-800 font-black px-2.5 py-1.5 rounded-xl shadow-xs text-[11px]"><IconEye /><span>開く</span></button>
                                <button onClick={(e) => handleDeleteProjectByList(proj.id, e)} className="text-slate-404 hover:text-rose-605 p-1.5 rounded-xl transition-all"><IconTrash2 className="h-4 w-4" /></button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ========================================================== */}
            {/* 3. 📊 アナリティクスビュー                                 */}
            {/* ========================================================== */}
            {viewMode === 'analytics' && (
              <div className="max-w-7xl mx-auto space-y-6 animate-in fade-in transition-colors">
                
                {/* 案件選択のヘッダーパネル */}
                <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 border border-slate-202 dark:border-slate-700">
                  <div className="space-y-1">
                    <h2 className="text-base font-black text-slate-805 dark:text-white flex items-center gap-2"><IconChart className="text-indigo-600 dark:text-indigo-404" />組織・案件推進状況アナリティクス</h2>
                    <p className="text-xs text-slate-505 dark:text-slate-440">実データに基づき、ボトルネックやリソース負荷状況をリアルタイム評価します。</p>
                  </div>
                </div>

                {/* 分析サブナビゲーション */}
                <div className="flex gap-2 border-b border-slate-202 dark:border-slate-700 pb-px">
                  {[
                    { id: 'resource', icon: '👥', label: 'リソース負荷 & 個人別処理力' },
                    { id: 'leadtime', icon: '⏱️', label: 'ステップ実消費営業日' },
                    { id: 'risk', icon: '🚨', label: '放置・難航アラート検知' },
                  ].map(tab => (
                    <button
                      key={tab.id}
                      onClick={() => setAnalyticsTab(tab.id)}
                      className={`px-5 py-2.5 rounded-t-xl text-sm font-bold transition-all ${analyticsTab === tab.id ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-550 dark:text-slate-400 hover:bg-slate-150 dark:hover:bg-slate-700/50'}`}
                    >
                      {tab.icon} {tab.label}
                    </button>
                  ))}
                </div>

                <div className="animate-in slide-in-from-bottom-2 fade-in duration-300">
                  
                  {/* 1. リソース・負荷状況 */}
                  {analyticsTab === 'resource' && (
                    <div className="space-y-6 animate-in fade-in">
                      {/* 部署別の簡易状況 */}
                      <div className="grid grid-cols-1 sm:grid-cols-4 gap-4">
                        {analyticsResourceData.deptStats?.map(d => (
                          <div key={d.deptLabel} className="bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 shadow-sm">
                            <div className="text-xs font-bold text-slate-404">{d.deptLabel}の未完了</div>
                            <div className="text-xl font-black text-slate-805 dark:text-white mt-1 font-mono">{d.active} 件</div>
                          </div>
                        ))}
                      </div>

                      {/* 個人別のシンプル実績表 */}
                      <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-5 shadow-sm space-y-4">
                        <h3 className="font-black text-slate-805 dark:text-white text-sm">👥 メンバー別のタスク処理実績</h3>
                        <div className="overflow-x-auto rounded-xl border dark:border-slate-700">
                          <table className="w-full text-xs text-left border-collapse">
                            <thead>
                              <tr className="bg-slate-55 dark:bg-slate-900 border-b dark:border-slate-700 text-slate-550 dark:text-slate-404 font-black text-[10px] uppercase tracking-wide">
                                <th className="py-2.5 px-4">担当者</th>
                                <th className="py-2.5 px-4 text-center">対応合計</th>
                                <th className="py-2.5 px-4 text-center text-emerald-600 dark:text-emerald-404">完了済</th>
                                <th className="py-2.5 px-4 text-center text-amber-600 dark:text-amber-404">未完了（手持ち）</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y dark:divide-slate-700 font-bold">
                              {analyticsResourceData.memberStats?.map(m => (
                                <tr key={m.name} className="hover:bg-slate-55/60 dark:hover:bg-slate-750 transition-colors">
                                  <td className="py-3 px-4 text-slate-805 dark:text-slate-200">{m.name}</td>
                                  <td className="py-3 px-4 text-center font-mono text-slate-705 dark:text-slate-300">{m.total}</td>
                                  <td className="py-3 px-4 text-center font-mono text-emerald-600 dark:text-emerald-400">{m.completed}</td>
                                  <td className="py-3 px-4 text-center font-mono text-amber-600 dark:text-amber-400">{m.uncompleted}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* 2. リードタイム分析 */}
                  {analyticsTab === 'leadtime' && (
                    <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 shadow-sm space-y-6 animate-in fade-in">
                      <div className="flex justify-between items-center">
                        <h3 className="font-black text-slate-805 dark:text-white text-sm">⏱️ 大ステップ別 平均消費日数（タスク実績ベース）</h3>
                        <span className="text-xs bg-slate-150 dark:bg-slate-700 text-slate-605 dark:text-slate-300 px-3 py-1 rounded-lg font-bold">全横断集計</span>
                      </div>
                      <div className="space-y-4">
                        {analyticsLeadTimeData.length > 0 ? analyticsLeadTimeData.map(d => {
                          const isOver = d.avg > d.target;
                          return (
                            <div key={d.step} className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 border-b border-slate-55 dark:border-slate-700/50 pb-3">
                              <div className="sm:w-44 text-xs font-bold text-slate-705 dark:text-slate-200 truncate" title={d.step}>{d.step}</div>
                              
                              <div className="flex-1 h-4 bg-slate-100 dark:bg-slate-900 rounded-xl overflow-hidden relative border border-slate-202 dark:border-slate-700 shadow-inner flex items-center">
                                <div className="absolute top-0 bottom-0 border-r-2 border-dashed border-slate-404 dark:border-slate-500 z-10" style={{ left: `${Math.min((d.target / 15) * 100, 100)}%` }}></div>
                                <div className={`h-full ${isOver ? 'bg-gradient-to-r from-rose-500 to-pink-500' : 'bg-gradient-to-r from-emerald-500 to-teal-500'}`} style={{ width: `${Math.min((d.avg / 15) * 100, 100)}%` }}></div>
                              </div>
                              
                              <div className="sm:w-40 text-xs font-bold flex justify-between sm:justify-end gap-4 shrink-0 font-mono">
                                <span className={isOver ? 'text-rose-605 dark:text-rose-400 font-black' : 'text-emerald-600 dark:text-emerald-400 font-black'}>平均 {d.avg} 日</span>
                                <span className="text-slate-404">(目標: {d.target}日)</span>
                              </div>
                            </div>
                          );
                        }) : (
                          <div className="py-12 text-center text-slate-404 dark:text-slate-505 border border-dashed rounded-2xl">
                            各プロジェクト内のタスクに、完了実績日のデータが蓄積されていません。
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {/* 3. リスク・放置タスク */}
                  {analyticsTab === 'risk' && (
                    <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 shadow-sm text-center text-xs text-slate-440">
                      リスク検知機能はステップ3で実装します。
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>

          {/* 大分類フォルダ追加モーダル */}
          {showAddFolderModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95">
                <div className="flex justify-between items-center pb-3 border-b border-slate-150 dark:border-slate-700/50">
                  <h3 className="font-extrabold text-sm text-slate-955 dark:text-white flex items-center gap-1.5"><IconFolder className="h-4 w-4 text-indigo-600 dark:text-indigo-404" />大分類フォルダの追加</h3>
                  <button onClick={() => setShowAddFolderModal(false)} className="text-slate-404 hover:text-slate-605 dark:hover:text-slate-300 p-1"><IconX /></button>
                </div>
                <form onSubmit={handleCreateFolder} className="space-y-4 text-xs">
                  <div>
                    <label className="block text-[10px] font-bold text-slate-605 dark:text-slate-440 mb-1">フォルダ名 (必須)</label>
                    <input required type="text" value={newFolderName} onChange={e => setNewFolderName(e.target.value)} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2.5 bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200 focus:outline-none focus:border-indigo-400" placeholder="例: 新商品設計（ECD）" />
                  </div>
                  <div className="flex justify-end gap-2 pt-2">
                    <button type="button" onClick={() => setShowAddFolderModal(false)} className="bg-slate-150 dark:bg-slate-700 hover:bg-slate-220 dark:hover:bg-slate-600 text-slate-605 dark:text-slate-300 px-4 py-2 rounded-xl font-bold">キャンセル</button>
                    <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl font-bold">作成</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* マスタ設定モーダル */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-base font-black text-slate-805 dark:text-slate-100 flex items-center gap-2"><IconSettings className="h-5 w-5 text-indigo-600 dark:text-indigo-400" />設定</h2>
                  <button onClick={() => setShowSettingsModal(false)} className="text-slate-404 dark:text-slate-505 hover:bg-slate-150 dark:hover:bg-slate-700/50 p-1.5 rounded-lg transition-colors"><IconX className="h-5 w-5" /></button>
                </div>
                <div className="flex-1 overflow-y-auto pr-2 space-y-6 scrollbar-thin">
                  
                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-605 dark:text-slate-440 border-b border-slate-202 dark:border-slate-700 pb-2 flex items-center gap-1.5">☁️ クラウド同期 (GitHub Gist)</h3>
                    <div className="bg-slate-55 dark:bg-slate-900/50 p-4 rounded-2xl border border-slate-202 dark:border-slate-700 shadow-sm space-y-3">
                      <p className="text-[10px] text-slate-550 dark:text-slate-455 font-bold">TokenとGist IDを設定すると同期・バックアップします。</p>
                      <div className="space-y-2">
                        <div>
                          <label className="block text-[10px] font-bold text-slate-605 dark:text-slate-440 mb-1">GitHub Personal Access Token</label>
                          <input type="password" value={tmpGistToken} onChange={e => setTmpGistToken(e.target.value)} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200 focus:outline-none focus:border-indigo-400" placeholder="ghp_xxxxxxxxxxxx" />
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-slate-605 dark:text-amber-404 mb-1">Gist ID</label>
                          <input type="text" value={tmpGistId} onChange={e => setTmpGistId(e.target.value)} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200 focus:outline-none focus:border-indigo-400 font-mono" placeholder="1a2b3c4d5e6f7g8h9i0j" />
                        </div>
                      </div>
                      <div className="flex justify-end pt-1">
                        <button onClick={saveGistSettings} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md">保存して接続</button>
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-605 dark:text-slate-440 border-b border-slate-202 dark:border-slate-700 pb-2">担当部署の管理</h3>
                    <div className="space-y-2.5">
                      {deptList.map((dept, idx) => (
                        <div key={dept.key} className="flex items-center gap-2 bg-slate-55 dark:bg-slate-900/50 p-2.5 rounded-2xl border border-slate-202 dark:border-slate-700 shadow-sm transition-all hover:border-indigo-300 group">
                          <div className="flex flex-col gap-0.5">
                            <button onClick={() => moveDeptOrder(idx, -1)} disabled={idx === 0} className={`p-0.5 rounded ${idx === 0 ? 'opacity-30' : 'hover:bg-indigo-100 hover:text-indigo-600 text-slate-404'}`}><IconArrowUp /></button>
                            <button onClick={() => moveDeptOrder(idx, 1)} disabled={idx === deptList.length - 1} className={`p-0.5 rounded ${idx === deptList.length - 1 ? 'opacity-30' : 'hover:bg-indigo-100 hover:text-indigo-600 text-slate-444'}`}><IconArrowDown /></button>
                          </div>
                          <input type="text" value={dept.label} onChange={(e) => handleRenameDeptChange(dept.key, e.target.value)} onBlur={() => handleRenameDeptSave(dept.key)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-xl p-2 text-slate-805 dark:text-slate-200 focus:outline-none" />
                          <select value={dept.color} onChange={(e) => updateDeptColorSetting(dept.key, e.target.value)} className={`text-xs font-bold rounded-xl p-2 border border-slate-300 dark:border-slate-600 focus:outline-none ${colorClassesMap[dept.color]?.badge || 'bg-white dark:bg-slate-800'}`}>
                            {Object.keys(colorClassesMap).map(c => <option key={c} value={c} className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200">{c}色</option>)}
                          </select>
                          <button onClick={() => handleDeleteDept(dept.key)} className="p-2 text-slate-404 hover:text-rose-605 hover:bg-rose-55 rounded-xl ml-1"><IconTrash2 className="h-4 w-4" /></button>
                        </div>
                      ))}
                    </div>
                    <form onSubmit={handleCreateDept} className="flex items-center gap-2 mt-4 bg-indigo-50/50 dark:bg-indigo-900/20 p-3 rounded-2xl border border-indigo-100 dark:border-indigo-800/50 shadow-inner">
                      <span className="text-[10px] font-black text-indigo-600 dark:text-indigo-404 shrink-0 uppercase flex items-center gap-0.5"><IconPlus className="h-3 w-3"/>追加</span>
                      <input type="text" placeholder="部署名..." value={newDeptLabel} onChange={e => setNewDeptLabel(e.target.value)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 text-slate-805 dark:text-slate-200 rounded-xl p-2 focus:outline-none shadow-sm" />
                      <select value={newDeptColor} onChange={e => setNewDeptColor(e.target.value)} className={`text-xs font-bold rounded-xl p-2 border border-slate-202 dark:border-slate-700 shadow-sm focus:outline-none ${colorClassesMap[newDeptColor]?.badge || 'bg-white dark:bg-slate-800'}`}>
                        {Object.keys(colorClassesMap).map(c => <option key={c} value={c} className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200">{c}色</option>)}
                      </select>
                      <button type="submit" disabled={!newDeptLabel.trim()} className="bg-indigo-600 hover:bg-indigo-700 text-white disabled:bg-slate-150 dark:disabled:bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold shadow-md ml-1">登録</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
