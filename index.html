        return Math.round((completed / stepTasks.length) * 100);
      };

        const pTasks = proj.tasks || [];

      // --- ドラッグ＆ドロップ並び替えロジック ---

      const handleDragOver = (index, e) => {
        e.preventDefault();
        if (draggedStepIndex === null || draggedStepIndex === index) return;

        const draggedItem = updatedSteps[draggedStepIndex];

        updatedSteps.splice(index, 0, draggedItem);
        
        setDraggedStepIndex(index);
        setStepList(updatedSteps);
      };

      const handleDragEnd = () => {
        setDraggedStepIndex(null);
      };

        e.stopPropagation();
        const targetIndex = index + direction;
        if (targetIndex < 0 || targetIndex >= stepList.length) return;

        const updatedSteps = [...stepList];
        const temp = updatedSteps[index];
        updatedSteps[index] = updatedSteps[targetIndex];
        updatedSteps[targetIndex] = temp;
        setStepList(updatedSteps);
      };

      const handleScrollToStep = (stepId) => {
        if (collapsedSteps[stepId]) {
          setCollapsedSteps(prev => ({ ...prev, [stepId]: false }));
        }
        setTimeout(() => {
          const element = document.getElementById(`step-anchor-${stepId}`);
          if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 150);
      };

      // --- プロジェクト情報の保存 ---
      const saveProjectEdit = () => {
        setProjects(prev => prev.map(p => p.id === activeProject.id ? { 
          ...p, 
          name: projectForm.name, 
          code: projectForm.code, 
          startDate: projectForm.startDate, 
          endDate: projectForm.endDate,
          folderId: projectForm.folderId 
        } : p));
        setEditingProject(false);
      };

      // --- 新規大分類フォルダの追加 ＆ 削除 ---
      const handleCreateFolder = (e) => {
        e.preventDefault();
        if (!newFolderName.trim()) return;

        const newId = `f_${Date.now()}`;
        const newFolder = {
          id: newId,
          name: newFolderName.trim()
        };

        setFolders(prev => [...prev, newFolder]);
        setSelectedFolderId(newId);
        setNewFolderName('');
        setShowAddFolderModal(false);
      };

      const handleDeleteFolder = (folderId, e) => {

          return;
        }
        if (window.confirm(`この大分類フォルダを完全に削除しますか？\n（フォルダ内のすべての案件も同時に削除されます）`)) {
          const remainingFolders = folders.filter(f => f.id !== folderId);
          setFolders(remainingFolders);
          setSelectedFolderId(remainingFolders[0].id);
          setProjects(prev => prev.filter(p => p.folderId !== folderId));
        }
      };

      // --- 新規プロジェクトの起票 ＆ 削除 ---
      const handleCreateProject = (e) => {
        e.preventDefault();
        if (!newProjName.trim()) return;

        const newId = `p_${Date.now()}`;
        const newProject = {
          id: newId,
          folderId: newProjFolderId, 
          name: newProjName.trim(),
          code: newProjCode.trim() || `ECD-${new Date().getFullYear()}-Q${Math.floor(new Date().getMonth()/3)+1}`,
          startDate: newProjStart,
          endDate: newProjEnd,
          stepList: [
            { id: 1, name: 'キックオフ・合意', desc: '新商品の基本方針合意', deptKey: 'sales', startDate: newProjStart, dueDate: newProjEnd }
          ],
          tasks: []
        };

        setProjects(prev => [...prev, newProject]);
        setSelectedFolderId(newProjFolderId); 
        setCurrentProjectId(newId);

        setNewProjCode('');
        setShowAddProjectModal(false);

          return;
        }
        const projName = projects.find(p => p.id === projId)?.name || 'この案件';
        if (window.confirm(`案件「${projName}」を完全に削除しますか？\n（大ステップ、タスク等のデータもすべて削除されます）`)) {
          const remainingProjects = projects.filter(p => p.id !== projId);
          setProjects(remainingProjects);
          if (currentProjectId === projId) {
            setCurrentProjectId(remainingProjects[0].id);
          }
        }
      };

      const handleDeleteProject = (e) => {
        e.stopPropagation();
        handleDeleteProjectByList(activeProject.id, e);
      };

        setEditStepDesc(step.desc);
        setEditStepDeptKey(step.deptKey || 'backoffice');
        setEditStepStartDate(step.startDate || '');
        setEditStepDueDate(step.dueDate || '');
      };

      const saveStepEdit = (stepId, e) => {

        setStepList(prev => prev.map(s => {
          if (s.id === stepId) {

              name: editStepName.trim(),

        };

            };

          }
          return t;
        }));

            };
          }
          return t;
        }));

        setTasks(prev => prev.map(t => {
          if (t.id === taskId) {
            return {
              ...t,

      // --- タスクステータス変更 ---

            if (newStatus === 'completed' && t.status !== 'completed') {

              updated.contextLogs = [{ id: `sys_${Date.now()}`, date: dateStr, text: '✅ タスクを完了しました。', links: [], completed: true, isSystem: true, to: null, dueDate: null, isHighlighted: false }, ...(t.contextLogs || [])];
            }
            return updated;
          }
          return t;
        }));
      };

      const toggleTaskPriority = (taskId) => {
        setTasks(prev => prev.map(t => {
          if (t.id === taskId) {
            return { ...t, isHighPriority: !t.isHighPriority };
          }
          return t;
        }));
      };

      const deleteTask = (taskId) => {
        setTasks(prev => prev.filter(t => t.id !== taskId));
      };

      const handleAddTask = (stepId, e) => {
        e.preventDefault();
        if (!newTaskTitle.trim()) return;

        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

        const newTask = {
          id: `t_${Date.now()}`,
          stepId: stepId,

          description: newTaskDesc.trim() || '詳細はありません。',

        };

      const saveEdit = (taskId) => {

              ...t,
              title: editFormData.title,
              description: editFormData.description,
              assignee: editFormData.assignee,
              department: editFormData.department,
              dueDate: editFormData.dueDate
            };

        setEditingTaskId(null);

      // 部署マスタの更新
      const handleCreateDept = (e) => {
        e.preventDefault();
        if (!newDeptLabel.trim()) return;
        const newKey = `dept_${Date.now()}`;
        const newDept = {
          key: newKey,
          label: newDeptLabel.trim(),
          color: newDeptColor
        };
        setDeptList(prev => [...prev, newDept]);
        setNewDeptLabel('');
        setSelectedSettingsDeptKey(newKey);

      const handleDeleteDept = (deptKey) => {

        }
        if (window.confirm(`「${deptList.find(d => d.key === deptKey)?.label}」部署を削除しますか？\n（この部署に紐づくタスクは自動的に最初の部署に変更されます）`)) {
          const remainingDepts = deptList.filter(d => d.key !== deptKey);
          const fallbackDeptKey = remainingDepts[0].key;
          
          setDeptList(remainingDepts);
          if (selectedSettingsDeptKey === deptKey) {
            setSelectedSettingsDeptKey(fallbackDeptKey);
          }
          setTasks(prev => prev.map(t => t.department === deptKey ? { ...t, department: fallbackDeptKey } : t));
          setStepList(prev => prev.map(s => s.deptKey === deptKey ? { ...s, deptKey: fallbackDeptKey } : s));
        }
      };

      const updateDeptColorSetting = (deptKey, newColorKey) => {
        setDeptList(prev => prev.map(d => d.key === deptKey ? { ...d, color: newColorKey } : d));
      };

      const handleRenameDept = (deptKey, newName) => {
        if (!newName.trim()) return;
        setDeptList(prev => prev.map(d => d.key === deptKey ? { ...d, label: newName.trim() } : d));
      };

      // DBビューから対象案件を直接ダッシュボードで読み込む処理
      const handleOpenProjectFromDb = (proj) => {
        setSelectedFolderId(proj.folderId);
        setCurrentProjectId(proj.id);
        setViewMode('board');
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased pb-12">
          
          {/* 1. ナビゲーションヘッダー */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 py-3 flex items-center justify-between shadow-sm">
            <div className="flex items-center gap-3">
              <div className="bg-purple-600 text-white p-1.5 rounded-lg font-bold text-lg shadow-sm">PL</div>
              <div>
                <h1 className="text-base font-extrabold text-slate-800 leading-tight">Project Loom</h1>
                <p className="text-[10px] text-slate-400 font-medium font-bold">マイ・プロジェクト ECDダッシュボード</p>
              </div>
            </div>

            {/* View切り替えタブメニュー */}
            <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200 text-xs">
              <button
                onClick={() => setViewMode('board')}
                className={`flex items-center gap-1.5 px-4 py-1.5 rounded-lg font-extrabold transition-all ${
                  viewMode === 'board' 
                    ? 'bg-white text-indigo-700 shadow-sm' 
                    : 'text-slate-500 hover:text-slate-800'
                }`}
              >
                <IconCalendar className="h-3.5 w-3.5" />
                <span>📋 進行ダッシュボード</span>
              </button>
              <button
                onClick={() => setViewMode('database')}
                className={`flex items-center gap-1.5 px-4 py-1.5 rounded-lg font-extrabold transition-all ${
                  viewMode === 'database' 
                    ? 'bg-white text-indigo-700 shadow-sm' 
                    : 'text-slate-500 hover:text-slate-800'
                }`}
              >
                <IconDatabase className="h-3.5 w-3.5" />
                <span>🗃️ 案件一覧データベース</span>
              </button>
            </div>

            <div className="flex items-center gap-3 shrink-0">
              {/* ⚙️ 部署・カラー設定トリガー */}
              <button 
                onClick={() => setShowSettingsModal(true)}
                className="flex items-center gap-1.5 text-xs font-bold text-slate-650 hover:text-purple-700 bg-slate-100 hover:bg-purple-50/60 border border-slate-200 hover:border-purple-300 px-3.5 py-2 rounded-xl transition-all shadow-xs"
              >
                <IconSettings />
                <span>⚙️ 部署＆カラーマスタ</span>
              </button>

              {/* フォルダ全体の進捗バー */}
              <div className="flex items-center gap-3 bg-slate-50 p-1.5 rounded-xl border border-slate-200 text-xs">
                <div className="text-right">
                  <span className="text-[9px] text-slate-400 font-bold block leading-none">完了率</span>
                  <span className="text-[10px] font-bold text-slate-600">{activeProject ? activeProject.code : '---'}</span>
                </div>
                <div className="flex items-center gap-2">
                  <div className="h-1.5 w-24 bg-slate-200 rounded-full overflow-hidden">
                    <div 
                      className="h-full bg-indigo-500 transition-all duration-500" 
                      style={{ width: `${projectProgress}%` }}
                    ></div>
                  </div>
                  <span className="text-[10px] font-extrabold text-indigo-600">{projectProgress}%</span>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto p-6 space-y-6">

            {/* 大分類フォルダ追加モーダル */}
            {showAddFolderModal && (
              <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center z-50 animate-in fade-in">
                <div className="bg-white border border-slate-200 rounded-2xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95">
                  <div className="flex justify-between items-center pb-2.5 border-b border-slate-150">
                    <h3 className="font-extrabold text-sm text-slate-800 flex items-center gap-2">
                      <IconFolder className="text-purple-650" />
                      大分類フォルダの新規追加
                    </h3>
                    <button onClick={() => setShowAddFolderModal(false)} className="text-slate-400 hover:text-slate-600"><IconX /></button>
                  </div>
                  <form onSubmit={handleCreateFolder} className="space-y-4 text-xs">
                    <div>
                      <label className="block text-slate-500 font-bold mb-1">フォルダ名称 <span className="text-rose-500">*</span></label>
                      <input required type="text" placeholder="例: 新規開発プロジェクト" value={newFolderName} onChange={e=>setNewFolderName(e.target.value)} className="w-full border border-slate-200 rounded-lg p-2 bg-white text-slate-700" />
                    </div>
                    <div className="flex justify-end gap-2 pt-3 border-t border-slate-150">
                      <button type="button" onClick={() => setShowAddFolderModal(false)} className="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg">キャンセル</button>
                      <button type="submit" className="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg">フォルダを作成</button>
                    </div>
                  </form>
                </div>
              </div>
            )}

            {/* 新規案件フォルダの追加モーダル */}
            {showAddProjectModal && (
              <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center z-50 animate-in fade-in">
                <div className="bg-white border border-slate-200 rounded-2xl p-6 max-w-md w-full shadow-2xl space-y-4 animate-in zoom-in-95 max-h-[90vh] overflow-y-auto scrollbar-thin">
                  <div className="flex justify-between items-center pb-2.5 border-b border-slate-150">
                    <h3 className="font-extrabold text-sm text-slate-800 flex items-center gap-2">
                      <IconPlus className="text-purple-600" />
                      新規案件プロジェクトの起票
                    </h3>
                    <button onClick={() => setShowAddProjectModal(false)} className="text-slate-400 hover:text-slate-600"><IconX /></button>
                  </div>

                  <form onSubmit={handleCreateProject} className="space-y-4 text-xs">
                    <div>
                      <label className="block text-slate-500 font-bold mb-1">作成先フォルダ階層 (大分類) <span className="text-rose-500">*</span></label>
                      <select 
                        value={newProjFolderId} 
                        onChange={e => setNewProjFolderId(e.target.value)}
                        className="w-full border border-slate-200 rounded-lg p-2 bg-white text-slate-700"
                      >
                        {folders.map(f => (
                          <option key={f.id} value={f.id}>{f.name}</option>
                        ))}
                      </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                      <div className="md:col-span-2">
                        <label className="block text-slate-500 font-bold mb-1">案件プロジェクト名称 <span className="text-rose-500">*</span></label>
                        <input required type="text" placeholder="例: 【ECD】新紹介料率の導入" value={newProjName} onChange={e=>setNewProjName(e.target.value)} className="w-full border border-slate-200 rounded-lg p-2 bg-white text-slate-700" />
                      </div>
                      <div>
                        <label className="block text-slate-500 font-bold mb-1">ECDコード</label>
                        <input type="text" placeholder="例: ECD-2026-Q3" value={newProjCode} onChange={e=>setNewProjCode(e.target.value)} className="w-full border border-slate-200 rounded-lg p-2 bg-white text-slate-700" />
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-slate-500 font-bold mb-1">開始日</label>
                        <input type="date" value={newProjStart} onChange={e=>setNewProjStart(e.target.value)} className="w-full border border-slate-200 rounded-lg p-2 bg-white text-slate-700 font-mono" />
                      </div>
                      <div>
                        <label className="block text-slate-500 font-bold mb-1">終了目標日</label>
                        <input type="date" value={newProjEnd} onChange={e=>setNewProjEnd(e.target.value)} className="w-full border border-slate-200 rounded-lg p-2 bg-white text-slate-700 font-mono" />
                      </div>
                    </div>

                    <div className="flex justify-end gap-2 pt-3 border-t border-slate-150">
                      <button type="button" onClick={() => setShowAddProjectModal(false)} className="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg">キャンセル</button>
                      <button type="submit" className="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg shadow-sm">案件を起票する</button>
                    </div>
                  </form>
                </div>
              </div>
            )}

            {/* ⚙️ 部署＆カラーのマスタ設定モーダル */}
            {showSettingsModal && (
              <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-xs flex items-center justify-center z-50 animate-in fade-in">
                <div className="bg-white border border-slate-200 rounded-2xl p-6 max-w-lg w-full shadow-2xl space-y-5 animate-in zoom-in-95 max-h-[90vh] overflow-y-auto scrollbar-thin">
                  <div className="flex justify-between items-center pb-2.5 border-b border-slate-150">
                    <h3 className="font-extrabold text-sm text-slate-800 flex items-center gap-2">
                      <IconSettings className="text-purple-600" />
                      部署 ＆ カラー設定
                    </h3>
                    <button onClick={() => setShowSettingsModal(false)} className="text-slate-400 hover:text-slate-600"><IconX /></button>
                  </div>

                  <p className="text-xs text-slate-500 leading-relaxed">
                    プロジェクトに紐づく「部署」を追加・変更・削除できます。部署を選択して、紐づけるカラーを直感的に当てはめましょう。
                  </p>

                  <div className="grid grid-cols-1 md:grid-cols-12 gap-5 pt-1">
                    {/* 左側：部署一覧の追加と選択リスト */}
                    <div className="md:col-span-5 space-y-3">
                      <span className="block text-xs font-bold text-slate-500 uppercase tracking-wider">📁 登録部署リスト</span>
                      <div className="space-y-1.5 max-h-[160px] overflow-y-auto pr-1 scrollbar-thin">
                        {deptList.map(dept => {
                          const isSelected = selectedSettingsDeptKey === dept.key;
                          const dColorInfo = colorClassesMap[dept.color] || colorClassesMap.slate;
                          return (
                            <div 
                              key={dept.key}
                              onClick={() => setSelectedSettingsDeptKey(dept.key)}
                              className={`p-2 rounded-xl border text-xs font-medium flex items-center justify-between cursor-pointer transition-all ${
                                isSelected 
                                  ? 'border-indigo-400 bg-indigo-50/20 shadow-xs' 
                                  : 'border-slate-100 bg-slate-50/50 hover:bg-slate-50'
                              }`}
                            >
                              <div className="flex items-center gap-2 truncate">
                                <span className={`w-2.5 h-2.5 rounded-full ${dColorInfo.bar}`} />
                                <span className="truncate font-bold text-slate-800">{dept.label}</span>
                              </div>
                              <button 
                                type="button" 
                                onClick={(e) => { e.stopPropagation(); handleDeleteDept(dept.key); }}
                                className="text-slate-355 hover:text-rose-600 p-1"
                                title="この部署を削除する"
                              >
                                <IconX className="h-3 w-3" />
                              </button>
                            </div>
                          );
                        })}
                      </div>

                      {/* 部署の新規作成フォーム */}
                      <form onSubmit={handleCreateDept} className="border-t border-slate-100 pt-3 space-y-2">
                        <span className="block text-[11px] font-bold text-slate-400 uppercase">➕ 新規部署を追加</span>
                        <div className="flex gap-1.5">
                          <input 
                            required
                            type="text" 
                            placeholder="部署・担当名を入力..." 
                            value={newDeptLabel}
                            onChange={e => setNewDeptLabel(e.target.value)}
                            className="flex-1 border border-slate-200 rounded-lg p-1.5 text-xs focus:outline-none focus:border-indigo-400"
                          />
                          <button 
                            type="submit"
                            className="bg-purple-600 hover:bg-purple-700 text-white font-bold px-3 rounded-lg text-xs"
                          >
                            追加
                          </button>
                        </div>
                      </form>
                    </div>

                    {/* 右側：選択した部署に対する「設定編集（カラー選択＆名前変更）」 */}
                    <div className="md:col-span-7 bg-slate-50/50 border border-slate-150 rounded-2xl p-4 space-y-4">
                      {selectedSettingsDeptKey && deptList.find(d => d.key === selectedSettingsDeptKey) ? (
                        (() => {
                          const activeDept = deptList.find(d => d.key === selectedSettingsDeptKey);
                          const currentSelectedColor = activeDept.color;
                          return (
                            <div className="space-y-4 text-xs">
                              <span className="block font-bold text-slate-755 border-b border-slate-200 pb-1.5">
                                📝 「{activeDept.label}」の詳細設定
                              </span>

                              {/* 部署名のインライン書き換え */}
                              <div>
                                <label className="block text-[10px] text-slate-400 font-bold mb-1">部署名・担当名</label>
                                <input 
                                  type="text" 
                                  value={activeDept.label}
                                  onChange={e => handleRenameDept(activeDept.key, e.target.value)}
                                  className="w-full bg-white border border-slate-200 rounded-lg p-2 text-slate-700 focus:outline-none focus:border-indigo-400"
                                />
                              </div>

                              {/* 部署へのカラー紐づけ */}
                              <div>
                                <label className="block text-[10px] text-slate-400 font-bold mb-1">紐づけるカラー</label>
                                <div className="grid grid-cols-2 gap-2">
                                  {Object.keys(colorClassesMap).map(colorKey => {
                                    const isSelected = currentSelectedColor === colorKey;
                                    const cMap = colorClassesMap[colorKey];
                                    return (
                                      <button
                                        key={colorKey}
                                        type="button"
                                        onClick={() => updateDeptColorSetting(activeDept.key, colorKey)}
                                        className={`w-full p-2 rounded-xl text-left font-bold text-[10px] border flex items-center gap-2 transition-all ${
                                          isSelected 
                                            ? `${cMap.bg} ${cMap.text} ${cMap.borderStrong} ring-1 ring-indigo-500/20 shadow-xs`
                                            : 'bg-white border-slate-200 text-slate-500 hover:border-slate-350'
                                        }`}
                                      >
                                        <span className={`w-2.5 h-2.5 rounded-full ${cMap.bar}`} />
                                        <span>{colorKey}</span>
                                      </button>
                                    );
                                  })}
                                </div>
                              </div>
                            </div>
                          );
                        })()
                      ) : (
                        <p className="text-slate-400 text-center py-12 text-xs">部署を選択してください。</p>
                      )}
                    </div>
                  </div>

                  <div className="flex justify-end pt-3.5 border-t border-slate-150">
                    <button 
                      onClick={() => setShowSettingsModal(false)}
                      className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-xl text-xs shadow-sm transition"
                    >
                      マスタを確定して反映
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* 📋 進行ダッシュボード */}
            {viewMode === 'board' ? (
              <React.Fragment>
                {/* プロジェクトの基本情報 ＆ 各STEP集計ボード */}
                <div className="flex flex-col gap-4">
                  <div className="bg-white border border-slate-200 rounded-2xl p-5 grid grid-cols-1 lg:grid-cols-12 gap-6 shadow-sm">
                    
                    {/* 左半分：大フォルダ選択、個別案件選択、案件タイトル */}
                    <div className="lg:col-span-7 flex flex-col justify-between space-y-4">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3.5">
                        {/* A. 親階層：大分類フォルダマスタ */}
                        <div className="space-y-1.5">
                          <div className="flex justify-between items-center">
                            <span className="text-[10px] font-bold text-slate-500 uppercase flex items-center gap-1">
                              <IconFolder /> 大分類フォルダ
                            </span>
                            <div className="flex items-center gap-1">
                              <button 
                                onClick={() => setShowAddFolderModal(true)} 
                                className="text-[9px] bg-purple-50 text-purple-700 hover:bg-purple-100 border border-purple-200 px-2 py-0.5 rounded font-bold"
                              >
                                + 新設
                              </button>
                              <button 
                                onClick={(e) => handleDeleteFolder(selectedFolderId, e)}
                                className="text-[9px] bg-slate-100 text-slate-500 hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 border border-slate-200 px-2 py-0.5 rounded font-bold"
                              >
                                削除
                              </button>
                            </div>
                          </div>
                          <select 
                            value={selectedFolderId} 
                            onChange={(e) => {
                              const fId = e.target.value;
                              setSelectedFolderId(fId);
                              const available = projects.filter(p => p.folderId === fId);
                              if (available.length > 0) {
                                setCurrentProjectId(available[0].id);
                              } else {
                                setCurrentProjectId('');
                              }
                              setEditingProject(false);
                            }}
                            className="w-full text-xs font-bold text-purple-700 bg-purple-50/40 border border-purple-200 hover:border-purple-300 rounded-xl px-2.5 py-1.5 focus:outline-none cursor-pointer"
                          >
                            {folders.map(f => (
                              <option key={f.id} value={f.id}>{f.name}</option>
                            ))}
                          </select>
                        </div>

                        {/* B. 子階層：案件フォルダマスタ */}
                        <div className="space-y-1.5">
                          <div className="flex justify-between items-center">
                            <span className="text-[10px] font-bold text-slate-500 uppercase">📄 案件プロジェクト</span>
                            <button 
                              onClick={() => {
                                setNewProjFolderId(selectedFolderId);
                                setShowAddProjectModal(true);
                              }}
                              className="text-[9px] bg-indigo-50 text-indigo-750 hover:bg-indigo-100 border border-indigo-200 px-2 py-0.5 rounded font-bold"
                            >
                              + 案件を起票
                            </button>
                          </div>
                          <select 
                            value={currentProjectId} 
                            onChange={(e) => {
                              setCurrentProjectId(e.target.value);
                              setEditingProject(false);
                            }}
                            className="w-full text-xs font-bold text-indigo-700 bg-indigo-50/40 border border-indigo-200 hover:border-indigo-300 rounded-xl px-2.5 py-1.5 focus:outline-none cursor-pointer"
                            disabled={filteredProjects.length === 0}
                          >
                            {filteredProjects.length > 0 ? (
                              filteredProjects.map(p => (
                                <option key={p.id} value={p.id}>{p.name}</option>
                              ))
                            ) : (
                              <option value="">(このフォルダは案件空です)</option>
                            )}
                          </select>
                        </div>
                      </div>

                      {/* 選択中の案件プロジェクト情報表示 */}
                      {activeProject ? (
                        <div className="pt-3 border-t border-slate-100">
                          {editingProject ? (
                            <div className="space-y-3 bg-slate-50 p-3.5 rounded-2xl border border-slate-200 text-xs shadow-inner">
                              <span className="font-extrabold text-indigo-600 block mb-1">✏️ 案件プロジェクト階層・情報の変更</span>
                              <div className="grid grid-cols-2 gap-3">
                                <div>
                                  <label className="text-[10px] text-slate-455 font-bold block mb-0.5">所属大分類フォルダ (階層移動)</label>
                                  <select 
                                    value={projectForm.folderId} 
                                    onChange={e => setProjectForm({...projectForm, folderId: e.target.value})} 
                                    className="w-full border border-slate-300 rounded p-1.5 bg-white text-xs focus:outline-none"
                                  >
                                    {folders.map(f => (
                                      <option key={f.id} value={f.id}>{f.name}</option>
                                    ))}
                                  </select>
                                </div>
                                <div>
                                  <label className="text-[10px] text-slate-455 font-bold block mb-0.5">案件コード</label>
                                  <input type="text" value={projectForm.code} onChange={e => setProjectForm({...projectForm, code: e.target.value})} className="w-full border border-slate-300 rounded p-1.5 focus:border-indigo-500 focus:outline-none bg-white text-xs" />
                                </div>
                              </div>
                              <div>
                                <label className="text-[10px] text-slate-455 font-bold block mb-0.5">案件プロジェクト名</label>
                                <input type="text" value={projectForm.name} onChange={e => setProjectForm({...projectForm, name: e.target.value})} className="w-full border border-slate-300 rounded p-1.5 focus:border-indigo-500 focus:outline-none bg-white text-xs" />
                              </div>
                              <div className="grid grid-cols-2 gap-3 text-[10px]">
                                <div>
                                  <label className="font-bold block mb-0.5">開始予定日</label>
                                  <input type="date" value={projectForm.startDate} onChange={e => setProjectForm({...projectForm, startDate: e.target.value})} className="w-full border border-slate-300 rounded p-1.5 font-mono text-xs focus:outline-none bg-white" />
                                </div>
                                <div>
                                  <label className="font-bold block mb-0.5">目標完了日</label>
                                  <input type="date" value={projectForm.endDate} onChange={e => setProjectForm({...projectForm, endDate: e.target.value})} className="w-full border border-slate-300 rounded p-1.5 font-mono text-xs focus:outline-none bg-white" />
                                </div>
                              </div>
                              <div className="flex justify-end gap-1.5 pt-1.5 border-t border-slate-150">
                                <button type="button" onClick={() => setEditingProject(false)} className="text-[10px] text-slate-550 px-2.5 py-0.5 rounded">戻る</button>
                                <button type="button" onClick={saveProjectEdit} className="text-[10px] bg-indigo-600 text-white px-3 py-0.5 rounded-lg font-bold shadow-sm">変更を適用</button>
                              </div>
                            </div>
                          ) : (
                            <div className="flex justify-between items-start">
                              <div>
                                <div className="flex items-center gap-1.5 text-xs text-slate-400 font-medium">
                                  <IconClock />
                                  <span>期間: {activeProject.startDate} 〜 {activeProject.endDate} (目標)</span>
                                  <span className="ml-1 bg-purple-50 text-purple-700 font-bold border border-purple-150 rounded px-1.5 py-0.5 text-[10px]">
                                    📁 {folders.find(f => f.id === activeProject.folderId)?.name || '未分類'}
                                  </span>
                                </div>
                                <h2 className="text-base font-extrabold text-slate-800 leading-tight flex items-center gap-1.5 mt-1">
                                  {activeProject.name}
                                  <button 
                                    onClick={handleDeleteProject}
                                    className="text-slate-300 hover:text-rose-600 p-1 rounded transition"
                                    title="この案件プロジェクトを削除する"
                                  >
                                    <IconTrash2 className="h-4 w-4" />
                                  </button>
                                </h2>
                              </div>
                              
                              <button 
                                onClick={() => { setEditingProject(true); setProjectForm(activeProject); }}
                                className="text-[10px] text-indigo-600 hover:text-indigo-850 font-extrabold flex items-center gap-0.5 bg-indigo-50 border border-indigo-200 px-2.5 py-1.5 rounded-md transition shrink-0 ml-2 shadow-xs"
                              >
                                <IconEdit2 className="h-2.5 w-2.5" /> 案件を編集・移動
                              </button>
                            </div>
                          )}
                        </div>
                      ) : (
                        <p className="text-slate-400 text-xs italic">フォルダ内に案件がありません。「案件を起票」から作成してください。</p>
                      )}
                    </div>

                    {/* 右半分：各大ステップの進捗状況ミニ集計ボード */}
                    <div className="lg:col-span-5 flex flex-col justify-between bg-slate-50/50 p-3 rounded-xl border border-slate-200">
                      <div className="w-full mb-1 flex items-center justify-between border-b border-slate-200 pb-1">
                        <span className="text-[10px] font-extrabold text-slate-500 uppercase tracking-wider flex items-center gap-1">
                          <IconClock className="h-3 w-3 text-slate-400" /> ステップ進捗 ＆ 期限ヘルスサマリー
                        </span>
                        <span className="text-[9px] text-slate-400 font-bold">クリックでジャンプ</span>
                      </div>
                      
                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-1.5 w-full">
                        {stepList.map(step => {
                          const totalSub = tasks.filter(t => t.stepId === step.id).length;
                          const completedSub = tasks.filter(t => t.stepId === step.id && t.status === 'completed').length;
                          const progress = totalSub > 0 ? Math.round((completedSub / totalSub) * 100) : 0;
                          const lates = tasks.filter(t => t.stepId === step.id && isOverdue(t.dueDate, t.status)).length;

                          const assocDeptColorKey = deptList.find(d => d.key === step.deptKey)?.color || 'slate';
                          const dClass = colorClassesMap[assocDeptColorKey] || colorClassesMap.purple;

                          return (
                            <div 
                              key={step.id} 
                              onClick={() => handleScrollToStep(step.id)}
                              className="bg-white border border-slate-200 hover:border-indigo-400 rounded-lg p-2 flex flex-col justify-between cursor-pointer shadow-xs hover:shadow-sm transition-all"
                            >
                              <div className="flex justify-between items-start gap-1">
                                <span className="text-[9px] font-extrabold text-slate-700 truncate block max-w-[105px]" title={step.name}>
                                  {step.name}
                                </span>
                                
                                {lates > 0 ? (
                                  <span className="bg-rose-100 text-rose-700 text-[8px] px-1 py-0.5 rounded-sm font-bold flex items-center gap-0.5 shrink-0 animate-pulse">
                                    🚨遅延{lates}
                                  </span>
                                ) : (
                                  <span className="text-[8px] text-slate-400 font-mono font-bold shrink-0">
                                    {completedSub}/{totalSub}
                                  </span>
                                )}
                              </div>

                              <div className="mt-2 space-y-0.5">
                                <div className="flex justify-between items-center text-[8px]">
                                  <span className="text-slate-400 font-bold">完了率</span>
                                  <span className={`${dClass.text} font-extrabold`}>{progress}%</span>
                                </div>
                                <div className="h-1 w-full bg-slate-100 rounded-full overflow-hidden">
                                  <div className={`h-full ${dClass.bar} transition-all duration-300`} style={{ width: `${progress}%` }} />
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                  </div>

                  {/* 大ステップ（STEP）の動的追加ボタン */}
                  <div className="flex justify-end">
                    {activeProject && !showAddStepForm ? (
                      <button 
                        onClick={() => {
                          setShowAddStepForm(true);
                          setNewStepName('');
                          setNewStepDesc('');
                          setNewStepStartDate(activeProject.startDate);
                          setNewStepDueDate(activeProject.endDate);
                        }}
                        className="bg-purple-50 hover:bg-purple-100 text-purple-700 font-bold border border-purple-200 text-xs px-4 py-2.5 rounded-xl flex items-center gap-1.5 transition-all shadow-xs"
                      >
                        <IconPlus /> 新しい大ステップを追加
                      </button>
                    ) : activeProject ? (
                      <form onSubmit={handleAddStep} className="w-full bg-purple-50/20 border border-purple-200 rounded-2xl p-4 space-y-3 text-xs animate-in fade-in">
                        <div className="flex justify-between items-center">
                          <span className="font-extrabold text-purple-800">➕ 新規大ステップ（STEP）の作成</span>
                          <button type="button" onClick={() => setShowAddStepForm(false)} className="text-slate-400 hover:text-slate-600"><IconX /></button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                          <div>
                            <label className="block text-slate-500 font-bold mb-1">ステップ名 <span className="text-rose-500">*</span></label>
                            <input required type="text" placeholder="例: テスト運用 ＆ 最終調整" value={newStepName} onChange={e => setNewStepName(e.target.value)} className="w-full border border-slate-200 rounded p-2 text-slate-700 bg-white" />
                          </div>
                          <div>
                            <label className="block text-slate-500 font-bold mb-1">ステップ説明文</label>
                            <input type="text" placeholder="例: 実際の取引先アカウントを用いた検証" value={newStepDesc} onChange={e => setNewStepDesc(e.target.value)} className="w-full border border-slate-200 rounded p-2 text-slate-700 bg-white" />
                          </div>
                        </div>

                        {/* 開始日と期限の設定 */}
                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="block text-slate-500 font-bold mb-1">開始予定日</label>
                            <input type="date" value={newStepStartDate} onChange={e => setNewStepStartDate(e.target.value)} className="w-full border border-slate-200 rounded p-2 text-slate-700 font-mono" />
                          </div>
                          <div>
                            <label className="block text-slate-500 font-bold mb-1">完了予定日(期日)</label>
                            <input type="date" value={newStepDueDate} onChange={e => setNewStepDueDate(e.target.value)} className="w-full border border-slate-200 rounded p-2 text-slate-700 font-mono" />
                          </div>
                        </div>

                        {/* 部署カラー連動 */}
                        <div className="space-y-1">
                          <span className="block text-slate-500 font-bold">関連付ける担当部署 (マスタカラーが自動同期されます)</span>
                          <select 
                            value={newStepDeptKey} 
                            onChange={e => setNewStepDeptKey(e.target.value)} 
                            className="w-full border border-slate-250 rounded-xl p-2 bg-white text-slate-700 text-xs focus:outline-none"
                          >
                            {deptList.map(d => (
                              <option key={d.key} value={d.key}>{d.label}</option>
                            ))}
                          </select>
                        </div>

                        <div className="flex justify-end gap-2 pt-2 border-t border-purple-200">
                          <button type="button" onClick={() => setShowAddStepForm(false)} className="bg-slate-100 text-slate-500 px-3 py-1 rounded">キャンセル</button>
                          <button type="submit" className="bg-purple-600 text-white px-4 py-1 rounded font-bold shadow-sm">ステップを作成</button>
                        </div>
                      </form>
                    ) : null}
                  </div>
                </div>

                {/* STEPコンテナ */}
                <div className="space-y-8">
                  {activeProject && stepList.map((step, index) => {
                    const stepTasks = tasks.filter(t => t.stepId === step.id);
                    const stepProgress = getStepProgress(step.id);
                    const isStepCollapsed = !!collapsedSteps[step.id];
                    const isEditingThisStep = editingStepId === step.id;

                    // 関連付けられた部署の特定からカラーを動的に逆引き
                    const assocDeptColorKey = deptList.find(d => d.key === step.deptKey)?.color || 'slate';
                    const stepClasses = colorClassesMap[assocDeptColorKey] || colorClassesMap.purple;

                    return (
                      <div 
                        key={step.id} 
                        id={`step-anchor-${step.id}`}
                        draggable={!isEditingThisStep}
                        onDragStart={(e) => handleDragStart(index, e)}
                        onDragOver={(e) => handleDragOver(index, e)}
                        onDragEnd={handleDragEnd}
                        className={`bg-white rounded-2xl shadow-xs overflow-hidden border-4 transition-all ${
                          isStepCollapsed ? 'border-slate-200' : stepClasses.borderStrong
                        } ${draggedStepIndex === index ? 'drag-ghost' : ''}`}
                      >
                        
                        {/* STEPヘッダー */}
                        {isEditingThisStep ? (
                          <div 
                            onClick={(e) => e.stopPropagation()} 
                            className="p-4 bg-purple-50/40 border-b border-purple-100 flex flex-col gap-3"
                          >
                            <div className="flex items-center gap-2">
                              <span className="bg-purple-600 text-white font-extrabold text-[10px] px-2 py-0.5 rounded">STEP {step.id} 編集</span>
                              <input 
                                required
                                type="text" 
                                placeholder="ステップ名を入力..." 
                                value={editStepName} 
                                onChange={e => setEditStepName(e.target.value)} 
                                className="flex-1 font-bold text-sm border border-purple-200 rounded p-1.5 focus:border-purple-500 focus:outline-none bg-white"
                              />
                            </div>
                            <input 
                              type="text" 
                              placeholder="ステップの簡潔な説明・進捗目安..." 
                              value={editStepDesc} 
                              onChange={e => setEditStepDesc(e.target.value)} 
                              className="w-full text-xs border border-purple-200 rounded p-1.5 focus:border-purple-500 focus:outline-none bg-white"
                            />

                            {/* 開始日・期限の編集 */}
                            <div className="grid grid-cols-2 gap-3 text-xs">
                              <div>
                                <label className="block text-slate-500 font-bold mb-0.5">開始予定日</label>
                                <input type="date" value={editStepStartDate} onChange={e => setEditStepStartDate(e.target.value)} className="w-full border border-purple-200 rounded p-1.5 font-mono text-xs focus:outline-none bg-white" />
                              </div>
                              <div>
                                <label className="block text-slate-500 font-bold mb-0.5">完了予定日(期日)</label>
                                <input type="date" value={editStepDueDate} onChange={e => setEditStepDueDate(e.target.value)} className="w-full border border-purple-200 rounded p-1.5 font-mono text-xs focus:outline-none bg-white" />
                              </div>
                            </div>

                            {/* 部署カラーの変更紐づき */}
                            <div className="space-y-1 text-xs">
                              <span className="block text-slate-500 font-bold">関連付ける担当部署</span>
                              <select 
                                value={editStepDeptKey} 
                                onChange={e => setEditStepDeptKey(e.target.value)} 
                                className="w-full border border-purple-200 rounded p-1.5 bg-white focus:outline-none text-xs"
                              >
                                {deptList.map(d => (
                                  <option key={d.key} value={d.key}>{d.label}</option>
                                ))}
                              </select>
                            </div>

                            <div className="flex justify-end gap-2 pt-1 border-t border-purple-100">
                              <button type="button" onClick={() => setEditingStepId(null)} className="text-xs text-slate-500 px-3 py-1 bg-white border border-slate-200 rounded">キャンセル</button>
                              <button type="button" onClick={(e) => saveStepEdit(step.id, e)} className="text-xs bg-purple-600 text-white px-4 py-1 rounded font-bold shadow-sm">変更を確定</button>
                            </div>
                          </div>
                        ) : (
                          <div 
                            onClick={() => toggleStepCollapse(step.id)}
                            className={`p-4 border-b flex flex-col md:flex-row md:items-center justify-between gap-3 cursor-pointer select-none transition-colors border-slate-150 ${
                              isStepCollapsed ? 'bg-slate-50/50' : `${stepClasses.bg}`
                            }`}
                          >
                            <div className="space-y-1">
                              <div className="flex items-center gap-2.5 flex-wrap">
                                {/* ドラッグ用ハンドルつまみ */}
                                <div className="p-1 hover:bg-white/80 rounded transition cursor-grab active:cursor-grabbing" title="ドラッグして並び替え">
                                  <IconDragHandle />
                                </div>

                                <span className={`${stepClasses.bar} text-white font-extrabold text-[10px] px-2 py-0.5 rounded shadow-xs`}>STEP {step.id}</span>
                                
                                <h3 className="font-extrabold text-sm text-slate-800 flex items-center gap-1.5">
                                  {step.name}
                                  <span className="text-slate-455">
                                    {isStepCollapsed ? <IconChevronRight className="h-4 w-4" /> : <IconChevronDown className="h-4 w-4" />}
                                  </span>
                                </h3>
                                
                                {/* 期日カウントダウン表示 */}
                                {renderStepDeadlineBadge(step, stepProgress)}

                                {/* STEP移動・編集・削除 */}
                                <div className="flex items-center gap-0.5" onClick={(e) => e.stopPropagation()}>
                                  <button 
                                    onClick={(e) => moveStepOrder(index, -1, e)}
                                    disabled={index === 0}
                                    className={`p-1 rounded transition border border-transparent hover:border-slate-200 hover:bg-white ${index === 0 ? 'opacity-30 cursor-not-allowed' : 'text-slate-500'}`}
                                    title="上に移動"
                                  >
                                    <IconArrowUp />
                                  </button>
                                  <button 
                                    onClick={(e) => moveStepOrder(index, 1, e)}
                                    disabled={index === stepList.length - 1}
                                    className={`p-1 rounded transition border border-transparent hover:border-slate-200 hover:bg-white ${index === stepList.length - 1 ? 'opacity-30 cursor-not-allowed' : 'text-slate-500'}`}
                                    title="下に移動"
                                  >
                                    <IconArrowDown />
                                  </button>

                                  <button 
                                    onClick={(e) => startEditingStep(step, e)}
                                    className="p-1 text-slate-400 hover:text-purple-600 hover:bg-white rounded transition shadow-xs border border-transparent hover:border-slate-100"
                                    title="ステップ情報を変更する"
                                  >
                                    <IconEdit2 className="h-3 w-3" />
                                  </button>
                                  <button 
                                    onClick={(e) => handleDeleteStep(step.id, e)}
                                    className="p-1 text-slate-400 hover:text-rose-600 hover:bg-white rounded transition shadow-xs border border-transparent hover:border-slate-100"
                                    title="このステップをまるごと削除する"
                                  >
                                    <IconTrash2 className="h-3 w-3" />
                                  </button>
                                </div>
                              </div>
                              
                              <div className="flex flex-wrap items-center gap-3 text-xs">
                                <p className="text-slate-455 font-medium">{step.desc}</p>
                                {step.startDate && step.dueDate && (
                                  <div className="flex items-center gap-1 text-[10.5px] text-slate-500 font-mono bg-white/70 px-2 py-0.5 rounded border border-slate-200">
                                    <IconCalendar className="h-3 w-3 text-slate-400" />
                                    <span>{step.startDate} 〜 {step.dueDate}</span>
                                  </div>
                                )}
                              </div>
                            </div>
                            
                            {/* STEP個別の進捗率と追加ボタン */}
                            <div className="flex items-center gap-4" onClick={(e) => e.stopPropagation()}>
                              <div className="flex items-center gap-2">
                                <span className="text-[10px] text-slate-400 font-bold uppercase">進捗</span>
                                <div className="h-1.5 w-20 bg-slate-200 rounded-full overflow-hidden">
                                  <div className={`h-full ${stepClasses.bar} transition-all duration-300`} style={{ width: `${stepProgress}%` }}></div>
                                </div>
                                <span className={`text-xs font-bold ${stepClasses.text}`}>{stepProgress}%</span>
                              </div>

                              {addingTaskStepId !== step.id && (
                                <button 
                                  onClick={() => {
                                    setAddingTaskStepId(step.id);
                                    setNewTaskTitle('');
                                    setNewTaskDesc('');
                                    const fallbackDept = deptList[0]?.key || 'backoffice';
                                    setNewTaskDept(fallbackDept);
                                    setNewTaskAssignee(fallbackDept === 'backoffice' ? '自分 (事務)' : '担当者');
                                  }}
                                  className="bg-white hover:bg-slate-55 border border-slate-200 text-slate-700 font-bold text-xs px-2.5 py-1.5 rounded-xl flex items-center gap-1 transition-all shadow-xs"
                                >
                                  <IconPlus /> タスク追加
                                </button>
                              )}
                            </div>
                          </div>
                        )}

                        {/* タスクエリア */}
                        {!isStepCollapsed && (
                          <div className="transition-all bg-slate-50/10">
                            {/* 新規タスク追加フォーム */}
                            {addingTaskStepId === step.id && (
                              <form onSubmit={(e) => handleAddTask(step.id, e)} className="p-4 bg-purple-50/10 border-b border-slate-200 space-y-3 text-xs animate-in fade-in">
                                <div className="flex justify-between items-center pb-1.5 border-b border-slate-150">
                                  <span className="font-extrabold text-purple-800">➕ STEP {step.id} に新規タスクを追加</span>
                                  <button type="button" onClick={() => setAddingTaskStepId(null)} className="text-slate-400 hover:text-slate-600"><IconX /></button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                  <div className="space-y-3">
                                    <input required type="text" placeholder="タスク名を入力..." value={newTaskTitle} onChange={e => setNewTaskTitle(e.target.value)} className="w-full border border-slate-200 bg-white rounded-xl p-2 text-slate-700 focus:outline-none focus:border-indigo-400" />
                                    <textarea placeholder="詳細論点・説明を記入..." value={newTaskDesc} onChange={e => setNewTaskDesc(e.target.value)} className="w-full border border-slate-200 bg-white rounded-xl p-2 text-slate-700 focus:outline-none focus:border-indigo-400" rows={2} />
                                  </div>
                                  <div className="grid grid-cols-2 gap-2 self-start">
                                    <div>
                                      <label className="block text-slate-500 mb-1">担当部署</label>
                                      <select value={newTaskDept} onChange={e => {
                                        const dept = e.target.value;
                                        const found = deptList.find(d => d.key === dept);
                                        let defaultName = '担当者';
                                        if (dept === 'backoffice') defaultName = '自分 (事務)';
                                        else if (found) defaultName = `${found.label}担当`;
                                        setNewTaskDept(dept);
                                        setNewTaskAssignee(defaultName);
                                      }} className="w-full border border-slate-200 rounded-lg p-1.5 bg-white text-slate-700">
                                        {deptList.map(d => (
                                          <option key={d.key} value={d.key}>{d.label}</option>
                                        ))}
                                      </select>
                                    </div>
                                    <div>
                                      <label className="block text-slate-500 mb-1">担当者名</label>
                                      <input type="text" value={newTaskAssignee} onChange={e => setNewTaskAssignee(e.target.value)} className="w-full border border-slate-200 rounded-lg p-1.5 text-slate-700 focus:outline-none focus:border-indigo-400" />
                                    </div>
                                    <div className="col-span-2">
                                      <label className="block text-slate-500 mb-1">期日</label>
                                      <input type="date" value={newTaskDueDate} onChange={e => setNewTaskDueDate(e.target.value)} className="w-full border border-slate-200 rounded-lg p-1.5 text-slate-700 font-mono" />
                                    </div>
                                  </div>
                                </div>
                                <div className="flex justify-end gap-2 pt-2 border-t border-slate-100">
                                  <button type="button" onClick={() => setAddingTaskStepId(null)} className="bg-white border border-slate-200 text-slate-500 px-3 py-1 rounded-lg">キャンセル</button>
                                  <button type="submit" className="bg-purple-600 text-white px-4 py-1 rounded-lg font-bold">作成する</button>
                                </div>
                              </form>
                            )}

                            {/* タスクカード一覧 */}
                            <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                              {stepTasks.length > 0 ? (
                                stepTasks.map(task => {
                                  const isBlocked = task.status === 'blocked';
                                  const isCompleted = task.status === 'completed';
                                  const isInProgress = task.status === 'in_progress';
                                  const isLate = isOverdue(task.dueDate, task.status);
                                  
                                  const assignedDeptColorKey = deptList.find(d => d.key === task.department)?.color || 'slate';
                                  const dClass = colorClassesMap[assignedDeptColorKey] || colorClassesMap.slate;
                                  const sortedLogs = task.contextLogs ? [...task.contextLogs].sort((a, b) => new Date(b.date) - new Date(a.date)) : [];
                                  const isTaskCollapsed = !!collapsedTasks[task.id];

                                  return (
                                    <div 
                                      key={task.id}
                                      className={`group relative border-4 rounded-2xl p-4 transition-all flex flex-col justify-between overflow-hidden shadow-xs ${
                                        isCompleted 
                                          ? 'border-slate-200 opacity-60 bg-slate-50/40' 
                                          : task.isHighPriority 
                                            ? 'border-amber-400 bg-gradient-to-br from-amber-50/15 via-white to-white ring-1 ring-amber-450/10 shadow-md'
                                            : `${dClass.borderStrong} bg-white` 
                                      }`}
                                    >
                                      {/* 編集・削除・最優先トグルのホバーメニュー */}
                                      <div className="absolute top-2 right-10 opacity-0 group-hover:opacity-100 transition-opacity flex gap-1 bg-white/95 rounded p-0.5 shadow-sm border border-slate-150 z-10">
                                        {!isCompleted && (
                                          <button 
                                            onClick={() => toggleTaskPriority(task.id)}
                                            className={`p-1 rounded transition ${task.isHighPriority ? 'text-amber-500 bg-amber-50' : 'text-slate-355 hover:text-amber-500'}`}
                                            title={task.isHighPriority ? '最優先を解除' : '最優先論点に設定'}
                                          >
                                            <IconFlag className={task.isHighPriority ? 'text-amber-500 fill-current' : 'text-slate-300 hover:text-amber-500'} />
                                          </button>

                                                                </div>
                                                              </div>

                                                              <div className="border-t border-slate-200 pt-2 space-y-1.5">

                                                                    onClick={() => startEditingLog(log)}
                                                                    className="p-0.5 text-slate-400 hover:text-indigo-600 rounded transition"

                                                                    <IconEdit2 className="h-2.5 w-2.5" />

                                                                      <IconExternalLink /> {lnk.label}

                                                                      <button onClick={() => removeSingleLinkFromLog(task.id, log.id, lnk.id)} className="text-indigo-400 hover:text-rose-600 font-extrabold text-[10px] ml-1" title="リンクのみを削除">×</button>
                                                                    )}
                                                                  </span>
                                                                ))}
                                                              </div>
                                                            </React.Fragment>
                                                          )}
                                                        </div>
                                                      );
                                                    })
                                                  ) : (
                                                    <p className="text-[9px] text-slate-400 italic text-center py-2">時系列メモはまだありません</p>
                                                  )}

                                              </div>

                                              <div className="mt-3 pt-3 border-t border-slate-100 flex justify-between items-center">
                                                <button 
                                                  onClick={() => toggleTaskPriority(task.id)}
                                                  className={`text-[10px] font-bold px-2 py-1 rounded transition flex items-center gap-1 ${

                                                      ? 'text-amber-700 bg-amber-100 border border-amber-200' 
                                                      : 'text-slate-400 hover:text-amber-600'
                                                  }`}

                                                </button>

                                                <div className="flex gap-2">

                                                    </button>

                                                    <button onClick={() => changeTaskStatus(task.id, 'completed')} className="text-[10px] text-slate-550 border border-slate-200 bg-white hover:bg-slate-55 px-2.5 py-1.5 rounded-lg">

                                                    <button onClick={() => changeTaskStatus(task.id, 'in_progress')} className="text-[10px] text-slate-400 hover:text-slate-600 underline">

                                                    </button>
                                                  )}
                                                </div>
                                              </div>
                                            </div>
                                          )}
                                        </div>
                                      )}

                                    </div>
                                  );
                                })
                              ) : (

                                </div>
                              )}
                            </div>
                          </div>
                        )}

                      </div>
                    );
                  })}
                </div>
              </React.Fragment>
            ) : (
              /* --- VIEW：🗃️ 案件一覧データベース (DBビュー / 新設) --- */

                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-200">
                  <div className="space-y-1">

                    <p className="text-xs text-slate-400">登録されているすべての調整案件・プロジェクトを横断して進捗・ヘルス状況を俯瞰します。</p>

                      setNewProjFolderId(selectedFolderId);

                        <th className="py-3 px-4 border border-slate-200">プロジェクト進捗率</th>
                        <th className="py-3 px-4 border border-slate-200">アラート・ヘルス</th>
                        <th className="py-3 px-4 border border-slate-200 text-center">アクション</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {projects.map(proj => {
                        const prog = calculateProjectProgressById(proj);
                        const lates = countLateTasksByProject(proj);
                        const folderName = folders.find(f => f.id === proj.folderId)?.name || '未分類';
                        const totalT = (proj.tasks || []).length;
                        const compT = (proj.tasks || []).filter(t => t.status === 'completed').length;

                        return (
                          <tr key={proj.id} className="hover:bg-slate-50/50 transition-colors">
                            <td className="py-3 px-4 border border-slate-200 font-bold text-slate-500">
                              <span className="inline-flex items-center gap-1">
                                <IconFolder className="h-3.5 w-3.5" />
                                {folderName}
                              </span>
                            </td>
                            <td className="py-3 px-4 border border-slate-200 font-extrabold text-slate-800 text-sm max-w-xs truncate">
                              {proj.name}
                            </td>
                            <td className="py-3 px-4 border border-slate-200 font-mono text-slate-500 font-semibold">
                              {proj.code}
                            </td>
                            <td className="py-3 px-4 border border-slate-200 font-mono text-slate-500">
                              {proj.startDate} 〜 {proj.endDate}
                            </td>
                            <td className="py-3 px-4 border border-slate-200 text-center font-mono font-bold text-slate-600">
                              {compT} / {totalT}
                            </td>
                            <td className="py-3 px-4 border border-slate-200">
                              <div className="flex items-center gap-2 min-w-[120px]">
                                <div className="h-2 flex-1 bg-slate-100 rounded-full overflow-hidden">
                                  <div className="h-full bg-indigo-500" style={{ width: `${prog}%` }} />
                                </div>
                                <span className="font-extrabold font-mono text-indigo-600 w-8 text-right">{prog}%</span>
                              </div>
                            </td>
                            <td className="py-3 px-4 border border-slate-200">
                              {lates > 0 ? (
                                <span className="inline-flex items-center gap-1 bg-rose-50 text-rose-700 border border-rose-200 font-extrabold text-[10px] px-2 py-0.5 rounded-full animate-pulse">
                                  ⚠️ 遅延タスク {lates} 件あり
                                </span>
                              ) : (
                                <span className="inline-flex items-center gap-1 bg-emerald-50 text-emerald-700 border border-emerald-200 font-extrabold text-[10px] px-2 py-0.5 rounded-full">
                                  ✅ 順調
                                </span>
                              )}
                            </td>
                            <td className="py-3 px-4 border border-slate-200 text-center">
                              <div className="flex items-center justify-center gap-1.5">
                                <button 
                                  onClick={() => handleOpenProjectFromDb(proj)}
                                  className="flex items-center gap-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 font-bold px-2.5 py-1 rounded-lg transition-all"
                                  title="この案件ダッシュボードを開く"
                                >
                                  <IconEye className="h-3.5 w-3.5" />
                                  <span>開く</span>
                                </button>
                                <button 
                                  onClick={(e) => handleDeleteProjectByList(proj.id, e)}
                                  className="text-slate-400 hover:text-rose-600 p-1.5 hover:bg-rose-50 border border-transparent hover:border-rose-100 rounded-lg transition-all"
                                  title="この案件を削除"
                                >
                                  <IconTrash2 className="h-3.5 w-3.5" />
                                </button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    // ReactをDOMにレンダリングする処理 (CDN環境用)
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
