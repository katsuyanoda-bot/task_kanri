<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Loom プロトタイプ (Dark Mode)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: { 
              55: '#f8fafc', 150: '#e2e8f0', 202: '#e2e8f0', 205: '#e2e8f0', 
              250: '#e2e8f0', 350: '#cbd5e1', 404: '#94a3b8', 405: '#94a3b8', 
              450: '#94a3b8', 455: '#94a3b8', 505: '#64748b', 550: '#64748b', 
              555: '#64748b', 605: '#475569', 606: '#475569', 650: '#475569', 
              655: '#475569', 705: '#334155', 750: '#334155', 755: '#334155', 
              805: '#1e293b', 850: '#1e293b', 855: '#1e293b', 955: '#0f172a' 
            },
            purple: { 55: '#faf5ff', 500: '#a855f7', 600: '#9333ea', 900: '#581c87' },
            indigo: { 
              150: '#e0e7ff', 450: '#818cf8', 455: '#818cf8', 505: '#6366f1', 
              550: '#6366f1', 605: '#4f46e5', 606: '#4f46e5', 650: '#4f46e5', 
              655: '#4f46e5', 750: '#3730a3', 755: '#3730a3' 
            },
            emerald: { 55: '#ecfdf5', 555: '#10b981' },
            rose: { 
              55: '#fff1f2', 150: '#ffe4e6', 550: '#f43f5e', 605: '#e11d48', 
              606: '#e11d48', 650: '#e11d48', 655: '#e11d48', 850: '#881337' 
            },
            amber: { 955: '#78350f' },
            blue: { 606: '#2563eb' },
            orange: { 100: '#ffedd5', 400: '#fb923c', 950: '#431407' }
          }
        }
      }
    }
  </script>

  <style>
    .scrollbar-thin::-webkit-scrollbar { width: 5px; height: 5px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark .scrollbar-thin::-webkit-scrollbar { width: 5px; height: 5px; }
    .dark .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; }
    .dark .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    
    html, body, #root { height: 100%; overflow: hidden; margin: 0; padding: 0; }
  </style>
</head>
<body class="bg-slate-55 dark:bg-slate-955 transition-colors duration-200 text-slate-150 font-sans antialiased overflow-hidden">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useMemo, useEffect, useRef } = React;

    // 🎨 グローバル安全カラー定義
    const colorClassesMap = {
      slate: { text: 'text-slate-700 dark:text-slate-300', bg: 'bg-[#f8fafc] dark:bg-[#1e293b]', border: 'border-slate-202 dark:border-slate-705', borderStrong: 'border-slate-350 dark:border-slate-650', badge: 'bg-slate-202 dark:bg-slate-805 text-slate-805 dark:text-slate-350', dot: '🔴' },
      blue: { text: 'text-blue-700 dark:text-blue-300', bg: 'bg-[#f0f7ff] dark:bg-[#18263e]', border: 'border-blue-200 dark:border-blue-800', borderStrong: 'border-blue-300 dark:border-blue-600', badge: 'bg-blue-50 dark:bg-blue-900/60 text-blue-800 dark:text-blue-200', dot: '🔵' },
      emerald: { text: 'text-emerald-700 dark:text-emerald-300', bg: 'bg-[#ecfdf5] dark:bg-[#132d24]', border: 'border-emerald-200 dark:border-emerald-800', borderStrong: 'border-emerald-300 dark:border-emerald-600', badge: 'bg-emerald-55 dark:bg-emerald-900/60 text-emerald-800 dark:text-emerald-200', dot: '🟢' },
      amber: { text: 'text-amber-850 dark:text-amber-300', bg: 'bg-[#fffbeb] dark:bg-[#2f2214]', border: 'border-amber-200 dark:border-amber-800', borderStrong: 'border-amber-300 dark:border-amber-600', badge: 'bg-amber-100 dark:bg-amber-900/60 text-amber-900 dark:text-amber-200', dot: '🟡' },
      rose: { text: 'text-rose-700 dark:text-rose-300', bg: 'bg-[#fff1f2] dark:bg-[#34161f]', border: 'border-rose-200 dark:border-rose-800', borderStrong: 'border-rose-300 dark:border-rose-600', badge: 'bg-rose-150 dark:bg-rose-900/60 text-rose-850 dark:text-rose-200', dot: '🔴' },
      purple: { text: 'text-purple-700 dark:text-purple-300', bg: 'bg-[#faf5ff] dark:bg-[#2b1b3d]', border: 'border-purple-200 border-purple-800', borderStrong: 'border-purple-300 dark:border-purple-600', badge: 'bg-purple-50 dark:bg-purple-900/60 text-purple-800 dark:text-purple-200', dot: '🟣' },
      orange: { text: 'text-orange-700 dark:text-orange-300', bg: 'bg-[#fff7ed] dark:bg-[#431407]/40', border: 'border-orange-200 border-orange-800', borderStrong: 'border-orange-300 dark:border-orange-600', badge: 'bg-orange-100 dark:bg-orange-955/60 text-orange-800 dark:text-orange-200', dot: '🟠' }
    };

    const colorLabels = {
      slate: '⚫ グレー',
      blue: '🔵 ブルー',
      emerald: '🟢 グリーン',
      amber: '🟡 イエロー',
      rose: '🔴 ローズ',
      purple: '🟣 パープル',
      orange: '🟠 オレンジ'
    };

    const allowedDomains = ['sansan.com', 'sansan.co.jp'];
    const TODAY_STR = '2026-05-24';

    const IconCalendar = () => <svg className="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" height="6"></line><line x1="8" y1="2" x2="8" height="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const IconDatabase = () => <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>;
    const IconChevronRight = () => <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>;

    const initialDepts = [
      { key: 'sales', label: '営業', color: 'blue', order: 0 },
      { key: 'finance', label: '経理', color: 'amber', order: 1 },
      { key: 'legal', label: '法務', color: 'emerald', order: 2 },
      { key: 'backoffice', label: '推進（事務）', color: 'rose', order: 3 },
      { key: 'system', label: 'システム', color: 'slate', order: 4 }
    ];

    const initialFolders = [
      { id: 'f1', name: '新商品設計（ECD）' },
      { id: 'f2', name: '社内事務・システム改善' }
    ];

    const initialProjects = [];

    // 🛡️ 最下層：現場担当のタスクカード
    function TaskCard({ task, index, totalTasks, onUpdateTask, onDeleteTask, onMoveTask, deptList }) {
      const [isEditing, setIsEditing] = useState(false);
      const [isDetailsOpen, setIsDetailsOpen] = useState(false);
      const [editTitle, setEditTitle] = useState(task.title);
      const [editDesc, setEditDesc] = useState(task.description || '');
      const [editDept, setEditDept] = useState(task.department || 'backoffice');
      const [editDueDate, setEditDueDate] = useState(task.dueDate || TODAY_STR);
      const [editLevel, setEditLevel] = useState(task.level || 1);
      const [editUrlName, setEditUrlName] = useState(task.urlName || '');
      const [editUrl, setEditUrl] = useState(task.url || '');
      const [logInput, setLogInput] = useState('');
      const [nextActionInput, setNextActionInput] = useState(task.nextAction || '');

      const normalizedUrls = useMemo(() => {
        if (task.urls && Array.isArray(task.urls)) return task.urls;
        if (task.url) return [{ id: 'legacy', name: task.urlName || '添付リソース', url: task.url }];
        return [];
      }, [task.urls, task.url]);

      const [editUrls, setEditUrls] = useState([]);

      useEffect(() => {
        if (isEditing) setEditUrls([...normalizedUrls]);
      }, [isEditing, normalizedUrls]);

      useEffect(() => {
        setNextActionInput(task.nextAction || '');
      }, [task.nextAction]);

      const isOver = !['completed', 'not_applicable'].includes(task.status) && new Date(task.dueDate) < new Date(TODAY_STR);
      const tkCls = colorClassesMap[task.deptColor] || colorClassesMap.slate;

      const daysDiff = useMemo(() => {
        if (['completed', 'not_applicable'].includes(task.status)) return null;
        if (!task.dueDate) return null;
        const t = new Date(TODAY_STR);
        const d = new Date(task.dueDate);
        const diffTime = d.setHours(0,0,0,0) - t.setHours(0,0,0,0);
        return Math.round(diffTime / (1000 * 60 * 60 * 24));
      }, [task.dueDate, task.status]);

      const deadlineBadge = useMemo(() => {
        if (daysDiff === null) return null;
        if (daysDiff < 0) {
          return <span className="text-rose-600 dark:text-rose-400 font-black bg-rose-50 dark:bg-rose-955/40 border border-rose-200 dark:border-rose-900/60 px-1.5 py-0.5 rounded animate-pulse">⚠️ {Math.abs(daysDiff)}日超過!</span>;
        } else if (daysDiff === 0) {
          return <span className="text-orange-600 dark:text-orange-400 font-black bg-orange-50 dark:bg-orange-955/40 border border-orange-200 dark:border-orange-900/60 px-1.5 py-0.5 rounded">🔥 今日が締切!</span>;
        } else if (daysDiff <= 3) {
          return <span className="text-amber-600 dark:text-amber-400 font-bold bg-amber-50 dark:bg-amber-955/40 border border-amber-200 dark:border-amber-900/60 px-1.5 py-0.5 rounded">⏳ あと{daysDiff}日</span>;
        } else {
          return <span className="text-slate-500 dark:text-slate-404 font-semibold bg-slate-100 dark:bg-slate-700/60 px-1.5 py-0.5 rounded">あと{daysDiff}日</span>;
        }
      }, [daysDiff]);

      const handleNextActionBlur = () => {
        if (nextActionInput.trim() !== (task.nextAction || '')) {
          onUpdateTask(task.id, p => ({ ...p, nextAction: nextActionInput.trim() }));
        }
      };

      const handleNextActionKeyDown = (e) => {
        if (e.key === 'Enter') { e.stopPropagation(); e.target.blur(); }
      };

      const handleAddUrlField = (e) => {
        e.stopPropagation();
        setEditUrls([...editUrls, { id: `url_${Date.now()}_${Math.random()}`, name: '', url: '' }]);
      };

      const handleUpdateUrlField = (id, fields) => {
        setEditUrls(editUrls.map(u => u.id === id ? { ...u, ...fields } : u));
      };

      const handleRemoveUrlField = (id, e) => {
        e.stopPropagation();
        setEditUrls(editUrls.filter(u => u.id !== id));
      };

      const handleSave = (e) => {
        e.stopPropagation();
        const targetDept = deptList.find(d => d.key === editDept) || { label: '他部署', color: 'slate' };
        const cleanedUrls = editUrls.filter(u => u.url.trim() !== '');

        onUpdateTask(task.id, (p) => ({
          ...p, title: editTitle, description: editDesc, department: editDept,
          deptLabel: targetDept.label, deptColor: targetDept.color, dueDate: editDueDate, level: Number(editLevel),
          urls: cleanedUrls,
          url: cleanedUrls[0]?.url || '',
          urlName: cleanedUrls[0]?.name || '',
          completedAt: p.status !== 'completed' && editTitle ? TODAY_STR : p.completedAt // 完了日の自動スタンプ防衛
        }));
        setIsEditing(false);
      };

      const handleAddLog = (e) => {
        if (e.key === 'Enter' && logInput.trim()) {
          e.stopPropagation();
          const pad = (n) => String(n).padStart(2, '0');
          const now = new Date();
          const dateStr = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
          const newLog = { id: `log_${Date.now()}`, date: dateStr, text: logInput.trim(), isSystem: false };
          
          onUpdateTask(task.id, p => ({
            ...p, contextLogs: [newLog, ...(p.contextLogs || [])]
          }));
          setLogInput('');
        }
      };

      return (
        <div 
          onClick={(e) => { e.stopPropagation(); setIsDetailsOpen(!isDetailsOpen); }}
          className={`relative border-4 rounded-3xl bg-white dark:bg-slate-800 shadow-sm flex flex-col justify-between overflow-hidden transition-all duration-150 cursor-pointer ${task.status === 'completed' ? 'border-slate-202 opacity-60' : task.isBlocked ? 'border-amber-400 ring-1 ring-amber-300' : task.doToday ? 'border-orange-400 ring-1 ring-orange-300' : tkCls?.borderStrong || 'border-slate-350'}`}
        >
          <div className="p-5 pb-2">
            <div className="flex justify-between items-center text-[11px] font-bold text-slate-500 mb-3">
              <div className="flex items-center gap-2" onClick={e => e.stopPropagation()}>
                <span className="font-black">{task.level === 4 ? '🔴 4P' : task.level === 2 ? '🟡 2P' : '🟢 1P'}</span>
                <select 
                  value={task.status} 
                  onChange={(e) => {
                    const nextStatus = e.target.value;
                    onUpdateTask(task.id, p => ({ 
                      ...p, 
                      status: nextStatus,
                      completedAt: nextStatus === 'completed' ? TODAY_STR : null // 完了日スタンプ回路
                    }));
                  }}
                  className="bg-slate-100 dark:bg-slate-700 border-none rounded px-1 py-0.5 text-[10px] font-black text-slate-605 dark:text-slate-200 outline-none"
                >
                  <option value="pending">⚪ 未対応</option>
                  <option value="in_progress">🔵 進行中</option>
                  <option value="completed">🟢 完了</option>
                  <option value="not_applicable">⚪ 対象外</option>
                </select>
              </div>
              
              <div className="flex items-center gap-1.5">
                <button disabled={index === 0} onClick={(e) => { e.stopPropagation(); onMoveTask(task.id, 'up'); }} className={`p-1 border rounded-md text-[10px] font-black bg-slate-55 dark:bg-slate-700 duration-100 ${index === 0 ? 'opacity-20 cursor-not-allowed' : 'hover:bg-indigo-500 hover:text-white'}`}>▲</button>
                <button disabled={index === totalTasks - 1} onClick={(e) => { e.stopPropagation(); onMoveTask(task.id, 'down'); }} className={`p-1 border rounded-md text-[10px] font-black bg-slate-55 dark:bg-slate-700 duration-100 ${index === totalTasks - 1 ? 'opacity-20 cursor-not-allowed' : 'hover:bg-indigo-500 hover:text-white'}`}>▼</button>
                
                <button onClick={(e) => { e.stopPropagation(); onUpdateTask(task.id, p => ({ ...p, isBlocked: !p.isBlocked })); }} className={`px-2 py-0.5 rounded-lg border font-black text-[10px] transition-all ${task.isBlocked ? 'bg-amber-100 text-amber-800 border-amber-400' : 'bg-slate-50 dark:bg-slate-700 text-slate-404 border-slate-300'}`}>連絡待ち</button>
                <button onClick={(e) => { e.stopPropagation(); onUpdateTask(task.id, p => ({ ...p, doToday: !p.doToday })); }} className={`px-2 py-0.5 rounded-lg border font-black text-[10px] transition-all ${task.doToday ? 'bg-orange-100 text-orange-800 border-orange-400' : 'bg-slate-50 dark:bg-slate-700 text-slate-404 border-slate-300'}`}>今日やる</button>
                <button onClick={(e) => { e.stopPropagation(); setIsEditing(true); }} className="text-slate-404 text-xs hover:scale-110 duration-100">✏️</button>
                <button onClick={(e) => { e.stopPropagation(); onDeleteTask(task.id, task.title); }} className="text-slate-404 text-sm font-black hover:text-rose-605">×</button>
              </div>
            </div>

            <div className="text-left space-y-1">
              <h4 className="font-extrabold text-sm text-slate-850 dark:text-slate-150 leading-tight break-all">{task.title}</h4>
              <div className="flex flex-wrap items-center gap-1.5 text-[10px] font-bold mt-1.5 text-slate-404 pb-1">
                <span className={`px-1.5 py-0.5 border rounded ${tkCls?.badge || 'bg-slate-202'}`}>{task.deptLabel || '他部署'}</span>
                <span className="font-mono">期日: {task.dueDate}</span>
                {deadlineBadge}
              </div>

              <div className="mt-3 pt-2 border-t border-slate-100 dark:border-slate-700/60 text-left" onClick={e => e.stopPropagation()}>
                <label className="text-[9.5px] font-black text-indigo-500 dark:text-indigo-400 block mb-1 uppercase tracking-wider">⏭️ 次の一手 (Next Action)</label>
                <input 
                  type="text" 
                  value={nextActionInput}
                  onChange={e => setNextActionInput(e.target.value)}
                  onBlur={handleNextActionBlur}
                  onKeyDown={handleNextActionKeyDown}
                  placeholder="次の具体的な打ち手を1行メモ..."
                  className="w-full text-xs bg-slate-55 dark:bg-slate-900/80 border border-slate-202 dark:border-slate-700 rounded-xl px-2.5 py-1.5 text-slate-805 dark:text-white font-bold focus:outline-none focus:border-indigo-500 shadow-2xs"
                />
              </div>
            </div>
          </div>

          {isDetailsOpen && (
            <div className="px-5 pb-4 space-y-3 animate-in fade-in duration-100" onClick={e => e.stopPropagation()}>
              {normalizedUrls.length > 0 && (
                <div className="text-left border-t border-dashed dark:border-slate-700 pt-3">
                  <span className="text-[9.5px] font-bold text-slate-404 block mb-1">関連リソースリンク集</span>
                  <div className="flex flex-wrap gap-1.5">
                    {normalizedUrls.map((uLink, uIdx) => (
                      <a 
                        key={uLink.id || uIdx}
                        href={uLink.url} 
                        target="_blank" 
                        rel="noopener noreferrer"
                        onClick={(e) => e.stopPropagation()}
                        className="inline-flex items-center gap-1 text-[11px] font-black bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-800 px-3 py-1.5 rounded-xl shadow-2xs hover:bg-indigo-600 hover:text-white dark:hover:bg-indigo-600 dark:hover:text-white transition-all duration-100"
                      >
                        🔗 {uLink.name || `リソース ${uIdx + 1}`}
                      </a>
                    ))}
                  </div>
                </div>
              )}

              <div className={`text-left ${normalizedUrls.length > 0 ? '' : 'border-t border-dashed dark:border-slate-700 pt-3'}`}>
                <span className="text-[9.5px] font-bold text-slate-404 block mb-1">論点・備考</span>
                <textarea 
                  value={editDesc} 
                  onChange={e => setEditDesc(e.target.value)}
                  onBlur={() => onUpdateTask(task.id, p => ({ ...p, description: editDesc }))}
                  className="w-full text-xs bg-slate-55 dark:bg-slate-900 p-2 border rounded-xl text-slate-805 dark:text-white focus:outline-none min-h-[60px]" 
                  placeholder="論点や決定事項をメモ..."
                />
              </div>

              <div className="text-left">
                <span className="text-[9.5px] font-bold text-slate-404 block mb-1">履歴タイムライン</span>
                <input 
                  type="text" 
                  placeholder="＋ 履歴ログを追記（Enterキーで確定）..." 
                  value={logInput}
                  onChange={e => setLogInput(e.target.value)}
                  onKeyDown={handleAddLog}
                  className="w-full text-[11px] bg-slate-55 dark:bg-slate-900 border border-slate-202 dark:border-slate-700 text-slate-805 dark:text-white rounded-xl px-2.5 py-1.5 focus:outline-none shadow-inner mb-2" 
                />
                <div className="space-y-1.5 max-h-40 overflow-y-auto custom-scrollbar pr-1">
                  {task.contextLogs?.map(log => (
                    <div key={log.id} className="p-2 rounded-lg border text-[11px] bg-slate-55 dark:bg-slate-900/40 border-slate-202 dark:border-slate-700 shadow-2xs">
                      <div className="flex justify-between items-center opacity-70 text-[9px] font-mono mb-0.5">
                        <span className="bg-slate-202 dark:bg-slate-700 px-1 rounded">{log.isSystem ? 'SYSTEM' : 'LOG'}</span>
                        <span>{log.date}</span>
                      </div>
                      <p className="whitespace-pre-wrap leading-relaxed font-semibold text-slate-700 dark:text-slate-200">{log.text}</p>
                    </div>
                  ))}
                  {(!task.contextLogs || task.contextLogs.length === 0) && (
                    <p className="text-[10px] text-slate-404 text-center py-2 italic">履歴はまだありません</p>
                  )}
                </div>
              </div>
            </div>
          )}

          <div className="bg-slate-100 dark:bg-slate-700 text-slate-404 dark:text-slate-455 text-[9px] font-black text-center py-1 select-none">
            {isDetailsOpen ? '閉じる' : '詳細・履歴タイムラインを展開'}
          </div>
        </div>
      );
    }

    // 🧱 中堅レイヤー：STEP工程コンポーネント
    function StepSection({ step, index, taskFilter, deptList, onUpdateStep, onDeleteStep, onAddTask, onUpdateTask, onDeleteTask, onMoveTask }) {
      const [isCollapsed, setIsCollapsed] = useState(false);
      const [isAddingTask, setIsAddingTask] = useState(false);
      const [isEditingStep, setIsEditingStep] = useState(false);

      const [stepName, setStepName] = useState(step.name);
      const [stepDeptKey, setStepDeptKey] = useState(step.deptKey || 'backoffice');
      const [stepStart, setStepStart] = useState(step.startDate || '');
      const [stepDue, setStepDue] = useState(step.dueDate || '');

      const [newTitle, setNewTitle] = useState('');
      const [newDept, setNewDept] = useState('backoffice');
      const [newDueDate, setNewDueDate] = useState(TODAY_STR);

      const stepTksAll = step.tasks || [];

      const stpProg = useMemo(() => {
        if (stepTksAll.length === 0) return 0;
        const valid = stepTksAll.filter(t => t.status !== 'not_applicable');
        if (valid.length === 0) return 100;

        const totalPoints = valid.reduce((sum, t) => sum + (Number(t.level) || 1), 0);
        const completedPoints = valid.filter(t => t.status === 'completed').reduce((sum, t) => sum + (Number(t.level) || 1), 0);
        
        return Math.round((completedPoints / totalPoints) * 100);
      }, [stepTksAll]);

      const cClass = colorClassesMap[step.deptColor] || colorClassesMap.slate;

      const handleSaveStep = (e) => {
        e.stopPropagation();
        const targetDept = deptList.find(d => d.key === stepDeptKey) || { label: '未設定', color: 'slate' };
        onUpdateStep(step.id, { name: stepName, deptKey: stepDeptKey, deptLabel: targetDept.label, deptColor: targetDept.color, startDate: stepStart, dueDate: stepDue });
        setIsEditingStep(false);
      };

      const handleCreateTask = (e) => {
        e.preventDefault();
        if (!newTitle.trim()) return;
        const targetDept = deptList.find(d => d.key === newDept) || { label: '他部署', color: 'slate' };
        
        const newTask = {
          id: `t_${Date.now()}`, title: newTitle.trim(), description: '', assignee: '自分', department: newDept,
          deptLabel: targetDept.label, deptColor: targetDept.color, interactor: '自分', dueDate: newDueDate,
          status: 'pending', doToday: false, startedAt: null, completedAt: null, contextLogs: [], level: 1, isBlocked: false,
          urls: [], nextAction: ''
        };
        onAddTask(step.id, newTask);
        setNewTitle('');
        setNewDueDate(TODAY_STR);
        setIsAddingTask(false);
      };

      return (
        <div className={`bg-white dark:bg-slate-900 rounded-3xl shadow-sm border-4 overflow-hidden transition-all ${isCollapsed ? 'border-slate-202 dark:border-slate-800' : cClass?.borderStrong || 'border-slate-350'}`}>
          <div 
            onClick={() => setIsCollapsed(!isCollapsed)}
            className="p-4 border-b dark:border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 select-none cursor-pointer bg-slate-55 dark:bg-slate-855"
          >
            <div className="flex flex-wrap items-center gap-3">
              <span className="bg-slate-600 text-white font-black text-[10px] px-2 py-0.5 rounded shadow-2xs">STEP {index + 1}</span>
              <h3 className="font-black text-sm text-slate-850 dark:text-slate-150">{step.name}</h3>
              <span className="text-[11px] text-slate-404 font-mono">期間: {step.startDate} 〜 {step.dueDate}</span>
              <span className={`text-[10px] font-black border px-2 py-0.5 rounded-md ${cClass?.badge || 'bg-slate-202'}`}>{step.deptLabel || '未設定'}</span>
            </div>

            {!isCollapsed && (
              <div className="flex flex-wrap gap-1 max-w-xl mx-auto" onClick={e => e.stopPropagation()}>
                {stepTksAll.map((t) => {
                  if (!taskFilter[t.status]) return null;
                  const isOver = !['completed', 'not_applicable'].includes(t.status) && new Date(t.dueDate) < new Date(TODAY_STR);
                  const dot = t.status === 'completed' ? '🟢' : isOver ? '🔴' : t.isBlocked ? '🟡' : t.status === 'in_progress' ? '🔵' : '⚪';
                  return (
                    <div key={t.id} onClick={(e) => { e.stopPropagation(); document.getElementById(`task-anchor-${t.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }); }} className="text-[9px] font-black border rounded px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-705 dark:text-slate-300 shadow-2xs">
                      {dot} {t.title}
                    </div>
                  );
                })}
              </div>
            )}

            <div className="flex items-center gap-4 shrink-0 font-bold" onClick={e => e.stopPropagation()}>
              <div className="text-xs text-slate-404">進捗: {stpProg}%</div>
              <button onClick={(e) => { e.stopPropagation(); setIsEditingStep(!isEditingStep); }} className="text-xs text-slate-404 hover:text-indigo-600">✏️</button>
              <button onClick={(e) => { e.stopPropagation(); onDeleteStep(step.id, step.name); }} className="text-xs text-slate-404 hover:text-rose-605">🗑️</button>
              <button onClick={(e) => { e.stopPropagation(); setIsAddingTask(!isAddingTask); }} className="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-xl font-black">＋ タスク追加</button>
            </div>
          </div>

          {isEditingStep && (
            <div className="p-5 bg-slate-55 dark:bg-slate-900 border-b dark:border-slate-800 text-xs font-bold space-y-4 shadow-inner" onClick={e => e.stopPropagation()}>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div><label className="block text-[10px] text-slate-404 mb-0.5">Step名 *</label><input type="text" value={stepName} onChange={e => setStepName(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-800 border-slate-202 text-slate-805 dark:text-white" /></div>
                <div><label className="block text-[10px] text-slate-404 mb-0.5">主担当部署</label><select value={stepDeptKey} onChange={e => setStepDeptKey(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-800 border-slate-202 text-slate-805 dark:text-white">{deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}</select></div>
                <div><label className="block text-[10px] text-slate-404 mb-0.5">開始日</label><input type="date" value={stepStart} onChange={e => setStepStart(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-800 font-mono border-slate-205 text-slate-805 dark:text-white" /></div>
                <div><label className="block text-[10px] text-slate-404 mb-0.5">工程期日</label><input type="date" value={stepDue} onChange={e => setStepDue(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-800 font-mono border-slate-205 text-slate-805 dark:text-white" /></div>
              </div>
              <div className="flex justify-end gap-2"><button onClick={() => setIsEditingStep(false)} className="bg-slate-202 dark:bg-slate-700 px-3 py-1 rounded-xl">戻る</button><button onClick={handleSaveStep} className="bg-indigo-600 text-white px-4 py-1 rounded-xl">保存</button></div>
            </div>
          )}

          {!isCollapsed && (
            <div className="p-4 bg-slate-55/30 dark:bg-slate-955/20">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {stepTksAll.map((task, tkIdx) => {
                  if (!taskFilter[task.status]) return null;
                  return (
                    <div key={task.id} id={`task-anchor-${task.id}`} onClick={e => e.stopPropagation()}>
                      <TaskCard 
                        task={task} index={tkIdx} totalTasks={stepTksAll.length} deptList={deptList} 
                        onUpdateTask={onUpdateTask} onDeleteTask={onDeleteTask} 
                        onMoveTask={(tid, dir) => onMoveTask(step.id, tid, dir)} 
                      />
                    </div>
                  );
                })}

                {isAddingTask && (
                  <form onSubmit={handleCreateTask} className="border-4 border-dashed border-indigo-500 rounded-3xl bg-white dark:bg-slate-800 p-5 space-y-3.5 text-xs font-bold shadow-md animate-in zoom-in-95" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center pb-1 border-b dark:border-slate-700">
                      <span className="text-indigo-500 font-extrabold">➕ 新規タスク追加</span>
                      <div className="flex gap-1.5">
                        <button type="button" onClick={() => setIsAddingTask(false)} className="bg-slate-150 dark:bg-slate-700 text-slate-605 px-2.5 py-0.5 rounded-lg">キャンセル</button>
                        <button type="submit" className="bg-indigo-600 text-white px-3 py-0.5 rounded-lg shadow-sm">追加</button>
                      </div>
                    </div>
                    <div className="space-y-2 text-left">
                      <div><label className="block text-[10px] text-slate-404 mb-0.5">タスク名 *</label><input required type="text" value={newTitle} onChange={e => setNewTitle(e.target.value)} className="w-full p-1.5 border rounded-xl dark:bg-slate-900 border-slate-202 text-slate-805 dark:text-white" /></div>
                      <div className="grid grid-cols-2 gap-2">
                        <div><label className="block text-[10px] text-slate-404 mb-0.5">保持部署</label><select value={newDept} onChange={e => setNewDept(e.target.value)} className="w-full p-1.5 border rounded-xl dark:bg-slate-900 border-slate-202 text-slate-805 dark:text-white">{deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}</select></div>
                        <div><label className="block text-[10px] text-slate-404 mb-0.5">期日</label><input type="date" value={newDueDate} onChange={e => setNewDueDate(e.target.value)} className="w-full p-1.5 border rounded-xl dark:bg-slate-900 border-slate-202 text-slate-805 dark:text-white font-mono" /></div>
                      </div>
                    </div>
                  </form>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // 👑 総支配人：アプリケーション最上位コア
    function App() {
      const fileInputRef = useRef(null);
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [viewMode, setViewMode] = useState('board');
      const [isDarkMode, setIsDarkMode] = useState(true);
      const [alertMessage, setAlertMessage] = useState(null);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
      const [user, setUser] = useState(null);

      const [expandedProjectDbId, setExpandedProjectDbId] = useState(null);

      const [folders, setFolders] = useState(() => JSON.parse(localStorage.getItem('pl_folders')) || initialFolders);
      const [deptList, setDeptList] = useState(() => JSON.parse(localStorage.getItem('pl_depts')) || initialDepts);
      const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('pl_projects')) || initialProjects);
      
      const [selectedFolderId, setSelectedFolderId] = useState('f1');
      const [currentProjectId, setCurrentProjectId] = useState('p1');
      const [taskFilter, setTaskFilter] = useState({ pending: true, in_progress: true, completed: false, not_applicable: false });

      const [showAddProjectModal, setShowAddProjectModal] = useState(false);
      const [newProjName, setNewProjName] = useState('');
      const [newProjCode, setNewProjCode] = useState('');
      const [newProjFolderId, setNewProjFolderId] = useState('f1');

      const [newDeptLabel, setNewDeptLabel] = useState('');
      const [newDeptColor, setNewDeptColor] = useState('slate');

      const [dbFilterFolderId, setDbFilterFolderId] = useState('all');
      const [dbFilterText, setDbFilterText] = useState('');

      const toggleDarkMode = () => setIsDarkMode(!isDarkMode);

      const isSansanUser = useMemo(() => {
        if (!user?.email) return false;
        return allowedDomains.includes(user.email.split('@')[1]?.toLowerCase());
      }, [user]);

      const filteredProjects = useMemo(() => projects?.filter(p => p.folderId === selectedFolderId) || [], [projects, selectedFolderId]);
      const activeProject = useMemo(() => projects?.find(p => p.id === currentProjectId) || filteredProjects[0] || projects[0] || null, [projects, currentProjectId, filteredProjects]);
      const stepList = useMemo(() => {
        if (!activeProject?.stepList) return [];
        return [...activeProject.stepList].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      }, [activeProject]);

      const alertCounts = useMemo(() => {
        let overdue = 0;
        let upcoming = 0;
        if (!activeProject?.stepList) return { overdue, upcoming };
        
        const t = new Date(TODAY_STR).setHours(0,0,0,0);
        activeProject.stepList.forEach(s => {
          s.tasks?.forEach(task => {
            if (!['completed', 'not_applicable'].includes(task.status) && task.dueDate) {
              const d = new Date(task.dueDate).setHours(0,0,0,0);
              const diff = Math.round((d - t) / (1000 * 60 * 60 * 24));
              if (diff < 0) overdue++;
              else if (diff >= 0 && diff <= 7) upcoming++;
            }
          });
        });
        return { overdue, upcoming };
      }, [activeProject]);

      const projectProgress = useMemo(() => {
        if (!activeProject?.stepList) return 0;
        let allTasks = [];
        activeProject.stepList.forEach(s => { if (s.tasks) allTasks = [...allTasks, ...s.tasks]; });
        if (allTasks.length === 0) return 0;

        const valid = allTasks.filter(t => t.status !== 'not_applicable');
        if (valid.length === 0) return 100;

        const totalPoints = valid.reduce((sum, t) => sum + (Number(t.level) || 1), 0);
        const completedPoints = valid.filter(t => t.status === 'completed').reduce((sum, t) => sum + (Number(t.level) || 1), 0);
        
        return Math.round((completedPoints / totalPoints) * 100);
      }, [activeProject]);

      // 🛠️ 期間ズレ＆評価ラベリングエンジン（NOW/PAST）の徹底強化
      const projectTimeframeMetrics = useMemo(() => {
        const metrics = {};
        projects.forEach(proj => {
          let tasksAll = [];
          proj.stepList?.forEach(s => { if (s.tasks) tasksAll = [...tasksAll, ...s.tasks]; });

          const nowTasks = tasksAll.filter(t => t.status !== 'completed' && t.status !== 'not_applicable');
          const nowPoints = nowTasks.reduce((sum, t) => sum + (Number(t.level) || 1), 0);
          
          const nowDeptBreakdown = {};
          deptList.forEach(d => { nowDeptBreakdown[d.key] = { label: d.label, color: d.color, points: 0, count: 0, isBlocked: false }; });
          nowTasks.forEach(t => {
            const dKey = t.department || 'backoffice';
            if (!nowDeptBreakdown[dKey]) nowDeptBreakdown[dKey] = { label: t.deptLabel || '他部署', color: t.deptColor || 'slate', points: 0, count: 0, isBlocked: false };
            nowDeptBreakdown[dKey].points += (Number(t.level) || 1);
            nowDeptBreakdown[dKey].count += 1;
            if (t.isBlocked) nowDeptBreakdown[dKey].isBlocked = true;
          });

          const pastTasks = tasksAll.filter(t => t.status === 'completed');
          const pastPoints = pastTasks.reduce((sum, t) => sum + (Number(t.level) || 1), 0);
          
          const pastDeptBreakdown = {};
          pastTasks.forEach(t => {
            const dKey = t.department || 'backoffice';
            if (!pastDeptBreakdown[dKey]) pastDeptBreakdown[dKey] = { label: t.deptLabel || '他部署', color: t.deptColor || 'slate', points: 0, count: 0 };
            pastDeptBreakdown[dKey].points += (Number(t.level) || 1);
            pastDeptBreakdown[dKey].count += 1;
          });

          // 🛠️ バグ修正：画面表示されている「最終完了日」の文字列と100%合致するよう日数計算回路を再構成
          let durationDays = null;
          let calculatedEndDateStr = TODAY_STR;
          if (proj.evaluation?.actualEndDate) {
            calculatedEndDateStr = proj.evaluation.actualEndDate;
          } else if (pastTasks.length > 0) {
            let maxDate = new Date(proj.startDate || TODAY_STR);
            pastTasks.forEach(t => {
              if (t.completedAt) { const cd = new Date(t.completedAt); if (cd > maxDate) maxDate = cd; }
            });
            const pad = (n) => String(n).padStart(2, '0');
            calculatedEndDateStr = `${maxDate.getFullYear()}-${pad(maxDate.getMonth() + 1)}-${pad(maxDate.getDate())}`;
          }

          if (proj.startDate && calculatedEndDateStr) {
            const start = new Date(proj.startDate);
            const end = new Date(calculatedEndDateStr);
            const diffTime = end.setHours(0,0,0,0) - start.setHours(0,0,0,0);
            durationDays = Math.max(1, Math.round(diffTime / (1000 * 60 * 60 * 24)) + 1); // 開始日当日を含める補正
          }

          // 🛠️ 新設：期間に対する評価軸（スピードスコア）判定ロジック
          let speedRating = '✅ 計画通り';
          let speedColor = 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300';
          if (durationDays) {
            const pointsPerDay = pastPoints / durationDays;
            if (pointsPerDay >= 1.0) {
              speedRating = '⚡ 爆速推進 (前倒し完了)';
              speedColor = 'bg-emerald-50 text-emerald-700 dark:bg-emerald-950/50 dark:text-emerald-300 border border-emerald-200 dark:border-emerald-900';
            } else if (durationDays > 14 && pastPoints <= 3) {
              speedRating = '⚠️ 長期化 (プロセス改善推奨)';
              speedColor = 'bg-rose-50 text-rose-700 dark:bg-rose-955/40 dark:text-rose-300 border border-rose-200 dark:border-rose-900';
            }
          }

          // 🛠️ 新設：リソース消費量（P数）に対する格付けラベル
          let loadClass = '🌱 ライト級案件';
          let loadColor = 'bg-slate-100 text-slate-505';
          if (pastPoints >= 10) {
            loadClass = '🐘 ヘビー級案件 (高負荷実績)';
            loadColor = 'bg-purple-50 text-purple-600 dark:bg-purple-900/40 dark:text-purple-300 border border-purple-200 dark:border-purple-800';
          } else if (pastPoints >= 5) {
            loadClass = '⚖️ ミドル級案件';
            loadColor = 'bg-indigo-50 text-indigo-600 dark:bg-indigo-900/40 dark:text-indigo-300 border border-indigo-200 dark:border-indigo-800';
          }

          metrics[proj.id] = {
            now: { tasks: nowTasks, totalPoints: nowPoints, totalCount: nowTasks.length, deptBreakdown: Object.values(nowDeptBreakdown).filter(d => d.count > 0) },
            past: { tasks: pastTasks, totalPoints: pastPoints, totalCount: pastTasks.length, deptBreakdown: Object.values(pastDeptBreakdown) },
            durationDays,
            endDateStr: calculatedEndDateStr,
            speedRating,
            speedColor,
            loadClass,
            loadColor
          };
        });
        return metrics;
      }, [projects, deptList]);

      useEffect(() => {
        localStorage.setItem('pl_projects', JSON.stringify(projects));
        localStorage.setItem('pl_depts', JSON.stringify(deptList));
        localStorage.setItem('pl_folders', JSON.stringify(folders));
      }, [projects, deptList, folders]);

      const handleAddDeptMaster = (e) => {
        e.preventDefault();
        if (!newDeptLabel.trim()) return;
        const newKey = `dept_${Date.now()}`;
        setDeptList([...deptList, { key: newKey, label: newDeptLabel.trim(), color: newDeptColor, order: deptList.length }]);
        setNewDeptLabel('');
        showAlert(`部署「${newDeptLabel.trim()}」を新設しました。`);
      };

      const handleUpdateDeptMaster = (key, fields) => {
        setDeptList(prev => prev.map(d => d.key === key ? { ...d, ...fields } : d));
      };

      const handleDeleteDeptMaster = (key, label) => {
        triggerConfirm('部署マスタの削除', `部署「${label}」を削除しますか？`, () => {
          setDeptList(prev => prev.filter(d => d.key !== key));
          showAlert('部署をマスタから削除しました。');
        });
      };

      const handleAddStep = () => {
        if (!activeProject) return;
        const nextOrder = stepList.length;
        const newStep = {
          id: `step_${Date.now()}`, name: `工程 ${nextOrder + 1}`, desc: '', deptKey: 'backoffice', deptLabel: '推進（事務）', deptColor: 'rose', startDate: TODAY_STR, dueDate: TODAY_STR, leader: user.displayName, order: nextOrder, tasks: []
        };
        setProjects(prev => prev.map(p => p.id === activeProject.id ? { ...p, stepList: [...p.stepList, newStep] } : p));
        showAlert('新しい工程(STEP)を追加しました。');
      };

      const updateNestedTask = (taskId, updateFn) => {
        if (!activeProject) return;
        setProjects(prev => prev.map(p => p.id === activeProject.id ? { ...p, stepList: p.stepList.map(s => ({ ...s, tasks: (s.tasks || []).map(t => t.id === taskId ? updateFn(t) : t) })) } : p));
      };

      const handleAddTaskToStep = (stepId, newTaskObj) => {
        setProjects(prev => prev.map(p => p.id === activeProject.id ? { ...p, taskSequence: (p.taskSequence || 0) + 1, stepList: p.stepList.map(s => s.id === stepId ? { ...s, tasks: [...(s.tasks || []), newTaskObj] } : s) } : p));
      };

      const handleDeleteTaskInStep = (taskId, taskTitle) => {
        triggerConfirm('タスクの削除確認', `タスク「${taskTitle}」を完全に削除してもよろしいですか？`, () => {
          setProjects(prev => prev.map(p => p.id === activeProject.id ? { ...p, stepList: p.stepList.map(s => ({ ...s, tasks: s.tasks.filter(t => t.id !== taskId) })) } : p));
          showAlert('タスクを削除しました。');
        });
      };

      const handleMoveTaskInStep = (stepId, taskId, direction) => {
        setProjects(prev => prev.map(p => {
          if (p.id !== activeProject.id) return p;
          return {
            ...p,
            stepList: p.stepList.map(s => {
              if (s.id !== stepId) return s;
              const tList = [...(s.tasks || [])];
              const idx = tList.findIndex(t => t.id === taskId);
              if (idx === -1) return s;
              const targetIdx = direction === 'up' ? idx - 1 : idx + 1;
              if (targetIdx < 0 || targetIdx >= tList.length) return s;
              
              const temp = tList[idx];
              tList[idx] = tList[targetIdx];
              tList[targetIdx] = temp;
              
              return { ...s, tasks: tList };
            })
          };
        }));
      };

      const handleUpdateStepInfo = (stepId, updatedFields) => {
        setProjects(prev => prev.map(p => p.id === activeProject.id ? { ...p, stepList: p.stepList.map(s => s.id === stepId ? { ...s, ...updatedFields } : s) } : p));
      };

      const handleDeleteStepInfo = (stepId, stepName) => {
        triggerConfirm('工程の削除', `${stepName} 内の全タスクを含め、この工程を削除しますか？`, () => {
          setProjects(prev => prev.map(p => p.id === activeProject.id ? { ...p, stepList: p.stepList.filter(s => s.id !== stepId) } : p));
          showAlert('工程を削除しました。');
        });
      };

      const handleUpdateProjectEvaluation = (projId, evaluationFields) => {
        setProjects(prev => prev.map(p => {
          if (p.id !== projId) return p;
          return { ...p, evaluation: { ...(p.evaluation || { tier: 'Tier 2', memo: '', actualEndDate: TODAY_STR }), ...evaluationFields } };
        }));
        showAlert('案件の戦略評価を更新しました。');
      };

      const handleOpenProjectFromDb = (proj) => {
        setCurrentProjectId(proj.id);
        if (proj.folderId) setSelectedFolderId(proj.folderId);
        setViewMode('board');
      };

      const handleCreateProject = (e) => {
        e.preventDefault(); if (!newProjName.trim()) return;
        const newId = `p_${Date.now()}`;
        const newProj = {
          id: newId, folderId: newProjFolderId, name: newProjName.trim(), code: newProjCode.trim(), status: 'in_progress', startDate: TODAY_STR, endDate: '2026-06-25', taskSequence: 0,
          stepList: [{ id: 1, name: '自部署で論点確認', desc: '方針策定', deptKey: 'backoffice', deptLabel: '推進（事務）', deptColor: 'rose', startDate: TODAY_STR, dueDate: '2026-06-25', leader: '推進担当者', order: 0, tasks: [] }],
          evaluation: { tier: 'Tier 2', memo: '', actualEndDate: '' }
        };
        setProjects([...projects, newProj]);
        setCurrentProjectId(newId); setShowAddProjectModal(false); setNewProjName(''); setNewProjCode(''); showAlert('新規プロジェクトを起票しました');
      };

      const exportBackup = () => {
        const blob = new Blob([JSON.stringify({ folders, depts: deptList, projects }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `project_loom_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
        showAlert('バックアップを出力しました。');
      };

      const importBackup = (e) => {
        const file = e.target.files[0]; if (!file) return;

                                  <div className="space-y-3 pt-1">
                                    {metrics.now.deptBreakdown.map(dept => (
                                      <div key={dept.label} className="space-y-1">
                                        <div className="flex justify-between text-[11px] font-bold">
                                          <span className="text-slate-850 dark:text-slate-200 flex items-center gap-1.5">
                                            <span>{colorClassesMap[dept.color]?.dot || '⚫'}</span>
                                            <span>{dept.label}</span>
                                            {dept.isBlocked && <span className="bg-amber-100 text-amber-800 border border-amber-300 px-1 rounded text-[9px] animate-pulse">⚠️ 連絡待ち詰まり</span>}
                                          </span>
                                          <span className="text-slate-505 font-mono">{dept.points} P</span>
                                        </div>
                                        {/* 🎨 インジケーター：ウエイトの重さをドットの個数で直感マウント */}
                                        <div className="flex items-center gap-1">
                                          <div className="flex gap-0.5">
                                            {Array.from({ length: dept.points }).map((_, i) => (
                                              <span key={i} className="text-xs select-none leading-none">{colorClassesMap[dept.color]?.dot || '🔵'}</span>
                                            ))}
                                          </div>
                                          <div className="h-1.5 bg-slate-100 dark:bg-slate-800 flex-1 rounded-full overflow-hidden ml-2">
                                            <div className={`h-full rounded-full ${
                                              dept.color === 'blue' ? 'bg-blue-606' :
                                              dept.color === 'emerald' ? 'bg-emerald-555' :
                                              dept.color === 'amber' ? 'bg-amber-500' :
                                              dept.color === 'rose' ? 'bg-rose-550' : 'bg-slate-404'
                                            }`} style={{ width: `${Math.min(100, (dept.points / 8) * 100)}%` }}></div>
                                          </div>
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                ) : (
                                  <p className="text-[11px] text-slate-404 text-center py-8 italic font-bold">すべてのタスクが完了しました！現在ボールは詰まっていません。✨</p>
                                )}
                              </div>

                              {/* 🏆 完了後（PAST）の実績内訳 ＆ スピード評価軸 */}
                              <div className="border dark:border-slate-750 rounded-2xl p-4 space-y-3 bg-slate-55/20 dark:bg-slate-900/10">
                                <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-1.5 border-b dark:border-slate-700 pb-2">
                                  <h4 className="text-xs font-black text-emerald-555 flex items-center gap-1.5">
                                    <span>🏆 完了後タスクの実績 (PAST)</span>
                                    <span className="bg-emerald-50 text-emerald-800 dark:bg-emerald-950/60 dark:text-emerald-300 px-2 py-0.5 rounded-md text-[10px] font-mono">{metrics.past.totalCount}件 / {metrics.past.totalPoints}P 実績</span>
                                  </h4>
                                  
                                  {/* ⏱️ 評価軸：実際の所要日数と、それに対するスピードレーティングの自動露出 */}
                                  {metrics.durationDays !== null ? (
                                    <div className="flex flex-col items-end gap-1 select-none">
                                      <span className="bg-indigo-600 text-white px-2 py-0.5 rounded-lg text-[9px] font-black tracking-wide">
                                        ⏱️ 所要期間: {metrics.durationDays}日間
                                      </span>
                                      <span className={`px-1.5 py-0.5 rounded text-[8.5px] font-black ${metrics.speedColor}`}>
                                        {metrics.speedRating}
                                      </span>
                                    </div>
                                  ) : (
                                    <span className="text-[10px] text-slate-404 italic font-bold">所要期間: 進行中...</span>
                                  )}
                                </div>

                                {metrics.past.totalCount > 0 ? (
                                  <div className="space-y-2 pt-1 text-[11px] font-bold text-slate-705 dark:text-slate-300 text-left">
                                    <p className="text-[10px] text-indigo-500 font-black uppercase mb-1">📋 各部署が実務で消費したリソース（負荷内訳）</p>
                                    <div className="grid grid-cols-2 gap-1.5 max-h-36 overflow-y-auto custom-scrollbar pr-0.5">
                                      {metrics.past.deptBreakdown.map(dept => (
                                        <div key={dept.label} className="p-2 border dark:border-slate-700 rounded-xl bg-white dark:bg-slate-900/30 flex items-center justify-between shadow-3xs">
                                          <span className="flex items-center gap-1.5">
                                            <span>{colorClassesMap[dept.color]?.dot || '⚫'}</span>
                                            <span>{dept.label}</span>
                                          </span>
                                          <span className="font-mono text-slate-404 text-[10px]">{dept.count}件 ({dept.points}P)</span>
                                        </div>
                                      ))}
                                    </div>
                                    <div className="text-[9.5px] text-slate-404 italic border-t dark:border-slate-700/60 pt-2 text-right font-mono">
                                      当初開始: {proj.startDate || '---'} ➔ 最終完了: {metrics.endDateStr}
                                    </div>
                                  </div>
                                ) : (
                                  <p className="text-[11px] text-slate-404 text-center py-8 italic font-bold">完了したタスクの実績内訳はまだありません。</p>
                                )}
                              </div>

                            </div>

                            <div className="flex justify-end pt-1">
                              <button 
                                onClick={() => handleOpenProjectFromDb(proj)} 
                                className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-4 py-2 rounded-xl font-black shadow-md hover:scale-102 duration-100"
                              >
                                🎯 この案件の推進ダッシュボード（工程）へワープ
                              </button>
                            </div>

                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {/* モーダル群 */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-955/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4" onClick={() => setShowSettingsModal(false)}>
              <div className="bg-white dark:bg-slate-800 border rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[85vh] relative" onClick={e => e.stopPropagation()}>
                <h2 className="text-base font-black mb-2 text-slate-850 dark:text-white">システム環境マスタ設定</h2>
                <div className="flex-1 overflow-y-auto space-y-6 text-xs font-bold scrollbar-thin pr-1 py-2">
                  <div className="bg-slate-55 dark:bg-slate-900 p-4 rounded-2xl border border-slate-202 dark:border-slate-700 flex justify-between items-center gap-4">
                    <p className="text-[10px] text-slate-404 leading-normal">戦略評価データベース（NOW/PAST 2軸分析・スピード指標）に完全準拠したデモデータをブラウザメモリに安全注入します。</p>
                    <button type="button" onClick={injectDemoData} className="bg-purple-600 text-white px-4 py-2 rounded-xl font-black shadow-sm shrink-0">デモデータを初期生成する</button>
                  </div>
                </div>
                <div className="pt-4 border-t dark:border-slate-700 flex justify-end"><button type="button" onClick={() => setShowSettingsModal(false)} className="bg-slate-150 dark:bg-slate-700 text-slate-805 dark:text-slate-200 px-5 py-2.5 rounded-xl font-bold">閉じる</button></div>
              </div>
            </div>
          )}

          {/* 案件追加モーダル */}
          {showAddProjectModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4" onClick={() => setShowAddProjectModal(false)}>
              <div className="bg-white dark:bg-slate-800 border rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95 duration-150" onClick={e => e.stopPropagation()}>
                <form onSubmit={handleCreateProject} className="space-y-4 text-xs font-bold">
                  <div><label className="block mb-1">新規案件プロジェクト名称 *</label><input required type="text" value={newProjName} onChange={e => setNewProjName(e.target.value)} className="w-full border rounded-xl p-2.5 bg-white dark:bg-slate-900 text-slate-805 dark:text-white" placeholder="例: 【ECD】無料化プラン実装" /></div>
                  <div className="grid grid-cols-2 gap-2">
                    <div><label className="block mb-1">コード</label><input type="text" value={newProjCode} onChange={e => setNewProjCode(e.target.value)} className="w-full border rounded-xl p-2 bg-white dark:bg-slate-900 text-slate-805 dark:text-white font-mono" placeholder="ECD-2026" /></div>
                    <div><label className="block mb-1">フォルダ分類</label><select value={newProjFolderId} onChange={e => setNewProjFolderId(e.target.value)} className="w-full border rounded-xl p-2 bg-white dark:bg-slate-900 text-slate-805 dark:text-white">{folders?.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}</select></div>
                  </div>
                  <div className="flex justify-end gap-2"><button type="button" onClick={() => setShowAddProjectModal(false)} className="bg-slate-150 px-4 py-2 rounded-xl">キャンセル</button><button type="submit" className="bg-indigo-600 text-white px-5 py-2 rounded-xl shadow-md">起票</button></div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
