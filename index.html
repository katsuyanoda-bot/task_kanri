                              const isOver = isOverdue(t.dueDate, t.status);
                              const dot = t.status === 'completed' ? '🟢' : isOver ? '🔴' : t.isBlocked ? '🟡' : t.status === 'in_progress' ? '🔵' : '⚪';
                              const btnColor = isOver 
                                ? 'bg-rose-100 dark:bg-rose-950/40 border-rose-300 text-rose-700 dark:text-rose-300' 
                                : t.status === 'completed' 
                                  ? 'bg-emerald-100 dark:bg-emerald-955/40 border-emerald-300 text-emerald-700 dark:text-emerald-300' 
                                  : t.isBlocked 
                                    ? 'bg-amber-100 dark:bg-amber-955/40 border-amber-300 text-amber-800 dark:text-amber-300' 
                                    : t.status === 'in_progress' 
                                      ? 'bg-blue-100 dark:bg-blue-950/40 border-blue-300 text-blue-700 dark:text-blue-300' 
                                      : 'bg-slate-100 dark:bg-slate-800 border-slate-300 text-slate-700 dark:text-slate-300';
                              return (
                                <div
                                  key={t.id}
                                  draggable
                                  onDragStart={(e) => handleTaskDragStart(step.id, tIdx, e)}
                                  onDragOver={(e) => handleTaskDragOver(step.id, tIdx, e)}
                                  onDragEnd={() => handleTaskDragEnd()}
                                  onClick={() => document.getElementById(`task-anchor-${t.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' })}
                                  className={`text-[9px] font-black border rounded px-2 py-0.5 cursor-grab active:cursor-grabbing transition-all ${btnColor}`}
                                >
                                  {dot} {t.title}
                                </div>
                              );
                            })}
                          </div>
                        )}

                        <div className="flex items-center gap-4 shrink-0 font-bold" onClick={e => e.stopPropagation()}>
                          <div className="text-xs text-slate-500">進捗: {stpProg}%</div>
                          <button onClick={(e) => { e.stopPropagation(); setAddingTaskStepId(step.id); }} className="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-xl font-black shadow-xs">＋ タスク追加</button>
                        </div>
                      </div>

                      {/* タスクリスト表示エリア */}
                      {!isCol && (
                        <div className="p-4 bg-slate-55/30 dark:bg-slate-950/20">
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {stepTksAll.map((task, taskIndex) => {
                              if (!taskFilter[task.status]) return null;
                              const isEditingTask = editingTaskId === task.id;
                              const d = task.status === 'completed', na = task.status === 'not_applicable';
                              const tkCls = colorClassesMap[deptList.find(dl => dl.key === task.department)?.color || 'slate'] || colorClassesMap.slate;
                              const dDays = getDurationDays(task);

                              return (
                                <div key={task.id} id={`task-anchor-${task.id}`} className={`relative border-4 rounded-3xl bg-white dark:bg-slate-800 shadow-sm flex flex-col justify-between overflow-hidden transition-all ${d || na ? 'border-slate-202 opacity-60' : task.doToday ? 'border-orange-400' : task.isBlocked ? 'border-amber-400' : tkCls.borderStrong}`}>
                                  {isEditingTask ? (
                                    <div className="p-4 space-y-3 text-xs font-bold w-full" onClick={e => e.stopPropagation()}>
                                      <input required type="text" value={editFormData.title || ''} onChange={e => setEditFormData({...editFormData, title: e.target.value})} className="w-full p-2 border rounded-xl bg-slate-55 dark:bg-slate-900" />
                                      <div className="flex justify-end gap-2">
                                        <button type="button" onClick={() => setEditingTaskId(null)} className="bg-slate-150 px-3 py-1 rounded-lg">戻る</button>
                                        <button type="button" onClick={() => saveEdit(task.id)} className="bg-indigo-600 text-white px-4 py-1 rounded-lg">保存</button>
                                      </div>
                                    </div>
                                  ) : (
                                    <div className="flex-1 flex flex-col justify-between">
                                      {/* 💡 修正：指示通りの「左上・右上」完全指定レイアウト */}
                                      <div className="p-5 pb-2">
                                        <div className="flex justify-between items-center text-[11px] font-bold text-slate-500 mb-3">
                                          <div className="flex items-center gap-2">
                                            <span className="font-mono text-slate-400">#{(index+1)}-{(taskIndex+1)}</span>
                                            {/* 💡 修正：ウエイト情報をP表記＋案1ドットにリニューアル */}
                                            <span>{task.level === 4 ? '🔴 4P' : task.level === 2 ? '🟡 2P' : '🟢 1P'}</span>
                                            <span>{task.status === 'completed' ? '🟢 完了' : isOverdue(task.dueDate, task.status) ? '🔴 期限超過' : '🔵 進行中'}</span>
                                          </div>
                                          {/* 💡 右上：トグルボタン。ONのときは薄い背景色がつく仕様 */}
                                          <div className="flex items-center gap-1" onClick={e => e.stopPropagation()}>
                                            <button onClick={() => toggleTaskBlocked(task.id)} className={`px-2 py-0.5 rounded border text-[10px] transition-colors ${task.isBlocked ? 'bg-amber-100 dark:bg-amber-950/60 text-amber-800 border-amber-400' : 'bg-transparent border-slate-300'}`}>
                                              {task.isBlocked ? '🟡 連絡待ち' : '連絡待ち'}
                                            </button>
                                            <button onClick={() => toggleDoToday(task.id)} className={`px-2 py-0.5 rounded border text-[10px] transition-colors ${task.doToday ? 'bg-orange-100 dark:bg-orange-950/60 text-orange-800 border-orange-400' : 'bg-transparent border-slate-300'}`}>
                                              {task.doToday ? '🟠 今日やる' : '今日やる'}
                                            </button>
                                            <button onClick={() => startEditing(task)} className="ml-1 text-slate-400">✏️</button>
                                            <button onClick={() => deleteTask(task.id)} className="text-slate-400 ml-1">×</button>
                                          </div>
                                        </div>

                                        <div className="text-left space-y-1">
                                          <h4 className="font-extrabold text-sm text-slate-850 dark:text-slate-150 leading-tight select-text">{task.title}</h4>
                                          <p className="text-[10px] text-slate-400 font-mono">期日: {task.dueDate} {task.startedAt && `(着手から ${dDays}日経過)`}</p>
                                        </div>
                                      </div>

                                      {/* 下部：論点・時系列メモ */}
                                      <div className="px-5 pb-4 space-y-3">
                                        <div className="text-left">
                                          <span className="text-[10px] font-bold text-slate-400 block mb-1">論点・備考</span>
                                          {editingDescTaskId === task.id ? (
                                            <div>
                                              <textarea value={tmpDescValue} onChange={e => setTmpDescValue(e.target.value)} className="w-full text-xs bg-slate-50 dark:bg-slate-900 p-2 border rounded-xl" autoFocus />
                                              <div className="flex justify-end gap-1 mt-1"><button onClick={() => handleSaveDirectDesc(task.id)} className="bg-indigo-600 text-white text-[10px] px-2 py-0.5 rounded">保存</button></div>
                                            </div>
                                          ) : (
                                            <p onClick={() => { setEditingDescTaskId(task.id); setTmpDescValue(task.description || ''); }} className="text-xs p-2 rounded-xl bg-slate-55 dark:bg-slate-900 border text-slate-705 dark:text-slate-300 min-h-[32px] cursor-text">{task.description || '(クリックして編集)'}</p>
                                          )}
                                        </div>

                                        {/* 時系列メモ履歴 */}
                                        <div className="border-t border-dashed dark:border-slate-700 pt-2 text-left" onClick={e => e.stopPropagation()}>
                                          <input 
                                            type="text" 
                                            placeholder="＋ 追記..." 
                                            onKeyDown={(e) => { 
                                              if (e.key === 'Enter' && e.target.value.trim()) { 
                                                const text = e.target.value.trim(); 
                                                const newLog = { id: `m_log_${Date.now()}`, date: getJSTDateTimeString(), text, isSystem: false }; 
                                                saveProjectToFirestore({ ...activeProject, tasks: tasks.map(x => x.id === task.id ? { ...x, contextLogs: [newLog, ...(x.contextLogs || [])] } : x) }); 
                                                e.target.value = ''; showAlert('追記しました');
                                              } 
                                            }} 
                                            className="w-full text-[11px] bg-slate-55 dark:bg-slate-900 border rounded-xl px-2 py-1.5 focus:outline-none mb-1.5" 
                                          />
                                          <div className="space-y-1 max-h-24 overflow-y-auto custom-scrollbar">
                                            {task.contextLogs?.map(log => (
                                              <div key={log.id} className="p-1.5 rounded-lg border text-[11px] bg-slate-55 dark:bg-slate-900/40 border-slate-200 dark:border-slate-700 flex justify-between items-center gap-2">
                                                <div className="flex-1 min-w-0">
                                                  <div className="text-[9px] text-slate-404 flex justify-between"><span>{log.isSystem ? 'システム' : 'ログ'}</span><span>{log.date}</span></div>
                                                  <p className="whitespace-pre-wrap mt-0.5">{log.text}</p>
                                                </div>
                                                {/* 💡 修正：タイムライン履歴の真横から一発でタスクを完了にできるプレーンテキスト完了ボタン */}
                                                {!log.isSystem && task.status !== 'completed' && (
                                                  <button onClick={() => changeTaskStatus(task.id, 'completed')} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-[9px] px-1.5 py-0.5 rounded shrink-0">完了する</button>
                                                )}
                                              </div>
                                            ))}
                                          </div>
                                        </div>
                                      </div>
                                    </div>
                                  )}
                                </div>
                              );
                            })}

                            {/* 💡 修正：タスク追加画面。既存のタスクカードの並び（2列・幅50%）の最後尾に完全に同じ姿で出現する空カードUI */}
                            {addingTaskStepId === step.id && (
                              <form onSubmit={(e) => handleAddTask(step.id, e)} className="border-4 border-dashed border-indigo-500 rounded-3xl bg-white dark:bg-slate-800 p-5 space-y-3 text-xs font-bold shadow-md">
                                <div className="flex justify-between items-center pb-1 border-b dark:border-slate-700">
                                  <span className="text-indigo-500 font-extrabold">新規タスク追加</span>
                                  <div className="flex gap-1.5">
                                    <button type="button" onClick={() => setAddingTaskStepId(null)} className="bg-slate-150 px-2 py-0.5 rounded-lg">キャンセル</button>
                                    <button type="submit" className="bg-indigo-600 text-white px-3 py-0.5 rounded-lg">追加</button>
                                  </div>
                                </div>
                                <div className="space-y-2">
                                  <div>
                                    <label className="block text-[10px] text-slate-400 mb-0.5">タスク推進名 *</label>
                                    <input required type="text" placeholder="推進項目名を入力..." value={newTaskTitle} onChange={e => setNewTaskTitle(e.target.value)} className="w-full p-2 border rounded-xl bg-slate-55 dark:bg-slate-900 border-slate-202 dark:border-slate-700" />
                                  </div>
                                  <div className="grid grid-cols-2 gap-2">
                                    <div>
                                      <label className="block text-[10px] text-slate-404">担当部署</label>
                                      <select value={newTaskDept} onChange={e => handleAddFormDeptChange(e.target.value)} className="w-full p-2 border rounded-xl bg-slate-55 dark:bg-slate-900 border-slate-202 dark:border-slate-700">
                                        {deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}
                                      </select>
                                    </div>
                                    <div>
                                      <label className="block text-[10px] text-slate-404">期日</label>
                                      <input type="date" value={newTaskDueDate} onChange={e => setNewTaskDueDate(e.target.value)} className="w-full p-2 border rounded-xl bg-slate-55 dark:bg-slate-900 border-slate-202 dark:border-slate-700" />
                                    </div>
                                  </div>
                                  <div>
                                    <label className="block text-[10px] text-slate-404">難易度ウエイト</label>
                                    <select value={newTaskLevel} onChange={e => setNewTaskLevel(Number(e.target.value))} className="w-full p-2 border rounded-xl bg-slate-55 dark:bg-slate-900 border-slate-202 dark:border-slate-700">
                                      <option value="1">🟢 1ポイント (セルフ完結型)</option>
                                      <option value="2">🟡 2ポイント (スポット他部署型)</option>
                                      <option value="4">🔴 4ポイント (マルチ他部署型)</option>
                                    </select>
                                  </div>
                                  <div>
                                    <label className="block text-[10px] text-slate-404">論点・備考説明</label>
                                    <textarea placeholder="詳細論点を追記..." value={newTaskDesc} onChange={e => setNewTaskDesc(e.target.value)} className="w-full p-2 border rounded-xl bg-slate-55 dark:bg-slate-900 h-12 border-slate-202 dark:border-slate-700" />
                                  </div>
                                </div>
                              </form>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* データベースビュー */}
            {viewMode === 'database' && (
              <div className="bg-white dark:bg-slate-800 border rounded-3xl shadow-sm p-6 space-y-4">
                <h2 className="text-base font-black">組織横断ポートフォリオデータベース</h2>
                <div className="overflow-x-auto rounded-2xl border dark:border-slate-700">
                  <table className="w-full text-xs text-left">
                    <thead className="bg-slate-55 dark:bg-slate-900 border-b dark:border-slate-700 font-black">
                      <tr><th className="py-3 px-4">案件プロジェクト名称</th><th className="py-3 px-4">コード</th><th className="py-3 px-4">進捗率</th></tr>
                    </thead>
                    <tbody className="divide-y font-bold dark:divide-slate-700">
                      {projects.map(proj => (
                        <tr key={proj.id} className="hover:bg-slate-55/40">
                          <td className="py-3 px-4 text-sm">{proj.name}</td>
                          <td className="py-3 px-4 font-mono text-slate-404">{proj.code}</td>
                          <td className="py-3 px-4">{calculateProjectProgressById(proj)}%</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* 分析力ビュー */}
            {viewMode === 'analytics' && (
              <div className="bg-white dark:bg-slate-800 border p-6 rounded-3xl shadow-sm space-y-4">
                <h2 className="text-base font-black">有言実行月次推進成績表</h2>
                <div className="grid grid-cols-2 gap-4">
                  <div className="bg-gradient-to-br from-indigo-600 to-indigo-700 text-white p-4 rounded-2xl">
                    <span className="text-[10px] font-bold opacity-80 block">獲得推進スコア</span>
                    <span className="text-2xl font-black font-mono">{newAnalyticsData.summary.done} pt</span>
                  </div>
                  <div className="bg-slate-55 dark:bg-slate-900 border p-4 rounded-2xl">
                    <span className="text-[10px] text-slate-404 block">全体リソース重量</span>
                    <span className="text-2xl font-black font-mono">{newAnalyticsData.summary.total} pt</span>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* 💡 修正：外枠クリック連動・下部プレーン閉じるボタンを配備した脱出バグ完全修正済みの設定画面 */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-955/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4" onClick={() => setShowSettingsModal(false)}>
              <div className="bg-white dark:bg-slate-800 border rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[85vh] relative" onClick={e => e.stopPropagation()}>
                <div className="absolute top-4 right-4">
                  <button onClick={() => setShowSettingsModal(false)} className="text-slate-400 font-bold text-base hover:text-white">×</button>
                </div>
                <h2 className="text-base font-black mb-4">システム環境マスタ設定</h2>
                <div className="flex-1 overflow-y-auto pr-2 space-y-4 text-xs font-bold">
                  <div className="bg-slate-55 dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-700 flex justify-between items-center gap-4">
                    <p className="text-[10px] text-slate-404 leading-normal">現在保持しているローカルマスタを初期化し、実例ベースのECD新商品設計デモ用サンプルデータを再投入します。</p>
                    <button type="button" onClick={() => { triggerConfirm('デモデータ投入', '上書きしてもよろしいですか？', () => { setFolders(initialFolders); setDeptList(initialDepts); setProjects(initialProjects); localStorage.setItem('pl_folders', JSON.stringify(initialFolders)); localStorage.setItem('pl_depts', JSON.stringify(initialDepts)); localStorage.setItem('pl_projects', JSON.stringify(initialProjects)); showAlert('シミュレーションデータを再投入しました。'); setShowSettingsModal(false); }); }} className="bg-purple-600 text-white px-4 py-2 rounded-xl shrink-0 font-black">データ生成</button>
                  </div>
                  <div className="space-y-2">
                    <h3 className="font-black border-b pb-1 dark:border-slate-700">他部署カラー管理</h3>
                    {deptList.map((dept, idx) => (
                      <div key={dept.key} className="flex items-center justify-between bg-slate-55 border p-2 rounded-xl dark:bg-slate-900/50 dark:border-slate-700">
                        <span>{dept.label}</span>
                        <span className={`text-[10px] px-2 py-0.5 rounded border ${colorClassesMap[dept.color]?.badge}`}>{dept.color}色</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="pt-4 border-t dark:border-slate-700 flex justify-end">
                  <button type="button" onClick={() => setShowSettingsModal(false)} className="bg-slate-150 dark:bg-slate-700 text-slate-805 dark:text-slate-200 px-5 py-2 rounded-xl font-bold transition-all active:scale-95">設定画面を閉じる</button>
                </div>
              </div>
            </div>
          )}

          {showAddFolderModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
              <div className="bg-white dark:bg-slate-800 border rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
                <form onSubmit={handleCreateFolder} className="space-y-4 text-xs font-bold">
                  <div><label className="block mb-1">フォルダ名称 *</label><input required type="text" value={newFolderName} onChange={e => setNewFolderName(e.target.value)} className="w-full border rounded-xl p-2.5 bg-white dark:bg-slate-900" /></div>
                  <div className="flex justify-end gap-2"><button type="button" onClick={() => setShowAddFolderModal(false)} className="bg-slate-150 px-4 py-2 rounded-xl">キャンセル</button><button type="submit" className="bg-indigo-600 text-white px-5 py-2 rounded-xl">作成</button></div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
