<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Loom プロトタイプ (Dark Mode)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: { 
              55: '#f8fafc', 150: '#e2e8f0', 202: '#e2e8f0', 205: '#e2e8f0', 
              250: '#e2e8f0', 350: '#cbd5e1', 404: '#94a3b8', 405: '#94a3b8', 
              450: '#94a3b8', 455: '#94a3b8', 505: '#64748b', 550: '#64748b', 
              555: '#64748b', 605: '#475569', 606: '#475569', 650: '#475569', 
              655: '#475569', 705: '#334155', 750: '#334155', 755: '#334155', 
              805: '#1e293b', 850: '#1e293b', 855: '#1e293b', 955: '#0f172a' 
            },
            purple: { 55: '#faf5ff' },
            indigo: { 
              150: '#e0e7ff', 450: '#818cf8', 455: '#818cf8', 505: '#6366f1', 
              550: '#6366f1', 605: '#4f46e5', 606: '#4f46e5', 650: '#4f46e5', 
              655: '#4f46e5', 750: '#3730a3', 755: '#3730a3' 
            },
            emerald: { 55: '#ecfdf5', 555: '#10b981' },
            rose: { 
              55: '#fff1f2', 150: '#ffe4e6', 550: '#f43f5e', 605: '#e11d48', 
              606: '#e11d48', 650: '#e11d48', 655: '#e11d48', 850: '#881337' 
            },
            amber: { 955: '#78350f' },
            blue: { 606: '#2563eb' },
            orange: { 100: '#ffedd5', 400: '#fb923c', 950: '#431407' }
          }
        }
      }
    }
  </script>

  <style>
    .scrollbar-thin::-webkit-scrollbar { width: 5px; height: 5px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; }
    .dark .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    
    html, body, #root { height: 100%; overflow: hidden; margin: 0; padding: 0; }
  </style>
</head>
<body class="bg-slate-55 dark:bg-slate-955 transition-colors duration-200 text-slate-150">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useMemo, useEffect, useRef } = React;

    // 🎨 グローバル安全カラー定義
    const colorClassesMap = {
      slate: { text: 'text-slate-700 dark:text-slate-300', bg: 'bg-[#f8fafc] dark:bg-[#1e293b]', border: 'border-slate-202 dark:border-slate-705', borderStrong: 'border-slate-350 dark:border-slate-650', badge: 'bg-slate-202 dark:bg-slate-805 text-slate-805 dark:text-slate-350' },
      blue: { text: 'text-blue-700 dark:text-blue-300', bg: 'bg-[#f0f7ff] dark:bg-[#18263e]', border: 'border-blue-200 dark:border-blue-800', borderStrong: 'border-blue-300 dark:border-blue-600', badge: 'bg-blue-50 dark:bg-blue-900/60 text-blue-800 dark:text-blue-200' },
      emerald: { text: 'text-emerald-700 dark:text-emerald-300', bg: 'bg-[#ecfdf5] dark:bg-[#132d24]', border: 'border-emerald-200 dark:border-emerald-800', borderStrong: 'border-emerald-300 dark:border-emerald-600', badge: 'bg-emerald-55 dark:bg-emerald-900/60 text-emerald-800 dark:text-emerald-200' },
      amber: { text: 'text-amber-850 dark:text-amber-300', bg: 'bg-[#fffbeb] dark:bg-[#2f2214]', border: 'border-amber-200 dark:border-amber-800', borderStrong: 'border-amber-300 dark:border-amber-600', badge: 'bg-amber-100 dark:bg-amber-900/60 text-amber-900 dark:text-amber-200' },
      rose: { text: 'text-rose-700 dark:text-rose-300', bg: 'bg-[#fff1f2] dark:bg-[#34161f]', border: 'border-rose-200 dark:border-rose-800', borderStrong: 'border-rose-300 dark:border-rose-600', badge: 'bg-rose-150 dark:bg-rose-900/60 text-rose-850 dark:text-rose-200' },
      orange: { text: 'text-orange-700 dark:text-orange-300', bg: 'bg-[#fff7ed] dark:bg-[#431407]/40', border: 'border-orange-200 dark:border-orange-800', borderStrong: 'border-orange-300 dark:border-orange-600', badge: 'bg-orange-100 dark:bg-orange-955/60 text-orange-800 dark:text-orange-200' }
    };

    const TODAY_STR = '2026-05-24';

    // 🛡️ 最下層：現場担当のタスクカード（状態を局所化し、stopPropagationシールドを配備）
    function TaskCard({ task, onUpdateTask, onDeleteTask, deptList }) {
      const [isEditing, setIsEditing] = useState(false);
      const [isDetailsOpen, setIsDetailsOpen] = useState(false);
      const [editTitle, setEditTitle] = useState(task.title);
      const [editDesc, setEditDesc] = useState(task.description || '');
      const [editDept, setEditDept] = useState(task.department || 'backoffice');
      const [editDueDate, setEditDueDate] = useState(task.dueDate || TODAY_STR);
      const [editLevel, setEditLevel] = useState(task.level || 1);
      const [editInteractor, setEditInteractor] = useState(task.interactor || '自分');
      const [logInput, setLogInput] = useState('');

      const isOver = !['completed', 'not_applicable'].includes(task.status) && new Date(task.dueDate) < new Date(TODAY_STR);
      const tkCls = colorClassesMap[task.deptColor] || colorClassesMap.slate;

      const handleSave = (e) => {
        e.stopPropagation();
        onUpdateTask(task.id, (prev) => ({
          ...prev, title: editTitle, description: editDesc, department: editDept,
          dueDate: editDueDate, level: Number(editLevel), interactor: editInteractor, assignee: editInteractor
        }));
        setIsEditing(false);
      };

      const handleAddLog = (e) => {
        if (e.key === 'Enter' && logInput.trim()) {
          e.stopPropagation();
          const pad = (n) => String(n).padStart(2, '0');
          const now = new Date();
          const dateStr = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
          const newLog = { id: `log_${Date.now()}`, date: dateStr, text: logInput.trim(), isSystem: false };
          
          onUpdateTask(task.id, prev => ({
            ...prev, contextLogs: [newLog, ...(prev.contextLogs || [])]
          }));
          setLogInput('');
        }
      };

      if (isEditing) {
        return (
          <div className="p-4 bg-slate-50 dark:bg-slate-900 border-4 border-indigo-500 rounded-3xl text-xs font-bold space-y-3" onClick={e => e.stopPropagation()}>
            <div><label className="text-[10px] text-slate-404">タスク名 *</label><input type="text" value={editTitle} onChange={e => setEditTitle(e.target.value)} className="w-full p-2 border rounded-xl dark:bg-slate-800 border-slate-202 dark:border-slate-700 text-slate-805 dark:text-white" /></div>
            <div className="grid grid-cols-2 gap-2">
              <div><label className="text-[10px] text-slate-404">主担当部署</label><select value={editDept} onChange={e => setEditDept(e.target.value)} className="w-full p-2 border rounded-xl dark:bg-slate-800 border-slate-202 dark:border-slate-700 text-slate-805 dark:text-white">{deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}</select></div>
              <div><label className="text-[10px] text-slate-404">やり取り相手</label><input type="text" value={editInteractor} onChange={e => setEditInteractor(e.target.value)} className="w-full p-2 border rounded-xl dark:bg-slate-800 border-slate-202 dark:border-slate-700 text-slate-805 dark:text-white" /></div>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <div><label className="text-[10px] text-slate-404">期日</label><input type="date" value={editDueDate} onChange={e => setEditDueDate(e.target.value)} className="w-full p-2 border rounded-xl dark:bg-slate-800 border-slate-202 dark:border-slate-700 text-slate-805 dark:text-white" /></div>
              <div><label className="text-[10px] text-slate-404">ウエイト</label><select value={editLevel} onChange={e => setEditLevel(Number(e.target.value))} className="w-full p-2 border rounded-xl dark:bg-slate-800 border-slate-202 dark:border-slate-700 text-slate-805 dark:text-white"><option value="1">🟢 1P</option><option value="2">🟡 2P</option><option value="4">🔴 4P</option></select></div>
            </div>
            <div className="flex justify-end gap-2 pt-2"><button onClick={(e) => { e.stopPropagation(); setIsEditing(false); }} className="bg-slate-202 dark:bg-slate-700 px-3 py-1.5 rounded-xl">戻る</button><button onClick={handleSave} className="bg-indigo-600 text-white px-4 py-1.5 rounded-xl">保存</button></div>
          </div>
        );
      }

      return (
        <div 
          onClick={(e) => { e.stopPropagation(); setIsDetailsOpen(!isDetailsOpen); }}
          className={`relative border-4 rounded-3xl bg-white dark:bg-slate-800 shadow-sm flex flex-col justify-between overflow-hidden transition-all duration-150 cursor-pointer ${task.status === 'completed' ? 'border-slate-202 opacity-60' : task.doToday ? 'border-orange-400 ring-1 ring-orange-300' : task.isBlocked ? 'border-amber-400 ring-1 ring-amber-300' : tkCls?.borderStrong || 'border-slate-350'}`}
        >
          <div className="p-5 pb-2">
            <div className="flex justify-between items-center text-[11px] font-bold text-slate-500 mb-3">
              <div className="flex items-center gap-2">
                <span className="font-black">{task.level === 4 ? '🔴 4P' : task.level === 2 ? '🟡 2P' : '🟢 1P'}</span>
                <span className="font-black">{task.status === 'completed' ? '🟢 完了' : isOver ? '🔴 期限超過' : '🔵 進行中'}</span>
              </div>
              <div className="flex items-center gap-1.5">
                <button onClick={(e) => { e.stopPropagation(); onUpdateTask(task.id, p => ({ ...p, isBlocked: !p.isBlocked })); }} className={`px-2 py-0.5 rounded-lg border font-black text-[10px] transition-all ${task.isBlocked ? 'bg-amber-100 text-amber-800 border-amber-400' : 'bg-slate-50 dark:bg-slate-700 text-slate-404 border-slate-300'}`}>連絡待ち</button>
                <button onClick={(e) => { e.stopPropagation(); onUpdateTask(task.id, p => ({ ...p, doToday: !p.doToday })); }} className={`px-2 py-0.5 rounded-lg border font-black text-[10px] transition-all ${task.doToday ? 'bg-orange-100 text-orange-800 border-orange-400' : 'bg-slate-50 dark:bg-slate-700 text-slate-404 border-slate-300'}`}>今日やる</button>
                <button onClick={(e) => { e.stopPropagation(); setIsEditing(true); }} className="text-slate-404 text-xs hover:scale-110 duration-100">✏️</button>
                <button onClick={(e) => { e.stopPropagation(); onDeleteTask(task.id); }} className="text-slate-404 text-sm font-black hover:text-rose-605">×</button>
              </div>
            </div>

            <div className="text-left space-y-1">
              <h4 className="font-extrabold text-sm text-slate-850 dark:text-slate-150 leading-tight break-all">{task.title}</h4>
              <div className="flex flex-wrap items-center gap-1.5 text-[10px] font-bold text-slate-404 mt-1.5">
                <span className={`px-1.5 py-0.5 border rounded ${tkCls?.badge || 'bg-slate-202'}`}>{task.deptLabel || '他部署'}</span>
                <span>To: {task.interactor}</span>
                <span className="font-mono">期日: {task.dueDate}</span>
              </div>
            </div>
          </div>

          {isDetailsOpen && (
            <div className="px-5 pb-4 space-y-3 animate-in fade-in duration-100" onClick={e => e.stopPropagation()}>
              <div className="text-left border-t border-dashed dark:border-slate-700 pt-3">
                <span className="text-[9.5px] font-bold text-slate-404 block mb-1">論点・備考</span>
                <textarea 
                  value={editDesc} 
                  onChange={e => setEditDesc(e.target.value)}
                  onBlur={() => onUpdateTask(task.id, p => ({ ...prev, description: editDesc }))}
                  className="w-full text-xs bg-slate-55 dark:bg-slate-900 p-2 border rounded-xl text-slate-805 dark:text-white focus:outline-none" 
                  placeholder="論点や決定事項をメモ..."
                />
              </div>

              <div className="text-left">
                <input 
                  type="text" 
                  placeholder="＋ 履歴ログを追記（Enterキーで確定）..." 
                  value={logInput}
                  onChange={e => setLogInput(e.target.value)}
                  onKeyDown={handleAddLog}
                  className="w-full text-[11px] bg-slate-55 dark:bg-slate-900 border border-slate-202 dark:border-slate-700 text-slate-805 dark:text-white rounded-xl px-2.5 py-1.5 focus:outline-none shadow-inner" 
                />
                <div className="space-y-1 max-h-24 overflow-y-auto custom-scrollbar mt-2">
                  {task.contextLogs?.map(log => (
                    <div key={log.id} className="p-1.5 rounded-lg border text-[11px] bg-slate-55 dark:bg-slate-900/40 border-slate-202 dark:border-slate-700 flex justify-between items-center gap-2">
                      <div className="flex-1 min-w-0">
                        <div className="text-[8.5px] text-slate-404 flex justify-between font-mono"><span>{log.isSystem ? 'SYSTEM' : 'LOG'}</span><span>{log.date}</span></div>
                        <p className="whitespace-pre-wrap mt-0.5 leading-relaxed font-semibold text-slate-700 dark:text-slate-200">{log.text}</p>
                      </div>
                      {!log.isSystem && task.status !== 'completed' && (
                        <button onClick={(e) => { e.stopPropagation(); onUpdateTask(task.id, p => ({ ...p, status: 'completed' })); }} className="bg-emerald-600 text-white font-black text-[9px] px-2 py-0.5 rounded shrink-0">完了</button>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          <div className="bg-slate-100 dark:bg-slate-700 text-slate-404 dark:text-slate-455 text-[9px] font-black text-center py-1 select-none">
            {isDetailsOpen ? '閉じる' : '詳細・履歴タイムラインを展開'}
          </div>
        </div>
      );
    }

    // 🧱 中堅レイヤー：STEP工程コンポーネント（折りたたみ状態の局所化）
    function StepSection({ step, index, taskFilter, deptList, onUpdateStep, onDeleteStep, onAddTask, onUpdateTask, onDeleteTask }) {
      const [isCollapsed, setIsCollapsed] = useState(false);
      const [isAddingTask, setIsAddingTask] = useState(false);
      const [isEditingStep, setIsEditingStep] = useState(false);

      const [stepName, setStepName] = useState(step.name);
      const [stepDeptKey, setStepDeptKey] = useState(step.deptKey || 'backoffice');
      const [stepStart, setStepStart] = useState(step.startDate || '');
      const [stepDue, setStepDue] = useState(step.dueDate || '');

      const [newTitle, setNewTitle] = useState('');
      const [newDept, setNewDept] = useState('backoffice');
      const [newDueDate, setNewDueDate] = useState('2026-06-10');
      const [newLevel, setNewLevel] = useState(1);

      const stepTksAll = step.tasks || [];
      const stpProg = useMemo(() => {
        if (stepTksAll.length === 0) return 0;
        const valid = stepTksAll.filter(t => t.status !== 'not_applicable');
        return valid.length === 0 ? 100 : Math.round((valid.filter(t => t.status === 'completed').length / valid.length) * 100);
      }, [stepTksAll]);

      const cClass = colorClassesMap[step.deptColor] || colorClassesMap.slate;

      const handleSaveStep = (e) => {
        e.stopPropagation();
        const targetDept = deptList.find(d => d.key === stepDeptKey) || { label: '未設定', color: 'slate' };
        onUpdateStep(step.id, { name: stepName, deptKey: stepDeptKey, deptLabel: targetDept.label, deptColor: targetDept.color, startDate: stepStart, dueDate: stepDue });
        setIsEditingStep(false);
      };

      const handleCreateTask = (e) => {
        e.preventDefault();
        if (!newTitle.trim()) return;
        const targetDept = deptList.find(d => d.key === newDept) || { label: '他部署', color: 'slate' };
        
        const newTask = {
          id: `t_${Date.now()}`, title: newTitle.trim(), description: '', assignee: '自分', department: newDept,
          deptLabel: targetDept.label, deptColor: targetDept.color, interactor: '自分', dueDate: newDueDate,
          status: 'pending', doToday: false, startedAt: null, completedAt: null, contextLogs: [], level: Number(newLevel), isBlocked: false
        };
        onAddTask(step.id, newTask);
        setNewTitle('');
        setIsAddingTask(false);
      };

      return (
        <div className={`bg-white dark:bg-slate-900 rounded-3xl shadow-sm border-4 overflow-hidden transition-all ${isCollapsed ? 'border-slate-202 dark:border-slate-800' : cClass?.borderStrong || 'border-slate-350'}`}>
          
          {/* Step帯ヘッダー（バブリング完全防御） */}
          <div 
            onClick={() => setIsCollapsed(!isCollapsed)}
            className="p-4 border-b dark:border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 select-none cursor-pointer bg-slate-55 dark:bg-slate-850"
          >
            <div className="flex flex-wrap items-center gap-3">
              <span className="bg-slate-600 text-white font-black text-[10px] px-2 py-0.5 rounded shadow-2xs">STEP {index + 1}</span>
              <h3 className="font-black text-sm text-slate-850 dark:text-slate-150">{step.name}</h3>
              <span className="text-[11px] text-slate-404 font-mono">期間: {step.startDate} 〜 {step.dueDate}</span>
              <span className={`text-[10px] font-black border px-2 py-0.5 rounded-md ${cClass?.badge || 'bg-slate-202'}`}>{step.deptLabel || '未設定'}</span>
            </div>

            {!isCollapsed && (
              <div className="flex flex-wrap gap-1 max-w-xl mx-auto" onClick={e => e.stopPropagation()}>
                {stepTksAll.map((t) => {
                  if (!taskFilter[t.status]) return null;
                  const isOver = !['completed', 'not_applicable'].includes(t.status) && new Date(t.dueDate) < new Date(TODAY_STR);
                  const dot = t.status === 'completed' ? '🟢' : isOver ? '🔴' : t.isBlocked ? '🟡' : t.status === 'in_progress' ? '🔵' : '⚪';
                  return (
                    <div key={t.id} onClick={(e) => { e.stopPropagation(); document.getElementById(`task-anchor-${t.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }); }} className="text-[9px] font-black border rounded px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-705 dark:text-slate-300 shadow-2xs">
                      {dot} {t.title}
                    </div>
                  );
                })}
              </div>
            )}

            <div className="flex items-center gap-4 shrink-0 font-bold" onClick={e => e.stopPropagation()}>
              <div className="text-xs text-slate-404">進捗: {stpProg}%</div>
              <button onClick={(e) => { e.stopPropagation(); setIsEditingStep(!isEditingStep); }} className="text-xs text-slate-404 hover:text-indigo-600">✏️</button>
              <button onClick={(e) => { e.stopPropagation(); onDeleteStep(step.id, step.name); }} className="text-xs text-slate-404 hover:text-rose-605">🗑️</button>
              <button onClick={(e) => { e.stopPropagation(); setIsAddingTask(!isAddingTask); }} className="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-xl font-black">＋ タスク追加</button>
            </div>
          </div>

          {/* STEP情報のインライン編集領域 */}
          {isEditingStep && (
            <div className="p-5 bg-slate-55 dark:bg-slate-900 border-b dark:border-slate-800 text-xs font-bold space-y-4" onClick={e => e.stopPropagation()}>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div><label className="block text-[10px] text-slate-404 mb-0.5">Step名 *</label><input type="text" value={stepName} onChange={e => setStepName(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-800 border-slate-202 text-slate-805 dark:text-white" /></div>
                <div><label className="block text-[10px] text-slate-404 mb-0.5">担当部署</label><select value={stepDeptKey} onChange={e => setStepDeptKey(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-800 border-slate-202 text-slate-805 dark:text-white">{deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}</select></div>
                <div><label className="block text-[10px] text-slate-404 mb-0.5">開始日</label><input type="date" value={stepStart} onChange={e => setStepStart(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-800 font-mono border-slate-202 text-slate-805 dark:text-white" /></div>
                <div><label className="block text-[10px] text-slate-404 mb-0.5">期日</label><input type="date" value={stepDue} onChange={e => setStepDue(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-800 font-mono border-slate-202 text-slate-805 dark:text-white" /></div>
              </div>
              <div className="flex justify-end gap-2"><button onClick={() => setIsEditingStep(false)} className="bg-slate-202 dark:bg-slate-700 px-3 py-1 rounded-xl">戻る</button><button onClick={handleSaveStep} className="bg-indigo-600 text-white px-4 py-1 rounded-xl">保存</button></div>
            </div>
          )}

          {/* タスクカード配置用レーン */}
          {!isCollapsed && (
            <div className="p-4 bg-slate-55/30 dark:bg-slate-955/20">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {stepTksAll.map((task) => {
                  if (!taskFilter[task.status]) return null;
                  return (
                    <div key={task.id} id={`task-anchor-${task.id}`} onClick={e => e.stopPropagation()}>
                      <TaskCard 
                        task={task} 
                        deptList={deptList}
                        onUpdateTask={onUpdateTask}
                        onDeleteTask={onDeleteTask}
                      />
                    </div>
                  );
                })}

                {/* 新規タスク追加フォーム */}
                {isAddingTask && (
                  <form onSubmit={handleCreateTask} className="border-4 border-dashed border-indigo-500 rounded-3xl bg-white dark:bg-slate-800 p-5 space-y-3.5 text-xs font-bold shadow-md" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center pb-1 border-b dark:border-slate-700">
                      <span className="text-indigo-500 font-extrabold">➕ 新規タスク追加カード</span>
                      <div className="flex gap-1.5">
                        <button type="button" onClick={() => setIsAddingTask(false)} className="bg-slate-150 dark:bg-slate-700 text-slate-605 px-2.5 py-0.5 rounded-lg">キャンセル</button>
                        <button type="submit" className="bg-indigo-600 text-white px-3 py-0.5 rounded-lg">追加</button>
                      </div>
                    </div>
                    <div className="space-y-2">
                      <div><label className="block text-[10px] text-slate-404 mb-0.5">タスク推進名 *</label><input required type="text" value={newTitle} onChange={e => setNewTitle(e.target.value)} className="w-full p-1.5 border rounded-xl dark:bg-slate-900 border-slate-202 text-slate-805 dark:text-white" /></div>
                      <div className="grid grid-cols-2 gap-2">
                        <div><label className="block text-[10px] text-slate-404 mb-0.5">保持部署</label><select value={newDept} onChange={e => setNewDept(e.target.value)} className="w-full p-1.5 border rounded-xl dark:bg-slate-900 border-slate-202 text-slate-805 dark:text-white">{deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}</select></div>
                        <div><label className="block text-[10px] text-slate-404 mb-0.5">期日</label><input type="date" value={newDueDate} onChange={e => setNewDueDate(e.target.value)} className="w-full p-1.5 border rounded-xl dark:bg-slate-900 border-slate-202 text-slate-805 dark:text-white font-mono" /></div>
                      </div>
                      <div><label className="block text-[10px] text-slate-404 mb-0.5">重要ウエイト</label><select value={newLevel} onChange={e => setNewLevel(Number(e.target.value))} className="w-full p-1.5 border rounded-xl dark:bg-slate-900 border-slate-202 text-slate-805 dark:text-white"><option value="1">🟢 1ポイント</option><option value="2">🟡 2ポイント</option><option value="4">🔴 4ポイント</option></select></div>
                    </div>
                  </form>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // 👑 総支配人：アプリケーション最上位コア（データの保存・入出力を一元集中管理）
    function App() {
      const allowedDomains = ['sansan.com', 'sansan.co.jp'];
      const headerWrapperRef = useRef(null);
      const fileInputRef = useRef(null);

      // モーダル・画面表示State
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [viewMode, setViewMode] = useState('board');
      const [isDarkMode, setIsDarkMode] = useState(true);
      const [alertMessage, setAlertMessage] = useState(null);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
      const [user, setUser] = useState(null);

      // アプリケーションコアState
      const [folders, setFolders] = useState(initialFolders);
      const [deptList, setDeptList] = useState(initialDepts);
      const [projects, setProjects] = useState(initialProjects);
      const [selectedFolderId, setSelectedFolderId] = useState('f1');
      const [currentProjectId, setCurrentProjectId] = useState('p1');
      const [taskFilter, setTaskFilter] = useState({ pending: true, in_progress: true, completed: false, not_applicable: false });

      const [showAddProjectModal, setShowAddProjectModal] = useState(false);
      const [newProjName, setNewProjName] = useState('');
      const [newProjCode, setNewProjCode] = useState('');
      const [newProjFolderId, setNewProjFolderId] = useState('f1');

      const [dbFilterFolderId, setDbFilterFolderId] = useState('all');
      const [dbFilterText, setDbFilterText] = useState('');

      // 計算Stateの算出（手動JOINコードを完全撲滅）
      const filteredProjects = useMemo(() => projects?.filter(p => p.folderId === selectedFolderId) || [], [projects, selectedFolderId]);
      const activeProject = useMemo(() => projects?.find(p => p.id === currentProjectId) || filteredProjects[0] || projects[0] || null, [projects, currentProjectId, filteredProjects]);
      const stepList = useMemo(() => {
        if (!activeProject?.stepList) return [];
        return [...activeProject.stepList].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      }, [activeProject]);

      // プロジェクト全体の総合進捗率
      const projectProgress = useMemo(() => {
        if (!activeProject?.stepList) return 0;
        let allTasks = [];
        activeProject.stepList.forEach(s => { if (s.tasks) allTasks = [...allTasks, ...s.tasks]; });
        if (allTasks.length === 0) return 0;
        const valid = allTasks.filter(t => t.status !== 'not_applicable');
        return valid.length === 0 ? 100 : Math.round((valid.filter(t => t.status === 'completed').length / valid.length) * 100);
      }, [activeProject]);

      // 🛡️ 原因④解決：手動保存を全廃し、ステート監視型の単一パイプラインに一本化（レースコンディション完全消滅）
      useEffect(() => {
        if (projects !== initialProjects || deptList !== initialDepts || folders !== initialFolders) {
          localStorage.setItem('pl_projects', JSON.stringify(projects));
          localStorage.setItem('pl_depts', JSON.stringify(deptList));
          localStorage.setItem('pl_folders', JSON.stringify(folders));
        }
      }, [projects, deptList, folders]);

      // 🛠️ 原因②解決：親子構造を壊さずピンポイントでディープアップデートをかける最強のヘルパー
      const updateNestedTask = (taskId, updateFn) => {
        if (!activeProject) return;
        setProjects(prevProjects => prevProjects.map(p => {
          if (p.id !== activeProject.id) return p;
          return {
            ...p,
            stepList: p.stepList.map(s => ({
              ...s,
              tasks: (s.tasks || []).map(t => t.id === taskId ? updateFn(t) : t)
            }))
          };
        }));
      };

      const handleAddTaskToStep = (stepId, newTaskObj) => {
        setProjects(prev => prev.map(p => {
          if (p.id !== activeProject.id) return p;
          return {
            ...p,
            taskSequence: (p.taskSequence || 0) + 1,
            stepList: p.stepList.map(s => s.id === stepId ? { ...s, tasks: [...(s.tasks || []), newTaskObj] } : s)
          };
        }));
      };

      const handleDeleteTaskInStep = (taskId) => {
        setProjects(prev => prev.map(p => {
          if (p.id !== activeProject.id) return p;
          return { ...p, stepList: p.stepList.map(s => ({ ...s, tasks: s.tasks.filter(t => t.id !== taskId) })) };
        }));
      };

      const handleUpdateStepInfo = (stepId, updatedFields) => {
        setProjects(prev => prev.map(p => {
          if (p.id !== activeProject.id) return p;
          return { ...p, stepList: p.stepList.map(s => s.id === stepId ? { ...s, ...updatedFields } : s) };
        }));
      };

      const handleDeleteStepInfo = (stepId) => {
        setProjects(prev => prev.map(p => {
          if (p.id !== activeProject.id) return p;
          return { ...p, stepList: p.stepList.filter(s => s.id !== stepId) };
        }));
      };

      const handleCreateProject = (e) => {
        e.preventDefault(); if (!newProjName.trim()) return;
        const newId = `p_${Date.now()}`;
        const newProj = {
          id: newId, folderId: newProjFolderId, name: newProjName.trim(), code: newProjCode.trim(), status: 'in_progress', startDate: '2026-05-15', endDate: '2026-06-25', taskSequence: 0,
          stepList: [{ id: 1, name: '自部署で論点確認', desc: '方針策定', deptKey: 'backoffice', deptLabel: '推進（事務）', deptColor: 'rose', startDate: '2026-05-15', dueDate: '2026-06-25', leader: '推進担当者', order: 0, tasks: [] }]
        };
        setProjects([...projects, newProj]);
        setCurrentProjectId(newId); setShowAddProjectModal(false); setNewProjName(''); setNewProjCode(''); showAlert('新規プロジェクトを起票しました');
      };

      // 📥 データの強固な保護：JSON物理エクスポート（バックアップ）
      const exportBackup = () => {
        const backupData = { folders, depts: deptList, projects };
        const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `project_loom_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showAlert('物理バックアップをダウンロードしました。');
      };

      // 📤 データの完全復元：JSONインポート（型崩れ完全防衛）
      const importBackup = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.folders) setFolders(data.folders);
            if (data.depts) setDeptList(data.depts);
            if (data.projects) setProjects(data.projects);
            showAlert('バックアップからデータを正常に復元しました！');
          } catch (err) {
            showAlert('復元に失敗しました。正しいJSONファイルかご確認ください。');
          }
        };
        reader.readAsText(file);
      };

      const handleMockLogin = (email) => {
        const mockUser = { uid: 'mock_' + Date.now(), email, displayName: email.split('@')[0] };
        localStorage.setItem('pl_mock_user', JSON.stringify(mockUser));
        setUser(mockUser);
        showAlert(`Sansan推進コアメンバーとして認証しました。`);
      };

      const calculateProjectProgressById = (proj) => {
        let allTasks = [];
        proj.stepList?.forEach(s => { if (s.tasks) allTasks = [...allTasks, ...s.tasks]; });
        if (allTasks.length === 0) return 0;
        const valid = allTasks.filter(t => t.status !== 'not_applicable');
        return valid.length === 0 ? 100 : Math.round((valid.filter(t => t.status === 'completed').length / valid.length) * 100);
      };

      const showAlert = (msg) => { setAlertMessage(msg); setTimeout(() => setAlertMessage(null), 4000); };
      const triggerConfirm = (title, message, onConfirmAction) => setConfirmModal({ isOpen: true, title, message, onConfirm: () => { onConfirmAction(); closeConfirm(); } });
      const closeConfirm = () => setConfirmModal({ isOpen: false, title: '', message: '', onConfirm: null });

      useEffect(() => {
        const savedMockUser = localStorage.getItem('pl_mock_user'); if (savedMockUser) setUser(JSON.parse(savedMockUser));
        const localFolders = localStorage.getItem('pl_folders'); if (localFolders) setFolders(JSON.parse(localFolders));
        const localDepts = localStorage.getItem('pl_depts'); if (localDepts) setDeptList(JSON.parse(localDepts));
        const localProjects = localStorage.getItem('pl_projects'); if (localProjects) setProjects(JSON.parse(localProjects));
      }, []);

      if (!user) {
        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-955 flex flex-col items-center justify-center p-6 duration-200">
            <div className="max-w-md w-full bg-white dark:bg-slate-900 rounded-3xl border border-slate-202 p-8 shadow-2xl text-center space-y-6">
              <div className="mx-auto bg-indigo-600 text-white w-16 h-16 rounded-2xl font-black text-2xl flex items-center justify-center shadow-lg">PL</div>
              <h1 className="text-xl font-black text-slate-850 dark:text-white leading-none">Project Loom</h1>
              <div className="bg-slate-55 dark:bg-slate-955/50 border border-slate-150 p-4 rounded-2xl text-left"><p className="text-xs text-slate-605 dark:text-slate-300 font-bold leading-relaxed">本システムはSansan株式会社専用プロトタイプです。アクセスおよび閲覧には、認証情報が必要です。</p></div>
              <div className="space-y-1.5 pt-2">
                <button onClick={() => handleMockLogin('member@sansan.com')} className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white border border-indigo-700 rounded-2xl font-black text-xs">推進コアメンバーとしてログイン</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="h-full flex flex-col bg-slate-55 dark:bg-slate-955 text-slate-805 dark:text-slate-150 font-sans antialiased duration-200">
          <input type="file" ref={fileInputRef} onChange={importBackup} accept=".json" className="hidden" />

          {alertMessage && (
            <div className="fixed bottom-6 right-6 bg-slate-955/95 dark:bg-slate-800 text-white text-xs px-5 py-4 rounded-2xl shadow-2xl z-[100] max-w-sm border border-slate-750 font-bold">{alertMessage}</div>
          )}

          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[200] p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
                <h3 className="font-extrabold text-sm text-slate-955 dark:text-white">{confirmModal.title}</h3>
                <p className="text-xs text-slate-505 dark:text-slate-455">{confirmModal.message}</p>
                <div className="flex justify-end gap-2 pt-3 border-t dark:border-slate-700 text-xs">
                  <button onClick={closeConfirm} className="bg-slate-150 dark:bg-slate-700 text-slate-605 px-4 py-2 rounded-2xl font-bold">キャンセル</button>
                  <button onClick={confirmModal.onConfirm} className="bg-rose-605 text-white px-5 py-2 rounded-2xl font-extrabold">実行</button>
                </div>
              </div>
            </div>
          )}

          {/* 🧱 固定天井エリア */}
          <div ref={headerWrapperRef} className="shrink-0 bg-white dark:bg-slate-900 border-b dark:border-slate-800 select-none z-40 shadow-sm">
            <div className="px-6 py-3 flex flex-wrap items-center justify-between gap-4 border-b dark:border-slate-800 bg-white dark:bg-slate-900">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 text-white p-2 rounded-2xl font-black text-sm">PL</div>
                <div><h1 className="text-xs font-black dark:text-white leading-none">Project Loom</h1><p className="text-[9px] text-slate-404 font-extrabold uppercase mt-0.5">Sansanグループ案件推進専用ダッシュボード</p></div>
              </div>
              <div className="flex bg-slate-150 dark:bg-slate-800 p-0.5 rounded-xl text-xs font-bold border dark:border-slate-700">
                <button onClick={() => setViewMode('board')} className={`px-3 py-1.5 rounded-lg flex items-center gap-1 ${viewMode==='board'?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}><IconCalendar /><span>ダッシュボード</span></button>
                <button onClick={() => setViewMode('database')} className={`px-3 py-1.5 rounded-lg flex items-center gap-1 ${viewMode==='database'?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}><IconDatabase /><span>データベース</span></button>
                <button onClick={() => setViewMode('analytics')} className={`px-3 py-1.5 rounded-lg flex items-center gap-1 ${viewMode==='analytics'?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}><IconCalendar /><span>分析力</span></button>
              </div>
              <div className="flex items-center gap-3">
                <button onClick={exportBackup} className="px-2 py-1 bg-slate-100 dark:bg-slate-800 text-[10px] rounded-xl font-bold border border-slate-202 text-slate-605">📥 バックアップ</button>
                <button onClick={() => fileInputRef.current.click()} className="px-2 py-1 bg-slate-100 dark:bg-slate-800 text-[10px] rounded-xl font-bold border border-slate-202 text-slate-605">📤 復元</button>
                <button onClick={toggleDarkMode} className="p-2 border rounded-xl bg-slate-55 dark:bg-slate-800 text-slate-605 font-bold text-xs">🌗 外観切替</button>
                <button onClick={() => setShowSettingsModal(true)} className="p-2 border rounded-xl bg-slate-55 dark:bg-slate-800 text-slate-605 font-bold text-xs">設定</button>
                <div className="text-xs font-mono font-black text-indigo-600 dark:text-indigo-404">進捗 {projectProgress}%</div>
              </div>
            </div>

            {viewMode === 'board' && activeProject && (
              <div className="px-6 py-3 flex flex-wrap items-center justify-between gap-4 border-b dark:border-slate-800 bg-white dark:bg-slate-900">
                <div className="flex items-center gap-4">
                  <div className="flex items-center gap-1 bg-white dark:bg-slate-800 border rounded-xl px-2 py-1 border-slate-202 dark:border-slate-700">
                    <select value={selectedFolderId} onChange={(e) => setSelectedFolderId(e.target.value)} className="bg-transparent text-xs font-black focus:outline-none text-slate-805 dark:text-white">
                      {folders?.map(f => <option key={f.id} value={f.id} className="dark:bg-slate-900">{f.name}</option>)}
                    </select>
                  </div>
                  <IconChevronRight />
                  <div className="flex items-center gap-1 bg-white dark:bg-slate-800 border rounded-xl px-2 py-1 border-slate-202 dark:border-slate-700">
                    <select value={currentProjectId} onChange={(e) => setCurrentProjectId(e.target.value)} className="bg-transparent text-xs font-black focus:outline-none text-slate-805 dark:text-white">
                      {filteredProjects?.map(p => <option key={p.id} value={p.id} className="dark:bg-slate-900">{p.name}</option>)}
                    </select>
                  </div>
                  <button onClick={() => setShowAddProjectModal(true)} className="text-xs text-indigo-600 font-bold">＋ 案件追加</button>
                </div>

                <div className="flex flex-wrap gap-1 bg-slate-100 dark:bg-slate-955 p-1 rounded-xl text-[10px] font-bold border dark:border-slate-800">
                  <button type="button" onClick={() => setTaskFilter(p => ({ ...p, pending: !p.pending }))} className={`px-2 py-1 rounded-lg transition-all ${taskFilter.pending ? 'bg-white dark:bg-slate-700 shadow-xs border dark:border-slate-600' : 'text-slate-404 opacity-40'}`}>⚪ 未対応</button>
                  <button type="button" onClick={() => setTaskFilter(p => ({ ...p, in_progress: !p.in_progress }))} className={`px-2 py-1 rounded-lg transition-all ${taskFilter.in_progress ? 'bg-white dark:bg-slate-700 shadow-xs border dark:border-slate-600' : 'text-slate-404 opacity-40'}`}>🔵 進行中</button>
                  <button type="button" onClick={() => setTaskFilter(p => ({ ...p, completed: !p.completed }))} className={`px-2 py-1 rounded-lg transition-all ${taskFilter.completed ? 'bg-white dark:bg-slate-700 shadow-xs border dark:border-slate-600' : 'text-slate-404 opacity-40'}`}>🟢 完了</button>
                </div>
              </div>
            )}
          </div>

          {/* メインエリア */}
          <div className="flex-1 overflow-y-auto p-6 scrollbar-thin">
            {viewMode === 'board' && activeProject && (
              <div className="space-y-8">
                {stepList?.map((step, index) => (
                  <StepSection 
                    key={step.id}
                    step={step}
                    index={index}
                    taskFilter={taskFilter}
                    deptList={deptList}
                    onUpdateStep={handleUpdateStepInfo}
                    onDeleteStep={handleDeleteStepInfo}
                    onAddTask={handleAddTaskToStep}
                    onUpdateTask={updateNestedTask}
                    onDeleteTask={handleDeleteTaskInStep}
                  />
                ))}
              </div>
            )}

            {viewMode === 'database' && (
              <div className="bg-white dark:bg-slate-800 border rounded-3xl shadow-sm p-6 space-y-5 animate-in fade-in">
                <h2 className="text-base font-black">組織横断ポートフォリオデータベース</h2>
                <div className="flex flex-wrap gap-2 text-xs font-bold">
                  <select value={dbFilterFolderId} onChange={e=>setDbFilterFolderId(e.target.value)} className="border p-2 rounded-xl bg-transparent font-bold text-slate-805 dark:text-white bg-white dark:bg-slate-800"><option value="all">すべての分類</option>{folders?.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}</select>
                  <input type="text" placeholder="案件名やコードで検索..." value={dbFilterText} onChange={e=>setDbFilterText(e.target.value)} className="border p-2 rounded-xl bg-transparent min-w-[240px] text-slate-805 dark:text-white bg-white dark:bg-slate-800" />
                </div>
                <div className="overflow-x-auto rounded-2xl border dark:border-slate-700 shadow-sm">
                  <table className="w-full text-xs text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-55 dark:bg-slate-900 border-b dark:border-slate-700 font-black text-[10.5px]">
                        <th className="py-3 px-4">案件プロジェクト名称</th><th className="py-3 px-4">コード</th><th className="py-3 px-4">推進進捗率</th><th className="py-3 px-4 text-center">操作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y font-bold dark:divide-slate-700">
                      {projects?.filter(proj => {
                        if (dbFilterFolderId !== 'all' && proj.folderId !== dbFilterFolderId) return false;
                        if (dbFilterText.trim() !== '') { const lowerText = dbFilterText.toLowerCase(); if (!proj.name.toLowerCase().includes(lowerText) && !proj.code.toLowerCase().includes(lowerText)) return false; }
                        return true;
                      }).map(proj => (
                        <tr key={proj.id} className="hover:bg-slate-55/40 dark:hover:bg-slate-700/20">
                          <td className="py-3 px-4 text-sm">{proj.name}</td>
                          <td className="py-3 px-4 font-mono text-slate-404">{proj.code}</td>
                          <td className="py-3 px-4">{calculateProjectProgressById(proj)}%</td>
                          <td className="py-3 px-4 text-center"><button onClick={()=>handleOpenProjectFromDb(proj)} className="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 text-[11px] px-2.5 py-1 rounded-xl shadow-xs">開く</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {viewMode === 'analytics' && (
              <div className="space-y-6 animate-in fade-in">
                <h2 className="text-base font-black">有言実行グループ月次推進力マトリクス</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="bg-gradient-to-br from-indigo-600 to-indigo-700 text-white p-5 rounded-3xl flex flex-col justify-between h-24 shadow-md"><span className="text-[10px] font-bold opacity-80 uppercase tracking-wider">当月並行推進プロジェクト数</span><div className="text-2xl font-black font-mono leading-none">{projects?.length || 0} <span className="text-xs opacity-70">案件</span></div></div>
                  <div className="bg-white dark:bg-slate-800 p-5 rounded-3xl border flex flex-col justify-between h-24 dark:border-slate-700 shadow-2xs"><span className="text-[10px] font-bold text-slate-404 uppercase tracking-wider">全体推進達成率</span><div className="text-2xl font-black font-mono text-indigo-500 leading-none">{projectProgress}%</div></div>
                </div>
              </div>
            )}
          </div>

          {/* 設定モーダル */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-955/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4" onClick={() => setShowSettingsModal(false)}>
              <div className="bg-white dark:bg-slate-800 border rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[85vh] relative" onClick={e => e.stopPropagation()}>
                <h2 className="text-base font-black mb-4 text-slate-850 dark:text-white">システム環境マスタ設定</h2>
                <div className="flex-1 overflow-y-auto space-y-5 text-xs font-bold scrollbar-thin">
                  <div className="bg-slate-55 dark:bg-slate-900 p-4 rounded-2xl border border-slate-202 dark:border-slate-700 flex justify-between items-center gap-4">
                    <p className="text-[10px] text-slate-404 leading-normal">ローカルデータを全消去し、新設計の入れ子構造データに完全初期化します。</p>
                    <button type="button" onClick={() => { triggerConfirm('データ再生成', '初期データに上書きします。よろしいですか？', () => { setFolders(initialFolders); setDeptList(initialDepts); setProjects(initialProjects); localStorage.clear(); showAlert('データを完全初期化しました'); setShowSettingsModal(false); }); }} className="bg-purple-600 text-white px-4 py-2 rounded-xl font-black shadow-sm shrink-0">工場出荷状態に戻す</button>
                  </div>
                </div>
                <div className="pt-4 border-t dark:border-slate-700 flex justify-end">
                  <button type="button" onClick={() => setShowSettingsModal(false)} className="bg-slate-150 dark:bg-slate-700 text-slate-805 dark:text-slate-200 px-5 py-2.5 rounded-xl font-bold">閉じる</button>
                </div>
              </div>
            </div>
          )}

          {/* 案件追加モーダル */}
          {showAddProjectModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4" onClick={() => setShowAddProjectModal(false)}>
              <div className="bg-white dark:bg-slate-800 border rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4" onClick={e => e.stopPropagation()}>
                <form onSubmit={handleCreateProject} className="space-y-4 text-xs font-bold">
                  <div><label className="block mb-1">新規案件プロジェクト名称 *</label><input required type="text" value={newProjName} onChange={e => setNewProjName(e.target.value)} className="w-full border rounded-xl p-2.5 bg-white dark:bg-slate-900 text-slate-805 dark:text-white" placeholder="例: 【ECD】無料化プラン実装" /></div>
                  <div className="grid grid-cols-2 gap-2">
                    <div><label className="block mb-1">コード</label><input type="text" value={newProjCode} onChange={e => setNewProjCode(e.target.value)} className="w-full border rounded-xl p-2 bg-white dark:bg-slate-900 text-slate-805 dark:text-white font-mono" placeholder="ECD-2026" /></div>
                    <div><label className="block mb-1">フォルダ分類</label><select value={newProjFolderId} onChange={e => setNewProjFolderId(e.target.value)} className="w-full border rounded-xl p-2 bg-white dark:bg-slate-900 text-slate-805 dark:text-white">{folders?.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}</select></div>
                  </div>
                  <div className="flex justify-end gap-2"><button type="button" onClick={() => setShowAddProjectModal(false)} className="bg-slate-150 px-4 py-2 rounded-xl">キャンセル</button><button type="submit" className="bg-indigo-600 text-white px-5 py-2 rounded-xl">起票</button></div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
