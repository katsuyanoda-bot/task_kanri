        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = (maxWidth * height) / width;
              width = maxWidth;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (err) => reject(err);
      });

            textClass: colorClassesMap[dept.color]?.text || '',
            active: activeTasks.length,
            urgent,
            members
          };
        }).filter(d => d.active > 0 || d.members.length > 0); 

        return { deptStats, memberStats: Object.values(memberStats).sort((a, b) => b.total - a.total) };
      }, [analyticsTargetProjects, deptList]);

      // ④ 営業日ベースのリードタイム・ステップ密度分析（土日除外）
      const analyticsLeadTimeData = useMemo(() => {
        const stepStats = {};
        analyticsTargetProjects.forEach(p => {
          (p.stepList || []).forEach(step => {
            const tks = (p.tasks || []).filter(t => t.stepId === step.id && t.status !== 'not_applicable');
            
            let duration = 0;
            const startDates = tks.map(t => t.startedAt).filter(Boolean);
            const endDates = tks.map(t => t.completedAt).filter(Boolean);
            const isStepCompleted = tks.length > 0 && tks.every(t => t.status === 'completed');
            
            if (isStepCompleted) {
              if (startDates.length && endDates.length) {
                const minStart = startDates.reduce((a, b) => a < b ? a : b);
                const maxEnd = endDates.reduce((a, b) => a > b ? a : b);
                duration = getWorkingDaysDiff(minStart, maxEnd); // 実績営業日
              }
            } else {
              if (startDates.length) {
                const minStart = startDates.reduce((a, b) => a < b ? a : b);
                duration = getWorkingDaysDiff(minStart, TODAY_STR); // 本日までの経過営業日
              }
            }

            if (duration > 0 || tks.length > 0) {
              const name = step.name;
              if (!stepStats[name]) stepStats[name] = { totalDays: 0, count: 0, taskCount: 0 };
              if (duration > 0) {
                stepStats[name].totalDays += duration;
                stepStats[name].count += 1;
              }
              stepStats[name].taskCount += tks.length;
            }
          });
        });

        return Object.keys(stepStats).map(name => {
          const stat = stepStats[name];
          return {
            step: name,
            avg: stat.count > 0 ? Math.round((stat.totalDays / stat.count) * 10) / 10 : 0,
            taskCount: stat.taskCount,
            target: targetLeadTimeDays // ⑥ 設定画面の可変しきい値と連動
          };
        });
      }, [analyticsTargetProjects, targetLeadTimeDays]);

      // ⑤ 営業日対応の放置リスク・難航アラート抽出
      const analyticsRiskTasks = useMemo(() => {
        const risks = [];
        analyticsTargetProjects.forEach(p => {
          (p.tasks || []).forEach(t => {
            if (t.status === 'completed' || t.status === 'not_applicable') return;
            
            // A. 期限超過アラート
            if (isOverdue(t.dueDate, t.status)) {
              risks.push({ id: t.id, title: t.title, proj: p.name, type: '期限超過', desc: `期限: ${t.dueDate}`, badge: 'bg-amber-900/50 text-amber-400 border border-amber-500' });
              return;
            }
            // B. 炎上予兆 (コミュニケーションコスト過多)
            const logs = t.contextLogs || [];
            const hasHighlight = logs.some(l => l.isHighlighted);
            if (logs.length >= 6 || hasHighlight) {
              risks.push({ id: t.id, title: t.title, proj: p.name, type: '炎上予兆', desc: `メモ ${logs.length}件${hasHighlight ? ' (ピン留めあり)' : ''}`, badge: 'bg-rose-900/50 text-rose-400 border border-rose-500' });
              return;
            }
            // C. 放置リスク (営業日ベースの静止状態を監視)
            if (t.status === 'in_progress' && logs.length > 0) {
              const lastLogDateStr = logs[0].date.split(' ')[0].replace(/\//g, '-');
              const diffWDays = getWorkingDaysDiff(lastLogDateStr, TODAY_STR);
              if (diffWDays >= riskThresholdDays) { // ⑥ 設定画面の可変しきい値と連動
                 risks.push({ id: t.id, title: t.title, proj: p.name, type: '放置', desc: `${diffWDays}営業日更新なし`, badge: 'bg-slate-700 text-slate-300 border border-slate-500' });
              }
            }
          });
        });
        return risks;
      }, [analyticsTargetProjects, riskThresholdDays]);

// 前半で漏れていた関数の定義を追加（ReferenceErrorの完全解消）
      const handleDeleteProject = (e) => { 
        e.stopPropagation(); 
        if (activeProject) {
          handleDeleteProjectByList(activeProject.id, e); 
        }
      };

      // ==========================================
      // 未ログイン（Sansanメンバー認証前）画面
      // ==========================================
      if (!user) {
        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-955 flex flex-col items-center justify-center p-6 transition-colors duration-200">
            <div className="max-w-md w-full bg-white dark:bg-slate-900 rounded-3xl border border-slate-202 dark:border-slate-800 p-8 shadow-2xl text-center space-y-6 relative overflow-hidden">
              <div className="mx-auto bg-indigo-600 bg-gradient-to-tr from-indigo-700 to-purple-600 text-white w-16 h-16 rounded-2xl font-black text-2xl flex items-center justify-center shadow-lg">
                PL
              </div>
              <div className="space-y-2">
                <h1 className="text-xl font-black text-slate-905 dark:text-white leading-snug">Project Loom</h1>
                <p className="text-xs text-slate-505 dark:text-slate-404 font-bold">Sansanグループ案件推進専用ダッシュボード</p>
              </div>
              <hr className="border-slate-150 dark:border-slate-800" />
              <div className="bg-slate-55 dark:bg-slate-955/50 border border-slate-150 dark:border-slate-800 p-4 rounded-2xl text-left">
                <p className="text-xs text-slate-605 dark:text-slate-300 font-bold leading-relaxed">
                  本システムはSansan株式会社のセキュリティ統制下にある専用プロトタイプです。アクセスおよび閲覧には、認証情報が必要です。
                </p>
              </div>
              <div className="pt-2">
                <button 
                  onClick={() => handleMockLogin('member@sansan.com')}
                  className="w-full py-4 px-4 bg-indigo-600 hover:bg-indigo-700 text-white border border-indigo-700 rounded-2xl font-black text-xs flex items-center justify-center shadow-md hover:shadow-lg transition-all"
                >
                  <span className="mr-2">🔑</span>
                  <span>Sansan社員アカウントでサインイン</span>
                </button>
                <span className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mt-2 text-center">
                  (認証制限およびドメインエラー回避用)
                </span>
              </div>
            </div>
          </div>
        );
      }

      if (!isSansanUser) {
        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-955 flex flex-col items-center justify-center p-6 transition-colors duration-200">
            <div className="max-w-md w-full bg-white dark:bg-slate-900 rounded-3xl border border-rose-200 p-8 shadow-2xl text-center space-y-6">
              <div className="mx-auto p-4 bg-rose-55 border border-rose-150 rounded-full w-20 h-20 flex items-center justify-center text-rose-605">
                <IconWarning className="h-10 w-10" />
              </div>
              <h1 className="text-lg font-black text-rose-605">アクセス権限エラー</h1>
              <p className="text-xs text-slate-505">@sansan.com 以外のドメインです。</p>
              <button onClick={handleLogout} className="w-full py-2.5 bg-slate-150 rounded-xl font-bold text-xs">トップに戻る</button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-55 dark:bg-slate-955 text-slate-805 dark:text-slate-150 font-sans antialiased pb-16 transition-colors duration-200">
          
          {alertMessage && (
            <div className="fixed bottom-6 right-6 bg-slate-955/95 dark:bg-slate-805 text-white text-xs px-5 py-4 rounded-2xl shadow-2xl z-[100] whitespace-pre-wrap max-w-sm flex items-center gap-2 border border-slate-705 dark:border-slate-600 backdrop-blur-md animate-bounce">
              <IconInfo className="h-5 w-5 text-indigo-400 shrink-0" />
              <span className="font-bold leading-relaxed">{alertMessage}</span>
            </div>
          )}

          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95">
                <div className="flex items-center gap-3 pb-3 border-b border-slate-150 dark:border-slate-700 text-rose-605">
                  <div className="p-2 bg-rose-55 dark:bg-rose-900/30 rounded-2xl"><IconWarning className="h-6 w-6 text-rose-605 dark:text-rose-400" /></div>
                  <h3 className="font-extrabold text-sm text-slate-955 dark:text-white leading-tight">{confirmModal.title}</h3>
                </div>
                <p className="text-xs text-slate-505 dark:text-slate-455 whitespace-pre-line leading-relaxed">{confirmModal.message}</p>
                <div className="flex justify-end gap-2 px-1 pt-3 border-t border-slate-150 dark:border-slate-700 text-xs">
                  <button type="button" onClick={closeConfirm} className="bg-slate-150 dark:bg-slate-700 hover:bg-slate-202 dark:hover:bg-slate-600 text-slate-605 dark:text-slate-300 px-4 py-2.5 rounded-2xl font-bold transition-all">キャンセル</button>
                  <button type="button" onClick={confirmModal.onConfirm} className="bg-rose-605 hover:bg-rose-700 text-white px-5 py-2.5 rounded-2xl font-extrabold shadow-md transition-all">実行</button>
                </div>
              </div>
            </div>
          )}

          {lightboxImage && (
            <div className="fixed inset-0 bg-slate-955/90 z-[200] flex items-center justify-center p-4 cursor-zoom-out animate-in fade-in" onClick={() => setLightboxImage(null)}>
              <div className="absolute top-4 right-4 bg-white/20 hover:bg-white/30 text-white p-2.5 rounded-full transition-all cursor-pointer"><IconX className="h-6 w-6" /></div>
              <img src={lightboxImage} alt="preview" className="max-w-full max-h-full rounded-2xl shadow-2xl object-contain animate-in zoom-in-95" />
            </div>
          )}

          {/* 新規プロジェクト起票モーダル */}
          {showAddProjectModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-4 border-b border-slate-150 dark:border-slate-700/50 pb-3">
                  <h2 className="text-base font-black text-slate-805 dark:text-slate-150 flex items-center gap-2"><IconPlus className="text-indigo-600 dark:text-indigo-400" />新規プロジェクトの起票</h2>
                  <button onClick={() => setShowAddProjectModal(false)} className="text-slate-404 dark:text-slate-505 hover:bg-slate-150 dark:hover:bg-slate-700 p-1.5 rounded-lg transition-colors"><IconX className="h-5 w-5" /></button>
                </div>
                <form onSubmit={handleCreateProject} className="flex-1 overflow-y-auto pr-2 space-y-5 scrollbar-thin">
                  <div className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">所属フォルダ</label>
                        <select value={newProjFolderId} onChange={e => setNewProjFolderId(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 bg-white dark:bg-slate-800 text-xs font-bold text-slate-805 dark:text-slate-150 focus:outline-none focus:border-indigo-500">
                          {folders.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">初期ステータス</label>
                        <select value={newProjStatus} onChange={e => setNewProjStatus(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 bg-white dark:bg-slate-800 text-xs font-bold text-slate-805 dark:text-slate-150 focus:outline-none focus:border-indigo-500">
                          <option value="pending">未着手</option><option value="in_progress">進行中</option><option value="completed">完了</option>
                        </select>
                      </div>
                    </div>
                    <div>
                      <label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">プロジェクト名称 (必須)</label>
                      <input required type="text" value={newProjName} onChange={e => setNewProjName(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 bg-white dark:bg-slate-805 text-slate-805 dark:text-slate-150 text-sm font-bold focus:outline-none focus:border-indigo-500" placeholder="例: 【ECD】新機能要件定義" />
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div><label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">管理コード</label><input type="text" value={newProjCode} onChange={e => setNewProjCode(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 bg-white dark:bg-slate-808 text-slate-805 dark:text-slate-150 text-xs font-bold font-mono focus:outline-none focus:border-indigo-500" placeholder="例: PRJ-2026-01" /></div>
                      <div><label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">開始予定日</label><input type="date" value={newProjStart} onChange={e => setNewProjStart(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 font-mono bg-white dark:bg-slate-808 text-slate-805 dark:text-slate-150 text-xs font-bold focus:outline-none focus:border-indigo-500" /></div>
                      <div><label className="text-[10px] text-slate-404 dark:text-slate-505 font-bold block mb-1">目標完了日</label><input type="date" value={newProjEnd} onChange={e => setNewProjEnd(e.target.value)} className="w-full border border-slate-350 dark:border-slate-600 rounded-xl p-2.5 font-mono bg-white dark:bg-slate-808 text-slate-805 dark:text-slate-150 text-xs font-bold focus:outline-none focus:border-indigo-500" /></div>
                    </div>
                    
                    <div className="border-t border-slate-150 dark:border-slate-700/50 pt-3 mt-1 space-y-2">
                      <span className="text-[10px] font-bold text-slate-605 dark:text-slate-455 flex items-center gap-1"><IconLink className="h-3 w-3"/> プロジェクト関連リンク</span>
                      <div className="flex items-center gap-2">
                        <input type="text" placeholder="リンク名 (例: 要件定義書)" value={tmpProjLinkLabel} onChange={e => setTmpProjLinkLabel(e.target.value)} className="w-32 border border-slate-350 dark:border-slate-600 bg-white dark:bg-slate-955 rounded-xl p-2.5 text-xs text-slate-705 dark:text-slate-150 focus:outline-none" />
                        <input type="text" placeholder="URL (https://...)" value={tmpProjLinkUrl} onChange={e => setTmpLinkUrl(e.target.value)} className="flex-1 border border-slate-350 dark:border-slate-600 bg-white dark:bg-slate-955 rounded-xl p-2.5 text-xs text-slate-705 dark:text-slate-150 focus:outline-none" />
                        <button type="button" onClick={handleAddLinkToNewProj} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition-colors">追加</button>
                      </div>
                      {newProjLinks.length > 0 && (
                        <div className="flex flex-wrap gap-1.5 pt-1">
                          {newProjLinks.map(lnk => (
                            <span key={lnk.id} className="inline-flex items-center gap-1 text-[10px] bg-slate-150 dark:bg-slate-800 border border-slate-202 dark:border-slate-700 text-slate-605 dark:text-slate-300 px-2 py-0.5 rounded-lg font-bold"><IconLink className="h-2.5 w-2.5"/><span className="truncate max-w-[120px] ml-1">{lnk.label}</span><button type="button" onClick={(e) => handleRemoveLinkFromNewProj(lnk.id, e)} className="text-slate-404 hover:text-rose-605 font-bold text-[10px] ml-1">×</button></span>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                  <div className="flex justify-end gap-2 pt-4 border-t border-slate-150 dark:border-slate-700">
                    <button type="button" onClick={() => setShowAddProjectModal(false)} className="bg-slate-150 dark:bg-slate-700 hover:bg-slate-202 dark:hover:bg-slate-600 text-slate-605 dark:text-slate-300 px-5 py-2.5 rounded-2xl font-bold transition-colors">キャンセル</button>
                    <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-2xl font-bold shadow-md transition-colors">プロジェクトを起票</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <header className="bg-white/95 dark:bg-slate-955/95 border-b border-slate-202 dark:border-slate-700 sticky top-0 z-50 shadow-sm backdrop-blur-lg divide-y divide-slate-150 dark:divide-slate-800 transition-colors duration-200">
            <div className="px-6 py-3 flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 bg-gradient-to-tr from-indigo-700 to-purple-600 text-white p-2.5 rounded-2xl font-black text-sm leading-none">PL</div>
                <div>
                  <h1 className="text-xs font-black text-slate-955 dark:text-white leading-tight">Project Loom</h1>
                  <p className="text-[9px] text-slate-440 dark:text-slate-505 font-extrabold uppercase tracking-wider">
                    Sansan専用ダッシュボード 
                    {(!useFirebase || (gistToken && gistId)) && <span className="ml-1 text-emerald-600 dark:text-emerald-400 bg-emerald-55 dark:bg-emerald-900/30 px-1 py-0.5 rounded font-black text-[7.5px]">{(gistToken && gistId) ? 'GIST-SYNC' : 'LOCAL-STORE'}</span>}
                  </p>
                </div>
              </div>

              {/* 👥 パターンB: ヘッダー部分に独立した第3の「アナリティクス」切替タブを実装 */}
              <div className="flex bg-slate-150 dark:bg-slate-800 p-0.5 rounded-xl border border-slate-202 dark:border-slate-700 text-xs shadow-inner">
                <button onClick={() => setViewMode('board')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 ${viewMode === 'board' ? 'bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-300 shadow-sm' : 'text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white'}`}><IconCalendar className="h-3 w-3 text-indigo-500" /><span>📋 進行ダッシュボード</span></button>
                <button onClick={() => setViewMode('database')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 ${viewMode === 'database' ? 'bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-300 shadow-sm' : 'text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white'}`}><IconDatabase className="h-3 w-3 text-indigo-500" /><span>🗃️ データベース</span></button>
                <button onClick={() => setViewMode('analytics')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 ${viewMode === 'analytics' ? 'bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-300 shadow-sm' : 'text-slate-605 dark:text-slate-455 hover:text-slate-955 dark:hover:text-white'}`}><IconChart className="h-4 w-4 text-indigo-500" /><span>📊 アナリティクス</span></button>
              </div>

              <div className="flex items-center gap-3 shrink-0">
                {/* 🔥 今日やるタスク集約アコーディオンボタン */}
                <div className="relative shrink-0">
                  <button 
                    onClick={() => setShowTodayDropdown(!showTodayDropdown)} 
                    className={`flex items-center gap-1.5 text-[11px] font-black px-3.5 py-2 rounded-xl border transition-all shadow-xs ${activeTodayTasks.length > 0 ? 'bg-amber-500 dark:bg-amber-955 border-amber-500 dark:border-amber-700 text-white dark:text-amber-300 animate-pulse' : 'bg-slate-55 dark:bg-slate-800 border-slate-202 dark:border-slate-705 text-slate-605 dark:text-slate-300 hover:bg-slate-150'}`}
                  >
                    <span>🔥 今日やる</span>
                    {activeTodayTasks.length > 0 && (
                      <span className="bg-white text-amber-600 dark:bg-amber-900 dark:text-amber-200 text-[9px] px-1.5 py-0.5 rounded-full font-black font-mono">
                        {activeTodayTasks.length}
                      </span>
                    )}
                    {overdueTodayTasks.length > 0 && (
                      <span className="text-[10px] animate-bounce" title="本日中に完了していない期限超過タスクがあります！">🚨</span>
                    )}
                  </button>

                  {/* 今日やるタスク一覧ドロップダウン */}
                  {showTodayDropdown && (
                    <React.Fragment>
                      <div className="fixed inset-0 z-40" onClick={() => setShowTodayDropdown(false)}></div>
                      <div className="absolute top-full right-0 mt-2 w-80 bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-2xl shadow-xl z-50 flex flex-col max-h-[70vh]">
                        <div className="p-3 border-b border-slate-150 dark:border-slate-700 bg-slate-55 dark:bg-slate-955 flex justify-between items-center">
                          <span className="font-bold text-xs text-slate-705 dark:text-slate-300 flex items-center gap-1.5">🔥 今日やるタスク一覧</span>
                          {overdueTodayTasks.length > 0 && (
                            <span className="bg-rose-55 dark:bg-rose-900/30 text-rose-605 dark:text-rose-400 text-[9px] px-2 py-0.5 rounded-lg border border-rose-200 dark:border-rose-800 font-extrabold animate-pulse">
                              🚨 期限超過 {overdueTodayTasks.length}件
                            </span>
                          )}
                        </div>
                        <div className="overflow-y-auto p-3 space-y-2 bg-slate-55/30 dark:bg-slate-900/30 scrollbar-thin max-h-[50vh]">

                                >
                                  <div className="flex items-start justify-between gap-2">
                                    <button 
                                      onClick={() => {
                                        setShowTodayDropdown(false);
                                        setViewMode('board');

                            </div>

                      {!editingProject && (

                          <button onClick={() => { setShowAddStepForm(true); setNewStepName(''); setNewStepDesc(''); setNewStepStartDate(activeProject.startDate); setNewStepDueDate(activeProject.endDate); setNewStepLinks([]); setTmpStepLinkLabel(''); setTmpStepLinkUrl(''); setTimeout(() => document.getElementById('add-step-form')?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150); }} className="text-[10px] bg-indigo-600 hover:bg-indigo-700 text-white font-black flex items-center gap-1 px-3 py-2 rounded-xl"><IconPlus className="h-3 w-3" /> STEP追加</button>
                        </div>
                        <div className="relative w-full text-right">

                      <div className="flex justify-between items-center pb-3 border-b border-purple-100 dark:border-purple-800">

                            ))}
                          </div>
                        )}
                      </div>
                    </form>

                    const isCol = !!collapsedSteps[step.id];
                    const isEd = editingStepId === step.id;
                    const cClass = colorClassesMap[deptList.find(d => d.key === step.deptKey)?.color || 'slate'] || colorClassesMap.purple;

                    return (
                      <div key={step.id} id={`step-anchor-${step.id}`} draggable={!isEd} onDragStart={(e) => handleDragStart(index, e)} onDragOver={(e) => handleDragOver(index, e)} onDragEnd={handleDragEnd} className={`bg-white dark:bg-slate-800 rounded-3xl shadow-xs border-4 transition-all ${isCol ? 'border-slate-202 dark:border-slate-705' : cClass.borderStrong} ${draggedStepIndex === index ? 'drag-ghost' : ''}`}>

                                <input type="text" placeholder="URL" value={tmpEditStepLinkUrl} onChange={e => setTmpEditStepLinkUrl(e.target.value)} className="flex-1 border border-slate-202 dark:border-slate-75 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs focus:outline-none focus:border-purple-500 text-slate-705 dark:text-slate-200" />
                                <button type="button" onClick={handleAddLinkToEditStep} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition-colors">追加</button>
                              </div>
                              {editStepLinks.length > 0 && (
                                <div className="flex flex-wrap gap-2 pt-1">
                                  {editStepLinks.map(lnk => (
                                    <span key={lnk.id} className="inline-flex items-center gap-1.5 text-[11px] bg-purple-100 dark:bg-purple-900/40 text-purple-800 dark:text-purple-300 border border-purple-200 dark:border-purple-800 px-2.5 py-1 rounded-full font-bold shadow-xs"><IconLink className="h-3 w-3" /><span className="truncate max-w-[120px]">{lnk.label}</span><button type="button" onClick={(e) => handleRemoveLinkFromEditStep(lnk.id, e)} className="text-purple-450 hover:text-purple-850 dark:hover:text-purple-100 font-extrabold text-xs ml-1">×</button></span>
                                  ))}
                                </div>
                              )}
                            </div>
                          </div>

                          <div onClick={() => toggleStepCollapse(step.id)} className={`sticky top-[114px] z-20 p-4 border-b flex flex-col lg:flex-row justify-between gap-4 cursor-pointer border-slate-202 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-t-[20px] transition-all bg-opacity-95 dark:bg-opacity-95 backdrop-blur-sm ${isCol ? 'bg-white dark:bg-slate-800' : cClass.bg}`}>

                                  onDragStart={(e) => { e.preventDefault(); e.stopPropagation(); }}

                                  <button onClick={(e) => startEditingStep(step, e)} className="p-1.5 text-slate-404"><IconEdit2 className="h-3.5 w-3.5" /></button>
                                  <button onClick={(e) => handleDeleteStep(step.id, step.name, e)} className="p-1.5 text-slate-440"><IconTrash2 className="h-3.5 w-3.5" /></button>

                              <div className="flex flex-col gap-2 pl-8">

                                  className={`font-bold text-xs cursor-text select-text ${step.desc ? 'text-slate-606 dark:text-slate-3xl' : 'text-slate-404 dark:text-slate-505 italic'}`}

                                  onDragStart={(e) => { e.preventDefault(); e.stopPropagation(); }}

                                <div className="flex items-center gap-3 flex-wrap">
                                  {step.startDate && step.dueDate && <div className="flex items-center gap-1.5 text-[10.5px] text-slate-606 dark:text-slate-300 font-mono font-bold bg-white/80 dark:bg-slate-800/80 px-2.5 py-0.5 rounded-lg border dark:border-slate-700"><IconCalendar className="h-3 w-3" /><span>{step.startDate} 〜 {step.dueDate}</span></div>}
                                  {step.links && step.links.length > 0 && (
                                    <div className="flex items-center gap-1.5 flex-wrap" onClick={(e) => e.stopPropagation()}>

                                        <a key={lnk.id} href={lnk.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 text-[10.5px] bg-indigo-50 dark:bg-indigo-900/30 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 border border-indigo-200 dark:border-indigo-800 px-2.5 py-0.5 rounded-lg transition font-black shadow-xs">
                                          <IconExternalLink className="h-2.5 w-2.5" /><span>{lnk.label}</span>
                                        </a>
                                      ))}
                                    </div>
                                  )}
                                </div>
                              </div>
                            </div>

                              <div className="flex flex-wrap gap-1.5 items-center px-4 py-2 bg-slate-150/40 dark:bg-slate-900/40 rounded-2xl max-w-xl self-start border dark:border-slate-800" onClick={(e) => e.stopPropagation()}>
                                <span className="text-[9px] font-black text-slate-440 dark:text-slate-505 uppercase tracking-wider shrink-0 mr-1">タスク:</span>
                                {stepTksAll.map((t, tIdx) => {
                                  if (!taskFilter[t.status]) return null;
                                  const d = t.status === 'completed', w = t.status === 'in_progress', p = t.status === 'pending', na = t.status === 'not_applicable';
                                  const hw = (w || p) && t.isHighPriority;
                                  const isDraggingThisBadge = draggedTaskInfo && draggedTaskInfo.stepId === step.id && draggedTaskInfo.index === tIdx;
                                  return (
                                    <button 
                                      key={t.id} 
                                      draggable={editingTaskId !== t.id}
                                      onDragStart={(e) => handleTaskDragStart(step.id, tIdx, e)}
                                      onDragOver={(e) => handleTaskDragOver(step.id, tIdx, e)}
                                      onDragEnd={handleTaskDragEnd}
                                      onClick={() => { if(isCol) setCollapsedSteps(pr=>({...pr,[step.id]:false})); setCollapsedTasks(pr=>({...pr,[t.id]:false})); setTimeout(() => document.getElementById(`task-anchor-${t.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150); }} 
                                      className={`px-2 py-0.5 rounded-lg text-[10px] font-extrabold border flex items-center gap-1.5 shrink-0 cursor-grab active:cursor-grabbing hover:scale-105 active:scale-95 transition-all shadow-xs ${isDraggingThisBadge ? 'opacity-30 border-dashed border-indigo-400 dark:border-indigo-500' : ''} ${d ? 'bg-[#ecfdf5] dark:bg-[#132d24] border-emerald-200 text-emerald-700' : hw ? 'bg-rose-150 border-rose-400 text-rose-700 animate-pulse' : w ? 'bg-blue-50 border-blue-200 text-blue-700 animate-pulse' : na ? 'bg-slate-202 text-slate-505' : 'bg-white dark:bg-slate-800 border-slate-202 text-slate-606 dark:text-slate-300'}`}
                                    >
                                      <span>{d ? '✓' : w ? '⚡' : na ? '🚫' : '🔘'} #{index+1}-{tIdx+1}-<span className="font-black">{t.sequenceId || '?'}</span></span><span className="truncate max-w-[80px]">{t.title}</span>
                                    </button>
                                  );
                                })}
                              </div>
                            )}
                            
                            <div className="flex items-center gap-4 pl-8 lg:pl-0 shrink-0" onClick={(e) => e.stopPropagation()}>

                                  <span className="text-[10px] text-slate-404 font-extrabold uppercase">進捗</span>
                                  <div className="h-2 w-20 bg-slate-150 dark:bg-slate-700 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-indigo-500" style={{ width: `${stpProg}%` }}></div></div>

                                <div className="flex items-center gap-2 text-[9px] font-black bg-white/50 dark:bg-slate-900/50 px-2 py-0.5 rounded-lg border border-slate-202/50 dark:border-slate-707/50 shadow-xs">

                                <button onClick={(e) => { 
                                  e.stopPropagation(); 
                                  setAddingTaskStepId(step.id); 
                                  setNewTaskTitle(''); 
                                  setNewTaskDesc(''); 
                                  setNewTaskImages([]); 
                                  setNewTaskLinks([]); 
                                  setTmpTaskLinkLabel(''); 
                                  setTmpTaskLinkUrl(''); 
                                  const fb = deptList[0]?.key || 'backoffice'; 
                                  setNewTaskDept(fb); 
                                  setNewTaskAssignee(fb === 'backoffice' ? '自分 (事務)' : '担当者'); 

                                  setTimeout(() => {
                                    const formEl = document.getElementById(`add-task-form-${step.id}`);

                                      </div>

                                  </div>
                                  <div className="grid grid-cols-2 gap-3 self-start">
                                    <div><label className="block text-slate-440 font-bold mb-1">担当部署</label><select value={newTaskDept} onChange={e => { const dept = e.target.value; const found = deptList.find(d => d.key === dept); setNewTaskDept(dept); setNewTaskAssignee(dept === 'backoffice' ? '自分 (事務)' : (found ? `${found.label}担当` : '担当者')); }} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2 bg-white dark:bg-slate-900 text-slate-705 dark:text-slate-150 font-bold focus:outline-none">{deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}</select></div>

                                  </div>

                                        type="text"

                                        value={tmpTaskLinkLabel}

                                        className="w-full sm:w-1/3 border border-slate-202 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs text-slate-705 dark:text-slate-150 focus:outline-none focus:border-indigo-500"

                                        <input 
                                          type="text" 
                                          placeholder="URL (https://...)" 
                                          value={tmpTaskLinkUrl}

                                        <button 
                                          type="button" 
                                          onClick={handleAddLinkToNewTask}

                              {stepTksAll.map((task, taskIndex) => {
                                if (!taskFilter[task.status]) return null;

                                const d = task.status === 'completed', w = task.status === 'in_progress', p = task.status === 'pending', na = task.status === 'not_applicable';
                                const lt = isOverdue(task.dueDate, task.status), hw = (w || p) && task.isHighPriority;
                                const tkCls = colorClassesMap[deptList.find(dl => dl.key === task.department)?.color || 'slate'] || colorClassesMap.slate;
                                const logs = task.contextLogs ? [...task.contextLogs].sort((a, b) => b.date.localeCompare(a.date)) : [];
                                const tCol = collapsedTasks[task.id] !== undefined ? collapsedTasks[task.id] : (d || na);
                                const dDays = getDurationDays(task);
                                const isDraggingThisCard = draggedTaskInfo && draggedTaskInfo.stepId === step.id && draggedTaskInfo.index === taskIndex;

                                // 「今日やる」に設定されているかつ「未完了」かつ「期限超過（本日を過ぎている）」かどうかの判定
                                const isOverdueTodayTask = task.doToday && !d && !na && lt;

                                return (
                                  <div 
                                    key={task.id} 
                                    id={`task-anchor-${task.id}`} 
                                    draggable={editingTaskId !== task.id} 
                                    onDragStart={(e) => handleTaskDragStart(step.id, taskIndex, e)} 
                                    onDragOver={(e) => handleTaskDragOver(step.id, taskIndex, e)} 
                                    onDragEnd={handleTaskDragEnd} 
                                    onClick={() => toggleTaskCollapse(task.id)} 
                                    className={`group/task-card relative border-4 rounded-3xl p-4 flex flex-col justify-between overflow-hidden shadow-xs cursor-pointer ${isDraggingThisCard ? 'drag-ghost' : ''} ${
                                      d || na 
                                        ? 'border-slate-202 dark:border-slate-707/50 opacity-60 bg-slate-55/70 dark:bg-slate-800/40' 
                                        : isOverdueTodayTask
                                          ? 'border-rose-500 bg-rose-50/30 dark:bg-rose-950/20 ring-2 ring-rose-500 animate-pulse'
                                          : task.doToday
                                            ? 'border-amber-400 bg-amber-50/10 dark:bg-amber-955/10 ring-1 ring-amber-300'
                                            : hw 
                                              ? 'border-rose-500 dark:border-rose-600 bg-rose-55 dark:bg-rose-900/10 ring-2 ring-rose-200' 
                                              : task.isHighPriority 
                                                ? 'border-rose-400 bg-gradient-to-br from-rose-55/10 to-white dark:from-rose-900/10 dark:to-slate-800 ring-1 ring-rose-400/5' 
                                                : `${tkCls.borderStrong} bg-white dark:bg-slate-800`
                                    }`}
                                  >
                                    <div className="absolute top-3.5 right-3.5 flex flex-wrap justify-end items-center gap-1.5 z-10 max-w-[65%]" onClick={(e) => e.stopPropagation()}>

                                        <div className="flex items-center gap-1 mr-1 bg-white/90 dark:bg-slate-800/90 border border-slate-202 dark:border-slate-700 p-0.5 rounded-lg">

                                          <button onClick={(e) => { e.stopPropagation(); deleteTask(task.id); }} className="p-1 text-slate-440 hover:text-rose-605 rounded-md"><IconTrash2 className="h-3.5 w-3.5" /></button>
                                        </div>
                                      )}
                                      
                                      {/* 🔥 今日やるトグルボタン */}
                                      {(!d && !na) && (
                                        <button 
                                          onClick={(e) => { e.stopPropagation(); toggleDoToday(task.id); }} 
                                          className={`flex items-center gap-0.5 text-[9px] font-black px-2.5 py-1.5 rounded-xl border transition-all ${
                                            task.doToday 
                                              ? isOverdueTodayTask 
                                                ? 'bg-rose-600 text-white border-rose-700 shadow-md animate-bounce' 
                                                : 'bg-amber-500 text-white border-amber-600 shadow-md' 
                                              : 'bg-slate-55 dark:bg-slate-800 text-slate-605 dark:text-slate-300 border-slate-202 hover:bg-slate-150'
                                          }`}
                                        >
                                          <span>🔥 {task.doToday ? '今日やる中' : '今日やる'}</span>
                                        </button>
                                      )}

                                      <button onClick={(e) => { e.stopPropagation(); toggleTaskPriority(task.id); }} className={`flex items-center gap-0.5 text-[9px] font-black px-2.5 py-1.5 rounded-xl border ${task.isHighPriority ? 'bg-rose-500 text-white border-rose-600 shadow-md shadow-rose-100 dark:shadow-none' : 'bg-rose-55/70 dark:bg-rose-900/30 text-rose-605 dark:text-rose-400 border-rose-200'}`}><IconFlag className="h-2.5 w-2.5" />{task.isHighPriority ? '最優先' : '優先度'}</button>
                                      <select value={task.status} onClick={(e) => e.stopPropagation()} onChange={(e) => changeTaskStatus(task.id, e.target.value)} className={`text-[9px] font-black px-2.5 py-1.5 rounded-xl border cursor-pointer focus:outline-none ${d ? 'bg-emerald-500 text-white border-emerald-600 shadow-md shadow-emerald-100' : w ? 'bg-blue-500 text-white border-blue-600 shadow-md shadow-blue-100' : na ? 'bg-slate-400 text-white border-slate-500 shadow-md shadow-slate-200' : 'bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300 border-slate-202'}`}>
                                        <option value="pending" className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-150">🔘 未対応</option><option value="in_progress" className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-150">⚡ 進行中</option><option value="completed" className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-150">✅ 完了マーク</option><option value="not_applicable" className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-150">🚫 対応なし</option>
                                      </select>
                                      {editingTaskId !== task.id && <button onClick={(e) => { e.stopPropagation(); toggleTaskCollapse(task.id); }} className="p-1 text-slate-404 ml-0.5">{tCol ? <IconChevronRight className="h-4 w-4" /> : <IconChevronDown className="h-4 w-4" />}</button>}
                                    </div>

                                    {editingTaskId === task.id ? (
                                      <div className="space-y-3.5 text-xs w-full pl-1 pr-4 mt-6 animate-in fade-in" onClick={(e) => e.stopPropagation()}>
                                        <div className="flex justify-between items-center pb-3 border-b border-slate-202 dark:border-slate-700">
                                          <span className="font-extrabold text-indigo-600 dark:text-indigo-400 block">✏️ タスク編集 (# {index + 1}-{taskIndex + 1}-{task.sequenceId || '?'})</span>
                                          <div className="flex items-center gap-2">
                                            <button onClick={() => setEditingTaskId(null)} className="bg-slate-150 dark:bg-slate-800 text-slate-505 px-3 py-1.5 rounded-xl font-bold">戻る</button>
                                            <button onClick={() => saveEdit(task.id)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-xl font-bold transition-colors">保存</button>
                                          </div>
                                        </div>
                                        <input type="text" value={editFormData.title} onChange={e => setEditFormData({...editFormData, title: e.target.value})} className="w-full font-bold border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2.5 text-slate-705 dark:text-slate-150 focus:outline-none" placeholder="タスク名" />
                                        <textarea value={editFormData.description} onChange={e => setEditFormData({...editFormData, description: e.target.value})} onPaste={(e) => handlePasteOnTextInput(e, setEditTaskImages)} onDrop={(e) => handleDropOnTextInput(e, setEditTaskImages)} className="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2.5 min-h-[100px] text-slate-705 dark:text-slate-150 focus:outline-none" rows={3} placeholder="詳細や論点... (画像ペースト対応)" />
                                        {editTaskImages.length > 0 && (
                                          <div className="flex flex-wrap gap-2 p-2 bg-slate-55 dark:bg-slate-800 rounded-xl border">
                                            {editTaskImages.map((src, imgIdx) => (
                                              <div key={`edit-img-${imgIdx}`} className="relative w-12 h-12 rounded-lg overflow-hidden border">
                                                <img src={src} className="w-full h-full object-cover" /><button type="button" onClick={() => setEditTaskImages(prev => prev.filter((_, idx) => idx !== imgIdx))} className="absolute top-0.5 right-0.5 bg-slate-955/80 text-white rounded-full p-0.5"><IconX className="h-2.5 w-2.5" /></button>
                                              </div>
                                            ))}
                                          </div>
                                        )}
                                        <div className="grid grid-cols-3 gap-2">
                                          <div><label className="text-[10px] text-slate-440 font-bold block mb-0.5">担当部署</label><select value={editFormData.department} onChange={e => { const dk = e.target.value; const fnd = deptList.find(d => d.key === dk); setEditFormData({ ...editFormData, department: dk, assignee: dk === 'backoffice' ? '自分 (事務)' : (fnd ? `${fnd.label}担当` : '担当者') }); }} className="w-full border border-slate-300 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-900 text-slate-705 dark:text-slate-200">{deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}</select></div>
                                          <div><label className="text-[10px] text-slate-440 font-bold block mb-0.5">担当者名</label><input type="text" value={editFormData.assignee} onChange={e => setEditFormData({...editFormData, assignee: e.target.value})} className="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs text-slate-705 dark:text-slate-200 focus:outline-none" /></div>
                                          <div><label className="text-[10px] text-slate-440 font-bold block mb-0.5">完了期日</label><input type="date" value={editFormData.dueDate} onChange={e => setEditFormData({...editFormData, dueDate: e.target.value})} className="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs font-mono text-slate-705 dark:text-slate-200 focus:outline-none" /></div>
                                        </div>

                                        {/* タスク編集時の関連リンク (インデントと縮小・デザインブラッシュアップ) */}
                                        <div className="col-span-1 md:col-span-3 border-t border-slate-202 dark:border-slate-700/50 pt-3 mt-1 space-y-2 pl-4 border-l-2 border-slate-200 dark:border-slate-700 ml-1">
                                          <span className="text-[10px] font-black text-slate-606 dark:text-slate-455 flex items-center gap-1.5 uppercase tracking-wider">
                                            <IconLink className="h-3.5 w-3.5 text-indigo-500" />
                                            <span>関連リンクの編集</span>
                                          </span>
                                          <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 max-w-lg">
                                            <input 
                                              type="text" 
                                              placeholder="リンク名" 
                                              value={tmpEditTaskLinkLabel} 
                                              onChange={e => setTmpEditTaskLinkLabel(e.target.value)} 
                                              className="w-full sm:w-1/3 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs text-slate-705 dark:text-slate-200 focus:outline-none focus:border-indigo-500" 
                                            />
                                            <div className="flex-1 flex gap-1.5">
                                              <input 
                                                type="text" 
                                                placeholder="URL" 
                                                value={tmpEditTaskLinkUrl} 
                                                onChange={e => setTmpEditTaskLinkUrl(e.target.value)} 
                                                className="flex-1 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs text-slate-705 dark:text-slate-200 focus:outline-none focus:border-indigo-500" 
                                              />
                                              <button 
                                                type="button" 
                                                onClick={handleAddLinkToEditTask} 
                                                className="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white px-3 py-2 rounded-xl text-xs font-black transition-all flex items-center gap-1 shrink-0 shadow-sm"
                                                title="リンクを追加"
                                              >
                                                <IconPlus />
                                                <span>追加</span>
                                              </button>
                                            </div>
                                          </div>
                                          {editTaskLinks.length > 0 && (
                                            <div className="flex flex-wrap gap-1.5 pt-1">
                                              {editTaskLinks.map(lnk => (
                                                <span key={lnk.id} className="inline-flex items-center gap-1 text-[10px] bg-slate-150 dark:bg-slate-800 border border-slate-202 dark:border-slate-700 text-slate-605 dark:text-slate-300 px-2 py-0.5 rounded-lg font-bold"><IconLink className="h-2.5 w-2.5"/><span className="truncate max-w-[120px] ml-1">{lnk.label}</span><button type="button" onClick={(e) => handleRemoveLinkFromEditTask(lnk.id, e)} className="text-slate-404 hover:text-rose-605 font-bold text-[10px] ml-1">×</button></span>
                                              ))}
                                            </div>
                                          )}
                                        </div>
                                      </div>
                                    ) : (
                                      /* ① ✕ ② 開閉アコーディオン時も含めた文字被り解消版の縦幅押し下げレイアウト */
                                      <div className="space-y-3.5 flex-1 flex flex-col justify-between pl-1 mt-10">
                                        <div className="space-y-2.5">
                                          
                                          {/* ① タスクナンバーをカードの左上（top-4 left-4）に絶対配置 */}
                                          <span className="absolute top-4 left-4 text-[10px] px-2 py-0.5 rounded-lg font-mono font-bold bg-slate-150 dark:bg-slate-900 border border-slate-202 dark:border-slate-700 text-slate-805 dark:text-slate-200 select-none">
                                            #{index+1}-{taskIndex+1}-<span className="font-black">{task.sequenceId || '?'}</span>
                                          </span>

                                          {/* ② タスク名はボタンと被らない安全な下行（mt-10）かつフル幅で表示 */}
                                          <h4 
                                            className="font-extrabold text-sm text-slate-805 dark:text-slate-150 cursor-text select-text"
                                            onPointerDown={(e) => e.stopPropagation()} 
                                            onDragStart={(e) => { e.preventDefault(); e.stopPropagation(); }}
                                          >
                                            {task.title}
                                          </h4>

                                          {/* 営業日ベース（○営業日）で実稼働日数を出力 */}
                                          <div className="flex flex-wrap items-center gap-2 pt-0.5">
                                            <span className={`text-[9.5px] font-black px-2.5 py-0.5 rounded-full border ${tkCls.badge}`}>{deptList.find(d => d.key === task.department)?.label || '未設定'} : {task.assignee}</span>
                                            <div className="flex items-center gap-1 text-[10.5px] text-slate-440 font-mono font-bold"><IconCalendar /><span className={lt ? 'text-rose-605 dark:text-rose-400 font-black animate-pulse' : ''}>{task.dueDate}</span></div>
                                            {task.startedAt && <span className={`inline-flex items-center gap-1 text-[9px] font-black px-2.5 py-0.5 rounded-lg border ${d ? 'bg-emerald-55 text-emerald-700 border-emerald-200' : na ? 'bg-slate-150 text-slate-505 border-slate-202' : 'bg-blue-50 text-blue-700 border-blue-200 animate-pulse'}`}><IconClock className="h-2.5 w-2.5" /><span>{d ? `${task.startedAt} 〜 ${task.completedAt} (${dDays} 営業日)` : na ? `${task.startedAt} 〜 ${task.completedAt} (対応なし)` : `${task.startedAt} 着手 (${dDays} 営業日目)`}</span></span>}
                                          </div>

                                                  onClick={(e) => {
                                                    e.stopPropagation();

                                          </div>

                                        {task.links && task.links.length > 0 && (
                                          <div className="flex flex-wrap items-center gap-1.5 mt-2 pt-2 border-t border-slate-150 dark:border-slate-700/50" onClick={(e) => e.stopPropagation()}>
                                            <span className="text-[9px] font-bold text-slate-440 dark:text-slate-555 flex items-center gap-0.5"><IconLink className="h-2.5 w-2.5"/> 関連リンク:</span>

                                              <a key={lnk.id} href={lnk.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 text-[10px] bg-slate-55 dark:bg-slate-800 hover:bg-slate-150 dark:hover:bg-slate-700 text-slate-606 dark:text-slate-300 border border-slate-202 dark:border-slate-700 px-2 py-0.5 rounded-lg transition font-black shadow-xs">
                                                <IconExternalLink className="h-2.5 w-2.5" /><span>{lnk.label}</span>
                                              </a>

                                          </div>

                                        <div className="bg-slate-55 dark:bg-slate-900/40 border border-slate-202 dark:border-slate-700 rounded-2xl p-3 space-y-2.5 shadow-inner">

                                            <span className="text-[9.5px] font-black text-slate-440 dark:text-slate-555 flex items-center gap-1 select-none"><IconClock /> 時系列メモ</span>
                                            {addingLogTaskId !== task.id && !d && !na && (
                                              <div className="flex justify-center w-full pb-1">
                                                <button onClick={(e) => { e.stopPropagation(); setAddingLogTaskId(task.id); setNewLogText(''); setNewLogTo(''); setNewLogDueDate(''); setNewLogLinks([]); setNewLogImages([]); setTmpLinkLabel(''); setTmpLinkUrl(''); }} className="text-[10px] font-black text-indigo-600 dark:text-indigo-400 flex items-center gap-1 bg-indigo-50 dark:bg-indigo-900/20 hover:bg-indigo-100 dark:hover:bg-indigo-900/40 border border-indigo-200 dark:border-indigo-800/50 px-4 py-1.5 rounded-full transition-colors shadow-xs"><IconPlus className="h-3 w-3"/> メモを追記する</button>
                                              </div>
                                            )}
                                          </div>
                                          {addingLogTaskId === task.id && (
                                            <div className="bg-white dark:bg-slate-800 border border-indigo-200 dark:border-indigo-800/50 rounded-2xl p-3 space-y-3 text-xs shadow-md animate-in zoom-in-95">

                                                <span className="font-bold text-indigo-700 dark:text-indigo-400 flex items-center gap-1.5"><IconPlus className="h-3.5 w-3.5"/> メモの新規追記</span>
                                                <div className="flex items-center gap-2">
                                                  <button onClick={() => setAddingLogTaskId(null)} className="text-[9px] text-slate-440 dark:text-slate-550 hover:bg-slate-55 dark:hover:bg-slate-700 px-2.5 py-1.5 rounded-lg font-bold transition-colors">キャンセル</button>
                                                  <button onClick={() => addLog(task.id)} disabled={!newLogText.trim() && newLogImages.length === 0} className="text-[9px] bg-indigo-600 hover:bg-indigo-700 text-white px-3.5 py-1.5 rounded-lg font-black disabled:bg-slate-150 dark:disabled:bg-slate-700 disabled:text-slate-404 dark:disabled:text-slate-555 disabled:cursor-not-allowed transition-colors">保存する</button>
                                                </div>
                                              </div>
                                              <textarea value={newLogText} onChange={e => setNewLogText(e.target.value)} onPaste={(e) => handlePasteOnTextInput(e, setNewLogImages)} onDrop={(e) => handleDropOnTextInput(e, setNewLogImages)} placeholder="状況メモ... (画像対応)" className="w-full bg-slate-55 dark:bg-slate-900 border border-slate-202 dark:border-slate-700 rounded-xl p-2.5 text-xs text-slate-705 dark:text-slate-150 font-bold focus:outline-none focus:border-indigo-400 min-h-[80px]" rows={2.5} />
                                              {newLogImages.length > 0 && (

                                                    ))}
                                                  </div>
                                                )}
                                              </div>
                                            </div>

                                          <div className="space-y-2 max-h-[170px] overflow-y-auto pr-1 scrollbar-thin">

                                                  {isEdLog ? (
                                                    <div className="space-y-2.5 text-xs w-full bg-slate-55 dark:bg-slate-900/50 p-2.5 rounded-xl border border-slate-202 dark:border-slate-700">
                                                      <span className="font-bold text-[10px] text-indigo-600 block">✏️ インライン編集</span>
                                                      <textarea value={editLogText} onChange={e => setEditLogText(e.target.value)} onPaste={(e) => handlePasteOnTextInput(e, setEditLogImages)} onDrop={(e) => handleDropOnTextInput(e, setEditLogImages)} className="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-xl p-2 text-xs text-slate-705 dark:text-slate-200 font-bold min-h-[60px]" rows={2} />
                                                      <div className="flex justify-end gap-1.5 pt-1.5 border-t border-slate-202 dark:border-slate-700">

                                                        <button onClick={() => saveLogEdit(task.id, log.id)} disabled={!editLogText.trim() && editLogImages.length === 0} className="text-[9px] bg-indigo-600 text-white px-3 py-1 rounded font-bold">更新</button>
                                                      </div>
                                                    </div>
                                                  ) : (
                                                    <React.Fragment>
                                                      <div className="flex justify-between items-center border-b border-slate-150 dark:border-slate-707/50 pb-1">
                                                        <span className="text-[8px] font-mono text-slate-404 font-bold flex items-center gap-0.5"><IconClock /> {log.date}{log.isHighlighted && <span className="ml-1.5 bg-amber-100 text-amber-800 text-[7.5px] px-1.5 py-0.5 rounded font-bold">📌 重要</span>}</span>
                                                        <div className="flex items-center gap-1.5 bg-white/95 dark:bg-slate-800/95 border border-slate-202 dark:border-slate-700 rounded-lg p-0.5 absolute top-2 right-2">

                                                          <button onClick={() => toggleLogComplete(task.id, log.id)} className={`p-1 ${log.completed ? 'text-emerald-500' : 'text-slate-404 hover:text-emerald-600'}`}><IconCheck className="h-3 w-3" /></button>
                                                          <button onClick={() => deleteLog(task.id, log.id)} className="p-1 text-slate-404 hover:text-rose-605"><IconTrash2 className="h-3 w-3" /></button>
                                                        </div>
                                                      </div>
                                                      <div className="w-full pr-14 space-y-2">
                                                        <p 
                                                          className={`text-[11px] font-bold whitespace-pre-wrap cursor-text select-text ${log.completed ? 'line-through text-slate-404' : ''}`}
                                                          onPointerDown={(e) => e.stopPropagation()} 
                                                          onDragStart={(e) => { e.preventDefault(); e.stopPropagation(); }}
                                                        >
                                                          {log.text}
                                                        </p>
                                                        {log.attachedImages && log.attachedImages.length > 0 && (

                                                            ))}
                                                          </div>
                                                        )}
                                                      </div>
                                                      <div className="flex flex-wrap items-center gap-1.5 mt-0.5">
                                                        {log.to && (<span className="inline-flex items-center gap-1 text-[9px] bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 px-2 py-0.5 rounded-lg font-black">TO: {log.to}</span>)}
                                                        {log.dueDate && (<span className="inline-flex items-center gap-1 text-[9px] bg-rose-55 dark:bg-rose-900/30 text-rose-700 dark:text-rose-300 px-2 py-0.5 rounded-lg font-mono font-bold">期日: {log.dueDate}</span>)}
                                                        {log.links && log.links.map(lnk => (
                                                          <a key={lnk.id} href={lnk.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 text-[9px] bg-slate-150 dark:bg-slate-800 hover:bg-slate-202 dark:hover:bg-slate-700 border border-slate-202 dark:border-slate-700 text-slate-605 dark:text-slate-300 px-2 py-0.5 rounded-lg transition">
                                                            <IconExternalLink className="h-2.5 w-2.5" /> <span className="font-bold">{lnk.label}</span>
                                                            {!log.completed && (<button onClick={(e) => { e.preventDefault(); e.stopPropagation(); removeSingleLinkFromLog(task.id, log.id, lnk.id); }} className="text-slate-404 dark:text-slate-550 hover:text-rose-605 dark:hover:text-rose-400 font-bold text-[10px] ml-1" title="リンクのみ削除">×</button>)}
                                                          </a>
                                                        ))}
                                                      </div>
                                                    </React.Fragment>
                                                  )}
                                                </div>
                                              );
                                            }) : (<p className="text-[10px] text-slate-404 text-center py-4 bg-white dark:bg-slate-800 border border-dashed rounded-xl">履歴はありません</p>)}
                                          </div>
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </React.Fragment>
