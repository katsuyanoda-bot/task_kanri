                                  </div>
                                  <div>
                                    <label className="block text-[10px] text-slate-440 font-bold mb-1">担当部署</label>
                                    <select value={editStepDeptKey} onChange={e => setEditStepDeptKey(e.target.value)} className="w-full border p-2 rounded-xl bg-white dark:bg-slate-900 text-slate-805 dark:text-white font-bold">
                                      {deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}
                                    </select>
                                  </div>
                                  <div>
                                    <label className="block text-[10px] text-slate-404 font-bold mb-1">開始予定日</label>
                                    <input type="date" value={editStepStartDate} onChange={e => setEditStepStartDate(e.target.value)} className="w-full border p-2 rounded-xl bg-white dark:bg-slate-900 text-slate-805 dark:text-white font-mono" />
                                  </div>
                                  <div>
                                    <label className="block text-[10px] text-slate-404 font-bold mb-1">目標完了日</label>
                                    <input type="date" value={editStepDueDate} onChange={e => setEditStepDueDate(e.target.value)} className="w-full border p-2 rounded-xl bg-white dark:bg-slate-900 text-slate-805 dark:text-white font-mono" />
                                  </div>
                                  <div className="sm:col-span-2">
                                    <label className="block text-[10px] text-slate-404 font-bold mb-1">工程の説明・概要</label>
                                    <textarea value={editStepDesc} onChange={e => setEditStepDesc(e.target.value)} className="w-full border p-2 rounded-xl bg-white dark:bg-slate-900 text-slate-805 dark:text-white h-16" />
                                  </div>
                                </div>
                              </div>
                            ) : (
                              <div className={`p-4 border-b dark:border-slate-700 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 ${cClass.bg}`}>
                                <div className="flex items-center gap-3">
                                  {/* 💡 ドラッグハンドルUI */}
                                  <span className="cursor-grab hover:bg-white/50 p-1 rounded text-slate-404"><IconDragHandle /></span>
                                  <span className={`${cClass.bar} text-white font-black text-[10px] px-2.5 py-0.5 rounded shadow-xs cursor-pointer`} onClick={() => toggleStepCollapse(step.id)}>STEP {index + 1}</span>
                                  <h3 className="font-black text-sm text-slate-805 dark:text-slate-150 cursor-pointer" onClick={() => toggleStepCollapse(step.id)}>{step.name}</h3>
                                  
                                  {/* 💡 Stepヘッダーの情報追加（期間・担当部署） */}
                                  <span className="text-[10px] font-bold text-slate-550 dark:text-slate-440 font-mono hidden sm:inline-block border-l pl-2 dark:border-slate-600">📅 {step.startDate} 〜 {step.dueDate}</span>
                                  <span className={`text-[10px] font-black hidden sm:inline-block border px-1.5 py-0.5 rounded ${cClass.badge}`}>🏢 {deptList.find(d => d.key === step.deptKey)?.label || '未設定'}</span>
                                  
                                  {renderStepDeadlineBadge(step, stpProg)}
                                </div>
                                <div className="flex items-center gap-4 shrink-0">
                                  <div className="text-right mr-1"><div className="text-xs font-black text-slate-705 dark:text-slate-300">{stpProg}%</div></div>
                                  <button onClick={(e) => startEditingStep(step, e)} className="p-1.5 text-slate-404 hover:text-indigo-600" title="STEPを編集"><IconEdit2 className="h-4 w-4" /></button>
                                  <button onClick={(e) => handleDeleteStep(step.id, step.name, e)} className="p-1.5 text-slate-404 hover:text-rose-605" title="STEPを削除"><IconTrash2 className="h-4 w-4" /></button>
                                  <button onClick={() => { setAddingTaskStepId(step.id); setNewTaskTitle(''); setNewTaskDesc(''); setNewTaskImages([]); }} className="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-xl font-black"><IconPlus /> タスク追加</button>
                                  <button onClick={() => toggleStepCollapse(step.id)} className="text-slate-404 ml-1 cursor-pointer p-1">{isCol ? '▼' : '▲'}</button>
                                </div>
                              </div>
                            )}

                            {/* 下半分のタスクカード一覧 */}
                            {!isCol && (
                              <div className="bg-slate-55/20 dark:bg-slate-900/20 p-4 space-y-4">
                                {addingTaskStepId === step.id && (
                                  <form onSubmit={(e) => handleAddTask(step.id, e)} className="p-4 bg-slate-55 dark:bg-slate-900 border border-slate-202 dark:border-slate-700 rounded-2xl space-y-4 text-xs animate-in fade-in shadow-inner">
                                    <div className="flex justify-between items-center pb-2 border-b dark:border-slate-700">
                                      <span className="font-extrabold text-indigo-600 dark:text-indigo-404">➕ 新規タスクの追加</span>
                                      <div className="flex justify-end gap-2">
                                        <button type="button" onClick={() => { setAddingTaskStepId(null); setNewTaskImages([]); }} className="bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300 px-3 py-1.5 rounded-xl font-bold transition-colors">キャンセル</button>
                                        <button type="submit" className="bg-indigo-600 text-white px-4 py-1.5 rounded-xl font-bold shadow-md">追加する</button>
                                      </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                                      <div className="md:col-span-4">
                                        <label className="block text-[10px] text-slate-404 font-bold mb-1">タスク名 *</label>
                                        <input required type="text" placeholder="タスク名を入力..." value={newTaskTitle} onChange={e => setNewTaskTitle(e.target.value)} className="w-full p-2.5 border border-slate-202 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 text-slate-805 dark:text-white font-bold focus:outline-none focus:border-indigo-500" />
                                      </div>
                                      <div>
                                        <label className="block text-[10px] text-slate-404 font-bold mb-1">ボールを持っている部署</label>
                                        <select value={newTaskDept} onChange={e => setNewTaskDept(e.target.value)} className="w-full p-2.5 border border-slate-202 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 text-slate-805 dark:text-white font-bold focus:outline-none">
                                          {deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}
                                        </select>
                                      </div>
                                      <div>
                                        {/* 💡 やり取り相手（サジェスト機能付き自由入力） */}
                                        <label className="block text-[10px] text-slate-404 font-bold mb-1 flex items-center justify-between">
                                          <span>やり取り相手 (To)</span>
                                          <span className="text-[8px] font-normal text-slate-400">※自由入力可</span>
                                        </label>
                                        <input 
                                          type="text" 
                                          list={`user-suggest-new-${step.id}`} 
                                          placeholder="名前..." 
                                          value={newTaskInteractor} 
                                          onChange={e => setNewTaskInteractor(e.target.value)} 
                                          className="w-full p-2.5 border border-slate-202 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 text-slate-805 dark:text-white font-bold focus:outline-none focus:border-indigo-500" 
                                        />
                                        <datalist id={`user-suggest-new-${step.id}`}>
                                          <option value={user?.displayName || '自分'} />
                                          <option value="上司・決裁者" />
                                        </datalist>
                                      </div>
                                      <div>
                                        <label className="block text-[10px] text-slate-404 font-bold mb-1">期日</label>
                                        <input type="date" value={newTaskDueDate} onChange={e => setNewTaskDueDate(e.target.value)} className="w-full p-2.5 border border-slate-202 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 text-slate-805 dark:text-white font-mono font-bold focus:outline-none" />
                                      </div>
                                      <div>
                                        <label className="block text-[10px] text-slate-505 dark:text-slate-404 font-black mb-1">🧠 難易度（推進ウエイト）</label>
                                        <select value={newTaskLevel} onChange={e => setNewTaskLevel(Number(e.target.value))} className="w-full p-2.5 border border-slate-202 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 text-slate-805 dark:text-white font-bold text-xs focus:outline-none">
                                          <option value="1">🟢 セルフ完結型 (1pt)</option>
                                          <option value="2">🟡 スポット他部署型 (2pt)</option>
                                          <option value="4">🔴 マルチ他部署巻き込み型 (4pt)</option>
                                        </select>
                                      </div>
                                      <div className="md:col-span-4">
                                        <label className="block text-[10px] text-slate-404 font-bold mb-1 flex items-center justify-between">
                                          <span>詳細・備考 (クリップボードのスクショをそのままペーストで添付できます)</span>
                                        </label>
                                        <textarea 
                                          placeholder="詳細・備考を入力... (Ctrl+Vで画像を添付)" 
                                          value={newTaskDesc} 
                                          onChange={e => setNewTaskDesc(e.target.value)} 
                                          onPaste={e => handlePasteOnTextInput(e, setNewTaskImages)} 
                                          className="w-full p-2.5 border border-slate-202 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 text-slate-805 dark:text-white h-16 focus:outline-none focus:border-indigo-500" 
                                        />
                                        {newTaskImages.length > 0 && (
                                          <div className="flex flex-wrap gap-2 mt-2">
                                            {newTaskImages.map((img, i) => (
                                              <div key={i} className="relative group/img">
                                                <img src={img} className="h-10 w-10 object-cover rounded border border-slate-200 cursor-zoom-in" onClick={() => setLightboxImage(img)} />
                                                <button type="button" onClick={() => setNewTaskImages(p => p.filter((_, idx) => idx !== i))} className="absolute -top-1.5 -right-1.5 bg-rose-500 text-white rounded-full w-4 h-4 text-[10px] flex items-center justify-center shadow-md">×</button>
                                              </div>
                                            ))}
                                          </div>
                                        )}
                                      </div>
                                    </div>
                                  </form>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                  {stepTksAll.map((task, taskIndex) => {
                                    if (!taskFilter[task.status]) return null;
                                    const isEditingTask = editingTaskId === task.id;
                                    const isTaskCol = !!collapsedTaskDetails[task.id];
                                    const d = task.status === 'completed', na = task.status === 'not_applicable';
                                    const tkCls = colorClassesMap[deptList.find(dl => dl.key === task.department)?.color || 'slate'] || colorClassesMap.slate;
                                    const dDays = getDurationDays(task);

                                    return (
                                      <div 
                                        key={task.id} 
                                        id={`task-anchor-${task.id}`} 
                                        className={`relative border-4 rounded-3xl bg-white dark:bg-slate-800 shadow-sm flex flex-col transition-all ${d || na ? 'border-slate-202 opacity-60 bg-slate-55/40 dark:bg-slate-800/40' : task.doToday ? 'border-amber-400 bg-amber-50/10 ring-1 ring-amber-300' : task.isBlocked ? 'border-amber-500/80 ring-2 ring-amber-300 dark:ring-amber-900' : tkCls.borderStrong}`}
                                        /* 💡 ドラッグ＆ドロップ（タスク） */
                                        draggable
                                        onDragStart={(e) => handleTaskDragStart(step.id, taskIndex, e)}
                                        onDragOver={(e) => handleTaskDragOver(step.id, taskIndex, e)}
                                        onDragEnd={handleTaskDragEnd}
                                      >
                                        
                                        {isEditingTask ? (
                                          <div className="p-5 space-y-3 text-xs w-full animate-in fade-in" onClick={e => e.stopPropagation()}>
                                            <div className="flex justify-between items-center pb-2 border-b dark:border-slate-700">
                                              <span className="font-extrabold text-indigo-600 dark:text-indigo-404">✏️ タスク情報を編集</span>
                                              <div className="flex gap-2">
                                                <button type="button" onClick={() => setEditingTaskId(null)} className="bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300 px-3 py-1 rounded-xl font-bold">キャンセル</button>
                                                <button type="button" onClick={() => saveEdit(task.id)} className="bg-indigo-600 text-white px-4 py-1 rounded-xl font-bold">保存する</button>
                                              </div>
                                            </div>
                                            <div className="space-y-2">
                                              <div>
                                                <label className="block text-[10px] text-slate-404 font-bold mb-0.5">タスク名 *</label>
                                                <input required type="text" value={editFormData.title || ''} onChange={e => setEditFormData({...editFormData, title: e.target.value})} className="w-full p-2 border rounded-xl bg-slate-55 dark:bg-slate-900 font-bold text-slate-805 dark:text-white" />
                                              </div>
                                              <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                  <label className="block text-[10px] text-slate-404 font-bold mb-0.5 flex items-center justify-between">
                                                    <span>やり取り相手 (To)</span>
                                                  </label>
                                                  {/* 💡 編集用サジェスト機能（ID重複回避） */}
                                                  <input 
                                                    type="text" 
                                                    list={`user-suggest-edit-${task.id}`}
                                                    value={editFormData.interactor || ''} 
                                                    onChange={e => setEditFormData({...editFormData, interactor: e.target.value})} 
                                                    className="w-full p-2 border rounded-xl bg-slate-55 dark:bg-slate-900 font-bold text-slate-805 dark:text-white" 
                                                  />
                                                  <datalist id={`user-suggest-edit-${task.id}`}>
                                                    <option value={user?.displayName || '自分'} />
                                                    <option value="上司・決裁者" />
                                                  </datalist>
                                                </div>
                                                <div>
                                                  <label className="block text-[10px] text-slate-404 font-bold mb-0.5">期日</label>
                                                  <input type="date" value={editFormData.dueDate || ''} onChange={e => setEditFormData({...editFormData, dueDate: e.target.value})} className="w-full p-2 border rounded-xl bg-slate-55 dark:bg-slate-900 font-mono text-slate-805 dark:text-white" />
                                                </div>
                                              </div>
                                              <div>
                                                <label className="block text-[10px] text-slate-404 font-bold mb-0.5">難易度</label>
                                                <select value={editFormData.level || 1} onChange={e => setEditFormData({...editFormData, level: Number(e.target.value)})} className="w-full p-2 border rounded-xl bg-slate-55 dark:bg-slate-900 font-bold text-slate-805 dark:text-white text-xs">
                                                  <option value="1">🟢 1ポイント (セルフ完結)</option>
                                                  <option value="2">🟡 2ポイント (スポット他部署)</option>
                                                  <option value="4">🔴 4ポイント (マルチ他部署)</option>
                                                </select>
                                              </div>
                                            </div>
                                          </div>
                                        ) : (
                                          <div className="flex-1 flex flex-col justify-between">
                                            {/* ヘッダーエリア */}
                                            <div className="relative p-5 pb-3">
                                              <div className="absolute top-4 left-4 flex items-center gap-1.5 select-none">
                                                <span className="cursor-grab hover:bg-slate-100 dark:hover:bg-slate-700 p-0.5 rounded text-slate-404"><IconDragHandle /></span>
                                                <span className="text-[10px] px-2 py-0.5 rounded-lg font-mono font-bold bg-slate-150 dark:bg-slate-900 border border-slate-202 dark:border-slate-700 text-slate-805 dark:text-slate-200">
                                                  #{index+1}-{taskIndex+1}-{task.sequenceId || '?'}
                                                </span>
                                                <span className={`text-[9px] font-black px-1.5 py-0.5 rounded-md border ${task.level === 4 ? 'bg-rose-55 border-rose-200 text-rose-605' : task.level === 2 ? 'bg-amber-50 text-amber-500 border-amber-200' : 'bg-green-50 border-green-200 text-green-600'}`}>
                                                  {task.level === 4 ? '🔴 4pt' : task.level === 2 ? '🟡 2pt' : '🟢 1pt'}
                                                </span>
                                              </div>
                                              
                                              <div className="absolute top-3.5 right-3.5 flex items-center gap-1.5 z-10" onClick={e => e.stopPropagation()}>
                                                {task.status !== 'completed' && task.status !== 'not_applicable' && (
                                                  <button 
                                                    onClick={() => toggleTaskBlocked(task.id)} 
                                                    className={`text-[9px] font-black px-2 py-1.5 rounded-xl border transition-all ${task.isBlocked ? 'bg-amber-500 text-white border-amber-600 shadow-sm animate-pulse' : 'bg-slate-55 dark:bg-slate-700 text-slate-404 border-slate-202 dark:border-slate-600 hover:text-amber-500'}`}
                                                    title="他部署のレス待ち（保留トグル）"
                                                  >
                                                    ✋ {task.isBlocked ? '相手待ち中' : '相手待ち'}
                                                  </button>
                                                )}
                                                <button onClick={() => startEditing(task)} className="p-1.5 text-slate-404 hover:text-indigo-600" title="編集"><IconEdit2 className="h-3.5 w-3.5" /></button>
                                                <button onClick={() => toggleDoToday(task.id)} className={`text-[9px] font-black px-2 py-1.5 rounded-xl border transition-colors ${task.doToday ? 'bg-amber-500 text-white border-amber-600 shadow-md' : 'bg-slate-55 dark:bg-slate-700 text-slate-605 border-slate-202 dark:border-slate-600'}`}>🔥 {task.doToday ? '今日やる中' : '今日やる'}</button>
                                                <select value={task.status} onChange={(e) => changeTaskStatus(task.id, e.target.value)} className="text-[9px] font-black px-1.5 py-1 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-150 dark:bg-slate-800 text-slate-705 dark:text-slate-200 focus:outline-none">
                                                  <option value="pending">🔘 未対応</option><option value="in_progress">⚡ 進行中</option><option value="completed">✅ 完了する</option><option value="not_applicable">🚫 対応なし</option>
                                                </select>
                                                <button onClick={() => deleteTask(task.id)} className="text-slate-404 hover:text-rose-605 font-bold text-sm ml-1">×</button>
                                              </div>
                                              
                                              <div className="mt-8 space-y-2">
                                                <h4 className="font-extrabold text-sm text-slate-805 dark:text-slate-150 select-text leading-snug break-words">{task.title}</h4>
                                                <div className="flex flex-wrap items-center gap-2 text-[10px] font-bold text-slate-550 dark:text-slate-444">
                                                  <span className={`px-2 py-0.5 rounded border ${tkCls.badge}`}>{deptList.find(dl => dl.key === task.department)?.label || '未設定'} To: {task.interactor}</span>
                                                  <span className="font-mono bg-slate-55 dark:bg-slate-800 border dark:border-slate-700 px-1.5 py-0.5 rounded">⌛ 期日: {task.dueDate}</span>
                                                  {task.startedAt && <span className="font-mono text-indigo-600 dark:text-indigo-404 bg-indigo-50 dark:bg-indigo-900/30 px-1.5 py-0.5 rounded border dark:border-indigo-800">⏱️ {d ? `${task.startedAt} 〜 ${task.completedAt} (${dDays} 日)` : `${task.startedAt} 着手 (${dDays} 日)`}</span>}
                                                </div>
                                              </div>
                                            </div>

                                            {/* 💡 詳細部分の折りたたみ */}
                                            {!isTaskCol && (
                                              <div className="px-5 pb-5 space-y-3 flex-1 flex flex-col justify-end animate-in slide-in-from-top-2 duration-200">
                                                {/* 💡 危険なonBlurを廃止した「論点・備考」明示的保存UI */}
                                                <div className="relative group/desc space-y-1" onClick={e => e.stopPropagation()}>
                                                  <div className="text-[9.5px] font-bold text-slate-440 flex items-center justify-between">
                                                    <span><IconInfo className="inline h-3 w-3 mr-0.5" />論点・備考</span>
                                                    {editingDescTaskId === task.id && <span className="text-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 px-1 rounded border border-indigo-200 dark:border-indigo-700 animate-pulse">編集中 (Cmd/Ctrl+Enterで保存)</span>}
                                                  </div>
                                                  {editingDescTaskId === task.id ? (
                                                    <div className="relative">
                                                      <textarea 
                                                        value={tmpDescValue} 
                                                        onChange={e => setTmpDescValue(e.target.value)} 
                                                        onPaste={(e) => handlePasteOnTextInput(e, (newB64s) => {
                                                          const updatedTasks = tasks.map(t => t.id === task.id ? { ...t, attachedImages: [...(t.attachedImages || []), ...newB64s] } : t);
                                                          saveProjectToFirestore({ ...activeProject, tasks: updatedTasks });
                                                          showAlert('画像を添付しました');
                                                        })}
                                                        onKeyDown={(e) => { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') handleSaveDirectDesc(task.id); }}
                                                        className="w-full text-xs bg-white dark:bg-slate-900 border-2 border-indigo-500 rounded-xl p-2 pb-8 text-slate-805 dark:text-slate-200 min-h-[70px] focus:outline-none" 
                                                        autoFocus 
                                                      />
                                                      <div className="absolute bottom-2 right-2 flex gap-1">
                                                        <button onClick={() => setEditingDescTaskId(null)} className="px-2 py-1 bg-slate-150 dark:bg-slate-700 rounded-lg text-[9px] font-bold text-slate-605 dark:text-slate-300">取消</button>
                                                        <button onClick={() => handleSaveDirectDesc(task.id)} className="px-2 py-1 bg-indigo-600 text-white rounded-lg text-[9px] font-bold shadow-md">保存</button>
                                                      </div>
                                                    </div>
                                                  ) : (
                                                    <p onClick={() => { setEditingDescTaskId(task.id); setTmpDescValue(task.description || ''); }} className={`text-xs p-2.5 border rounded-2xl bg-slate-55 dark:bg-slate-900/40 border-slate-202 dark:border-slate-700 whitespace-pre-wrap cursor-text hover:border-indigo-400 dark:hover:border-indigo-500 transition-colors ${task.description ? 'text-slate-606 dark:text-slate-300' : 'text-slate-440 italic'}`}>
                                                      {task.description || '入力なし (クリックで編集 / Ctrl+Vで画像貼付)'}
                                                    </p>
                                                  )}

                                                  {/* 💡 画像サムネイル表示・削除UI */}
                                                  {task.attachedImages?.length > 0 && (
                                                    <div className="flex flex-wrap gap-2 mt-1.5 pt-1">
                                                      {task.attachedImages.map((img, i) => (
                                                        <div key={i} className="relative group/img">
                                                          <img src={img} className="h-10 w-10 object-cover rounded border border-slate-200 dark:border-slate-600 cursor-zoom-in shadow-sm hover:opacity-80 transition-opacity" onClick={() => setLightboxImage(img)} />
                                                          <button 
                                                            onClick={(e) => { 
                                                              e.stopPropagation(); 
                                                              triggerConfirm('画像削除', 'この画像を削除しますか？', () => {
                                                                const newImgs = [...(task.attachedImages || [])];
                                                                newImgs.splice(i, 1);
                                                                saveProjectToFirestore({ ...activeProject, tasks: tasks.map(t => t.id === task.id ? { ...t, attachedImages: newImgs } : t) });
                                                              });
                                                            }} 
                                                            className="absolute -top-1.5 -right-1.5 bg-rose-500 text-white rounded-full w-4 h-4 text-[10px] hidden group-hover/img:flex items-center justify-center shadow-md border border-white dark:border-slate-800"
                                                          >
                                                            ×
                                                          </button>
                                                        </div>
                                                      ))}
                                                    </div>
                                                  )}
                                                </div>

                                                {/* 交渉タイムライン・メモ */}
                                                <div className="border-t border-dashed dark:border-slate-700 pt-3 mt-2" onClick={e => e.stopPropagation()}>
                                                  <div className="flex items-center justify-between text-[10px] font-bold text-slate-440 mb-1.5"><span>📋 時系列メモ ({task.contextLogs?.length || 0})</span></div>
                                                  {task.contextLogs && task.contextLogs.length > 0 ? (
                                                    <div className="space-y-1.5 max-h-[100px] overflow-y-auto mb-2 pr-1 custom-scrollbar">
                                                      {task.contextLogs.map((log) => (
                                                        <div key={log.id} className={`p-2 rounded-xl text-[11px] border ${log.isHighlighted ? 'bg-amber-50 dark:bg-amber-900/20 border-amber-300 dark:border-amber-700 text-amber-900 dark:text-amber-200 shadow-sm' : log.isSystem ? 'bg-slate-55/60 dark:bg-slate-900/20 border-slate-150 dark:border-slate-700 text-slate-550 dark:text-slate-440' : 'bg-indigo-50/20 dark:bg-indigo-950/20 border-indigo-100/40 dark:border-indigo-800/50 text-slate-705 dark:text-slate-300'}`}>
                                                          <div className="flex justify-between text-[9px] font-mono opacity-60 mb-0.5 font-bold">
                                                            <span>{log.isSystem ? '🤖 システム' : log.isHighlighted ? '🚨 炎上・重要' : '👤 アクション'}</span>
                                                            <span>{log.date}</span>
                                                          </div>
                                                          <p className="whitespace-pre-wrap font-medium leading-relaxed">{log.text}</p>
                                                        </div>
                                                      ))}
                                                    </div>
                                                  ) : (
                                                    <p className="text-[10px] text-slate-440 italic mb-2 text-center py-2 bg-slate-55 dark:bg-slate-900/30 rounded-xl">ログはまだありません</p>
                                                  )}

                                                  <div className="flex gap-1.5 items-center">
                                                    <input 
                                                      type="text" 
                                                      placeholder="ラリーを追記... (★から始めると赤く保存)" 
                                                      id={`quick-log-input-${task.id}`}
                                                      onKeyDown={(e) => {
                                                        // 💡 IME変換中のEnterは無視する安全処理
                                                        if (e.nativeEvent.isComposing) return;
                                                        if (e.key === 'Enter' && e.target.value.trim()) {
                                                          const text = e.target.value.trim(); 
                                                          const dStr = getJSTDateTimeString();
                                                          
                                                          // 💡 ★・！コマンド自動検知
                                                          const isHigh = text.startsWith('★') || text.startsWith('!') || text.startsWith('☆');
                                                          
                                                          const newLog = { id: `manual_log_${Date.now()}`, date: dStr, text, isSystem: false, isHighlighted: isHigh };
                                                          const updatedTasks = tasks.map(t => t.id === task.id ? { ...t, contextLogs: [newLog, ...(t.contextLogs || [])] } : t);
                                                          saveProjectToFirestore({ ...activeProject, tasks: updatedTasks });
                                                          e.target.value = ''; showAlert('📝 メモを時系列に追記しました');
                                                        }
                                                      }}
                                                      className="flex-1 text-[11px] bg-slate-55 dark:bg-slate-900 border border-slate-202 dark:border-slate-600 rounded-xl px-2.5 py-1.5 font-medium text-slate-705 dark:text-slate-200 focus:outline-none focus:border-indigo-500 shadow-inner"
                                                    />
                                                    <span className="text-[9px] text-slate-404 font-bold bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded-lg border dark:border-slate-700">Enter</span>
                                                  </div>
                                                </div>
                                              </div>
                                            )}
                                            
                                            {/* 💡 折りたたみトグルボタン */}
                                            <div 
                                              onClick={(e) => { e.stopPropagation(); setCollapsedTaskDetails(p => ({ ...p, [task.id]: !p[task.id] })); }}
                                              className="bg-slate-100 dark:bg-slate-700/50 hover:bg-slate-202 dark:hover:bg-slate-700 text-slate-404 dark:text-slate-455 text-[9px] font-black text-center py-1.5 mt-auto cursor-pointer transition-colors select-none"
                                            >
                                              {isTaskCol ? '▼ 詳細・ログを開く' : '▲ 閉じる'}
                                            </div>
                                          </div>
                                        )}
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ) : (
                  <div className="text-center py-12 text-slate-404 font-bold">⚠️ プロジェクトを選択するか新規起票してください。</div>
                )}
              </React.Fragment>
            )}
            {/* ============================== */}
            {/* 2. 🗃️ データベースビュー       */}
            {/* ============================== */}
            {viewMode === 'database' && (
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl shadow-sm overflow-hidden p-6 space-y-5 animate-in fade-in transition-colors">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-202 dark:border-slate-700">
                  <div className="space-y-1">
                    <h2 className="text-base font-black text-slate-805 dark:text-white flex items-center gap-2"><IconDatabase className="text-indigo-600 dark:text-indigo-404" />案件横断データベース</h2>
                    <p className="text-xs text-slate-404 dark:text-slate-505">全プロジェクトの進捗・ヘルス状況を俯瞰します。</p>
                  </div>
                  <button onClick={() => { setNewProjFolderId(selectedFolderId); setShowAddProjectModal(true); }} className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-xs px-4.5 py-3 rounded-2xl flex items-center gap-1.5 shadow-sm transition-all"><IconPlus /> 新規案件を起票</button>
                </div>
                <div className="flex flex-col sm:flex-row gap-3 pt-1">
                  <select value={dbFilterFolderId} onChange={(e) => setDbFilterFolderId(e.target.value)} className="border border-slate-202 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-605 dark:text-slate-300 bg-slate-55 dark:bg-slate-900 focus:outline-none">
                    <option value="all">📁 すべてのフォルダ</option>{folders.map(f => (<option key={f.id} value={f.id}>📁 {f.name}</option>))}
                  </select>
                  <select value={dbFilterStatus} onChange={(e) => setDbFilterStatus(e.target.value)} className="border border-slate-202 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-605 dark:text-slate-300 bg-slate-55 dark:bg-slate-900 focus:outline-none">
                    <option value="all">🚥 すべての進捗状況</option><option value="pending">未着手</option><option value="in_progress">進行中</option><option value="completed">完了</option>
                  </select>
                  <div className="flex-1 relative">
                    <input type="text" placeholder="案件名やコードでリアルタイム検索..." value={dbFilterText} onChange={(e) => setDbFilterText(e.target.value)} className="w-full border border-slate-202 dark:border-slate-705 text-slate-705 dark:text-slate-200 font-bold bg-white dark:bg-slate-900 focus:outline-none rounded-xl p-2.5 text-xs shadow-inner" />
                  </div>
                </div>
                <div className="overflow-x-auto rounded-2xl border border-slate-202 dark:border-slate-700 shadow-xs">
                  <table className="w-full text-xs text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-55 dark:bg-slate-900 border-b border-slate-202 dark:border-slate-700 text-slate-605 dark:text-slate-440 font-black text-[10.5px] uppercase tracking-wider">
                        <th className="py-3 px-4 text-center w-28">状態</th><th className="py-3 px-4">フォルダ</th><th className="py-3 px-4">案件名</th><th className="py-3 px-4 w-32">コード</th><th className="py-3 px-4 w-44">期間</th><th className="py-2.5 px-4 text-center w-28">タスク</th><th className="py-3 px-4 w-40">進捗率</th><th className="py-3 px-4 w-36">状況</th><th className="py-3 px-4 text-center w-32">操作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-202 dark:divide-slate-700 font-bold">
                      {filteredDbProjects.map(proj => {
                        const prog = calculateProjectProgressById(proj), lates = countLateTasksByProject(proj);
                        const folderName = folders.find(f => f.id === proj.folderId)?.name || '未分類';
                        const { completed, inProgress, notStarted } = countTaskStatus(proj);
                        const statusObj = projectStatusOptions.find(o => o.value === (proj.status || 'pending'));
                        return (
                          <tr key={proj.id} className="hover:bg-slate-55/50 dark:hover:bg-slate-700/30 transition-colors">
                            <td className="py-3.5 px-4 text-center"><span className={`inline-flex items-center px-2.5 py-0.5 rounded-xl font-black text-[9.5px] border shadow-xs ${statusObj?.className}`}>{statusObj?.label}</span></td>
                            <td className="py-3.5 px-4 text-slate-550 dark:text-slate-455 truncate max-w-[120px]">{folderName}</td>
                            <td className="py-3.5 px-4 text-slate-955 dark:text-slate-100 text-sm max-w-xs truncate">{proj.name}</td>
                            <td className="py-3.5 px-4 font-mono text-slate-505 dark:text-slate-455 text-xs uppercase tracking-wider">{proj.code}</td>
                            <td className="py-3.5 px-4 font-mono text-slate-505 dark:text-slate-455 text-[11px]">{proj.startDate} 〜 {proj.endDate}</td>
                            <td className="py-2 px-4 align-middle">
                              <div className="flex flex-col gap-0.5 text-[9px] w-24 mx-auto font-mono leading-none">
                                <div className="flex justify-between items-center text-slate-505 bg-slate-55 dark:bg-slate-900/40 px-1.5 py-0.5 rounded border border-slate-150 dark:border-slate-700"><span>未対応</span><span>{notStarted}</span></div>
                                <div className="flex justify-between items-center text-blue-600 bg-blue-50 dark:bg-blue-900/20 px-1.5 py-0.5 rounded border border-blue-100 dark:border-blue-900/30"><span>進行中</span><span>{inProgress}</span></div>
                                <div className="flex justify-between items-center text-emerald-600 bg-emerald-55 dark:bg-emerald-900/20 px-1.5 py-0.5 rounded border border-emerald-100 dark:border-emerald-900/30"><span>完了</span><span>{completed}</span></div>
                              </div>
                            </td>
                            <td className="py-3.5 px-4">
                              <div className="flex items-center gap-2 min-w-[120px]"><div className="h-2 flex-1 bg-slate-150 dark:bg-slate-700 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-indigo-500" style={{ width: `${prog}%` }} /></div><span className="font-black font-mono text-indigo-600 dark:text-indigo-404 w-8 text-right">{prog}%</span></div>
                            </td>
                            <td className="py-3.5 px-4">
                              {lates > 0 ? <span className="inline-flex items-center gap-1 bg-rose-55 dark:bg-rose-900/30 text-rose-700 dark:text-rose-400 border border-rose-200 dark:border-rose-800 text-[9.5px] px-2.5 py-0.5 rounded-full shadow-sm animate-pulse">⚠️ 遅延 {lates}件</span> : <span className="inline-flex items-center gap-1 bg-emerald-55 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800 text-[9.5px] px-2.5 py-0.5 rounded-full shadow-xs">✅ 順調</span>}
                            </td>
                            <td className="py-3.5 px-4 text-center">
                              <div className="flex items-center justify-center gap-1.5">
                                <button onClick={() => handleOpenProjectFromDb(proj)} className="flex items-center gap-1 bg-indigo-50 dark:bg-indigo-900/30 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 border border-indigo-200 dark:border-indigo-800 font-black px-2.5 py-1.5 rounded-xl shadow-xs text-[11px] transition-colors"><IconEye className="h-3.5 w-3.5" /><span>開く</span></button>
                                <button onClick={(e) => handleDeleteProjectByList(proj.id, e)} className="text-slate-404 hover:text-rose-605 p-1.5 rounded-xl transition-all"><IconTrash2 className="h-4 w-4" /></button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ========================================================== */}
            {/* 3. 📊 【真・大改造】狙い撃ちアナリティクスビュー           */}
            {/* ========================================================== */}
            {viewMode === 'analytics' && (
              <div className="max-w-7xl mx-auto space-y-6 animate-in fade-in transition-colors">
                
                {/* 🎯 最上部：月次狙い撃ちフィルター・ヘッダーコントロール */}
                <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm flex flex-col xl:flex-row xl:items-center justify-between gap-6 border border-slate-202 dark:border-slate-700">
                  <div className="space-y-1">
                    <h2 className="text-base font-black text-slate-805 dark:text-white flex items-center gap-2"><IconChart className="text-indigo-600 dark:text-indigo-404" />月次推進馬力・ボトルネック分析</h2>
                    <p className="text-xs text-slate-505 dark:text-slate-440 font-medium">数量×レベル×期日を統合し、指定月の「推進実績」と「相手先別ボール滞留」を可視化します。</p>
                  </div>
                  
                  {/* ワンタップ実績コピー機能 */}
                  <div className="flex flex-wrap items-center gap-3">
                    <div className="flex items-center gap-2 bg-slate-55 dark:bg-slate-900 border border-slate-202 dark:border-slate-700 px-4 py-2.5 rounded-2xl shadow-inner">
                      <span className="text-[10px] font-black text-slate-404 uppercase tracking-wider">分析対象月:</span>
                      <input 
                        type="month" 
                        value={selectedMonth} 
                        onChange={(e) => { if(e.target.value) setSelectedMonth(e.target.value); }} 
                        className="bg-transparent text-xs font-black text-indigo-600 dark:text-indigo-404 focus:outline-none font-mono cursor-pointer"
                      />
                    </div>
                    <button 
                      onClick={() => {
                        const txt = `【${selectedMonth} 推進実績報告】\n🏆 獲得スコア: ${newAnalyticsData.summary.done}pt\n🔋 稼働総重量: ${newAnalyticsData.summary.total}pt\n✋ 他部署保留: ${newAnalyticsData.summary.blocked}pt\n📈 達成率: ${newAnalyticsData.summary.scoreProgress}%`;
                        if (navigator.clipboard) {
                          navigator.clipboard.writeText(txt).then(() => showAlert('📋 報告用テキストをクリップボードにコピーしました！'));
                        } else {
                          showAlert('⚠️ コピー機能がサポートされていません');
                        }
                      }}
                      className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-xs px-5 py-2.5 rounded-2xl shadow-sm transition-all flex items-center gap-1.5"
                    >
                      📋 報告テキストをコピー
                    </button>
                  </div>
                </div>

                {/* 🏆 指定月の推進力サマリーパネル */}
                <div className="grid grid-cols-1 sm:grid-cols-4 gap-4 animate-in zoom-in-95">
                  <div className="bg-gradient-to-br from-indigo-600 to-indigo-700 text-white p-5 rounded-3xl shadow-md border border-indigo-700 relative overflow-hidden flex flex-col justify-between h-28">
                    <span className="text-[10px] font-black tracking-wider uppercase opacity-80">🏆 当月獲得推進スコア</span>
                    <div className="text-2xl font-black font-mono leading-none flex items-baseline gap-1">{newAnalyticsData.summary.done} <span className="text-xs font-bold opacity-70">pt</span></div>
                    <div className="text-[9px] font-bold opacity-60">自己遅延による減算を反映済</div>
                  </div>
                  <div className="bg-white dark:bg-slate-800 p-5 rounded-3xl shadow-sm border dark:border-slate-700 flex flex-col justify-between h-28 transition-colors">
                    <span className="text-[10px] font-black text-slate-404 tracking-wider uppercase">📢 稼働タスク総重量</span>
                    <div className="text-2xl font-black font-mono text-slate-805 dark:text-white leading-none flex items-baseline gap-1">{newAnalyticsData.summary.total} <span className="text-xs font-bold text-slate-404">pt</span></div>
                    <div className="text-[9px] font-bold text-slate-440">過去から繰り越した手持ちを含む</div>
                  </div>
                  <div className="bg-white dark:bg-slate-800 p-5 rounded-3xl shadow-sm border dark:border-slate-700 flex flex-col justify-between h-28 transition-colors">
                    <span className="text-[10px] font-black text-slate-404 tracking-wider uppercase">✋ 他部署ブロック保留pt</span>
                    <div className="text-2xl font-black font-mono text-amber-505 leading-none flex items-baseline gap-1">{newAnalyticsData.summary.blocked} <span className="text-xs font-bold text-slate-404">pt</span></div>
                    <div className="text-[9px] font-bold text-slate-440">相手のレス待ちでスタック中</div>
                  </div>
                  <div className="bg-white dark:bg-slate-800 p-5 rounded-3xl shadow-sm border dark:border-slate-700 flex flex-col justify-between h-28 transition-colors">
                    <span className="text-[10px] font-black text-slate-404 tracking-wider uppercase">📈 推進目標達成率</span>
                    <div className="text-2xl font-black font-mono text-indigo-600 dark:text-indigo-404 leading-none">{newAnalyticsData.summary.scoreProgress}%</div>
                    <div className="w-full bg-slate-150 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden shadow-inner"><div className="bg-indigo-500 h-full" style={{ width: `${newAnalyticsData.summary.scoreProgress}%` }}></div></div>
                  </div>
                </div>

                {/* 分析ビュー内タブナビゲーション */}
                <div className="flex flex-wrap gap-1.5 bg-slate-150 dark:bg-slate-800 p-1 rounded-2xl border dark:border-slate-700 text-xs w-full shadow-inner">
                  <button onClick={() => setAnalyticsTab('resource')} className={`px-3 py-2 rounded-xl font-black transition-all ${analyticsTab === 'resource' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow-xs' : 'text-slate-550 dark:text-slate-400 hover:text-slate-955 dark:hover:text-white'}`}>🚥 ① ポートフォリオ</button>
                  <button onClick={() => setAnalyticsTab('interactor')} className={`px-3 py-2 rounded-xl font-black transition-all ${analyticsTab === 'interactor' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow-xs' : 'text-slate-550 dark:text-slate-400 hover:text-slate-955 dark:hover:text-white'}`}>👥 ② 相手先別 ボール滞留分析</button>
                  <button onClick={() => setAnalyticsTab('leadtime')} className={`px-3 py-2 rounded-xl font-black transition-all ${analyticsTab === 'leadtime' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow-xs' : 'text-slate-550 dark:text-slate-400 hover:text-slate-955 dark:hover:text-white'}`}>⏱️ ③ 工程別 リードタイム</button>
                  <button onClick={() => setAnalyticsTab('risk')} className={`px-3 py-2 rounded-xl font-black transition-all ${analyticsTab === 'risk' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow-xs' : 'text-slate-550 dark:text-slate-400 hover:text-slate-955 dark:hover:text-white'}`}>🚨 ④ ボトルネックアラート</button>
                </div>

                <div className="pt-2 animate-in fade-in duration-200">
                  
                  {/* ① 案件ポートフォリオ（並列俯瞰） */}
                  {analyticsTab === 'resource' && (
                    <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-5 shadow-sm space-y-4 transition-colors">
                      <div className="flex justify-between items-center"><h3 className="font-black text-slate-805 dark:text-white text-sm">🚥 走っている全案件の注力比率・進捗並列一覧 ({selectedMonth})</h3></div>
                      <div className="overflow-x-auto rounded-xl border dark:border-slate-700">
                        <table className="w-full text-xs text-left border-collapse">
                          <thead>
                            <tr className="bg-slate-55 dark:bg-slate-900 border-b dark:border-slate-700 text-slate-550 dark:text-slate-440 font-black text-[10px] uppercase tracking-wide">
                              <th className="py-2.5 px-4">プロジェクト名</th>
                              <th className="py-2.5 px-4 text-center">当月稼働タスク数</th>
                              <th className="py-2.5 px-4 text-center">総重要ウエイト</th>
                              <th className="py-2.5 px-4 text-center text-emerald-600">獲得推進スコア</th>
                              <th className="py-2.5 px-4 text-center text-amber-500">うち他部署ブロックpt</th>
                              <th className="py-2.5 px-4 text-center w-36">進捗率（ptベース）</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y dark:divide-slate-700 font-bold">
                            {newAnalyticsData.portfolioCard.map(p => (
                              <tr key={p.id} className={`hover:bg-slate-55/60 dark:hover:bg-slate-750 transition-colors ${currentProjectId === p.id ? 'bg-indigo-50/20 dark:bg-indigo-950/20' : ''}`}>
                                <td className="py-3 px-4 text-slate-805 dark:text-slate-200">
                                  <div className="flex flex-col">
                                    <span className="font-black">{p.name}</span>
                                    <span className="text-[9px] text-slate-404 font-mono uppercase tracking-wider">{p.code || 'NO-CODE'}</span>
                                  </div>
                                </td>
                                <td className="py-3 px-4 text-center font-mono text-slate-705 dark:text-slate-300">{p.totalTasks} 件</td>
                                <td className="py-3 px-4 text-center font-mono text-slate-705 dark:text-slate-300">{p.totalWeight} pt</td>
                                <td className="py-3 px-4 text-center font-mono text-emerald-600 dark:text-emerald-400">{p.doneWeight} pt</td>
                                <td className="py-3 px-4 text-center font-mono text-amber-500">{p.blockedWeight} pt</td>
                                <td className="py-3 px-4">
                                  <div className="flex items-center gap-2"><div className="h-1.5 flex-1 bg-slate-150 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-indigo-500" style={{ width: `${p.progressRate}%` }} /></div><span className="font-black font-mono text-indigo-600 dark:text-indigo-404 w-8 text-right text-[11px]">{p.progressRate}%</span></div>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {/* 💡 ② やり取り相手（ボトルネック）別 ボール滞留分析（新機能） */}
                  {analyticsTab === 'interactor' && (
                    <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-5 shadow-sm space-y-4 transition-colors">
                      <div className="flex justify-between items-center">
                        <div className="space-y-1">
                          <h3 className="font-black text-slate-805 dark:text-white text-sm">👥 やり取り相手（部署・人）別のボール滞留・ボトルネック分析 ({selectedMonth})</h3>
                          <p className="text-[11px] text-slate-505 dark:text-slate-440 font-bold">あなた（From）を中心として、現在誰のところにどれだけ重たいボールが滞留しているかを可視化します。</p>
                        </div>
                      </div>
                      <div className="overflow-x-auto rounded-xl border dark:border-slate-700">
                        <table className="w-full text-xs text-left border-collapse">
                          <thead>
                            <tr className="bg-slate-55 dark:bg-slate-900 border-b dark:border-slate-700 text-slate-550 dark:text-slate-440 font-black text-[10px] uppercase tracking-wide">
                              <th className="py-2.5 px-4 w-1/3">やり取り相手 (To)</th>
                              <th className="py-2.5 px-4 w-1/4">担当部署</th>
                              <th className="py-2.5 px-4 text-center text-slate-705 dark:text-slate-200">抱えている総ウエイト</th>
                              <th className="py-2.5 px-4 text-center text-amber-600 dark:text-amber-500">うち相手待ち(保留)ウエイト</th>
                              <th className="py-2.5 px-4 text-center text-rose-600 dark:text-rose-500">うち期限超過ウエイト</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y dark:divide-slate-700 font-bold">
                            {newAnalyticsData.interactorRows.length === 0 ? (
                              <tr><td colSpan="5" className="py-8 text-center text-slate-404 italic">当月の稼働データがありません。</td></tr>
                            ) : (
                              newAnalyticsData.interactorRows.map(row => {
                                const isSelf = row.name === user?.displayName || row.name === '自分';
                                const dClass = colorClassesMap[deptList.find(d => d.key === row.deptKey)?.color || 'slate'] || colorClassesMap.slate;
                                return (
                                  <tr key={row.name} className={`hover:bg-slate-55/60 dark:hover:bg-slate-750 transition-colors ${isSelf ? 'bg-indigo-50/10 dark:bg-indigo-900/10' : ''}`}>
                                    <td className="py-3 px-4 text-slate-805 dark:text-slate-150 font-black text-sm flex items-center gap-2">
                                      {isSelf ? '👤' : '🏢'} {row.name} {isSelf && <span className="text-[9px] bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded ml-1">You</span>}
                                    </td>
                                    <td className="py-3 px-4"><span className={`px-2 py-0.5 rounded-lg border text-[10px] ${dClass.badge}`}>{deptList.find(d => d.key === row.deptKey)?.label || '未設定'}</span></td>
                                    <td className="py-3 px-4 text-center font-mono text-slate-705 dark:text-slate-300 text-sm">{row.total} pt</td>
                                    <td className="py-3 px-4 text-center font-mono text-amber-600 dark:text-amber-500">{row.blocked > 0 ? `${row.blocked} pt` : '-'}</td>
                                    <td className="py-3 px-4 text-center font-mono text-rose-600 dark:text-rose-400">{row.overdue > 0 ? <span className="animate-pulse">🚨 {row.overdue} pt</span> : '-'}</td>
                                  </tr>
                                );
                              })
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {/* ③ 案件ディープダイブ（個別消費日数・ボトルネック工程の振り返り） */}
                  {analyticsTab === 'leadtime' && (
                    <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 shadow-sm space-y-6 transition-colors">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 border-b dark:border-slate-700 pb-3">
                        <div className="space-y-0.5">
                          <h3 className="font-black text-slate-805 dark:text-white text-sm">⏱️ 工程（大ステップ）別の平均消費日数分析</h3>
                          <p className="text-[11px] text-slate-404 font-bold">現在ヘッダーで選択中の案件：<span className="text-indigo-600 dark:text-indigo-404">{activeProject?.name || 'なし'}</span> の{selectedMonth}内実績</p>
                        </div>
                        <span className="text-[10px] bg-slate-150 dark:bg-slate-700 text-slate-605 dark:text-slate-300 px-3 py-1 rounded-xl font-black font-mono uppercase tracking-wider">営業リードタイム (保留日数除外済)</span>
                      </div>
                      <div className="space-y-5">
                        {newAnalyticsData.deepDiveSteps.length > 0 ? newAnalyticsData.deepDiveSteps.map(d => {
                          const isOver = d.avgDays > d.target;
                          return (
                            <div key={d.stepName} className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 border-b border-slate-55 dark:border-slate-700/40 pb-3 font-bold">
                              <div className="sm:w-48 text-xs text-slate-705 dark:text-slate-200 truncate" title={d.stepName}>{d.stepName}</div>
                              <div className="flex-1 h-4 bg-slate-100 dark:bg-slate-900 rounded-xl overflow-hidden relative border dark:border-slate-700 shadow-inner flex items-center">
                                <div className="absolute top-0 bottom-0 border-r-2 border-dashed border-slate-404 dark:border-slate-500 z-10" style={{ left: `${Math.min((d.target / 15) * 100, 100)}%` }}></div>
                                <div className={`h-full ${isOver ? 'bg-gradient-to-r from-rose-500 to-pink-500' : 'bg-gradient-to-r from-emerald-500 to-teal-500'}`} style={{ width: `${Math.min((d.avgDays / 15) * 100, 100)}%` }}></div>
                              </div>
                              <div className="sm:w-40 text-xs flex justify-between sm:justify-end gap-4 shrink-0 font-mono text-[11px]">
                                <span className={isOver ? 'text-rose-605 dark:text-rose-400 font-black' : 'text-emerald-600 dark:text-emerald-404 font-black'}>実績 {d.avgDays} 日</span>
                                <span className="text-slate-404">(目標: {d.target}日)</span>
                              </div>
                            </div>
                          );
                        }) : (
                          <div className="py-12 text-center text-slate-404 border border-dashed border-slate-300 dark:border-slate-700 rounded-2xl italic text-xs">選ばれた月に完了した工程データがまだありません。</div>
                        )}
                      </div>
                    </div>
                  )}

                  {/* ④ ボトルネックアラート */}
                  {analyticsTab === 'risk' && (
                    <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 shadow-sm space-y-4 transition-colors">
                      <h3 className="font-black text-slate-805 dark:text-white text-sm">🚨 {selectedMonth} の組織推進ボトルネック・放置タスク検知</h3>
                      {newAnalyticsData.monthRisks.length === 0 ? (
                        <div className="py-12 text-center text-emerald-600 font-bold border border-dashed border-emerald-200 dark:border-emerald-900 rounded-2xl bg-emerald-55/30 dark:bg-emerald-900/10 text-xs">
                          🎉 今月、滞っている他部署ラリーや期限超過タスクはありません。順調です。
                        </div>
                      ) : (
                        <div className="overflow-x-auto rounded-xl border dark:border-slate-700">
                          <table className="w-full text-xs text-left border-collapse">
                            <thead>
                              <tr className="bg-slate-55 dark:bg-slate-900 border-b dark:border-slate-700 text-slate-550 dark:text-slate-404 font-black text-[10px] uppercase tracking-wide">
                                <th className="py-2.5 px-4 w-32 text-center">シグナル</th>
                                <th className="py-2.5 px-4">難航タスク名</th>
                                <th className="py-2.5 px-4">所属プロジェクト</th>
                                <th className="py-2.5 px-4">状況・理由</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y dark:divide-slate-700 font-bold">
                              {newAnalyticsData.monthRisks.map(r => (
                                <tr key={r.id} className="hover:bg-slate-55/60 dark:hover:bg-slate-750 transition-colors">
                                  <td className="py-3 px-4 text-center"><span className={`px-2.5 py-0.5 rounded-xl text-[9px] font-black border ${r.badge}`}>{r.type}</span></td>
                                  <td className="py-3 px-4 text-slate-805 dark:text-slate-200">{r.title}</td>
                                  <td className="py-3 px-4 text-slate-404 font-medium truncate max-w-[160px]">{r.proj}</td>
                                  <td className="py-3 px-4 font-mono text-rose-605 dark:text-rose-400 text-[11px]">{r.desc}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      )}
                    </div>
                  )}
                </div>

              </div>
            )}
          </main>

          {/* 大分類フォルダ追加モーダル */}
          {showAddFolderModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95">
                <div className="flex justify-between items-center pb-3 border-b border-slate-150 dark:border-slate-700/50">
                  <h3 className="font-extrabold text-sm text-slate-955 dark:text-white flex items-center gap-1.5"><IconFolder className="h-4 w-4 text-indigo-600 dark:text-indigo-404" />大分類フォルダの追加</h3>
                  <button onClick={() => setShowAddFolderModal(false)} className="text-slate-404 hover:text-slate-605 dark:hover:text-slate-300 p-1"><IconX className="h-5 w-5" /></button>
                </div>
                <form onSubmit={handleCreateFolder} className="space-y-4 text-xs font-bold">
                  <div>
                    <label className="block text-[10px] font-bold text-slate-605 dark:text-slate-440 mb-1">フォルダ名 (必須)</label>
                    <input required type="text" value={newFolderName} onChange={e => setNewFolderName(e.target.value)} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2.5 bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200 focus:outline-none focus:border-indigo-400" placeholder="例: 新商品設計（ECD）" />
                  </div>
                  <div className="flex justify-end gap-2 pt-2">
                    <button type="button" onClick={() => setShowAddFolderModal(false)} className="bg-slate-150 dark:bg-slate-700 text-slate-605 dark:text-slate-300 px-4 py-2 rounded-xl font-bold">キャンセル</button>
                    <button type="submit" className="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold shadow-md">作成</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* マスタ設定モーダル */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-base font-black text-slate-805 dark:text-slate-100 flex items-center gap-2"><IconSettings className="h-5 w-5 text-indigo-600 dark:text-indigo-400" />システム設定コックピット</h2>
                  <button onClick={() => { setShowSettingsModal(false); setTmpGistToken(gistToken); setTmpGistId(gistId); }} className="text-slate-404 dark:text-slate-505 hover:bg-slate-150 dark:hover:bg-slate-700 p-1.5 rounded-lg transition-colors"><IconX className="h-5 w-5" /></button>
                </div>
                <div className="flex-1 overflow-y-auto pr-2 space-y-6 scrollbar-thin">
                  
                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-605 dark:text-slate-440 border-b border-slate-202 dark:border-slate-700 pb-2 flex items-center gap-1.5">☁️ クラウド同期 (GitHub Gist バックアップ)</h3>
                    <div className="bg-slate-55 dark:bg-slate-900/50 p-4 rounded-2xl border border-slate-202 dark:border-slate-700 shadow-sm space-y-3 font-bold">
                      <p className="text-[10px] text-slate-550 dark:text-slate-455">TokenとGist IDを設定すると同期・バックアップします。</p>
                      <div className="space-y-2">
                        <div>
                          <label className="block text-[10px] text-slate-605 dark:text-slate-440 mb-1">GitHub Personal Access Token</label>
                          <input type="password" value={tmpGistToken} onChange={e => setTmpGistToken(e.target.value)} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200 focus:outline-none" placeholder="ghp_xxxxxxxxxxxx" />
                        </div>
                        <div>
                          <label className="block text-[10px] text-slate-605 dark:text-amber-404 mb-1">Gist ID</label>
                          <input type="text" value={tmpGistId} onChange={e => setTmpGistId(e.target.value)} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200 focus:outline-none font-mono" placeholder="1a2b3c4d5e6f7g8h9i0j" />
                        </div>
                      </div>
                      <div className="flex justify-end pt-1">
                        <button onClick={saveGistSettings} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md">保存して接続</button>
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-605 dark:text-slate-440 border-b border-slate-202 dark:border-slate-700 pb-2">📊 アナリティクス目標しきい値設定</h3>
                    <div className="grid grid-cols-2 gap-4 bg-slate-55 dark:bg-slate-900/50 p-4 rounded-2xl border border-slate-202 dark:border-slate-700 shadow-sm font-bold">
                      <div>
                        <label className="block text-[10px] text-slate-605 dark:text-slate-440 mb-1">放置リスクアラート（判定日数）</label>
                        <input type="number" value={riskStaleDays} onChange={e => setRiskStaleDays(Number(e.target.value))} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-805 dark:text-white focus:outline-none font-bold font-mono" min="1" />
                      </div>
                      <div>
                        <label className="block text-[10px] text-slate-605 dark:text-slate-440 mb-1">大ステップ目標処理日数（基準）</label>
                        <input type="number" value={targetLeadTime} onChange={e => setTargetLeadTime(Number(e.target.value))} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-805 dark:text-white focus:outline-none font-bold font-mono" min="1" />
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-605 dark:text-slate-440 border-b border-slate-202 dark:border-slate-700 pb-2">👥 担当部署・カラーマスタの管理</h3>
                    <div className="space-y-2.5">
                      {deptList.map((dept, idx) => (
                        <div key={dept.key} className="flex items-center gap-2 bg-slate-55 dark:bg-slate-900/50 p-2.5 rounded-2xl border border-slate-202 dark:border-slate-700 shadow-sm group">
                          <div className="flex flex-col gap-0.5">
                            <button onClick={() => moveDeptOrder(idx, -1)} disabled={idx === 0} className={`p-0.5 rounded ${idx === 0 ? 'opacity-30' : 'hover:bg-indigo-100 text-slate-404'}`}><IconArrowUp /></button>
                            <button onClick={() => moveDeptOrder(idx, 1)} disabled={idx === deptList.length - 1} className={`p-0.5 rounded ${idx === deptList.length - 1 ? 'opacity-30' : 'hover:bg-indigo-100 text-slate-404'}`}><IconArrowDown /></button>
                          </div>
                          <input type="text" value={dept.label} onChange={(e) => handleRenameDeptChange(dept.key, e.target.value)} onBlur={() => handleRenameDeptSave(dept.key)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-xl p-2 text-slate-805 dark:text-slate-200 focus:outline-none" />
                          <select value={dept.color} onChange={(e) => updateDeptColorSetting(dept.key, e.target.value)} className={`text-xs font-bold rounded-xl p-2 border border-slate-300 dark:border-slate-600 focus:outline-none ${colorClassesMap[dept.color]?.badge || 'bg-white'}`}>
                            {Object.keys(colorClassesMap).map(c => <option key={c} value={c} className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200">{c}色</option>)}
                          </select>
                          <button onClick={() => handleDeleteDept(dept.key)} className="p-2 text-slate-404 hover:text-rose-605 rounded-xl ml-1"><IconTrash2 className="h-4 w-4" /></button>
                        </div>
                      ))}
                    </div>
                    <form onSubmit={handleCreateDept} className="flex items-center gap-2 mt-4 bg-indigo-50/50 dark:bg-indigo-900/20 p-3 rounded-2xl border border-indigo-100 dark:border-indigo-800/50 shadow-inner">
                      <span className="text-[10px] font-black text-indigo-600 dark:text-indigo-404 shrink-0 uppercase flex items-center gap-0.5"><IconPlus className="h-3 w-3"/>追加</span>
                      <input type="text" placeholder="部署名..." value={newDeptLabel} onChange={e => setNewDeptLabel(e.target.value)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 text-slate-805 dark:text-slate-200 rounded-xl p-2 focus:outline-none shadow-sm" />
                      <select value={newDeptColor} onChange={e => setNewDeptColor(e.target.value)} className={`text-xs font-bold rounded-xl p-2 border border-slate-202 dark:border-slate-700 shadow-sm focus:outline-none ${colorClassesMap[newDeptColor]?.badge || 'bg-white dark:bg-slate-800'}`}>
                        {Object.keys(colorClassesMap).map(c => <option key={c} value={c} className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200">{c}色</option>)}
                      </select>
                      <button type="submit" disabled={!newDeptLabel.trim()} className="bg-indigo-600 hover:bg-indigo-700 text-white disabled:bg-slate-150 dark:disabled:bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold shadow-md ml-1">登録</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
