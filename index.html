        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width, height = img.height;
            if (width > maxWidth) { height = (maxWidth * height) / width; width = maxWidth; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.onerror = (err) => reject(err);
        };

      });

              const bDays = Math.max(0, Math.round((Date.now() - Number(t.blockedStartedAt)) / (1000 * 60 * 60 * 24)));
              upd.blockedDays = (t.blockedDays || 0) + bDays;
            }
            upd.isBlocked = false; upd.blockedStartedAt = null;
            upd.contextLogs = [{ id: `s_${Date.now()}`, date: dStr, text: newStatus === 'completed' ? '✅ タスク完了' : '🚫 対応なし確定', isSystem: true }, ...(t.contextLogs || [])];
          }
          return upd;
        })});
      };

      const toggleDoToday = (taskId) => {
        if (!isSansanUser) return;
        setTasks(tasks.map(t => t.id === taskId ? { ...t, doToday: !t.doToday } : t));
        const t = tasks.find(x => x.id === taskId);
        showAlert(t && !t.doToday ? '🔥 今日やるタスクにピン留めしました' : '💤 今日やるから除外しました');
      };

      const toggleTaskBlocked = (taskId) => {
        if (!isSansanUser) return;
        const dStr = getJSTDateTimeString();
        const updatedTasks = tasks.map(t => {
          if (t.id !== taskId) return t;
          const nextBlocked = !t.isBlocked;
          let logText = ''; let newBlockedDays = t.blockedDays || 0; let nextStartedAt = t.blockedStartedAt;
          if (nextBlocked) {
            logText = '✋ レス待ち(保留)に突入'; nextStartedAt = String(Date.now());
          } else {
            logText = '⭕ レス待ち(保留)を解除';
            if (nextStartedAt) {
              const diff = Math.max(0, Math.round((Date.now() - Number(nextStartedAt)) / (1000 * 60 * 60 * 24)));
              newBlockedDays += diff;
            }
            nextStartedAt = null;
          }
          return { ...t, isBlocked: nextBlocked, hasBeenBlocked: true, blockedStartedAt: nextStartedAt, blockedDays: newBlockedDays, contextLogs: [{ id: `b_log_${Date.now()}`, date: dStr, text: logText, isSystem: true }, ...(t.contextLogs || [])] };
        });
        saveProjectToFirestore({ ...activeProject, tasks: updatedTasks });
        showAlert('相手待ち状態を切り替えました');
      };

      const handleTaskEditDeptChange = (deptKey) => {
        let finalInteractor = editFormData.interactor || '';
        if (deptKey === 'backoffice') {
          finalInteractor = user?.displayName || '自分';
        } else {
          const dName = deptList.find(d => d.key === deptKey)?.label || '他部署';
          finalInteractor = `${dName} 担当者`;
        }
        setEditFormData(p => ({ ...p, department: deptKey, interactor: finalInteractor }));
      };

      const handleAddTask = (stepId, e) => {
        e.preventDefault(); if (!newTaskTitle.trim() || !isSansanUser) return;
        const todayStr = getJSTDateString(); const currentSeq = activeProject.taskSequence || tasks.length; const nextSeq = currentSeq + 1;
        const newId = `t_${Date.now()}`;
        
        let finalInteractor = newTaskInteractor.trim();
        if (finalInteractor === '自分' || finalInteractor === '自分 (推進担当)') {
          finalInteractor = user?.displayName || '自分';
        }

        const newTask = { id: newId, stepId, sequenceId: nextSeq, title: newTaskTitle.trim(), description: newTaskDesc.trim(), assignee: finalInteractor, department: newTaskDept, interactor: finalInteractor, dueDate: newTaskDueDate || todayStr, status: 'pending', isHighPriority: false, doToday: false, startedAt: null, completedAt: null, attachedImages: [...newTaskImages], contextLogs: [], links: [], level: Number(newTaskLevel), isBlocked: false, hasBeenBlocked: false, blockedDays: 0 };
        saveProjectToFirestore({ ...activeProject, taskSequence: nextSeq, tasks: [...tasks, newTask] });
        setAddingTaskStepId(null); setNewTaskTitle(''); setNewTaskDesc(''); setNewTaskImages([]);
        showAlert('タスクを追加しました');
      };

      const startEditing = (task) => { setEditingTaskId(task.id); setEditFormData({ title: task.title, description: task.description || '', assignee: task.interactor, department: task.department || 'backoffice', interactor: task.interactor, dueDate: task.dueDate, level: task.level || 1 }); };
      
      const saveEdit = (taskId) => { 
        if (!isSansanUser) return; 
        let finalInteractor = (editFormData.interactor || '').trim();
        if (finalInteractor === '自分' || finalInteractor === '自分 (推進担当)') {
          finalInteractor = user?.displayName || '自分';
        }
        saveProjectToFirestore({ ...activeProject, tasks: tasks.map(t => t.id === taskId ? { ...t, ...editFormData, interactor: finalInteractor, assignee: finalInteractor, level: Number(editFormData.level || 1) } : t) }); 
        setEditingTaskId(null); showAlert('タスクマスタを更新しました'); 
      };
      
      const deleteTask = (taskId) => triggerConfirm('削除', '削除しますか？', () => { if (!isSansanUser) return; saveProjectToFirestore({ ...activeProject, tasks: tasks.filter(t => t.id !== taskId) }); showAlert('削除完了'); });

      const handleCreateDept = async (e) => {
        e.preventDefault(); if (!newDeptLabel.trim() || !isSansanUser) return;
        const newKey = `dept_${Date.now()}`, newDept = { key: newKey, label: newDeptLabel.trim(), color: newDeptColor, order: deptList.length };
        if (!useFirebase || (gistToken && gistId)) { updateData('depts', [...deptList, newDept]); setNewDeptLabel(''); showAlert('追加完了'); return; }
        try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'departments', newKey), newDept); setNewDeptLabel(''); showAlert('追加完了'); } catch (err) { showAlert('エラー'); }
      };

      const handleDeleteDept = (key) => {
        if(deptList.length<=1) return showAlert('最低1要素必要'); if(!isSansanUser) return;
        triggerConfirm('部署マスタ削除','マスタから削除しますか？', async () => {
          const rem = deptList.filter(d=>d.key!==key), fb = rem[0].key;
          if(!useFirebase || (gistToken && gistId)){ updateData('depts',rem); updateData('projects',projects.map(p=>({...p, tasks:(p.tasks||[]).map(t=>t.department===key?{...t,department:fb}:t), stepList:(p.stepList||[]).map(s=>s.deptKey===key?{...s,deptKey:fb}:s)}))); showAlert('削除完了'); return; }
          try{ await deleteDoc(doc(db,'artifacts',appId,'public', 'data', 'departments',key)); showAlert('削除完了'); }catch(e){showAlert('エラー');}
        });
      };
      const updateDeptColorSetting = async (k, c) => { if (!isSansanUser) return; updateData('depts',deptList.map(d=>d.key===k?{...d,color:c}:d)); };
      const handleRenameDeptChange = (k, n) => { if (!isSansanUser) return; setDeptList(p=>p.map(d=>d.key===k?{...d,label:n}:d)); };
      const handleRenameDeptSave = async (k) => { if (!isSansanUser) return; updateData('depts',deptList); };
      const moveDeptOrder = async (i, dir) => { if (!isSansanUser) return; const t=i+dir; if(t<0||t>=deptList.length)return; const l=[...deptList]; [l[i],l[t]]=[l[t],l[i]]; const o=l.map((d,idx)=>({...d,order:idx})); setDeptList(o); updateData('depts',o); };
      
      const handleOpenProjectFromDb = (proj) => { 
        if (!proj) return;
        setSelectedFolderId(proj.folderId || 'f1'); 
        setCurrentProjectId(proj.id); 
        setViewMode('board'); 
      };

      const handleSaveDirectDesc = (taskId) => {
        if (!isSansanUser) return;
        const updatedTasks = tasks.map(t => t.id === taskId ? { ...t, description: tmpDescValue } : t);
        saveProjectToFirestore({ ...activeProject, tasks: updatedTasks });
        setEditingDescTaskId(null); showAlert('論点・備考を更新しました。');
      };

      const newAnalyticsData = useMemo(() => {
        let monthTotalW = 0, monthDoneW = 0, monthRemainW = 0, monthBlockedW = 0;
        const interactorStats = {};
        const portfolioCard = projects.map(p => {
          let pTotalW = 0, pDoneW = 0, pRemainW = 0, pBlockedW = 0, pTasksCount = 0;
          (p.tasks || []).forEach(t => {
            if (t.status === 'not_applicable') return;
            const isCompletedThisMonth = t.status === 'completed' && t.completedAt && t.completedAt.startsWith(selectedMonth);
            const isUncompletedActive = t.status !== 'completed' && ((t.dueDate && t.dueDate <= selectedMonth + '-31') || (t.startedAt && t.startedAt <= selectedMonth + '-31'));
            if (!isCompletedThisMonth && !isUncompletedActive) return;
            pTasksCount++; const w = Number(t.level || 1); pTotalW += w;
            const interName = t.interactor || '未設定';
            if (!interactorStats[interName]) interactorStats[interName] = { name: interName, deptKey: t.department, total: 0, blocked: 0, overdue: 0 };
            interactorStats[interName].total += w;
            if (t.status !== 'completed' && t.isBlocked) interactorStats[interName].blocked += w;
            if (t.status !== 'completed' && isOverdue(t.dueDate, t.status)) interactorStats[interName].overdue += w;
            if (t.status === 'completed') {
              if (t.completedAt && t.dueDate && (new Date(t.completedAt) > new Date(t.dueDate)) && !t.hasBeenBlocked) pDoneW += (w / 2);
              else pDoneW += w;
            } else { pRemainW += w; if (t.isBlocked) pBlockedW += w; }
          });
          monthTotalW += pTotalW; monthDoneW += pDoneW; monthRemainW += pRemainW; monthBlockedW += pBlockedW;
          return { id: p.id, name: p.name, code: p.code, status: p.status, totalTasks: pTasksCount, totalWeight: pTotalW, doneWeight: pDoneW, remainWeight: pRemainW, blockedWeight: pBlockedW, progressRate: pTotalW > 0 ? Math.round((pDoneW / pTotalW) * 100) : 0 };
        });
        const deepDiveSteps = [];
        if (activeProject) {
          (activeProject.stepList || []).forEach(step => {
            const stepTasks = (activeProject.tasks || []).filter(t => t.stepId === step.id && t.status === 'completed' && t.startedAt && t.completedAt);
            let totalDays = 0, count = 0;
            stepTasks.forEach(t => {
              if (!t.completedAt.startsWith(selectedMonth)) return;
              let rawDays = Math.max(0, Math.round((new Date(t.completedAt) - new Date(t.startedAt)) / (1000 * 60 * 60 * 24)));
              rawDays = Math.max(0, rawDays - (t.blockedDays || 0)); totalDays += rawDays; count++;
            });
            deepDiveSteps.push({ stepName: step.name, avgDays: count > 0 ? Math.round((totalDays / count) * 10) / 10 : 0, target: targetLeadTime });
          });
        }
        const monthRisks = [];
        projects.forEach(p => {
          (p.tasks || []).forEach(t => {
            if (t.status === 'completed' || t.status === 'not_applicable') return;
            if ((t.dueDate || TODAY_STR) > selectedMonth + '-31') return;
            if (isOverdue(t.dueDate, t.status)) monthRisks.push({ id: t.id, title: t.title, proj: p.name, type: t.isBlocked ? '相手待ち超過' : '期限超過', desc: `相手: ${t.interactor} / 期日: ${t.dueDate}`, badge: t.isBlocked ? 'bg-amber-500 text-white' : 'bg-rose-605 text-white' });
            else if (t.isBlocked) monthRisks.push({ id: t.id, title: t.title, proj: p.name, type: '他部署スタック', desc: `調整中 (${t.level || 1}pt)`, badge: 'bg-indigo-505 text-white' });
          });
        });
        return { portfolioCard, deepDiveSteps, monthRisks, interactorRows: Object.values(interactorStats).sort((a, b) => b.total - a.total), summary: { total: monthTotalW, done: monthDoneW, remain: monthRemainW, blocked: monthBlockedW, scoreProgress: monthTotalW > 0 ? Math.round((monthDoneW / monthTotalW) * 100) : 0 } };
      }, [projects, selectedMonth, currentProjectId, targetLeadTime, riskStaleDays]);

      const renderLogTextWithLinks = (text) => {
        if (!text) return '';
        const urlRegex = /(https?:\/\/[^\s\(\)\<\>]+)/g;
        const parts = text.split(urlRegex);
        return parts.map((part, i) => {
          if (part.match(urlRegex)) return <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-indigo-600 dark:text-indigo-404 font-extrabold underline break-all inline-flex items-center gap-0.5 hover:text-indigo-700">{part}<IconExternalLink className="h-2.5 w-2.5 inline"/></a>;
          return part;
        });
      };

      if (!user) {
        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-955 flex flex-col items-center justify-center p-6 duration-200">
            <div className="max-w-md w-full bg-white dark:bg-slate-900 rounded-3xl border border-slate-202 p-8 shadow-2xl text-center space-y-6">
              <div className="mx-auto bg-indigo-600 bg-gradient-to-tr from-indigo-700 to-purple-600 text-white w-16 h-16 rounded-2xl font-black text-2xl flex items-center justify-center shadow-lg">PL</div>
              <h1 className="text-xl font-black text-slate-850 dark:text-white leading-none">Project Loom</h1>
              <div className="bg-slate-55 dark:bg-slate-955/50 border border-slate-150 p-4 rounded-2xl text-left"><p className="text-xs text-slate-605 dark:text-slate-300 font-bold leading-relaxed">本システムはSansan株式会社専用プロトタイプです。アクセスおよび閲覧には、認証情報が必要です。</p></div>
              <div className="space-y-1.5 pt-2">
                <button onClick={() => handleMockLogin('member@sansan.com')} className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white border border-indigo-700 rounded-2xl font-black text-xs">🔑 推進コアメンバーとしてログイン</button>
                <button onClick={() => handleMockLogin('leader@sansan.com')} className="w-full py-2.5 bg-slate-150 dark:bg-slate-800 text-slate-705 dark:text-slate-300 border border-slate-202 dark:border-slate-705 rounded-xl font-bold text-xs">👤 決裁・管理職枠でテストログイン</button>
              </div>
            </div>
          </div>
        );
      }

      if (!isSansanUser) {
        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-955 flex flex-col items-center justify-center p-6">
            <div className="max-w-md w-full bg-white dark:bg-slate-900 border border-rose-200 rounded-3xl p-8 text-center space-y-4">
              <div className="mx-auto text-rose-605"><IconWarning className="h-12 w-12 mx-auto" /></div>
              <h1 className="text-lg font-black text-rose-605">アクセス権限エラー</h1>
              <p className="text-xs text-slate-505">@sansan.com 以外のドメインです。</p>
              <button onClick={handleLogout} className="w-full py-2 bg-slate-150 rounded-xl font-bold text-xs">戻る</button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-55 dark:bg-slate-955 text-slate-805 dark:text-slate-150 font-sans antialiased pb-16 duration-200">
          
          {alertMessage && (
            <div className="fixed bottom-6 right-6 bg-slate-955/95 dark:bg-slate-800 text-white text-xs px-5 py-4 rounded-2xl shadow-2xl z-[100] max-w-sm flex items-center gap-2 border border-slate-750 backdrop-blur-md animate-bounce">
              <IconInfo className="h-5 w-5 text-indigo-400 shrink-0" />
              <span className="font-bold">{alertMessage}</span>
            </div>
          )}

          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[200] p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
                <div className="flex items-center gap-3 pb-3 border-b dark:border-slate-750 text-rose-605">
                  <IconWarning className="h-6 w-6 text-rose-605" />
                  <h3 className="font-extrabold text-sm text-slate-955 dark:text-white">{confirmModal.title}</h3>
                </div>
                <p className="text-xs text-slate-505 dark:text-slate-455">{confirmModal.message}</p>
                <div className="flex justify-end gap-2 pt-3 border-t dark:border-slate-750 text-xs">
                  <button onClick={closeConfirm} className="bg-slate-150 dark:bg-slate-700 text-slate-605 dark:text-slate-300 px-4 py-2 rounded-2xl font-bold">キャンセル</button>
                  <button onClick={confirmModal.onConfirm} className="bg-rose-605 text-white px-5 py-2 rounded-2xl font-extrabold">実行</button>
                </div>
              </div>
            </div>
          )}

          {lightboxImage && (
            <div className="fixed inset-0 bg-slate-955/90 z-[200] flex items-center justify-center p-4 cursor-zoom-out animate-in fade-in" onClick={() => setLightboxImage(null)}>
              <div className="absolute top-4 right-4 bg-white/20 text-white p-2.5 rounded-full cursor-pointer"><IconX className="h-6 w-6" /></div>
              <img src={lightboxImage} alt="preview" className="max-w-full max-h-full rounded-2xl shadow-2xl object-contain animate-in zoom-in-95" />
            </div>
          )}

          {showAddProjectModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
              <div className="bg-white dark:bg-slate-800 border rounded-3xl p-6 max-xl w-full shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-4 border-b pb-3 dark:border-slate-700">
                  <h2 className="text-base font-black flex items-center gap-2">📂 新規プロジェクトの起票</h2>
                  <button onClick={() => setShowAddProjectModal(false)} className="text-slate-404"><IconX className="h-5 w-5" /></button>
                </div>
                <form onSubmit={handleCreateProject} className="flex-1 overflow-y-auto pr-2 space-y-5 scrollbar-thin">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-[10px] text-slate-404 block mb-1">所属フォルダ</label>
                      <select value={newProjFolderId} onChange={e => setNewProjFolderId(e.target.value)} className="w-full border text-xs font-bold rounded-xl p-2 bg-transparent">
                        {folders.map(f => <option key={f.id} value={f.id} className="dark:bg-slate-800">{f.name}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="text-[10px] text-slate-404 block mb-1">初期ステータス</label>
                      <select value={newProjStatus} onChange={e => setNewProjStatus(e.target.value)} className="w-full border text-xs font-bold rounded-xl p-2 bg-transparent">
                        <option value="pending" className="dark:bg-slate-800">未着手</option><option value="in_progress" className="dark:bg-slate-800">進行中</option>
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="text-[10px] text-slate-404 block mb-1">プロジェクト名称</label>
                    <input required type="text" value={newProjName} onChange={e => setNewProjName(e.target.value)} className="w-full border text-sm font-bold rounded-xl p-2.5 bg-transparent" placeholder="例: 【ECD】プラン無料化" />
                  </div>
                  <div className="grid grid-cols-3 gap-4">
                    <div><label className="text-[10px] text-slate-404 block mb-1">コード</label><input type="text" value={newProjCode} onChange={e => setNewProjCode(e.target.value)} className="w-full border rounded-xl p-2 bg-transparent text-xs font-mono" placeholder="PRJ-01"/></div>
                    <div><label className="text-[10px] text-slate-404 block mb-1">開始日</label><input type="date" value={newProjStart} onChange={e => setNewProjStart(e.target.value)} className="w-full border rounded-xl p-2 bg-transparent text-xs" /></div>
                    <div><label className="text-[10px] text-slate-404 block mb-1">期日</label><input type="date" value={newProjEnd} onChange={e => setNewProjEnd(e.target.value)} className="w-full border rounded-xl p-2 bg-transparent text-xs" /></div>
                  </div>
                  <div className="flex justify-end gap-2 pt-4 border-t dark:border-slate-700">
                    <button type="button" onClick={() => setShowAddProjectModal(false)} className="bg-slate-150 dark:bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold">キャンセル</button>
                    <button type="submit" className="bg-indigo-600 text-white px-5 py-2 rounded-xl text-xs font-bold">起票する</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* 💡 修正1層目：トップ全体ヘッダー (常に固定) */}
          <header className="bg-white/95 dark:bg-slate-955/95 border-b sticky top-0 z-50 shadow-sm backdrop-blur-lg divide-y dark:border-slate-700 divide-slate-150 dark:divide-slate-800">
            <div className="px-6 py-3 flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 bg-gradient-to-tr from-indigo-700 to-purple-600 text-white p-2 rounded-2xl font-black text-sm">PL</div>
                <div><h1 className="text-xs font-black dark:text-white leading-none">Project Loom</h1><p className="text-[9px] text-slate-404 font-extrabold uppercase mt-0.5">Sansanグループ案件推進専用ダッシュボード</p></div>
              </div>
              <div className="flex bg-slate-150 dark:bg-slate-800 p-0.5 rounded-xl text-xs font-bold border dark:border-slate-700">
                <button onClick={() => setViewMode('board')} className={`px-3 py-1.5 rounded-lg flex items-center gap-1 ${viewMode==='board'?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}><IconCalendar /><span>📋 ダッシュボード</span></button>
                <button onClick={() => setViewMode('database')} className={`px-3 py-1.5 rounded-lg flex items-center gap-1 ${viewMode==='database'?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}><IconDatabase /><span>🗃️ データベース</span></button>
                <button onClick={() => setViewMode('analytics')} className={`px-3 py-1.5 rounded-lg flex items-center gap-1 ${viewMode==='analytics'?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}><IconChart /><span>📊 分析馬力</span></button>
              </div>
              <div className="flex items-center gap-3">
                <div className="relative">
                  <button onClick={() => setShowTodayDropdown(!showTodayDropdown)} className={`flex items-center gap-1.5 text-[11px] font-black px-3 py-2 border rounded-xl ${activeTodayTasks.length>0?'bg-amber-500 border-amber-600 text-white animate-pulse':'bg-transparent text-slate-605'}`}>
                    <span>🔥 今日やる</span>{activeTodayTasks.length>0 && <span className="bg-white text-amber-600 text-[9px] px-1.5 py-0.5 rounded-full font-black">{activeTodayTasks.length}</span>}
                  </button>
                  {showTodayDropdown && (
                    <React.Fragment>
                      <div className="fixed inset-0 z-40" onClick={() => setShowTodayDropdown(false)}></div>
                      <div className="absolute top-full right-0 mt-2 w-80 bg-white dark:bg-slate-800 border rounded-2xl shadow-xl z-50 flex flex-col max-h-[70vh]">
                        <div className="p-3 border-b bg-slate-55 dark:bg-slate-900 flex justify-between items-center text-xs font-bold"><span>🔥 今日やる一覧</span></div>
                        <div className="overflow-y-auto p-3 space-y-2 bg-slate-55/30 scrollbar-thin">

                                  <span className="text-slate-404" onClick={e => e.stopPropagation()}><IconDragHandle /></span>

                                  <span className={`text-[10px] font-black border px-2 py-0.5 rounded-md ${cClass.badge}`}>🏢 {deptList.find(d => d.key === step.deptKey)?.label || '未設定'}</span>

                                          onDragEnd={() => handleTaskDragEnd()}

                                                      <div className="flex justify-end gap-1 mt-1"><button onClick={() => setEditingDescTaskId(null)} className="px-2 py-0.5 bg-slate-150 rounded text-[9px] text-slate-805">閉じる</button><button onClick={() => handleSaveDirectDesc(task.id)} className="px-2 py-0.5 bg-indigo-600 text-white rounded text-[9px]">保存(Ctrl+Enter)</button></div>

                                                        </div>
                                                      ))}

                                                        const newLog = { id: `m_log_${Date.now()}`, date: dStr, text, isSystem: false, isHighlighted: false };

                                                        e.target.value = '';

                                                    className="w-full text-[10.5px] bg-slate-55 dark:bg-slate-900 border rounded-xl px-2.5 py-1.5 focus:outline-none mb-2 border-slate-202 dark:border-slate-700 text-slate-805 dark:text-white shadow-inner"

                                                            </button>
                                                          )}
                                                        </div>
                                                      ))}
                                                    </div>
                                                  )}
                                                </div>
                                              </div>
                                            )}

                                            <div onClick={(e) => { e.stopPropagation(); setCollapsedTaskDetails(p => ({ ...p, [task.id]: !p[task.id] })); }} className="bg-slate-100 dark:bg-slate-700 hover:bg-slate-202 text-slate-404 dark:text-slate-455 text-[9px] font-black text-center py-1 mt-2 cursor-pointer select-none">
                                              {isTaskCol ? '▼ 詳細・交渉メモを展開' : '▲ 閉じる'}
                                            </div>
                                          </div>
                                        )}
                                      </div>
                                    );

                                  {/* 💡 修正：タスク追加画面。既存カードと同じ「50%幅」のグリッド最後尾へ、本物のカードと完全同幅で出現するよう再構成 */}
                                  {addingTaskStepId === step.id && (
                                    <form onSubmit={(e) => handleAddTask(step.id, e)} className="relative border-4 border-dashed border-indigo-500 rounded-3xl bg-white dark:bg-slate-800 p-4 space-y-3 text-xs font-bold shadow-md animate-in zoom-in-95">
                                      <div className="flex justify-between items-center pb-1 border-b dark:border-slate-700">
                                        <span className="font-extrabold text-indigo-600 dark:text-indigo-404">➕ 新規タスク追加カード</span>
                                        <div className="flex gap-1.5 text-[11px]">
                                          <button type="button" onClick={() => { setAddingTaskStepId(null); setNewTaskImages([]); }} className="bg-slate-150 dark:bg-slate-700 text-slate-605 px-2 py-0.5 rounded-lg">キャンセル</button>
                                          <button type="submit" className="bg-indigo-600 text-white px-3 py-0.5 rounded-lg shadow-sm">追加</button>
                                        </div>
                                      </div>
                                      <div className="space-y-2">
                                        {/* 1行目：タスク名入力 */}
                                        <div>
                                          <label className="block text-[9px] text-slate-404 mb-0.5">タスク推進名 *</label>

                                        </div>
                                        
                                        {/* 2行目：4分割パラメータ */}
                                        <div className="grid grid-cols-1 gap-2">

                                                <option value="1">🟢 1ポイント</option>
                                                <option value="2">🟡 2ポイント</option>
                                                <option value="4">🔴 4ポイント</option>
                                              </select>
                                            </div>
                                          </div>
                                        </div>

                                        {/* 3行目：備考 */}
                                        <div>
                                          <label className="block text-[9px] text-slate-404 mb-0.5">論点・備考</label>
                                          <textarea placeholder="詳細論点・メモを入力..." value={newTaskDesc} onChange={e => setNewTaskDesc(e.target.value)} className="w-full p-1.5 text-xs border rounded-xl bg-slate-55 dark:bg-slate-900 h-12 text-slate-805 dark:text-white border-slate-202 dark:border-slate-700" />
                                        </div>
                                      </div>
                                    </form>
                                  )}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ) : (
                  <div className="text-center py-12 text-slate-404 font-bold border rounded-2xl border-dashed dark:border-slate-700">⚠️ プロジェクト案件を左上から選択、または＋ボタンから新規作成してください。</div>
                )}
              </React.Fragment>
            )}

            {viewMode === 'database' && (
              <div className="bg-white dark:bg-slate-800 border rounded-3xl shadow-sm p-6 space-y-5 animate-in fade-in">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 pb-4 border-b dark:border-slate-700">
                  <div><h2 className="text-base font-black flex items-center gap-2">🗃 組織横断ポートフォリオデータベース</h2><p className="text-xs text-slate-404 mt-0.5">全案件のヘルススコアとマイルストーンを一覧します。</p></div>
                </div>
                <div className="flex flex-wrap gap-2 text-xs font-bold">
                  <select value={dbFilterFolderId} onChange={e=>setDbFilterFolderId(e.target.value)} className="border p-2 rounded-xl bg-transparent font-bold text-slate-805 dark:text-white bg-white dark:bg-slate-800"><option value="all">📁 すべてのフォルダ</option>{folders.map(f=><option key={f.id} value={f.id}>📁 {f.name}</option>)}</select>
                  <select value={dbFilterStatus} onChange={e=>setDbFilterStatus(e.target.value)} className="border p-2 rounded-xl bg-transparent font-bold text-slate-805 dark:text-white bg-white dark:bg-slate-800"><option value="all">🚥 すべての進捗状態</option><option value="pending">未着手</option><option value="in_progress">進行中</option></select>
                  <input type="text" placeholder="案件名やコードで検索..." value={dbFilterText} onChange={e=>setDbFilterText(e.target.value)} className="border p-2 rounded-xl bg-transparent min-w-[200px] text-slate-805 dark:text-white bg-white dark:bg-slate-800" />

                        <th className="py-3 px-4">状態</th><th className="py-3 px-4">大分類</th><th className="py-3 px-4">案件プロジェクト名称</th><th className="py-3 px-4">コード</th><th className="py-3 px-4">推進進捗率</th><th className="py-3 px-4 text-center">操作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y font-bold dark:divide-slate-700">
                      {projects.filter(proj => {
                        if (dbFilterFolderId !== 'all' && proj.folderId !== dbFilterFolderId) return false;
                        if (dbFilterStatus !== 'all' && proj.status !== dbFilterStatus) return false;
                        if (dbFilterText.trim() !== '') { const lowerText = dbFilterText.toLowerCase(); if (!proj.name.toLowerCase().includes(lowerText) && !proj.code.toLowerCase().includes(lowerText)) return false; }
                        return true;
                      }).map(proj => {
                        const prog = calculateProjectProgressById(proj); const fName = folders.find(f=>f.id===proj.folderId)?.name || '未分類';
                        const stObj = projectStatusOptions.find(o=>o.value===(proj.status||'pending'));
                        return (
                          <tr key={proj.id} className="hover:bg-slate-55/50 dark:hover:bg-slate-700/20">
                            <td className="py-3 px-4"><span className={`px-2 py-0.5 border rounded-xl text-[9px] ${stObj?.className}`}>{stObj?.label}</span></td>
                            <td className="py-3 px-4 text-slate-404">{fName}</td>
                            <td className="py-3 px-4 text-sm text-slate-900 dark:text-slate-100">{proj.name}</td>
                            <td className="py-3 px-4 font-mono text-slate-404">{proj.code}</td>
                            <td className="py-3 px-4"><div className="flex items-center gap-2"><div className="h-1.5 bg-slate-150 rounded-full overflow-hidden dark:bg-slate-700"><div className="bg-indigo-500 h-full" style={{width:`${prog}%`}}/></div><span className="font-mono text-indigo-500 w-8 text-right">{prog}%</span></div></td>
                            <td className="py-3 px-4 text-center"><div className="flex items-center justify-center gap-2"><button onClick={()=>handleOpenProjectFromDb(proj)} className="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 border border-indigo-200 dark:border-indigo-800 text-[11px] px-2.5 py-1 rounded-xl shadow-xs">開く</button><button onClick={(e)=>handleDeleteProjectByList(proj.id, e)} className="text-slate-404 hover:text-rose-600 font-bold text-xs">× 削除</button></div></td>
                          </tr>
                        );
                      }).reverse()}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {viewMode === 'analytics' && (
              <div className="space-y-6 animate-in fade-in">
                <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl border shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 dark:border-slate-700">
                  <div><h2 className="text-base font-black flex items-center gap-2">📊 有言実行月次推進成績表</h2><p className="text-xs text-slate-404">自己遅延ペナルティ半減ロジックを統合した真の馬力測定器。</p></div>
                  <div className="flex items-center gap-2 font-bold text-xs">
                    <div className="bg-slate-55 border px-3 py-2 rounded-xl dark:bg-slate-900 dark:border-slate-700">分析月: <input type="month" value={selectedMonth} onChange={e=>{ if(e.target.value) setSelectedMonth(e.target.value); }} className="bg-transparent font-black text-indigo-600 cursor-pointer outline-none font-mono"/></div>
                    <button onClick={() => { const text = `【${selectedMonth} 推進力実績エビデンス】\n🏆 獲得スコア: ${newAnalyticsData.summary.done}pt\n🔋 稼働総重量: ${newAnalyticsData.summary.total}pt\n✋ 他部署スタック: ${newAnalyticsData.summary.blocked}pt\n📈 目標達成率: ${newAnalyticsData.summary.scoreProgress}%`; navigator.clipboard.writeText(text).then(() => showAlert('📋 報告用フォーマットをクリップボードにコピーしました！')); }} className="bg-indigo-600 text-white font-black px-4 py-2.5 rounded-xl">📋 報告テキストをコピー</button>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                  <div className="bg-gradient-to-br from-indigo-600 to-indigo-700 text-white p-4 rounded-3xl flex flex-col justify-between h-24 shadow-md"><span className="text-[10px] font-bold opacity-80 uppercase tracking-wider">🏆 当月獲得推進スコア</span><div className="text-2xl font-black font-mono leading-none">{newAnalyticsData.summary.done} <span className="text-xs opacity-70">pt</span></div><span className="text-[8px] opacity-60">他部署レス待ちは減算から免除</span></div>
                  <div className="bg-white dark:bg-slate-800 p-4 rounded-3xl border flex flex-col justify-between h-24 dark:border-slate-700"><span className="text-[10px] font-bold text-slate-404 uppercase tracking-wider">🔋 稼働タスク総重量</span><div className="text-2xl font-black font-mono text-slate-805 dark:text-white leading-none">{newAnalyticsData.summary.total} <span className="text-xs text-slate-404">pt</span></div><span className="text-[8px] text-slate-404">過去月からの未完了キャリーオーバー含む</span></div>
                  <div className="bg-white dark:bg-slate-800 p-4 rounded-3xl border flex flex-col justify-between h-24 dark:border-slate-700"><span className="text-[10px] font-bold text-slate-404 uppercase tracking-wider">✋ 他部署スタック保留重量</span><div className="text-2xl font-black font-mono text-amber-505 leading-none">{newAnalyticsData.summary.blocked} <span className="text-xs text-slate-404">pt</span></div><span className="text-[8px] text-slate-404">相手のターンで止まっている負荷</span></div>
                  <div className="bg-white dark:bg-slate-800 p-4 rounded-3xl border flex flex-col justify-between h-24 dark:border-slate-700"><span className="text-[10px] font-bold text-slate-404 uppercase tracking-wider">📈 当月推進達成率</span><div className="text-2xl font-black font-mono text-indigo-500 leading-none">{newAnalyticsData.summary.scoreProgress}%</div><div className="h-1.5 w-full bg-slate-150 dark:bg-slate-700 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-indigo-500" style={{width:`${newAnalyticsData.summary.scoreProgress}%`}}/></div></div>
                </div>

                <div className="flex bg-slate-150 dark:bg-slate-800 p-1 rounded-2xl border text-xs font-bold w-max shadow-inner dark:border-slate-700">
                  <button onClick={() => setAnalyticsTab('resource')} className={`px-4 py-2 rounded-xl ${analyticsTab==='resource'?'bg-white dark:bg-slate-700 shadow':''}`}>🚥 ① 案件ポートフォリオ</button>
                  <button onClick={() => setAnalyticsTab('interactor')} className={`px-4 py-2 rounded-xl ${analyticsTab==='interactor'?'bg-white dark:bg-slate-700 shadow':''}`}>👥 ② 相手先別 ボール滞留分析</button>
                  <button onClick={() => setAnalyticsTab('leadtime')} className={`px-4 py-2 rounded-xl ${analyticsTab==='leadtime'?'bg-white dark:bg-slate-700 shadow':''}`}>⏱️ ③ 工程別 リードタイム</button>
                  <button onClick={() => setAnalyticsTab('risk')} className={`px-4 py-2 rounded-xl ${analyticsTab==='risk'?'bg-white dark:bg-slate-700 shadow':''}`}>🚨 ④ 組織ボトルネック検知</button>
                </div>

                <div className="pt-1">
                  {analyticsTab === 'resource' && (
                    <div className="bg-white dark:bg-slate-800 border p-5 rounded-3xl shadow-sm space-y-4 dark:border-slate-700">
                      <h3 className="font-black text-sm">🚥 全並列案件の重要度・リソース比率俯瞰 ({selectedMonth})</h3>
                      <div className="overflow-x-auto rounded-xl border dark:border-slate-700">
                        <table className="w-full text-xs border-collapse text-left">
                          <thead>
                            <tr className="bg-slate-55 dark:bg-slate-900 border-b text-[10px] font-black text-slate-405 dark:border-slate-700">
                              <th className="py-2 px-4">案件プロジェクト名称</th><th className="py-2 px-4 text-center">当月稼働件数</th><th className="py-2 px-4 text-center">総重要pt</th><th className="py-2 px-4 text-center text-emerald-500">純獲得pt</th><th className="py-2 px-4 text-center text-amber-500">保留pt</th><th className="py-2 px-4 w-40">ウエイト達成率</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y font-bold dark:divide-slate-700">
                            {newAnalyticsData.portfolioCard.map(p => (
                              <tr key={p.id} className="hover:bg-slate-55/40">
                                <td className="py-3 px-4 text-slate-805 dark:text-slate-200">{p.name} <span className="text-[9px] block font-mono text-slate-404">{p.code}</span></td>
                                <td className="py-3 px-4 text-center font-mono">{p.totalTasks}件</td>
                                <td className="py-3 px-4 text-center font-mono">{p.totalWeight}pt</td>
                                <td className="py-3 px-4 text-center font-mono text-emerald-500">{p.doneWeight}pt</td>
                                <td className="py-3 px-4 text-center font-mono text-amber-500">{p.blockedWeight}pt</td>
                                <td className="py-3 px-4"><div className="flex items-center gap-2"><div className="h-1.5 bg-slate-150 rounded-full overflow-hidden dark:bg-slate-700"><div className="bg-indigo-500 h-full" style={{width:`${p.progressRate}%`}}/></div><span className="font-mono text-indigo-500 w-8 text-right">{p.progressRate}%</span></div></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {analyticsTab === 'interactor' && (
                    <div className="bg-white dark:bg-slate-800 border p-5 rounded-3xl shadow-sm space-y-4 dark:border-slate-700 animate-in fade-in">
                      <div><h3 className="font-black text-sm">👥 ② やり取り相手（部署・個人）別のボトルネック＆滞留分析 ({selectedMonth})</h3><p className="text-[11px] text-slate-404 mt-0.5">あなたを中心として、現在誰のところにどれだけ重たいボール（未完了タスクpt）が滞留しているかを可視化します。</p></div>
                      <div className="overflow-x-auto rounded-xl border dark:border-slate-700">
                        <table className="w-full text-xs border-collapse text-left">
                          <thead>
                            <tr className="bg-slate-55 dark:bg-slate-900 border-b text-[10px] font-black text-slate-405 dark:border-slate-700">
                              <th className="py-2.5 px-4">やり取り相手 (To)</th><th className="py-2.5 px-4">島（担当部署）</th><th className="py-2.5 px-4 text-center">滞留総重量</th><th className="py-2.5 px-4 text-center text-amber-500">うち相手待ち(保留)</th><th className="py-2.5 px-4 text-center text-rose-500">うち現在期限超過</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y font-bold dark:divide-slate-700">
                            {newAnalyticsData.interactorRows.length === 0 ? <tr><td colSpan="5" className="py-6 text-center text-slate-404 italic">データがまだありません。</td></tr> : newAnalyticsData.interactorRows.map(row => {
                              const dClass = colorClassesMap[deptList.find(d => d.key === row.deptKey)?.color || 'slate'] || colorClassesMap.slate;
                              const isSelf = row.name === user?.displayName;
                              return (
                                <tr key={row.name} className={`hover:bg-slate-55/50 ${isSelf ? 'bg-indigo-50/10' : ''}`}>
                                  <td className="py-3 px-4 text-sm font-extrabold flex items-center gap-1.5"><span>{isSelf ? '👤' : '🏢'}</span><span>{row.name} {isSelf && <span className="text-[9px] bg-indigo-600 text-white px-1 rounded-full">YOU</span>}</span></td>
                                  <td className="py-3 px-4"><span className={`px-2 py-0.5 rounded-lg border text-[10px] ${dClass.badge}`}>{deptList.find(d => d.key === row.deptKey)?.label || '他部署'}</span></td>
                                  <td className="py-3 px-4 text-center font-mono text-sm text-slate-805 dark:text-slate-200">{row.total} pt</td>
                                  <td className="py-3 px-4 text-center font-mono text-amber-500">{row.blocked > 0 ? `${row.blocked} pt` : '-'}</td>
                                  <td className="py-3 px-4 text-center font-mono text-rose-500">{row.overdue > 0 ? <span className="animate-pulse">🚨 {row.overdue} pt</span> : '-'}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {analyticsTab === 'leadtime' && (
                    <div className="bg-white dark:bg-slate-800 border p-6 rounded-3xl shadow-sm space-y-6 dark:border-slate-700">
                      <div><h3 className="font-black text-sm">⏱ 大Step別 リードタイム速度振り返り</h3><p className="text-[11px] text-slate-404 mt-0.5">現在選択中の案件「{activeProject?.name}」の純消費日数（保留期間を除去した実馬力）</p></div>
                      <div className="space-y-4 font-bold">
                        {newAnalyticsData.deepDiveSteps.map(d => {
                          const isOver = d.avgDays > d.target;
                          return (
                            <div key={d.stepName} className="flex flex-col sm:flex-row sm:items-center gap-2 border-b dark:border-slate-700 pb-2">
                              <div className="sm:w-48 text-xs truncate">{d.stepName}</div>
                              <div className="flex-1 h-3.5 bg-slate-100 rounded-xl relative overflow-hidden dark:bg-slate-900 border dark:border-slate-700 shadow-inner flex items-center">
                                <div className="absolute top-0 bottom-0 border-r border-slate-404" style={{ left: `${Math.min((d.target / 12) * 100, 100)}%` }} />
                                <div className={`h-full ${isOver ? 'bg-rose-500' : 'bg-emerald-500'}`} style={{ width: `${Math.min((d.avgDays / 12) * 100, 100)}%` }} />
                              </div>
                              <div className="sm:w-36 text-right font-mono text-[11px] flex justify-end gap-2"><span className={isOver?'text-rose-500':'text-emerald-500'}>実 {d.avgDays}日</span><span className="text-slate-404">(目標 {d.target}日)</span></div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {analyticsTab === 'risk' && (
                    <div className="bg-white dark:bg-slate-800 border p-6 rounded-3xl shadow-sm space-y-4 dark:border-slate-700">
                      <h3 className="font-black text-sm">🚨 組織ボトルネック・放置スタックタスクの自動検知</h3>
                      {newAnalyticsData.monthRisks.length === 0 ? <p className="text-xs text-emerald-600 border border-dashed border-emerald-200 bg-emerald-55/20 rounded-xl p-6 text-center">🎉 素晴らしいです。指定月に詰まっている他部署タスク、期限超過はありません。</p> : (
                        <div className="overflow-x-auto rounded-xl border dark:border-slate-700">
                          <table className="w-full text-xs text-left border-collapse">
                            <thead><tr className="bg-slate-55 dark:bg-slate-900 border-b dark:border-slate-700 font-black text-slate-405 text-[10px]"><th className="py-2 px-4 text-center">種別</th><th className="py-2 px-4">スタック論点名</th><th className="py-2 px-4">所属案件</th><th className="py-2 px-4">状態理由</th></tr></thead>
                            <tbody className="divide-y font-bold dark:divide-slate-700">
                              {newAnalyticsData.monthRisks.map(r => (
                                <tr key={r.id} className="hover:bg-slate-55/40">
                                  <td className="py-3 px-4 text-center"><span className={`px-2 py-0.5 border rounded-xl text-[9px] ${r.badge}`}>{r.type}</span></td>
                                  <td className="py-3 px-4">{r.title}</td><td className="py-3 px-4 text-slate-404 font-medium">{r.proj}</td><td className="py-3 px-4 font-mono text-rose-500 text-[11px]">{r.desc}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>

          {showAddFolderModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
              <div className="bg-white dark:bg-slate-800 border rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95">
                <div className="flex justify-between items-center pb-2 border-b border-slate-150 dark:border-slate-700"><h3 className="font-extrabold text-sm flex items-center gap-1.5">📁 大分類フォルダの新規作成</h3><button onClick={() => setShowAddFolderModal(false)} className="text-slate-404"><IconX /></button></div>
                <form onSubmit={handleCreateFolder} className="space-y-4 text-xs font-bold">
                  <div><label className="block mb-1 text-slate-550">フォルダ名称 *</label><input required type="text" value={newFolderName} onChange={e => setNewFolderName(e.target.value)} className="w-full border rounded-xl p-2.5 bg-transparent bg-white dark:bg-slate-900 text-slate-805 dark:text-white" placeholder="例: 新商品設計（ECD）" /></div>
                  <div className="flex justify-end gap-2"><button type="button" onClick={() => setShowAddFolderModal(false)} className="bg-slate-150 dark:bg-slate-700 text-slate-605 px-4 py-2 rounded-xl">キャンセル</button><button type="submit" className="bg-indigo-600 text-white px-5 py-2 rounded-xl">作成</button></div>
                </form>
              </div>
            </div>
          )}

          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
              <div className="bg-white dark:bg-slate-800 border rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[90vh]">
                <div className="absolute top-4 right-4"><button onClick={() => { setShowSettingsModal(false); setTmpGistToken(gistToken); setTmpGistId(gistId); }} className="text-slate-404"><IconX className="h-5 w-5"/></button></div>
                <h2 className="text-base font-black flex items-center gap-1.5 mb-4">⚙️ システム環境マスタマトリクス設定</h2>
                <div className="flex-1 overflow-y-auto pr-2 space-y-6 scrollbar-thin text-xs font-bold">
                  <div className="space-y-3">
                    <h3 className="border-b pb-1 font-black text-slate-505 border-slate-150 dark:border-slate-700">☁️ GitHub Gist データクラウド外部バックアップ同期設定</h3>
                    <div className="bg-slate-55 dark:bg-slate-900/50 p-4 rounded-2xl border dark:border-slate-700 space-y-3">
                      <div><label className="block mb-1">GitHub Personal Access Token</label><input type="password" value={tmpGistToken} onChange={e => setTmpGistToken(e.target.value)} className="w-full border rounded-xl p-2 bg-white dark:bg-slate-800 text-slate-805 dark:text-white" placeholder="ghp_xxxxxxxxxxxx" /></div>
                      <div><label className="block mb-1">Gist API ID</label><input type="text" value={tmpGistId} onChange={e => setTmpGistId(e.target.value)} className="w-full border rounded-xl p-2 bg-white dark:bg-slate-800 font-mono text-slate-805 dark:text-white" placeholder="1a2b3c4d..." /></div>
                      <div className="flex justify-end"><button onClick={saveGistSettings} className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold shadow-sm">Tokenを保存してクラウド同期</button></div>
                    </div>
                  </div>
                  
                  <div className="space-y-3">
                    <h3 className="border-b pb-1 font-black text-slate-505 border-slate-150 dark:border-slate-700">📋 初期環境・デモシミュレーションデータの生成</h3>
                    <div className="bg-slate-55 dark:bg-slate-900/50 p-4 rounded-2xl border dark:border-slate-700 flex justify-between items-center">
                      <p className="text-[10px] text-slate-505 dark:text-slate-400">現在保持しているローカル環境をリセットし、実例ベース of ECD新商品設計サンプルデータを強制的に再投入します。</p>
                      <button type="button" onClick={() => { triggerConfirm('デモデータ投入', '現在のデータがサンプルデータで上書きされますがよろしいですか？', () => { setFolders(initialFolders); setDeptList(initialDepts); setProjects(initialProjects); localStorage.setItem('pl_folders', JSON.stringify(initialFolders)); localStorage.setItem('pl_depts', JSON.stringify(initialDepts)); localStorage.setItem('pl_projects', JSON.stringify(initialProjects)); showAlert('🚀 デモシミュレーションデータを投入しました。'); setShowSettingsModal(false); }); }} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-xl shrink-0 ml-4 font-black">サンプルデータを投入する</button>
                    </div>
                  </div>

                  <div className="space-y-3">
                    <h3 className="border-b pb-1 font-black text-slate-505 border-slate-150 dark:border-slate-700">👥 組織内・他部署マスタマトリクスと表示カラー管理</h3>
                    <div className="space-y-2">
                      {deptList.map((dept, idx) => (
                        <div key={dept.key} className="flex items-center gap-2 bg-slate-55 border p-2 rounded-2xl dark:bg-slate-900/50 dark:border-slate-700 border-slate-202">
                          <div className="flex flex-col"><button onClick={() => moveDeptOrder(idx, -1)} disabled={idx === 0} className="disabled:opacity-20 text-slate-404"><IconArrowUp /></button><button onClick={() => moveDeptOrder(idx, 1)} disabled={idx === deptList.length - 1} className="disabled:opacity-20 text-slate-404"><IconArrowDown /></button></div>
                          <input type="text" value={dept.label} onChange={(e) => handleRenameDeptChange(dept.key, e.target.value)} onBlur={() => handleRenameDeptSave(dept.key)} className="flex-1 border p-2 rounded-xl bg-white dark:bg-slate-800 text-sm text-slate-805 dark:text-white" />
                          <select value={dept.color} onChange={(e) => updateDeptColorSetting(dept.key, e.target.value)} className={`p-2 border rounded-xl bg-white dark:bg-slate-800 ${colorClassesMap[dept.color]?.badge}`}>{Object.keys(colorClassesMap).map(c=><option key={c} value={c} className="text-slate-805">{c}色ラベル</option>)}</select>
                          <button onClick={() => handleDeleteDept(dept.key)} className="text-slate-404 hover:text-rose-605 px-1 font-black text-sm">×</button>
                        </div>
                      ))}
                    </div>
                    <form onSubmit={handleCreateDept} className="flex items-center gap-2 bg-indigo-50/40 p-3 rounded-2xl border border-indigo-100 dark:bg-indigo-950/20 dark:border-indigo-900">
                      <input type="text" placeholder="新規追加する部署名..." value={newDeptLabel} onChange={e => setNewDeptLabel(e.target.value)} className="flex-1 border p-2 rounded-xl bg-white dark:bg-slate-800 text-slate-805 dark:text-white" />
                      <select value={newDeptColor} onChange={e => setNewDeptColor(e.target.value)} className="p-2 border rounded-xl bg-white dark:bg-slate-800 text-slate-805 dark:text-white">{Object.keys(colorClassesMap).map(c=><option key={c} value={c}>{c}色</option>)}</select>
                      <button type="submit" disabled={!newDeptLabel.trim()} className="bg-indigo-600 text-white px-4 py-2 rounded-xl disabled:opacity-40">登録</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
