                                const d = task.status === 'completed', w = task.status === 'in_progress', p = task.status === 'pending', na = task.status === 'not_applicable';
                                const lt = isOverdue(task.dueDate, task.status), hw = (w || p) && task.isHighPriority;
                                const tkCls = colorClassesMap[deptList.find(dl => dl.key === task.department)?.color || 'slate'] || colorClassesMap.slate;
                                const logs = task.contextLogs ? [...task.contextLogs].sort((a, b) => b.date.localeCompare(a.date)) : [];
                                const tCol = collapsedTasks[task.id] !== undefined ? collapsedTasks[task.id] : (d || na);
                                const dDays = getDurationDays(task);
                                const isDraggingThisCard = draggedTaskInfo && draggedTaskInfo.stepId === step.id && draggedTaskInfo.index === taskIndex;

                                // 「今日やる」に設定されているかつ「未完了」かつ「期限超過（本日を過ぎている）」かどうかの判定
                                const isOverdueTodayTask = task.doToday && !d && !na && lt;

                                return (
                                  <div 
                                    key={task.id} 
                                    id={`task-anchor-${task.id}`} 
                                    draggable={editingTaskId !== task.id} 
                                    onDragStart={(e) => handleTaskDragStart(step.id, taskIndex, e)} 
                                    onDragOver={(e) => handleTaskDragOver(step.id, taskIndex, e)} 
                                    onDragEnd={handleTaskDragEnd} 
                                    onClick={() => toggleTaskCollapse(task.id)} 
                                    className={`group/task-card relative border-4 rounded-3xl p-4 flex flex-col justify-between overflow-hidden shadow-xs cursor-pointer ${isDraggingThisCard ? 'drag-ghost' : ''} ${
                                      d || na 
                                        ? 'border-slate-202 dark:border-slate-707/50 opacity-60 bg-slate-55/70 dark:bg-slate-800/40' 
                                        : isOverdueTodayTask
                                          ? 'border-rose-500 bg-rose-50/30 dark:bg-rose-950/20 ring-2 ring-rose-500 animate-pulse'
                                          : task.doToday
                                            ? 'border-amber-400 bg-amber-50/10 dark:bg-amber-955/10 ring-1 ring-amber-300'
                                            : hw 
                                              ? 'border-rose-500 dark:border-rose-600 bg-rose-55 dark:bg-rose-900/10 ring-2 ring-rose-200' 
                                              : task.isHighPriority 
                                                ? 'border-rose-400 bg-gradient-to-br from-rose-55/10 to-white dark:from-rose-900/10 dark:to-slate-800 ring-1 ring-rose-400/5' 
                                                : `${tkCls.borderStrong} bg-white dark:bg-slate-800`
                                    }`}
                                  >
                                    <div className="absolute top-3.5 right-3.5 flex flex-wrap justify-end items-center gap-1.5 z-10 max-w-[65%]" onClick={(e) => e.stopPropagation()}>
                                      {(!d && !na) && (
                                        <div className="flex items-center gap-1 mr-1 bg-white/90 dark:bg-slate-800/90 border border-slate-202 dark:border-slate-700 p-0.5 rounded-lg">
                                          <button onClick={(e) => { e.stopPropagation(); moveTaskOrder(step.id, taskIndex, -1, e); }} disabled={taskIndex === 0} className={`p-1 bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-md transition shadow-xs ${taskIndex === 0 ? 'opacity-25' : 'text-slate-440 hover:text-indigo-600'}`}><IconDragHandle /></button>
                                          <button onClick={(e) => { e.stopPropagation(); startEditing(task); }} className="p-1 text-slate-440 hover:text-indigo-600 rounded-md"><IconEdit2 className="h-3.5 w-3.5" /></button>
                                          <button onClick={(e) => { e.stopPropagation(); deleteTask(task.id); }} className="p-1 text-slate-440 hover:text-rose-605 rounded-md"><IconTrash2 className="h-3.5 w-3.5" /></button>
                                        </div>
                                      )}
                                      
                                      {/* 🔥 今日やるトグルボタン */}
                                      {(!d && !na) && (
                                        <button 
                                          onClick={(e) => { e.stopPropagation(); toggleDoToday(task.id); }} 
                                          className={`flex items-center gap-0.5 text-[9px] font-black px-2.5 py-1.5 rounded-xl border transition-all ${
                                            task.doToday 
                                              ? isOverdueTodayTask 
                                                ? 'bg-rose-600 text-white border-rose-700 shadow-md animate-bounce' 
                                                : 'bg-amber-500 text-white border-amber-600 shadow-md' 
                                              : 'bg-slate-55 dark:bg-slate-800 text-slate-605 dark:text-slate-300 border-slate-202 hover:bg-slate-150'
                                          }`}
                                        >
                                          <span>🔥 {task.doToday ? '今日やる中' : '今日やる'}</span>
                                        </button>
                                      )}

                                      <button onClick={(e) => { e.stopPropagation(); toggleTaskPriority(task.id); }} className={`flex items-center gap-0.5 text-[9px] font-black px-2.5 py-1.5 rounded-xl border ${task.isHighPriority ? 'bg-rose-500 text-white border-rose-600 shadow-md shadow-rose-100 dark:shadow-none' : 'bg-rose-55/70 dark:bg-rose-900/30 text-rose-605 dark:text-rose-400 border-rose-200'}`}><IconFlag className="h-2.5 w-2.5" />{task.isHighPriority ? '最優先' : '優先度'}</button>
                                      <select value={task.status} onClick={(e) => e.stopPropagation()} onChange={(e) => changeTaskStatus(task.id, e.target.value)} className={`text-[9px] font-black px-2.5 py-1.5 rounded-xl border cursor-pointer focus:outline-none ${d ? 'bg-emerald-500 text-white border-emerald-600 shadow-md shadow-emerald-100' : w ? 'bg-blue-500 text-white border-blue-600 shadow-md shadow-blue-100' : na ? 'bg-slate-400 text-white border-slate-500 shadow-md shadow-slate-200' : 'bg-slate-150 dark:bg-slate-700 text-slate-705 dark:text-slate-300 border-slate-202'}`}>
                                        <option value="pending" className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-150">🔘 未対応</option><option value="in_progress" className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-150">⚡ 進行中</option><option value="completed" className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-150">✅ 完了マーク</option><option value="not_applicable" className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-150">🚫 対応なし</option>
                                      </select>
                                      {editingTaskId !== task.id && <button onClick={(e) => { e.stopPropagation(); toggleTaskCollapse(task.id); }} className="p-1 text-slate-404 ml-0.5">{tCol ? <IconChevronRight className="h-4 w-4" /> : <IconChevronDown className="h-4 w-4" />}</button>}
                                    </div>

                                    {editingTaskId === task.id ? (
                                      <div className="space-y-3.5 text-xs w-full pl-1 pr-4 mt-6 animate-in fade-in" onClick={(e) => e.stopPropagation()}>
                                        <div className="flex justify-between items-center pb-3 border-b border-slate-202 dark:border-slate-700">
                                          <span className="font-extrabold text-indigo-600 dark:text-indigo-400 block">✏️ タスク編集 (# {index + 1}-{taskIndex + 1}-{task.sequenceId || '?'})</span>
                                          <div className="flex items-center gap-2">
                                            <button onClick={() => setEditingTaskId(null)} className="bg-slate-150 dark:bg-slate-800 text-slate-505 px-3 py-1.5 rounded-xl font-bold">戻る</button>
                                            <button onClick={() => saveEdit(task.id)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-xl font-bold transition-colors">保存</button>
                                          </div>
                                        </div>
                                        <input type="text" value={editFormData.title} onChange={e => setEditFormData({...editFormData, title: e.target.value})} className="w-full font-bold border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2.5 text-slate-705 dark:text-slate-150 focus:outline-none" placeholder="タスク名" />
                                        <textarea value={editFormData.description} onChange={e => setEditFormData({...editFormData, description: e.target.value})} onPaste={(e) => handlePasteOnTextInput(e, setEditTaskImages)} onDrop={(e) => handleDropOnTextInput(e, setEditTaskImages)} className="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2.5 min-h-[100px] text-slate-705 dark:text-slate-150 focus:outline-none" rows={3} placeholder="詳細や論点... (画像ペースト対応)" />
                                        {editTaskImages.length > 0 && (
                                          <div className="flex flex-wrap gap-2 p-2 bg-slate-55 dark:bg-slate-800 rounded-xl border">
                                            {editTaskImages.map((src, imgIdx) => (
                                              <div key={`edit-img-${imgIdx}`} className="relative w-12 h-12 rounded-lg overflow-hidden border">
                                                <img src={src} className="w-full h-full object-cover" /><button type="button" onClick={() => setEditTaskImages(prev => prev.filter((_, idx) => idx !== imgIdx))} className="absolute top-0.5 right-0.5 bg-slate-955/80 text-white rounded-full p-0.5"><IconX className="h-2.5 w-2.5" /></button>
                                              </div>
                                            ))}
                                          </div>
                                        )}
                                        <div className="grid grid-cols-3 gap-2">
                                          <div><label className="text-[10px] text-slate-440 font-bold block mb-0.5">担当部署</label><select value={editFormData.department} onChange={e => { const dk = e.target.value; const fnd = deptList.find(d => d.key === dk); setEditFormData({ ...editFormData, department: dk, assignee: dk === 'backoffice' ? '自分 (事務)' : (fnd ? `${fnd.label}担当` : '担当者') }); }} className="w-full border border-slate-300 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-900 text-slate-705 dark:text-slate-200">{deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}</select></div>
                                          <div><label className="text-[10px] text-slate-440 font-bold block mb-0.5">担当者名</label><input type="text" value={editFormData.assignee} onChange={e => setEditFormData({...editFormData, assignee: e.target.value})} className="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs text-slate-705 dark:text-slate-200 focus:outline-none" /></div>
                                          <div><label className="text-[10px] text-slate-440 font-bold block mb-0.5">完了期日</label><input type="date" value={editFormData.dueDate} onChange={e => setEditFormData({...editFormData, dueDate: e.target.value})} className="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs font-mono text-slate-705 dark:text-slate-200 focus:outline-none" /></div>
                                        </div>

                                        {/* タスク編集時の関連リンク (インデントと縮小・デザインブラッシュアップ) */}
                                        <div className="col-span-1 md:col-span-3 border-t border-slate-202 dark:border-slate-700/50 pt-3 mt-1 space-y-2 pl-4 border-l-2 border-slate-200 dark:border-slate-700 ml-1">
                                          <span className="text-[10px] font-black text-slate-606 dark:text-slate-455 flex items-center gap-1.5 uppercase tracking-wider">
                                            <IconLink className="h-3.5 w-3.5 text-indigo-500" />
                                            <span>関連リンクの編集</span>
                                          </span>
                                          <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 max-w-lg">
                                            <input 
                                              type="text" 
                                              placeholder="リンク名" 
                                              value={tmpEditTaskLinkLabel} 
                                              onChange={e => setTmpEditTaskLinkLabel(e.target.value)} 
                                              className="w-full sm:w-1/3 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs text-slate-705 dark:text-slate-200 focus:outline-none focus:border-indigo-500" 
                                            />
                                            <div className="flex-1 flex gap-1.5">
                                              <input 
                                                type="text" 
                                                placeholder="URL" 
                                                value={tmpEditTaskLinkUrl} 
                                                onChange={e => setTmpEditTaskLinkUrl(e.target.value)} 
                                                className="flex-1 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-xl p-2 text-xs text-slate-705 dark:text-slate-200 focus:outline-none focus:border-indigo-500" 
                                              />
                                              <button 
                                                type="button" 
                                                onClick={handleAddLinkToEditTask} 
                                                className="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white px-3 py-2 rounded-xl text-xs font-black transition-all flex items-center gap-1 shrink-0 shadow-sm"
                                                title="リンクを追加"
                                              >
                                                <IconPlus />
                                                <span>追加</span>
                                              </button>
                                            </div>
                                          </div>
                                          {editTaskLinks.length > 0 && (
                                            <div className="flex flex-wrap gap-1.5 pt-1">
                                              {editTaskLinks.map(lnk => (
                                                <span key={lnk.id} className="inline-flex items-center gap-1 text-[10px] bg-slate-150 dark:bg-slate-800 border border-slate-202 dark:border-slate-700 text-slate-605 dark:text-slate-300 px-2 py-0.5 rounded-lg font-bold"><IconLink className="h-2.5 w-2.5"/><span className="truncate max-w-[120px] ml-1">{lnk.label}</span><button type="button" onClick={(e) => handleRemoveLinkFromEditTask(lnk.id, e)} className="text-slate-404 hover:text-rose-605 font-bold text-[10px] ml-1">×</button></span>
                                              ))}
                                            </div>
                                          )}
                                        </div>
                                      </div>
                                    ) : (
                                      <div className="space-y-3.5 flex-1 flex flex-col justify-between pl-1 pr-4 mt-6">
                                        <div className="space-y-2.5">
                                          <h4 
                                            className="font-extrabold text-sm text-slate-805 dark:text-slate-150 flex items-start gap-1.5 pr-[420px] cursor-text select-text"
                                            onPointerDown={(e) => e.stopPropagation()} 
                                            onDragStart={(e) => { e.preventDefault(); e.stopPropagation(); }}
                                          >
                                            <span className="text-[10px] px-2 py-0.5 rounded-lg font-mono font-bold bg-slate-150 dark:bg-slate-900 border border-slate-202 dark:border-slate-700 text-slate-805 dark:text-slate-200 select-none">#{index+1}-{taskIndex+1}-<span className="font-black">{task.sequenceId || '?'}</span></span>
                                            <span>{task.title}</span>
                                          </h4>
                                          <div className="flex flex-wrap items-center gap-2 pt-0.5">
                                            <span className={`text-[9.5px] font-black px-2.5 py-0.5 rounded-full border ${tkCls.badge}`}>{deptList.find(d => d.key === task.department)?.label || '未設定'} : {task.assignee}</span>
                                            <div className="flex items-center gap-1 text-[10.5px] text-slate-440 font-mono font-bold"><IconCalendar /><span className={lt ? 'text-rose-605 dark:text-rose-400 font-black animate-pulse' : ''}>{task.dueDate}</span></div>
                                            {task.startedAt && <span className={`inline-flex items-center gap-1 text-[9px] font-black px-2.5 py-0.5 rounded-lg border ${d ? 'bg-emerald-55 text-emerald-700 border-emerald-200' : na ? 'bg-slate-150 text-slate-505 border-slate-202' : 'bg-blue-50 text-blue-700 border-blue-200 animate-pulse'}`}><IconClock className="h-2.5 w-2.5" /><span>{d ? `${task.startedAt} 〜 ${task.completedAt} (${dDays} 日)` : na ? `${task.startedAt} 〜 ${task.completedAt} (対応なし)` : `${task.startedAt} 着手 (${dDays} 日)`}</span></span>}
                                          </div>
                                          
                                          <div className="relative group/desc space-y-1.5 mt-3" onClick={(e) => e.stopPropagation()}>
                                            <div className="text-[9.5px] font-bold text-slate-450 dark:text-slate-555 ml-1 flex items-center justify-between select-none">
                                              <span className="flex items-center gap-1"><IconInfo className="h-3 w-3" /> 論点・備考 <span className="text-[8px] text-slate-440 dark:text-slate-555 font-normal">(クリックで直接編集)</span></span>
                                              {editingDescTaskId === task.id && (
                                                <button 
                                                  onClick={() => handleSaveDirectDesc(task.id)}
                                                  className="text-[9px] bg-indigo-600 hover:bg-indigo-700 text-white px-2 py-0.5 rounded-lg font-bold"
                                                >
                                                  保存
                                                </button>
                                              )}
                                            </div>
                                            <div className="relative">
                                              {editingDescTaskId === task.id ? (
                                                <textarea
                                                  value={tmpDescValue}
                                                  onChange={(e) => setTmpDescValue(e.target.value)}
                                                  onBlur={() => handleSaveDirectDesc(task.id)}
                                                  onKeyDown={(e) => {
                                                    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
                                                      handleSaveDirectDesc(task.id);
                                                    }
                                                  }}
                                                  className="w-full text-[11px] bg-white dark:bg-slate-900 border-2 border-indigo-500 dark:border-indigo-400 rounded-2xl p-3 text-slate-805 dark:text-slate-100 focus:outline-none min-h-[60px]"
                                                  autoFocus
                                                  onPointerDown={(e) => e.stopPropagation()}
                                                  onDragStart={(e) => { e.preventDefault(); e.stopPropagation(); }}
                                                />
                                              ) : (
                                                <p 
                                                  className={`text-[11px] whitespace-pre-wrap bg-slate-55 dark:bg-slate-900/50 border border-slate-202 dark:border-slate-700 rounded-2xl p-3 cursor-pointer select-text hover:border-indigo-400 dark:hover:indigo-600 hover:bg-indigo-50/20 dark:hover:bg-indigo-950/20 transition-all ${task.description ? 'text-slate-606 dark:text-slate-300' : 'text-slate-440 dark:text-slate-555 italic'}`}
                                                  onClick={(e) => {
                                                    e.stopPropagation();
                                                    setEditingDescTaskId(task.id);
                                                    setTmpDescValue(task.description || '');
                                                  }}
                                                  onPointerDown={(e) => e.stopPropagation()} 
                                                  onDragStart={(e) => { e.preventDefault(); e.stopPropagation(); }}
                                                  title="クリックして直接編集"
                                                >
                                                  {task.description || '入力なし'}
                                                </p>
                                              )}
                                              {task.attachedImages && task.attachedImages.length > 0 && (
                                                <div className="flex flex-wrap gap-2 pt-2 px-1">
                                                  {task.attachedImages.map((src, imgIdx) => (
                                                    <div key={`task-img-${task.id}-${imgIdx}`} onClick={() => setLightboxImage(src)} className="relative max-w-[140px] max-h-[100px] rounded-xl overflow-hidden border border-slate-202 cursor-zoom-in hover:brightness-95"><img src={src} alt="preview" className="w-full h-full object-cover" /></div>
                                                  ))}
                                                </div>
                                              )}
                                              {editingDescTaskId !== task.id && task.description && (
                                                <button onClick={(e) => { e.stopPropagation(); handleCopyToClipboard(task.description, 'タスク詳細説明をコピーしました！'); }} className="absolute top-2 right-2 opacity-100 p-1 bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-600 text-slate-505 dark:text-slate-450 rounded-lg text-[9px] font-bold shadow-xs select-none transition-colors" title="タスクの説明をコピー">📋 コピー</button>
                                              )}
                                            </div>
                                          </div>
                                        </div>

                                        {task.links && task.links.length > 0 && (
                                          <div className="flex flex-wrap items-center gap-1.5 mt-2 pt-2 border-t border-slate-150 dark:border-slate-700/50" onClick={(e) => e.stopPropagation()}>
                                            <span className="text-[9px] font-bold text-slate-440 dark:text-slate-550 flex items-center gap-0.5"><IconLink className="h-2.5 w-2.5"/> 関連リンク:</span>
                                            {task.links.map(lnk => (
                                              <a key={lnk.id} href={lnk.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 text-[10px] bg-slate-55 dark:bg-slate-800 hover:bg-slate-150 dark:hover:bg-slate-700 text-slate-606 dark:text-slate-300 border border-slate-202 dark:border-slate-700 px-2 py-0.5 rounded-lg transition font-black shadow-xs">
                                                <IconExternalLink className="h-2.5 w-2.5" /><span>{lnk.label}</span>
                                              </a>
                                            ))}
                                          </div>
                                        )}
                                      </div>
                                    )}

                                    {!tCol && (
                                      <div className="space-y-3 pt-2" onClick={(e) => e.stopPropagation()}>
                                        <div className="bg-slate-55 dark:bg-slate-900/40 border border-slate-202 dark:border-slate-700 rounded-2xl p-3 space-y-2.5 shadow-inner">
                                          <div className="pb-1.5 border-b border-slate-202 dark:border-slate-700/50 flex flex-col gap-2">
                                            <span className="text-[9.5px] font-black text-slate-440 dark:text-slate-550 flex items-center gap-1 select-none"><IconClock /> 時系列メモ</span>
                                            {addingLogTaskId !== task.id && !d && !na && (
                                              <div className="flex justify-center w-full pb-1">
                                                <button onClick={(e) => { e.stopPropagation(); setAddingLogTaskId(task.id); setNewLogText(''); setNewLogTo(''); setNewLogDueDate(''); setNewLogLinks([]); setNewLogImages([]); setTmpLinkLabel(''); setTmpLinkUrl(''); }} className="text-[10px] font-black text-indigo-600 dark:text-indigo-400 flex items-center gap-1 bg-indigo-50 dark:bg-indigo-900/20 hover:bg-indigo-100 dark:hover:bg-indigo-900/40 border border-indigo-200 dark:border-indigo-800/50 px-4 py-1.5 rounded-full transition-colors shadow-xs"><IconPlus className="h-3 w-3"/> メモを追記する</button>
                                              </div>
                                            )}
                                          </div>
                                          {addingLogTaskId === task.id && (
                                            <div className="bg-white dark:bg-slate-800 border border-indigo-200 dark:border-indigo-800/50 rounded-2xl p-3 space-y-3 text-xs shadow-md animate-in zoom-in-95">
                                              <div className="flex justify-between items-center pb-2 border-b border-slate-150 dark:border-slate-700">
                                                <span className="font-bold text-indigo-700 dark:text-indigo-400 flex items-center gap-1.5"><IconPlus className="h-3.5 w-3.5"/> メモの新規追記</span>
                                                <div className="flex items-center gap-2">
                                                  <button onClick={() => setAddingLogTaskId(null)} className="text-[9px] text-slate-440 dark:text-slate-550 hover:bg-slate-55 dark:hover:bg-slate-700 px-2.5 py-1.5 rounded-lg font-bold transition-colors">キャンセル</button>
                                                  <button onClick={() => addLog(task.id)} disabled={!newLogText.trim() && newLogImages.length === 0} className="text-[9px] bg-indigo-600 hover:bg-indigo-700 text-white px-3.5 py-1.5 rounded-lg font-black disabled:bg-slate-150 dark:disabled:bg-slate-700 disabled:text-slate-404 dark:disabled:text-slate-555 disabled:cursor-not-allowed transition-colors">保存する</button>
                                                </div>
                                              </div>
                                              <textarea value={newLogText} onChange={e => setNewLogText(e.target.value)} onPaste={(e) => handlePasteOnTextInput(e, setNewLogImages)} onDrop={(e) => handleDropOnTextInput(e, setNewLogImages)} placeholder="状況メモ... (画像対応)" className="w-full bg-slate-55 dark:bg-slate-900 border border-slate-202 dark:border-slate-700 rounded-xl p-2.5 text-xs text-slate-705 dark:text-slate-150 font-bold focus:outline-none focus:border-indigo-400 min-h-[80px]" rows={2.5} />
                                              {newLogImages.length > 0 && (
                                                <div className="flex flex-wrap gap-1.5 p-2 bg-slate-150 dark:bg-slate-900/50 rounded-xl border">
                                                  {newLogImages.map((src, imgIdx) => (
                                                    <div key={`new-log-img-${imgIdx}`} className="relative w-12 h-12 rounded-lg overflow-hidden border"><img src={src} className="w-full h-full object-cover" /><button type="button" onClick={() => setNewLogImages(p => p.filter((_, idx) => idx !== imgIdx))} className="absolute top-0.5 right-0.5 bg-slate-955/80 text-white rounded-full p-0.5"><IconX className="h-2.5 w-2.5" /></button></div>
                                                  ))}
                                                </div>
                                              )}
                                              <div className="grid grid-cols-2 gap-2 text-[10px]">
                                                <div><label className="block text-slate-440 dark:text-slate-555 font-bold mb-0.5">TO</label><select value={newLogTo} onChange={e=>setNewLogTo(e.target.value)} className="w-full border border-slate-202 dark:border-slate-700 rounded-lg p-1.5 bg-white dark:bg-slate-900 font-bold text-slate-555 dark:text-slate-300 focus:outline-none"><option value="">指定なし</option>{deptList.map(dl => <option key={dl.key} value={dl.label}>{dl.label}</option>)}<option value="全員">全員</option></select></div>
                                                <div><label className="block text-slate-440 dark:text-slate-555 font-bold mb-0.5">期限日</label><input type="date" value={newLogDueDate} onChange={e=>setNewLogDueDate(e.target.value)} className="w-full border border-slate-202 dark:border-slate-700 bg-white dark:bg-slate-900 rounded-lg p-1 font-mono font-bold text-slate-705 dark:text-slate-200 focus:outline-none" /></div>
                                              </div>
                                              <div className="border-t border-slate-150 dark:border-slate-700 pt-2 space-y-2">
                                                <span className="text-[9px] font-bold text-slate-440 dark:text-slate-555 block uppercase">🔗 関連リンク</span>
                                                <div className="flex items-center gap-1">
                                                  <IconLink className="text-slate-440" /><input type="text" placeholder="リンク名" value={tmpLinkLabel} onChange={e=>setTmpLinkLabel(e.target.value)} className="w-24 border border-slate-202 dark:border-slate-700 bg-white dark:bg-slate-900 rounded-lg px-2 py-1 text-[9px] font-bold text-slate-755 dark:text-slate-200 focus:outline-none focus:border-indigo-400" /><input type="text" placeholder="URL" value={tmpLinkUrl} onChange={e=>setTmpLinkUrl(e.target.value)} className="flex-1 border border-slate-202 dark:border-slate-700 bg-white dark:bg-slate-900 rounded-lg px-2 py-1 text-[9px] text-slate-705 dark:text-slate-200 focus:outline-none focus:border-indigo-400" /><button onClick={handleAddLinkToNewLog} className="bg-indigo-600 hover:bg-indigo-700 text-white border border-indigo-600 px-2.5 py-1 rounded-lg text-[9px] font-black shrink-0 transition-colors">開く</button>
                                                </div>
                                                {newLogLinks.length > 0 && (
                                                  <div className="flex flex-wrap gap-1.5 pt-1">
                                                    {newLogLinks.map(lnk => (
                                                      <span key={lnk.id} className="inline-flex items-center gap-1 text-[9px] bg-slate-150 dark:bg-slate-800 border border-slate-202 dark:border-slate-700 text-slate-605 dark:text-slate-300 px-2 py-0.5 rounded-lg font-bold"><span className="truncate max-w-[85px]">{lnk.label}</span><button onClick={(e) => handleRemoveLinkFromNewLog(lnk.id, e)} className="text-slate-404 hover:text-rose-605 dark:hover:text-rose-400 font-bold text-[10px]">×</button></span>
                                                    ))}
                                                  </div>
                                                )}
                                              </div>
                                            </div>
                                          )}
                                          <div className="space-y-2 max-h-[170px] overflow-y-auto pr-1 scrollbar-thin">
                                            {logs.length > 0 ? logs.map(log => {
                                              const isEdLog = editingLogId === log.id;
                                              return (
                                                <div key={log.id} className={`group/log relative border rounded-xl p-3 shadow-xs flex flex-col gap-1.5 ${log.completed ? 'opacity-50 bg-emerald-55/50 dark:bg-emerald-900/20 border-emerald-100' : log.isHighlighted ? 'bg-amber-50 dark:bg-amber-900/20 border-amber-300 ring-1 ring-amber-300' : 'bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700'}`}>
                                                  {isEdLog ? (
                                                    <div className="space-y-2.5 text-xs w-full bg-slate-55 dark:bg-slate-900/50 p-2.5 rounded-xl border border-slate-202 dark:border-slate-700">
                                                      <span className="font-bold text-[10px] text-indigo-600 block">✏️ インライン編集</span>
                                                      <textarea value={editLogText} onChange={e => setEditLogText(e.target.value)} onPaste={(e) => handlePasteOnTextInput(e, setEditLogImages)} onDrop={(e) => handleDropOnTextInput(e, setEditLogImages)} className="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-xl p-2 text-xs text-slate-705 dark:text-slate-200 font-bold min-h-[60px]" rows={2} />
                                                      <div className="flex justify-end gap-1.5 pt-1.5 border-t border-slate-202 dark:border-slate-700">
                                                        <button onClick={() => setEditingLogId(null)} className="text-[9px] text-slate-550 px-2 py-0.5">キャンセル</button>
                                                        <button onClick={() => saveLogEdit(task.id, log.id)} disabled={!editLogText.trim() && editLogImages.length === 0} className="text-[9px] bg-indigo-600 text-white px-3 py-1 rounded font-bold">更新</button>
                                                      </div>
                                                    </div>
                                                  ) : (
                                                    <React.Fragment>
                                                      <div className="flex justify-between items-center border-b border-slate-150 dark:border-slate-707/50 pb-1">
                                                        <span className="text-[8px] font-mono text-slate-404 font-bold flex items-center gap-0.5"><IconClock /> {log.date}{log.isHighlighted && <span className="ml-1.5 bg-amber-100 text-amber-800 text-[7.5px] px-1.5 py-0.5 rounded font-bold">📌 重要</span>}</span>
                                                        <div className="flex items-center gap-1.5 bg-white/95 dark:bg-slate-800/95 border border-slate-202 dark:border-slate-700 rounded-lg p-0.5 absolute top-2 right-2">
                                                          <button onClick={() => startEditingLog(log)} className="p-1 text-slate-404 hover:text-indigo-600"><IconEdit2 className="h-3 w-3" /></button>
                                                          <button onClick={() => toggleLogHighlight(task.id, log.id)} className={`p-1 ${log.isHighlighted ? 'text-amber-500 bg-amber-50' : 'text-slate-404 hover:text-amber-500'}`}><IconPin className="h-3 w-3" /></button>
                                                          <button onClick={() => toggleLogComplete(task.id, log.id)} className={`p-1 ${log.completed ? 'text-emerald-500' : 'text-slate-404 hover:text-emerald-600'}`}><IconCheck className="h-3 w-3" /></button>
                                                          <button onClick={() => deleteLog(task.id, log.id)} className="p-1 text-slate-404 hover:text-rose-605"><IconTrash2 className="h-3 w-3" /></button>
                                                        </div>
                                                      </div>
                                                      <div className="w-full pr-14 space-y-2">
                                                        <p 
                                                          className={`text-[11px] font-bold whitespace-pre-wrap cursor-text select-text ${log.completed ? 'line-through text-slate-404' : ''}`}
                                                          onPointerDown={(e) => e.stopPropagation()} 
                                                          onDragStart={(e) => { e.preventDefault(); e.stopPropagation(); }}
                                                        >
                                                          {log.text}
                                                        </p>
                                                        {log.attachedImages && log.attachedImages.length > 0 && (
                                                          <div className="flex flex-wrap gap-1.5 pt-1.5">
                                                            {log.attachedImages.map((src, imgIdx) => (
                                                              <div key={`log-img-${log.id}-${imgIdx}`} onClick={() => setLightboxImage(src)} className="relative max-w-[120px] max-h-[80px] rounded-lg overflow-hidden border border-slate-202 cursor-zoom-in"><img src={src} className="w-full h-full object-cover" /></div>
                                                            ))}
                                                          </div>
                                                        )}
                                                      </div>
                                                      <div className="flex flex-wrap items-center gap-1.5 mt-0.5">
                                                        {log.to && (<span className="inline-flex items-center gap-1 text-[9px] bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 px-2 py-0.5 rounded-lg font-black">TO: {log.to}</span>)}
                                                        {log.dueDate && (<span className="inline-flex items-center gap-1 text-[9px] bg-rose-55 dark:bg-rose-900/30 text-rose-700 dark:text-rose-300 px-2 py-0.5 rounded-lg font-mono font-bold">期日: {log.dueDate}</span>)}
                                                        {log.links && log.links.map(lnk => (
                                                          <a key={lnk.id} href={lnk.url} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="inline-flex items-center gap-1 text-[9px] bg-slate-150 dark:bg-slate-800 hover:bg-slate-202 dark:hover:bg-slate-700 border border-slate-202 dark:border-slate-700 text-slate-605 dark:text-slate-300 px-2 py-0.5 rounded-lg transition">
                                                            <IconExternalLink className="h-2.5 w-2.5" /> <span className="font-bold">{lnk.label}</span>
                                                            {!log.completed && (<button onClick={(e) => { e.preventDefault(); e.stopPropagation(); removeSingleLinkFromLog(task.id, log.id, lnk.id); }} className="text-slate-404 dark:text-slate-550 hover:text-rose-605 dark:hover:text-rose-400 font-bold text-[10px] ml-1" title="リンクのみ削除">×</button>)}
                                                          </a>
                                                        ))}
                                                      </div>
                                                    </React.Fragment>
                                                  )}
                                                </div>
                                              );
                                            }) : (<p className="text-[10px] text-slate-404 text-center py-4 bg-white dark:bg-slate-800 border border-dashed rounded-xl">履歴はありません</p>)}
                                          </div>
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </React.Fragment>
            )}

            {/* --- DBビュー --- */}
            {viewMode === 'database' && (
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl shadow-xs overflow-hidden p-6 space-y-5 animate-in fade-in transition-colors">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-202 dark:border-slate-700">
                  <div className="space-y-1">
                    <h2 className="text-base font-black text-slate-805 dark:text-white flex items-center gap-2"><IconDatabase className="text-indigo-600 dark:text-indigo-400" />ECD案件一覧データベース</h2>
                    <p className="text-xs text-slate-404 dark:text-slate-505">案件・プロジェクトを横断して進捗・ヘルス状況を俯瞰します。</p>
                  </div>
                  <button onClick={() => { setNewProjFolderId(selectedFolderId); setShowAddProjectModal(true); }} className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-xs px-4.5 py-3 rounded-2xl flex items-center gap-1.5"><IconPlus /> 新規案件を起票</button>
                </div>
                <div className="flex flex-col sm:flex-row gap-3 pt-1">
                  <select value={dbFilterFolderId} onChange={(e) => setDbFilterFolderId(e.target.value)} className="border border-slate-202 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-605 dark:text-slate-300 bg-slate-55 dark:bg-slate-900 focus:outline-none focus:border-indigo-400">
                    <option value="all">📁 すべてのフォルダ</option>{folders.map(f => (<option key={f.id} value={f.id}>📁 {f.name}</option>))}
                  </select>
                  <select value={dbFilterStatus} onChange={(e) => setDbFilterStatus(e.target.value)} className="border border-slate-202 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-605 dark:text-slate-300 bg-slate-55 dark:bg-slate-900 focus:outline-none focus:border-indigo-400">
                    <option value="all">🚥 すべての進捗状況</option><option value="pending">未着手</option><option value="in_progress">進行中</option><option value="completed">完了</option><option value="not_applicable">対応なし</option>
                  </select>
                  <div className="flex-1 relative">
                    <input type="text" placeholder="案件名やコードでリアルタイム検索..." value={dbFilterText} onChange={(e) => setDbFilterText(e.target.value)} className="w-full border border-slate-202 dark:border-slate-705 text-slate-705 dark:text-slate-200 font-bold bg-white dark:bg-slate-900 focus:outline-none focus:border-indigo-400" />
                  </div>
                </div>
                <div className="overflow-x-auto rounded-2xl border border-slate-202 dark:border-slate-700">
                  <table className="w-full text-xs text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-55 dark:bg-slate-900 border-b border-slate-202 dark:border-slate-700 text-slate-605 dark:text-slate-440 font-black text-[10.5px] uppercase tracking-wider">
                        <th className="py-3 px-4 border border-slate-202 dark:border-slate-700 text-center w-28">状態</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700">フォルダ</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700">案件名</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700 w-32">コード</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700 w-44">開始〜目標</th><th className="py-2.5 px-4 border border-slate-202 dark:border-slate-700 text-center w-28">タスク内訳</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700 w-40">進捗率</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700 w-36">アラート</th><th className="py-3 px-4 border border-slate-202 dark:border-slate-700 text-center w-32">操作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-202 dark:divide-slate-700">
                      {filteredDbProjects.length > 0 ? filteredDbProjects.map(proj => {
                        const prog = calculateProjectProgressById(proj), lates = countLateTasksByProject(proj);
                        const folderName = folders.find(f => f.id === proj.folderId)?.name || '未分類';
                        const { completed, inProgress, notStarted, notApplicable } = countTaskStatus(proj);
                        const statusObj = projectStatusOptions.find(o => o.value === (proj.status || 'pending'));
                        return (
                          <tr key={proj.id} className="hover:bg-slate-55/50 dark:hover:bg-slate-700/30 transition-colors">
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 text-center"><span className={`inline-flex items-center px-2.5 py-0.5 rounded-xl font-black text-[9.5px] border shadow-xs ${statusObj?.className}`}>{statusObj?.label}</span></td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 font-black text-slate-550 dark:text-slate-455"><span className="inline-flex items-center gap-1"><IconFolder className="h-3.5 w-3.5 text-purple-600 dark:text-purple-400" />{folderName}</span></td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 font-black text-slate-955 dark:text-slate-100 text-sm max-w-xs truncate">{proj.name}</td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 font-mono text-slate-505 dark:text-slate-455 font-bold uppercase tracking-wider">{proj.code}</td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 font-mono text-slate-505 dark:text-slate-455 font-bold">{proj.startDate} 〜 {proj.endDate}</td>
                            <td className="py-2 px-4 border border-slate-202 dark:border-slate-700 align-middle">
                              <div className="flex flex-col gap-0.5 text-[9.5px] w-24 mx-auto font-mono font-bold leading-none">
                                <div className="flex justify-between items-center text-slate-505 dark:text-slate-455 bg-slate-55 dark:bg-slate-800 px-1 py-0.5 rounded border border-slate-150 dark:border-slate-700"><span>未着手</span><span>{notStarted}</span></div>
                                <div className="flex justify-between items-center text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 px-1 py-0.5 rounded border border-blue-100 dark:border-blue-800"><span>進行中</span><span>{inProgress}</span></div>
                                <div className="flex justify-between items-center text-emerald-600 dark:text-emerald-400 bg-emerald-55 dark:bg-emerald-900/30 px-1 py-0.5 rounded border border-emerald-100 dark:border-emerald-800"><span>完了</span><span>{completed}</span></div>
                                {notApplicable > 0 && (<div className="flex justify-between items-center text-slate-505 dark:text-slate-455 bg-slate-150 dark:bg-slate-700 px-1 py-0.5 rounded border border-slate-202 dark:border-slate-600"><span>対応なし</span><span>{notApplicable}</span></div>)}
                              </div>
                            </td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700">
                              <div className="flex items-center gap-2 min-w-[120px]"><div className="h-2 flex-1 bg-slate-150 dark:bg-slate-700 border border-slate-202 dark:border-slate-600 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-indigo-500 bg-gradient-to-r from-indigo-500 to-purple-500" style={{ width: `${prog}%` }} /></div><span className="font-black font-mono text-indigo-600 dark:text-indigo-400 w-8 text-right text-xs">{prog}%</span></div>
                            </td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700">
                              {lates > 0 ? <span className="inline-flex items-center gap-1 bg-rose-55 dark:bg-rose-900/30 text-rose-700 dark:text-rose-400 border border-rose-200 dark:border-rose-800 font-black text-[9.5px] px-2.5 py-0.5 rounded-full shadow-sm animate-pulse">⚠️ 遅延 {lates}件</span> : <span className="inline-flex items-center gap-1 bg-emerald-55 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800 font-black text-[9.5px] px-2.5 py-0.5 rounded-full shadow-xs">✅ 順調</span>}
                            </td>
                            <td className="py-3.5 px-4 border border-slate-202 dark:border-slate-700 text-center">
                              <div className="flex items-center justify-center gap-1.5">
                                <button onClick={() => handleOpenProjectFromDb(proj)} className="flex items-center gap-1 bg-indigo-50 dark:bg-indigo-900/30 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 border border-indigo-200 dark:border-indigo-800 font-black px-2.5 py-1.5 rounded-xl shadow-xs text-[11px]"><IconEye className="h-3.5 w-3.5" /><span>開く</span></button>
                                <button onClick={(e) => handleCopyProjectUrl(proj.id, e)} className="flex items-center gap-1 bg-white dark:bg-slate-800 hover:bg-slate-150 dark:hover:bg-slate-700 text-slate-606 dark:text-slate-300 border border-slate-300 dark:border-slate-600 font-bold px-2 py-1.5 rounded-xl shadow-xs"><IconLink className="h-3.5 w-3.5 text-slate-404 dark:text-slate-505" /></button>
                                <button onClick={(e) => handleDeleteProjectByList(proj.id, e)} className="text-slate-404 dark:text-slate-505 hover:text-rose-605 dark:hover:text-rose-400 p-1.5 hover:bg-rose-55 dark:hover:bg-rose-900/30 border border-transparent hover:border-rose-100 dark:hover:border-rose-800 rounded-xl transition-all"><IconTrash2 className="h-4 w-4" /></button>
                              </div>
                            </td>
                          </tr>
                        );
                      }) : (<tr><td colSpan="9" className="py-12 text-center text-slate-404 dark:text-slate-505 font-bold">条件に一致する調整案件がありません。</td></tr>)}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>

          {/* 大分類フォルダ追加モーダル */}
          {showAddFolderModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 animate-in zoom-in-95">
                <div className="flex justify-between items-center pb-3 border-b border-slate-150 dark:border-slate-700/50">
                  <h3 className="font-extrabold text-sm text-slate-955 dark:text-white flex items-center gap-1.5"><IconFolder className="h-4 w-4 text-indigo-600 dark:text-indigo-400" />大分類フォルダの追加</h3>
                  <button onClick={() => setShowAddFolderModal(false)} className="text-slate-404 hover:text-slate-605 dark:hover:text-slate-300 p-1"><IconX /></button>
                </div>
                <form onSubmit={handleCreateFolder} className="space-y-4 text-xs">
                  <div>
                    <label className="block text-[10px] font-bold text-slate-605 dark:text-slate-440 mb-1">フォルダ名 (必須)</label>
                    <input required type="text" value={newFolderName} onChange={e => setNewFolderName(e.target.value)} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2.5 bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200 focus:outline-none focus:border-indigo-400" placeholder="例: 新商品設計（ECD）" />
                  </div>
                  <div className="flex justify-end gap-2 pt-2">
                    <button type="button" onClick={() => setShowAddFolderModal(false)} className="bg-slate-150 dark:bg-slate-700 hover:bg-slate-202 dark:hover:bg-slate-600 text-slate-605 dark:text-slate-300 px-4 py-2 rounded-xl font-bold">キャンセル</button>
                    <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl font-bold">作成</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* マスタ設定モーダル */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-700 rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-base font-black text-slate-805 dark:text-slate-100 flex items-center gap-2"><IconSettings className="h-5 w-5 text-indigo-600 dark:text-indigo-400" />設定</h2>
                  <button onClick={() => setShowSettingsModal(false)} className="text-slate-404 dark:text-slate-505 hover:bg-slate-150 dark:hover:bg-slate-700/50 p-1.5 rounded-lg transition-colors"><IconX className="h-5 w-5" /></button>
                </div>
                <div className="flex-1 overflow-y-auto pr-2 space-y-6 scrollbar-thin">
                  
                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-605 dark:text-slate-440 border-b border-slate-202 dark:border-slate-700 pb-2 flex items-center gap-1.5">☁️ クラウド同期 (GitHub Gist)</h3>
                    <div className="bg-slate-55 dark:bg-slate-900/50 p-4 rounded-2xl border border-slate-202 dark:border-slate-700 shadow-sm space-y-3">
                      <p className="text-[10px] text-slate-550 dark:text-slate-455 font-bold">TokenとGist IDを設定すると同期・バックアップします。</p>
                      <div className="space-y-2">
                        <div>
                          <label className="block text-[10px] font-bold text-slate-605 dark:text-slate-440 mb-1">GitHub Personal Access Token</label>
                          <input type="password" value={tmpGistToken} onChange={e => setTmpGistToken(e.target.value)} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200 focus:outline-none focus:border-indigo-400" placeholder="ghp_xxxxxxxxxxxx" />
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-slate-605 dark:text-slate-440 mb-1">Gist ID</label>
                          <input type="text" value={tmpGistId} onChange={e => setTmpGistId(e.target.value)} className="w-full border border-slate-202 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200 focus:outline-none focus:border-indigo-400 font-mono" placeholder="1a2b3c4d5e6f7g8h9i0j" />
                        </div>
                      </div>
                      <div className="flex justify-end pt-1">
                        <button onClick={saveGistSettings} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md">保存して接続</button>
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-605 dark:text-slate-440 border-b border-slate-202 dark:border-slate-700 pb-2">担当部署の管理</h3>
                    <div className="space-y-2.5">
                      {deptList.map((dept, idx) => (
                        <div key={dept.key} className="flex items-center gap-2 bg-slate-55 dark:bg-slate-900/50 p-2.5 rounded-2xl border border-slate-202 dark:border-slate-700 shadow-sm transition-all hover:border-indigo-300 group">
                          <div className="flex flex-col gap-0.5">
                            <button onClick={() => moveDeptOrder(idx, -1)} disabled={idx === 0} className={`p-0.5 rounded ${idx === 0 ? 'opacity-30' : 'hover:bg-indigo-100 hover:text-indigo-600 text-slate-404'}`}><IconArrowUp /></button>
                            <button onClick={() => moveDeptOrder(idx, 1)} disabled={idx === deptList.length - 1} className={`p-0.5 rounded ${idx === deptList.length - 1 ? 'opacity-30' : 'hover:bg-indigo-100 hover:text-indigo-600 text-slate-444'}`}><IconArrowDown /></button>
                          </div>
                          <input type="text" value={dept.label} onChange={(e) => handleRenameDeptChange(dept.key, e.target.value)} onBlur={() => handleRenameDeptSave(dept.key)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-xl p-2 text-slate-805 dark:text-slate-200 focus:outline-none" />
                          <select value={dept.color} onChange={(e) => updateDeptColorSetting(dept.key, e.target.value)} className={`text-xs font-bold rounded-xl p-2 border border-slate-300 dark:border-slate-600 focus:outline-none ${colorClassesMap[dept.color]?.badge || 'bg-white dark:bg-slate-800'}`}>
                            {Object.keys(colorClassesMap).map(c => <option key={c} value={c} className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200">{c}色</option>)}
                          </select>
                          <button onClick={() => handleDeleteDept(dept.key)} className="p-2 text-slate-404 hover:text-rose-605 hover:bg-rose-55 rounded-xl ml-1"><IconTrash2 className="h-4 w-4" /></button>
                        </div>
                      ))}
                    </div>
                    <form onSubmit={handleCreateDept} className="flex items-center gap-2 mt-4 bg-indigo-50/50 dark:bg-indigo-900/20 p-3 rounded-2xl border border-indigo-100 dark:border-indigo-800/50 shadow-inner">
                      <span className="text-[10px] font-black text-indigo-600 dark:text-indigo-400 shrink-0 uppercase flex items-center gap-0.5"><IconPlus className="h-3 w-3"/>追加</span>
                      <input type="text" placeholder="部署名..." value={newDeptLabel} onChange={e => setNewDeptLabel(e.target.value)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-202 dark:border-slate-705 text-slate-805 dark:text-slate-200 rounded-xl p-2 focus:outline-none shadow-sm" />
                      <select value={newDeptColor} onChange={e => setNewDeptColor(e.target.value)} className={`text-xs font-bold rounded-xl p-2 border border-slate-202 dark:border-slate-700 shadow-sm focus:outline-none ${colorClassesMap[newDeptColor]?.badge || 'bg-white dark:bg-slate-800'}`}>
                        {Object.keys(colorClassesMap).map(c => <option key={c} value={c} className="bg-white dark:bg-slate-800 text-slate-805 dark:text-slate-200">{c}色</option>)}
                      </select>
                      <button type="submit" disabled={!newDeptLabel.trim()} className="bg-indigo-600 hover:bg-indigo-700 text-white disabled:bg-slate-150 dark:disabled:bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold shadow-md ml-1">登録</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
