          img.src = event.target.result;
          img.onload = () => {

                        <button onClick={() => { setShowAddStepForm(true); setNewStepName(''); setNewStepDesc(''); setNewStepStartDate(activeProject.startDate); setNewStepDueDate(activeProject.endDate); setNewStepLinks([]); setTmpStepLinkLabel(''); setTmpStepLinkUrl(''); setTimeout(() => { const el = document.getElementById('add-step-form'); if(el) { window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 180, behavior: 'smooth' }); } }, 150); }} className="text-[10px] bg-purple-600 hover:bg-purple-700 text-white font-black flex items-center gap-1 px-3 py-2 rounded-xl transition shadow-md shadow-purple-200 dark:shadow-none"><IconPlus className="h-3 w-3" /> STEPを追加</button>

                                                            <div><label className="block text-slate-400 dark:text-slate-500 font-bold mb-0.5">期限日</label><input type="date" value={editLogDueDate} onChange={e=>setEditLogDueDate(e.target.value)} className="w-full border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 p-0.5 font-mono font-bold rounded text-slate-700 dark:text-slate-200" /></div>
                                                          </div>
                                                          <div className="border-t border-slate-200 dark:border-slate-700 pt-2 space-y-1.5">
                                                            <span className="text-[9px] font-bold text-slate-400 dark:text-slate-500 block uppercase">関連リンク編集</span>
                                                            <div className="flex items-center gap-1"><IconLink className="text-slate-500" /><input type="text" placeholder="名前" value={tmpEditLinkLabel} onChange={e=>setTmpEditLinkLabel(e.target.value)} className="w-16 border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 rounded px-1.5 py-0.5 text-[9px] font-bold text-slate-700 dark:text-slate-200" /><input type="text" placeholder="URL" value={tmpEditLinkUrl} onChange={e=>setTmpEditLinkUrl(e.target.value)} className="flex-1 border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 rounded px-1.5 py-0.5 text-[9px] text-slate-700 dark:text-slate-200" /><button onClick={handleAddLinkToEditLog} className="bg-indigo-50 dark:bg-indigo-900/30 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 text-indigo-700 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-800 px-2 py-0.5 rounded text-[9px] font-black">追加</button></div>
                                                            {editLogLinks.length > 0 && (
                                                              <div className="flex flex-wrap gap-1.5 pt-1">
                                                                {editLogLinks.map(lnk => (
                                                                  <span key={lnk.id} className="inline-flex items-center gap-1 text-[9px] bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 px-1.5 py-0.5 rounded font-bold"><span className="truncate max-w-[85px]">{lnk.label}</span><button onClick={(e) => handleRemoveLinkFromEditLog(lnk.id, e)} className="text-slate-400 hover:text-rose-600 dark:hover:text-rose-400 font-bold text-[10px]">×</button></span>
                                                                ))}
                                                              </div>
                                                            )}
                                                          </div>
                                                          <div className="flex flex-wrap justify-end gap-1.5 pt-1.5 border-t border-slate-200 dark:border-slate-700">
                                                            <button onClick={() => setEditingLogId(null)} className="text-[9px] text-slate-500 dark:text-slate-400 px-2 py-0.5">キャンセル</button>
                                                            <button onClick={() => saveLogEdit(task.id, log.id)} disabled={!editLogText.trim() && editLogImages.length === 0} className="text-[9px] bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 dark:disabled:bg-slate-700 disabled:text-slate-400 dark:disabled:text-slate-500 disabled:cursor-not-allowed text-white px-3 py-1 rounded font-bold transition-all">更新する</button>
                                                          </div>
                                                        </div>
                                                      ) : (
                                                        <React.Fragment>
                                                          <div className="flex justify-between items-center border-b border-slate-100 dark:border-slate-700 pb-1 select-none">
                                                            <span className="text-[8px] font-mono text-slate-400 dark:text-slate-500 font-bold flex items-center gap-0.5 leading-none"><IconClock /> {log.date}{log.isHighlighted && <span className="ml-1.5 bg-amber-100 dark:bg-amber-900/40 text-amber-800 dark:text-amber-300 border border-amber-300 dark:border-amber-700 text-[7.5px] px-1.5 py-0.5 rounded font-bold">📌 重要・ピン留め</span>}</span>
                                                            <div className="opacity-100 flex items-center gap-1.5 bg-white/95 dark:bg-slate-800/95 border border-slate-200 dark:border-slate-600 rounded-lg p-0.5 z-10 shadow-xs absolute top-2 right-2">
                                                              <button onClick={() => startEditingLog(log)} className="p-1 text-slate-400 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 rounded transition" title="このメモ内容を編集"><IconEdit2 className="h-3 w-3" /></button>
                                                              <button onClick={() => toggleLogHighlight(task.id, log.id)} className={`p-1 rounded transition ${log.isHighlighted ? 'text-amber-500 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/30' : 'text-slate-400 dark:text-slate-400 hover:text-amber-500 dark:hover:text-amber-400 hover:bg-slate-50 dark:hover:bg-slate-700'}`} title={log.isHighlighted ? 'ピン留め解除' : '重要な状況としてピン留めする'}><IconPin className="h-3 w-3" /></button>
                                                              <button onClick={() => toggleLogComplete(task.id, log.id)} className={`p-1 rounded hover:bg-slate-50 dark:hover:bg-slate-700 ${log.completed ? 'text-slate-300 dark:text-slate-500 hover:text-emerald-500 dark:hover:text-emerald-400' : 'text-slate-400 dark:text-slate-400 hover:text-emerald-600 dark:hover:text-emerald-400'}`} title={log.completed ? '未完了に戻す' : '対応完了マークにする'}><IconCheck className="h-3 w-3" /></button>
                                                              <button onClick={() => deleteLog(task.id, log.id)} className="p-1 text-slate-400 dark:text-slate-400 hover:text-rose-500 dark:hover:text-rose-400 hover:bg-slate-50 dark:hover:bg-slate-700 rounded shadow-xs" title="この時系列メモを削除"><IconTrash2 className="h-3 w-3" /></button>
                                                            </div>
                                                          </div>
                                                          <div className="relative group/logtext w-full pr-14 space-y-2">
                                                            <p className={`text-[11px] text-slate-600 dark:text-slate-300 leading-relaxed font-bold whitespace-pre-wrap select-text ${log.completed ? 'line-through text-slate-400 dark:text-slate-500 font-medium' : ''}`}>{log.text}</p>
                                                            {log.attachedImages && log.attachedImages.length > 0 && (
                                                              <div className="flex flex-wrap gap-1.5 pt-1.5">
                                                                {log.attachedImages.map((src, imgIdx) => (
                                                                  <div key={`${src.substring(0,20)}-${imgIdx}`} onClick={() => setLightboxImage(src)} className="relative max-w-[120px] max-h-[80px] rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 shadow-xs cursor-zoom-in hover:brightness-95 transition-all">
                                                                    <img src={src} alt="preview" className="w-full h-full object-cover" />
                                                                  </div>
                                                                ))}
                                                              </div>
                                                            )}
                                                            <button onClick={(e) => { e.stopPropagation(); handleCopyToClipboard(log.text, 'メモ内容をコピーしました！'); }} className="absolute right-0 top-0 opacity-100 p-1 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-400 rounded text-[9px] font-bold shadow-xs select-none transition-colors" title="このメモのテキストをコピー">📋 コピー</button>
                                                          </div>
                                                          <div className="flex flex-wrap items-center gap-1.5 mt-0.5 select-none">
                                                            {log.to && (<span className="inline-flex items-center gap-1 text-[9px] bg-indigo-50 dark:bg-indigo-900/30 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 border border-indigo-200 dark:border-indigo-800 text-indigo-700 dark:text-indigo-300 px-2 py-0.5 rounded-lg transition font-black"><span>TO: {log.to}</span>{!isCompleted && (<button onClick={() => clearLogField(task.id, log.id, 'to')} className="text-indigo-400 dark:text-indigo-500 hover:text-rose-600 dark:hover:text-rose-400 font-bold text-[10px] ml-1">×</button>)}</span>)}
                                                            {log.dueDate && (<span className="inline-flex items-center gap-1 text-[9px] bg-rose-50 dark:bg-rose-900/30 hover:bg-rose-100 dark:hover:bg-rose-900/50 text-rose-700 dark:text-rose-300 px-2 py-0.5 rounded-lg border border-rose-200 dark:border-rose-800 transition font-mono font-bold"><span>期日: {log.dueDate}</span>{!isCompleted && (<button onClick={() => clearLogField(task.id, log.id, 'dueDate')} className="text-rose-400 dark:text-rose-500 hover:text-rose-600 dark:hover:text-rose-400 font-bold text-[10px] ml-1">×</button>)}</span>)}
                                                            {log.links && log.links.map(lnk => (
                                                              <span key={lnk.id} className="inline-flex items-center gap-1 text-[9px] bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 px-2 py-0.5 rounded-lg transition">
                                                                <a href={lnk.url} target="_blank" rel="noopener noreferrer" className="flex items-center gap-0.5 font-bold"><IconExternalLink /> {lnk.label}</a>
                                                                {!isCompleted && (<button onClick={() => removeSingleLinkFromLog(task.id, log.id, lnk.id)} className="text-slate-400 dark:text-slate-500 hover:text-rose-600 dark:hover:text-rose-400 font-bold text-[10px] ml-1" title="リンクのみ削除">×</button>)}
                                                              </span>
                                                            ))}
                                                          </div>
                                                        </React.Fragment>
                                                      )}
                                                    </div>
                                                  );
                                                }) : (<p className="text-[10px] text-slate-400 dark:text-slate-500 font-bold text-center py-4 bg-white dark:bg-slate-800 border border-dashed border-slate-200 dark:border-slate-700 rounded-xl">時系列の議論・メモ履歴は空です</p>)}
                                              </div>
                                            </div>
                                          </div>
                                        )}
                                      </div>
                                    )}
                                  </div>
                                );
                              }) : (
                                <div className="col-span-2 text-center py-10 bg-white dark:bg-slate-800 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl text-slate-400 dark:text-slate-500 text-xs font-bold leading-relaxed">現在、このステップに登録されている確認タスクはありません。<br />右上の「＋ タスク追加」ボタンから最初の確認事項を起票しましょう！</div>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </React.Fragment>
            )}

            {/* --- DBビュー --- */}
            {viewMode === 'database' && (
              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl shadow-xs overflow-hidden p-6 space-y-5 animate-in fade-in duration-150">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-200 dark:border-slate-700">
                  <div className="space-y-1">
                    <h2 className="text-base font-black text-slate-800 dark:text-slate-100 flex items-center gap-2"><IconDatabase className="text-indigo-600 dark:text-indigo-400" />ECD案件一覧データベース (Notion風ビュー)</h2>
                    <p className="text-xs text-slate-400 dark:text-slate-400">登録されているすべての調整案件・プロジェクトを横断して進捗・ヘルス状況を俯瞰します。</p>
                  </div>
                  <button onClick={() => { setNewProjFolderId(selectedFolderId); setShowAddProjectModal(true); }} className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-xs px-4.5 py-3 rounded-2xl flex items-center gap-1.5 transition-all shadow-md shadow-indigo-100 dark:shadow-none shrink-0"><IconPlus /> 新規案件を起票する</button>
                </div>
                <div className="flex flex-col sm:flex-row gap-3 pt-1">
                  <select value={dbFilterFolderId} onChange={(e) => setDbFilterFolderId(e.target.value)} className="border border-slate-200 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-900 focus:outline-none focus:border-indigo-400 dark:focus:border-indigo-500 cursor-pointer shadow-xs">
                    <option value="all">📁 すべてのフォルダ</option>{folders.map(f => (<option key={f.id} value={f.id}>📁 {f.name}</option>))}
                  </select>
                  <select value={dbFilterStatus} onChange={(e) => setDbFilterStatus(e.target.value)} className="border border-slate-200 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-900 focus:outline-none focus:border-indigo-400 dark:focus:border-indigo-500 cursor-pointer shadow-xs">
                    <option value="all">🚥 すべての進捗状況</option><option value="pending">未着手</option><option value="in_progress">進行中</option><option value="completed">完了</option><option value="not_applicable">対応なし</option>
                  </select>
                  <div className="flex-1 relative">
                    <input type="text" placeholder="案件名やECD管理コードでリアルタイム検索..." value={dbFilterText} onChange={(e) => setDbFilterText(e.target.value)} className="w-full border border-slate-200 dark:border-slate-700 rounded-xl p-2.5 pl-3.5 text-xs text-slate-700 dark:text-slate-200 font-bold bg-white dark:bg-slate-900 focus:outline-none focus:border-indigo-400 dark:focus:border-indigo-500 shadow-xs" />
                  </div>
                </div>
                <div className="overflow-x-auto rounded-2xl border border-slate-200 dark:border-slate-700">
                  <table className="w-full text-xs text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-50 dark:bg-slate-800/80 border-b border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 font-black text-[10.5px] uppercase tracking-wider">
                        <th className="py-3 px-4 border border-slate-200 dark:border-slate-700 text-center w-28">ステータス</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700">所属大分類</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700">案件プロジェクト名称</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700 w-32">コード</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700 w-44">開始 〜 目標期日</th><th className="py-2.5 px-4 border border-slate-200 dark:border-slate-700 text-center w-28">タスク内訳</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700 w-40">進捗率</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700 w-36">アラート・ヘルス</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700 text-center w-32">アクション</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200 dark:divide-slate-700">
                      {filteredDbProjects.length > 0 ? filteredDbProjects.map(proj => {
                        const prog = calculateProjectProgressById(proj);
                        const lates = countLateTasksByProject(proj);
                        const folderName = folders.find(f => f.id === proj.folderId)?.name || '未分類';
                        const { completed, inProgress, notStarted, notApplicable } = countTaskStatus(proj);
                        const statusObj = projectStatusOptions.find(o => o.value === (proj.status || 'pending'));
                        return (
                          <tr key={proj.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/50 transition-colors">
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 text-center"><span className={`inline-flex items-center px-2.5 py-0.5 rounded-xl font-black text-[9.5px] border shadow-xs ${statusObj?.className}`}>{statusObj?.label}</span></td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 font-black text-slate-500 dark:text-slate-400"><span className="inline-flex items-center gap-1"><IconFolder className="h-3.5 w-3.5 text-purple-600 dark:text-purple-400" />{folderName}</span></td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 font-black text-slate-900 dark:text-slate-100 text-sm max-w-xs truncate">{proj.name}</td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 font-mono text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider">{proj.code}</td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 font-mono text-slate-500 dark:text-slate-400 font-bold">{proj.startDate} 〜 {proj.endDate}</td>
                            <td className="py-2 px-4 border border-slate-200 dark:border-slate-700 align-middle">
                              <div className="flex flex-col gap-0.5 text-[9.5px] w-24 mx-auto font-mono font-bold leading-none">
                                <div className="flex justify-between items-center text-slate-500 dark:text-slate-300 bg-slate-50 dark:bg-slate-700 px-1 py-0.5 rounded border border-slate-100 dark:border-slate-600"><span>未着手</span><span>{notStarted}</span></div>
                                <div className="flex justify-between items-center text-blue-600 dark:text-blue-300 bg-blue-50 dark:bg-blue-900/30 px-1 py-0.5 rounded border border-blue-100 dark:border-blue-800"><span>進行中</span><span>{inProgress}</span></div>
                                <div className="flex justify-between items-center text-emerald-600 dark:text-emerald-300 bg-emerald-50 dark:bg-emerald-900/30 px-1 py-0.5 rounded border border-emerald-100 dark:border-emerald-800"><span>完了</span><span>{completed}</span></div>
                                {notApplicable > 0 && (<div className="flex justify-between items-center text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 px-1 py-0.5 rounded border border-slate-200 dark:border-slate-600"><span>対応なし</span><span>{notApplicable}</span></div>)}
                              </div>
                            </td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700">
                              <div className="flex items-center gap-2 min-w-[120px]"><div className="h-2 flex-1 bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-indigo-500 bg-gradient-to-r from-indigo-500 to-purple-500" style={{ width: `${prog}%` }} /></div><span className="font-black font-mono text-indigo-600 dark:text-indigo-400 w-8 text-right text-xs">{prog}%</span></div>
                            </td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700">
                              {lates > 0 ? <span className="inline-flex items-center gap-1 bg-rose-50 dark:bg-rose-900/30 text-rose-700 dark:text-rose-400 border border-rose-200 dark:border-rose-800 font-black text-[9.5px] px-2.5 py-0.5 rounded-full shadow-sm animate-pulse">⚠️ 遅延 {lates} 件あり</span> : <span className="inline-flex items-center gap-1 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800 font-black text-[9.5px] px-2.5 py-0.5 rounded-full shadow-xs">✅ 順調</span>}
                            </td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 text-center">
                              <div className="flex items-center justify-center gap-1.5">
                                <button onClick={() => handleOpenProjectFromDb(proj)} className="flex items-center gap-1 bg-indigo-50 dark:bg-indigo-900/30 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 text-indigo-700 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-800 font-black px-2.5 py-1.5 rounded-xl transition-all shadow-xs text-[11px]" title="この案件を開く"><IconEye className="h-3.5 w-3.5" /><span>開く</span></button>
                                <button onClick={(e) => handleCopyProjectUrl(proj.id, e)} className="flex items-center gap-1 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 border border-slate-300 dark:border-slate-600 font-bold px-2 py-1.5 rounded-xl transition-all shadow-xs" title="共有URLをコピー"><IconLink className="h-3.5 w-3.5 text-slate-400 dark:text-slate-400" /></button>
                                <button onClick={(e) => handleDeleteProjectByList(proj.id, e)} className="text-slate-400 dark:text-slate-500 hover:text-rose-600 dark:hover:text-rose-400 p-1.5 hover:bg-rose-50 dark:hover:bg-rose-900/30 border border-transparent hover:border-rose-100 dark:hover:border-rose-800 rounded-xl transition-all" title="削除"><IconTrash2 className="h-4 w-4" /></button>
                              </div>
                            </td>
                          </tr>
                        );
                      }) : (<tr><td colSpan="9" className="py-12 text-center text-slate-400 dark:text-slate-500 font-bold">条件に一致する調整案件がありません。</td></tr>)}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>

          {/* マスタ設定モーダル */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/70 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in duration-200 p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-base font-black text-slate-800 dark:text-slate-100 flex items-center gap-2"><IconSettings className="h-5 w-5 text-indigo-600 dark:text-indigo-400" />部署・マスタ設定</h2>
                  <button onClick={() => setShowSettingsModal(false)} className="text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 p-1.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors"><IconX className="h-5 w-5" /></button>
                </div>
                <div className="flex-1 overflow-y-auto pr-2 space-y-6 scrollbar-thin">
                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-600 dark:text-slate-300 border-b border-slate-200 dark:border-slate-700 pb-2">担当部署の管理 (順序・色・名称)</h3>
                    <div className="space-y-2.5">
                      {deptList.map((dept, idx) => (
                        <div key={dept.key} className="flex items-center gap-2 bg-slate-50 dark:bg-slate-800/50 p-2.5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm transition-all hover:border-indigo-300 dark:hover:border-indigo-600 group">
                          <div className="flex flex-col gap-0.5">
                            <button onClick={() => moveDeptOrder(idx, -1)} disabled={idx === 0} className={`p-0.5 rounded transition-colors ${idx === 0 ? 'opacity-30 cursor-not-allowed' : 'hover:bg-indigo-100 dark:hover:bg-indigo-900/50 hover:text-indigo-600 dark:hover:text-indigo-400 text-slate-400 dark:text-slate-500'}`}><IconArrowUp /></button>
                            <button onClick={() => moveDeptOrder(idx, 1)} disabled={idx === deptList.length - 1} className={`p-0.5 rounded transition-colors ${idx === deptList.length - 1 ? 'opacity-30 cursor-not-allowed' : 'hover:bg-indigo-100 dark:hover:bg-indigo-900/50 hover:text-indigo-600 dark:hover:text-indigo-400 text-slate-400 dark:text-slate-500'}`}><IconArrowDown /></button>
                          </div>
                          <input type="text" value={dept.label} onChange={(e) => handleRenameDeptChange(dept.key, e.target.value)} onBlur={() => handleRenameDeptSave(dept.key)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 border border-slate-300 dark:border-slate-600 rounded-xl p-2 focus:border-indigo-500 dark:focus:border-indigo-400 focus:ring-1 focus:ring-indigo-500 dark:focus:ring-indigo-400 focus:outline-none transition-shadow" />
                          <select value={dept.color} onChange={(e) => updateDeptColorSetting(dept.key, e.target.value)} className={`text-xs font-bold rounded-xl p-2 border border-slate-300 dark:border-slate-600 cursor-pointer focus:outline-none focus:border-indigo-500 dark:focus:border-indigo-400 transition-shadow ${colorClassesMap[dept.color]?.badge || 'bg-white dark:bg-slate-900'}`}>
                            {Object.keys(colorClassesMap).map(c => <option key={c} value={c} className="bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200">{c}色</option>)}
                          </select>
                          <button onClick={() => handleDeleteDept(dept.key)} className="p-2 text-slate-400 dark:text-slate-500 hover:text-rose-600 dark:hover:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/30 rounded-xl transition-colors ml-1"><IconTrash2 className="h-4 w-4" /></button>
                        </div>
                      ))}
                    </div>
                    <form onSubmit={handleCreateDept} className="flex items-center gap-2 mt-4 bg-indigo-50/50 dark:bg-indigo-900/20 p-3 rounded-2xl border border-indigo-100 dark:border-indigo-800 shadow-inner">
                      <span className="text-[10px] font-black text-indigo-600 dark:text-indigo-400 shrink-0 uppercase tracking-wider flex items-center gap-0.5"><IconPlus className="h-3 w-3"/>追加</span>
                      <input type="text" placeholder="新しい部署名..." value={newDeptLabel} onChange={e => setNewDeptLabel(e.target.value)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 border border-slate-200 dark:border-slate-600 rounded-xl p-2 focus:border-indigo-400 dark:focus:border-indigo-500 focus:outline-none shadow-sm" />
                      <select value={newDeptColor} onChange={e => setNewDeptColor(e.target.value)} className={`text-xs font-bold rounded-xl p-2 border border-slate-200 dark:border-slate-600 shadow-sm focus:outline-none ${colorClassesMap[newDeptColor]?.badge || 'bg-white dark:bg-slate-900'}`}>
                        {Object.keys(colorClassesMap).map(c => <option key={c} value={c} className="bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200">{c}色</option>)}
                      </select>
                      <button type="submit" disabled={!newDeptLabel.trim()} className="bg-indigo-600 hover:bg-indigo-700 text-white disabled:bg-slate-300 dark:disabled:bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold shadow-md transition-colors ml-1">登録</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
