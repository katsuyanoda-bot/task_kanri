    const compressImage = (file, maxWidth = 800) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = (maxWidth * height) / width;
              width = maxWidth;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (err) => reject(err);
      });
    };

      const handleAddLinkToNewStep = (e) => { e.preventDefault(); if(tmpStepLinkUrl.trim()) { setNewStepLinks(p=>[...p,{id:`slnk_${Date.now()}`,label:tmpStepLinkLabel.trim()||'リンク',url:tmpStepLinkUrl.trim()}]); setTmpStepLinkLabel(''); setTmpStepLinkUrl(''); }};

        const newLog = { id: `l_${Date.now()}`, date: dateStr, text: newLogText.trim() || "📸 画像添付", links: [...newLogLinks], attachedImages: [...newLogImages], to: newLogTo.trim() || null, dueDate: newLogDueDate || null, completed: false, isHighlighted: false };
        saveProjectToFirestore({ ...activeProject, tasks: tasks.map(t => t.id === taskId ? { ...t, contextLogs: [newLog, ...(t.contextLogs || [])] } : t) });
        setAddingLogTaskId(null); setNewLogText(''); setNewLogTo(''); setNewLogDueDate(''); setNewLogLinks([]); setNewLogImages([]); showAlert('記録しました');

      const removeSingleLinkFromLog = (tId, lId, lnkId) => saveProjectToFirestore({ ...activeProject, tasks: tasks.map(t => t.id === tId ? { ...t, contextLogs: (t.contextLogs || []).map(l => l.id === lId ? { ...l, links: (l.links || []).filter(lk => lk.id !== lnkId) } : l) } : t) });
      const toggleLogHighlight = (tId, lId) => saveProjectToFirestore({ ...activeProject, tasks: tasks.map(t => t.id === tId ? { ...t, contextLogs: (t.contextLogs || []).map(l => l.id === lId ? { ...l, isHighlighted: !l.isHighlighted } : l) } : t) });
      const startEditingLog = (log) => { setEditingLogId(log.id); setEditLogText(log.text); setEditLogTo(log.to || ''); setEditLogDueDate(log.dueDate || ''); setEditLogLinks(log.links ? [...log.links] : []); setEditLogImages(log.attachedImages ? [...log.attachedImages] : []); };
      const saveLogEdit = (tId, lId) => { saveProjectToFirestore({ ...activeProject, tasks: tasks.map(t => t.id === tId ? { ...t, contextLogs: (t.contextLogs || []).map(l => l.id === lId ? { ...l, text: editLogText.trim()||"📸", to: editLogTo.trim()||null, dueDate: editLogDueDate||null, links: [...editLogLinks], attachedImages: [...editLogImages] } : l) } : t) }); setEditingLogId(null); showAlert('更新しました'); };

      const changeTaskStatus = (taskId, newStatus) => {
        saveProjectToFirestore({ ...activeProject, tasks: tasks.map(t => {

          const dOnly = dStr.split(' ')[0];

          else if (newStatus === 'completed' || newStatus === 'not_applicable') { upd.completedAt = dOnly; if (!t.startedAt) upd.startedAt = dOnly; upd.contextLogs = [{ id: `s_${Date.now()}`, date: dStr, text: newStatus==='completed'?'✅ 完了':'🚫 対応なし', links: [], completed: true, isSystem: true, attachedImages: [] }, ...(t.contextLogs || [])]; }
          else { upd.startedAt = null; upd.completedAt = null; }
          return upd;

        e.preventDefault(); if (!newDeptLabel.trim()) return;
        const newKey = `dept_${Date.now()}`, newDept = { key: newKey, label: newDeptLabel.trim(), color: newDeptColor, order: deptList.length };
        if (!useFirebase || (gistToken && gistId)) { updateData('depts', [...deptList, newDept]); setNewDeptLabel(''); showAlert('追加完了'); return; }

          if(!useFirebase || (gistToken && gistId)){ updateData('depts',rem); updateData('projects',projects.map(p=>({...p, tasks:(p.tasks||[]).map(t=>t.department===key?{...t,department:fb}:t), stepList:(p.stepList||[]).map(s=>s.deptKey===key?{...s,deptKey:fb}:s)}))); showAlert('削除完了'); return; }
          try{ await deleteDoc(doc(db,'artifacts',appId,'public','data','departments',key)); for(const p of projects){ let mod=false; const ts=p.tasks.map(t=>{if(t.department===key){mod=true;return{...t,department:fb}}return t;}); const ss=p.stepList.map(s=>{if(s.deptKey===key){mod=true;return{...s,deptKey:fb}}return s;}); if(mod) await setDoc(doc(db,'artifacts',appId,'public','data','projects',p.id),{...p,tasks:ts,stepList:ss}); } showAlert('削除完了'); }catch(e){showAlert('エラー');}

      const updateDeptColorSetting = async (k, c) => { const f=deptList.find(d=>d.key===k); if(!f)return; if(!useFirebase||(gistToken&&gistId)){ updateData('depts',deptList.map(d=>d.key===k?{...d,color:c}:d)); return; } try{await setDoc(doc(db,'artifacts',appId,'public','data','departments',k),{...f,color:c});}catch(e){} };
      const handleRenameDeptChange = (k, n) => setDeptList(p=>p.map(d=>d.key===k?{...d,label:n}:d));
      const handleRenameDeptSave = async (k) => { const f=deptList.find(d=>d.key===k); if(!f)return; if(!useFirebase||(gistToken&&gistId)){ updateData('depts',deptList); return; } try{await setDoc(doc(db,'artifacts',appId,'public','data','departments',k),f);}catch(e){} };
      const moveDeptOrder = async (i, dir) => { const t=i+dir; if(t<0||t>=deptList.length)return; const l=[...deptList]; [l[i],l[t]]=[l[t],l[i]]; const o=l.map((d,idx)=>({...d,order:idx})); if(!useFirebase||(gistToken&&gistId)){updateData('depts',o);return;} setDeptList(o); try{await Promise.all(o.map(d=>setDoc(doc(db,'artifacts',appId,'public','data','departments',d.key),d)));}catch(e){} };
      const handleOpenProjectFromDb = (proj) => { setSelectedFolderId(proj.folderId); setCurrentProjectId(proj.id); setViewMode('board'); };

        <div className="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 font-sans antialiased pb-16 transition-colors duration-200">

                  <button type="button" onClick={closeConfirm} className="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 px-4 py-2.5 rounded-2xl font-bold transition-all">キャンセル</button>
                  <button type="button" onClick={confirmModal.onConfirm} className="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2.5 rounded-2xl font-extrabold shadow-md transition-all">実行</button>

              <div className="absolute top-4 right-4 bg-white/20 hover:bg-white/30 text-white p-2.5 rounded-full transition-all cursor-pointer"><IconX className="h-6 w-6" /></div>
              <img src={lightboxImage} alt="preview" className="max-w-full max-h-full rounded-2xl shadow-2xl object-contain animate-in zoom-in-95" />

          <header className="bg-white/95 dark:bg-slate-900/95 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-50 shadow-sm backdrop-blur-lg divide-y divide-slate-100 dark:divide-slate-800 transition-colors duration-200">
            <div className="px-6 py-3 flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 bg-gradient-to-tr from-indigo-700 to-purple-600 text-white p-2.5 rounded-2xl font-black text-sm leading-none">PL</div>
                <div>

                  <p className="text-[9px] text-slate-400 dark:text-slate-500 font-extrabold uppercase tracking-wider">
                    ECDダッシュボード 
                    {(!useFirebase || (gistToken && gistId)) && <span className="ml-1 text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/30 px-1 py-0.5 rounded font-black text-[7.5px]">{(gistToken && gistId) ? 'GIST-SYNC' : 'LOCAL-STORE'}</span>}
                  </p>

              </div>

              <div className="flex bg-slate-100 dark:bg-slate-800 p-0.5 rounded-xl border border-slate-200 dark:border-slate-700 text-xs shadow-inner">
                <button onClick={() => setViewMode('board')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all duration-200 ${viewMode === 'board' ? 'bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-300 shadow-sm' : 'text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white'}`}><IconCalendar className="h-3 w-3 text-indigo-500" /><span>📋 進行ダッシュボード</span></button>

                <div className="flex items-center gap-2.5 bg-slate-50 dark:bg-slate-800 px-2.5 py-1.5 rounded-xl border border-slate-200 dark:border-slate-700 text-xs">

                  {stepList.map((step, idx) => {
                    const t = tasks.filter(x => x.stepId === step.id), c = t.filter(x => x.status === 'completed').length, l = t.filter(x => isOverdue(x.dueDate, x.status)).length;
                    const p = t.length > 0 ? Math.round((c / t.length) * 100) : 0;
                    const dClass = colorClassesMap[deptList.find(d => d.key === step.deptKey)?.color || 'slate'] || colorClassesMap.purple;
                    return (
                      <button key={step.id} onClick={() => handleScrollToStep(step.id)} className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-indigo-400 rounded-xl px-2.5 py-1.5 flex items-center gap-2.5 cursor-pointer shrink-0 shadow-xs hover:shadow-sm text-left group">
                        <div className="leading-none">
                          <div className="text-[9px] font-black text-slate-700 dark:text-slate-300 truncate max-w-[90px] leading-tight">{idx + 1}. {step.name}</div>

                        </div>
                      </button>
                    );
                  })}
                </div>
              )}

                                                  <textarea value={newLogText} onChange={e => setNewLogText(e.target.value)} onPaste={(e) => handlePasteOnTextInput(e, setNewLogImages)} onDrop={(e) => handleDropOnTextInput(e, setNewLogImages)} placeholder="状況メモ... (画像対応)" className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-2.5 text-xs text-slate-700 dark:text-slate-200 font-bold focus:outline-none focus:border-indigo-400 min-h-[80px]" rows={2.5} />
                                                  {newLogImages.length > 0 && (
                                                    <div className="flex flex-wrap gap-1.5 p-2 bg-slate-100 dark:bg-slate-900/50 rounded-xl border">
                                                      {newLogImages.map((src, imgIdx) => (
                                                        <div key={`${src.substring(0,20)}-${imgIdx}`} className="relative w-12 h-12 rounded-lg overflow-hidden border"><img src={src} className="w-full h-full object-cover" /><button type="button" onClick={() => setNewLogImages(p => p.filter((_, idx) => idx !== imgIdx))} className="absolute top-0.5 right-0.5 bg-slate-900/80 text-white rounded-full p-0.5"><IconX className="h-2.5 w-2.5" /></button></div>
                                                      ))}
                                                    </div>
                                                  )}
                                                  <div className="grid grid-cols-2 gap-2 text-[10px]">
                                                    <div><label className="block text-slate-400 dark:text-slate-500 font-bold mb-0.5">TO</label><select value={newLogTo} onChange={e=>setNewLogTo(e.target.value)} className="w-full border border-slate-200 dark:border-slate-700 rounded-lg p-1.5 bg-white dark:bg-slate-900 font-bold text-slate-600 dark:text-slate-300 focus:outline-none"><option value="">指定なし</option>{deptList.map(dl => <option key={dl.key} value={dl.label}>{dl.label}</option>)}<option value="全員">全員</option></select></div>
                                                    <div><label className="block text-slate-400 dark:text-slate-500 font-bold mb-0.5">期限日</label><input type="date" value={newLogDueDate} onChange={e=>setNewLogDueDate(e.target.value)} className="w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 rounded-lg p-1 font-mono font-bold text-slate-700 dark:text-slate-200 focus:outline-none" /></div>
                                                  </div>
                                                  <div className="flex justify-end gap-1.5 mt-1 pt-2 border-t border-slate-100 dark:border-slate-700">
                                                    <button onClick={() => setAddingLogTaskId(null)} className="text-[9px] text-slate-400 dark:text-slate-500 px-2.5 py-1.5 rounded-lg font-bold">キャンセル</button>
                                                    <button onClick={() => addLog(task.id)} disabled={!newLogText.trim() && newLogImages.length === 0} className="text-[9px] bg-indigo-600 text-white px-3.5 py-1.5 rounded-lg font-black disabled:bg-slate-300">メモ追加</button>
                                                  </div>
                                                </div>
                                              )}
                                              <div className="space-y-2 max-h-[170px] overflow-y-auto pr-1 scrollbar-thin">
                                                {logs.length > 0 ? logs.map(log => {
                                                  const isEdLog = editingLogId === log.id;
                                                  return (
                                                    <div key={log.id} className={`group/log relative border rounded-xl p-3 shadow-xs flex flex-col gap-1.5 ${log.completed ? 'opacity-50 bg-emerald-50/50 dark:bg-emerald-900/20 border-emerald-100' : log.isHighlighted ? 'bg-amber-50 dark:bg-amber-900/20 border-amber-300 ring-1 ring-amber-300' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700'}`}>
                                                      {isEdLog ? (
                                                        <div className="space-y-2.5 text-xs w-full bg-slate-50 dark:bg-slate-900/50 p-2.5 rounded-xl border border-slate-200 dark:border-slate-700">
                                                          <span className="font-bold text-[10px] text-indigo-600 block">✏️ インライン編集</span>
                                                          <textarea value={editLogText} onChange={e => setEditLogText(e.target.value)} onPaste={(e) => handlePasteOnTextInput(e, setEditLogImages)} onDrop={(e) => handleDropOnTextInput(e, setEditLogImages)} className="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-xl p-2 text-xs text-slate-700 dark:text-slate-200 font-bold min-h-[60px]" rows={2} />
                                                          <div className="flex justify-end gap-1.5 pt-1.5 border-t border-slate-200 dark:border-slate-700">
                                                            <button onClick={() => setEditingLogId(null)} className="text-[9px] text-slate-500 px-2 py-0.5">キャンセル</button>
                                                            <button onClick={() => saveLogEdit(task.id, log.id)} disabled={!editLogText.trim() && editLogImages.length === 0} className="text-[9px] bg-indigo-600 text-white px-3 py-1 rounded font-bold">更新</button>
                                                          </div>
                                                        </div>
                                                      ) : (
                                                        <React.Fragment>
                                                          <div className="flex justify-between items-center border-b border-slate-100 dark:border-slate-700/50 pb-1">
                                                            <span className="text-[8px] font-mono text-slate-400 font-bold flex items-center gap-0.5"><IconClock /> {log.date}{log.isHighlighted && <span className="ml-1.5 bg-amber-100 text-amber-800 text-[7.5px] px-1.5 py-0.5 rounded font-bold">📌 重要</span>}</span>
                                                            <div className="flex items-center gap-1.5 bg-white/95 dark:bg-slate-800/95 border border-slate-200 dark:border-slate-700 rounded-lg p-0.5 absolute top-2 right-2">
                                                              <button onClick={() => startEditingLog(log)} className="p-1 text-slate-400 hover:text-indigo-600"><IconEdit2 className="h-3 w-3" /></button>
                                                              <button onClick={() => toggleLogHighlight(task.id, log.id)} className={`p-1 ${log.isHighlighted ? 'text-amber-500 bg-amber-50' : 'text-slate-400 hover:text-amber-500'}`}><IconPin className="h-3 w-3" /></button>
                                                              <button onClick={() => toggleLogComplete(task.id, log.id)} className={`p-1 ${log.completed ? 'text-emerald-500' : 'text-slate-400 hover:text-emerald-600'}`}><IconCheck className="h-3 w-3" /></button>
                                                              <button onClick={() => deleteLog(task.id, log.id)} className="p-1 text-slate-400 hover:text-rose-500"><IconTrash2 className="h-3 w-3" /></button>
                                                            </div>
                                                          </div>
                                                          <div className="w-full pr-14 space-y-2">
                                                            <p className={`text-[11px] text-slate-600 dark:text-slate-300 font-bold whitespace-pre-wrap ${log.completed ? 'line-through text-slate-400' : ''}`}>{log.text}</p>
                                                            {log.attachedImages && log.attachedImages.length > 0 && (
                                                              <div className="flex flex-wrap gap-1.5 pt-1.5">
                                                                {log.attachedImages.map((src, imgIdx) => (
                                                                  <div key={`${src.substring(0,20)}-${imgIdx}`} onClick={() => setLightboxImage(src)} className="relative max-w-[120px] max-h-[80px] rounded-lg overflow-hidden border border-slate-200 cursor-zoom-in"><img src={src} className="w-full h-full object-cover" /></div>
                                                                ))}
                                                              </div>
                                                            )}
                                                          </div>
                                                          <div className="flex flex-wrap items-center gap-1.5 mt-0.5">
                                                            {log.to && (<span className="inline-flex items-center gap-1 text-[9px] bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 px-2 py-0.5 rounded-lg font-black">TO: {log.to}</span>)}
                                                            {log.dueDate && (<span className="inline-flex items-center gap-1 text-[9px] bg-rose-50 dark:bg-rose-900/30 text-rose-700 dark:text-rose-300 px-2 py-0.5 rounded-lg font-mono font-bold">期日: {log.dueDate}</span>)}
                                                          </div>
                                                        </React.Fragment>
                                                      )}
                                                    </div>
                                                  );
                                                }) : (<p className="text-[10px] text-slate-400 text-center py-4 bg-white dark:bg-slate-800 border border-dashed rounded-xl">履歴はありません</p>)}
                                              </div>
                                            </div>
                                          </div>
                                        )}
                                      </div>
                                    )}
                                  </div>
                                );
                              }) : (
                                <div className="col-span-2 text-center py-10 bg-white dark:bg-slate-800 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl text-slate-400 dark:text-slate-500 text-xs font-bold leading-relaxed">タスクがありません。<br />「＋ タスク追加」から起票しましょう。</div>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </React.Fragment>
            )}

            {/* --- DBビュー --- */}
            {viewMode === 'database' && (
              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl shadow-xs overflow-hidden p-6 space-y-5 animate-in fade-in transition-colors">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-200 dark:border-slate-700">
                  <div className="space-y-1">
                    <h2 className="text-base font-black text-slate-800 dark:text-white flex items-center gap-2"><IconDatabase className="text-indigo-600 dark:text-indigo-400" />ECD案件一覧データベース</h2>
                    <p className="text-xs text-slate-400 dark:text-slate-500">案件・プロジェクトを横断して進捗・ヘルス状況を俯瞰します。</p>
                  </div>
                  <button onClick={() => { setNewProjFolderId(selectedFolderId); setShowAddProjectModal(true); }} className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-xs px-4.5 py-3 rounded-2xl flex items-center gap-1.5"><IconPlus /> 新規案件を起票</button>
                </div>
                <div className="flex flex-col sm:flex-row gap-3 pt-1">
                  <select value={dbFilterFolderId} onChange={(e) => setDbFilterFolderId(e.target.value)} className="border border-slate-200 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-900 focus:outline-none focus:border-indigo-400">
                    <option value="all">📁 すべてのフォルダ</option>{folders.map(f => (<option key={f.id} value={f.id}>📁 {f.name}</option>))}
                  </select>
                  <select value={dbFilterStatus} onChange={(e) => setDbFilterStatus(e.target.value)} className="border border-slate-200 dark:border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-900 focus:outline-none focus:border-indigo-400">
                    <option value="all">🚥 すべての進捗状況</option><option value="pending">未着手</option><option value="in_progress">進行中</option><option value="completed">完了</option><option value="not_applicable">対応なし</option>
                  </select>
                  <div className="flex-1 relative">
                    <input type="text" placeholder="案件名やコードでリアルタイム検索..." value={dbFilterText} onChange={(e) => setDbFilterText(e.target.value)} className="w-full border border-slate-200 dark:border-slate-700 rounded-xl p-2.5 pl-3.5 text-xs text-slate-700 dark:text-slate-200 font-bold bg-white dark:bg-slate-900 focus:outline-none focus:border-indigo-400" />
                  </div>
                </div>
                <div className="overflow-x-auto rounded-2xl border border-slate-200 dark:border-slate-700">
                  <table className="w-full text-xs text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 font-black text-[10.5px] uppercase">
                        <th className="py-3 px-4 border border-slate-200 dark:border-slate-700 text-center w-28">状態</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700">フォルダ</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700">案件名</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700 w-32">コード</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700 w-44">開始〜目標</th><th className="py-2.5 px-4 border border-slate-200 dark:border-slate-700 text-center w-28">タスク内訳</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700 w-40">進捗率</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700 w-36">アラート</th><th className="py-3 px-4 border border-slate-200 dark:border-slate-700 text-center w-32">操作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200 dark:divide-slate-700">
                      {filteredDbProjects.length > 0 ? filteredDbProjects.map(proj => {
                        const prog = calculateProjectProgressById(proj), lates = countLateTasksByProject(proj);
                        const folderName = folders.find(f => f.id === proj.folderId)?.name || '未分類';
                        const { completed, inProgress, notStarted, notApplicable } = countTaskStatus(proj);
                        const statusObj = projectStatusOptions.find(o => o.value === (proj.status || 'pending'));
                        return (
                          <tr key={proj.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-700/30 transition-colors">
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 text-center"><span className={`inline-flex items-center px-2.5 py-0.5 rounded-xl font-black text-[9.5px] border shadow-xs ${statusObj?.className}`}>{statusObj?.label}</span></td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 font-black text-slate-500 dark:text-slate-400"><span className="inline-flex items-center gap-1"><IconFolder className="h-3.5 w-3.5 text-purple-600 dark:text-purple-400" />{folderName}</span></td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 font-black text-slate-900 dark:text-slate-100 text-sm max-w-xs truncate">{proj.name}</td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 font-mono text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider">{proj.code}</td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 font-mono text-slate-500 dark:text-slate-400 font-bold">{proj.startDate} 〜 {proj.endDate}</td>
                            <td className="py-2 px-4 border border-slate-200 dark:border-slate-700 align-middle">
                              <div className="flex flex-col gap-0.5 text-[9.5px] w-24 mx-auto font-mono font-bold leading-none">
                                <div className="flex justify-between items-center text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-800 px-1 py-0.5 rounded border border-slate-100 dark:border-slate-700"><span>未着手</span><span>{notStarted}</span></div>
                                <div className="flex justify-between items-center text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 px-1 py-0.5 rounded border border-blue-100 dark:border-blue-800"><span>進行中</span><span>{inProgress}</span></div>
                                <div className="flex justify-between items-center text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/30 px-1 py-0.5 rounded border border-emerald-100 dark:border-emerald-800"><span>完了</span><span>{completed}</span></div>
                                {notApplicable > 0 && (<div className="flex justify-between items-center text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 px-1 py-0.5 rounded border border-slate-200 dark:border-slate-600"><span>対応なし</span><span>{notApplicable}</span></div>)}
                              </div>
                            </td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700">
                              <div className="flex items-center gap-2 min-w-[120px]"><div className="h-2 flex-1 bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-indigo-500 bg-gradient-to-r from-indigo-500 to-purple-500" style={{ width: `${prog}%` }} /></div><span className="font-black font-mono text-indigo-600 dark:text-indigo-400 w-8 text-right text-xs">{prog}%</span></div>
                            </td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700">
                              {lates > 0 ? <span className="inline-flex items-center gap-1 bg-rose-50 dark:bg-rose-900/30 text-rose-700 dark:text-rose-400 border border-rose-200 dark:border-rose-800 font-black text-[9.5px] px-2.5 py-0.5 rounded-full shadow-sm animate-pulse">⚠️ 遅延 {lates}件</span> : <span className="inline-flex items-center gap-1 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800 font-black text-[9.5px] px-2.5 py-0.5 rounded-full shadow-xs">✅ 順調</span>}
                            </td>
                            <td className="py-3.5 px-4 border border-slate-200 dark:border-slate-700 text-center">
                              <div className="flex items-center justify-center gap-1.5">
                                <button onClick={() => handleOpenProjectFromDb(proj)} className="flex items-center gap-1 bg-indigo-50 dark:bg-indigo-900/30 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 border border-indigo-200 dark:border-indigo-800 font-black px-2.5 py-1.5 rounded-xl shadow-xs text-[11px]"><IconEye className="h-3.5 w-3.5" /><span>開く</span></button>
                                <button onClick={(e) => handleCopyProjectUrl(proj.id, e)} className="flex items-center gap-1 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 border border-slate-300 dark:border-slate-600 font-bold px-2 py-1.5 rounded-xl shadow-xs"><IconLink className="h-3.5 w-3.5 text-slate-400 dark:text-slate-500" /></button>
                                <button onClick={(e) => handleDeleteProjectByList(proj.id, e)} className="text-slate-400 dark:text-slate-500 hover:text-rose-600 dark:hover:text-rose-400 p-1.5 hover:bg-rose-50 dark:hover:bg-rose-900/30 border border-transparent hover:border-rose-100 dark:hover:border-rose-800 rounded-xl transition-all"><IconTrash2 className="h-4 w-4" /></button>
                              </div>
                            </td>
                          </tr>
                        );
                      }) : (<tr><td colSpan="9" className="py-12 text-center text-slate-400 dark:text-slate-500 font-bold">条件に一致する調整案件がありません。</td></tr>)}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>

          {/* マスタ設定モーダル */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] animate-in fade-in p-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 max-w-xl w-full shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-base font-black text-slate-800 dark:text-slate-100 flex items-center gap-2"><IconSettings className="h-5 w-5 text-indigo-600 dark:text-indigo-400" />設定</h2>
                  <button onClick={() => setShowSettingsModal(false)} className="text-slate-400 dark:text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 p-1.5 rounded-lg transition-colors"><IconX className="h-5 w-5" /></button>
                </div>
                <div className="flex-1 overflow-y-auto pr-2 space-y-6 scrollbar-thin">
                  
                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-600 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700 pb-2 flex items-center gap-1.5">☁️ クラウド同期 (GitHub Gist)</h3>
                    <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm space-y-3">
                      <p className="text-[10px] text-slate-500 dark:text-slate-400 font-bold">TokenとGist IDを設定すると同期・バックアップします。</p>
                      <div className="space-y-2">
                        <div>
                          <label className="block text-[10px] font-bold text-slate-600 dark:text-slate-400 mb-1">GitHub Personal Access Token</label>
                          <input type="password" value={tmpGistToken} onChange={e => setTmpGistToken(e.target.value)} className="w-full border border-slate-200 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 focus:outline-none focus:border-indigo-400" placeholder="ghp_xxxxxxxxxxxx" />
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-slate-600 dark:text-slate-400 mb-1">Gist ID</label>
                          <input type="text" value={tmpGistId} onChange={e => setTmpGistId(e.target.value)} className="w-full border border-slate-200 dark:border-slate-600 rounded-xl p-2 text-xs bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 focus:outline-none focus:border-indigo-400 font-mono" placeholder="1a2b3c4d5e6f7g8h9i0j" />
                        </div>
                      </div>
                      <div className="flex justify-end pt-1">
                        <button onClick={saveGistSettings} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md">保存して接続</button>
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-slate-600 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700 pb-2">担当部署の管理</h3>
                    <div className="space-y-2.5">
                      {deptList.map((dept, idx) => (
                        <div key={dept.key} className="flex items-center gap-2 bg-slate-50 dark:bg-slate-900/50 p-2.5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm transition-all hover:border-indigo-300 group">
                          <div className="flex flex-col gap-0.5">
                            <button onClick={() => moveDeptOrder(idx, -1)} disabled={idx === 0} className={`p-0.5 rounded ${idx === 0 ? 'opacity-30' : 'hover:bg-indigo-100 hover:text-indigo-600 text-slate-400'}`}><IconArrowUp /></button>
                            <button onClick={() => moveDeptOrder(idx, 1)} disabled={idx === deptList.length - 1} className={`p-0.5 rounded ${idx === deptList.length - 1 ? 'opacity-30' : 'hover:bg-indigo-100 hover:text-indigo-600 text-slate-400'}`}><IconArrowDown /></button>
                          </div>
                          <input type="text" value={dept.label} onChange={(e) => handleRenameDeptChange(dept.key, e.target.value)} onBlur={() => handleRenameDeptSave(dept.key)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-xl p-2 text-slate-800 dark:text-slate-200 focus:outline-none" />
                          <select value={dept.color} onChange={(e) => updateDeptColorSetting(dept.key, e.target.value)} className={`text-xs font-bold rounded-xl p-2 border border-slate-300 dark:border-slate-600 focus:outline-none ${colorClassesMap[dept.color]?.badge || 'bg-white dark:bg-slate-800'}`}>
                            {Object.keys(colorClassesMap).map(c => <option key={c} value={c} className="bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200">{c}色</option>)}
                          </select>
                          <button onClick={() => handleDeleteDept(dept.key)} className="p-2 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-xl ml-1"><IconTrash2 className="h-4 w-4" /></button>
                        </div>
                      ))}
                    </div>
                    <form onSubmit={handleCreateDept} className="flex items-center gap-2 mt-4 bg-indigo-50/50 dark:bg-indigo-900/20 p-3 rounded-2xl border border-indigo-100 dark:border-indigo-800/50 shadow-inner">
                      <span className="text-[10px] font-black text-indigo-600 dark:text-indigo-400 shrink-0 uppercase flex items-center gap-0.5"><IconPlus className="h-3 w-3"/>追加</span>
                      <input type="text" placeholder="部署名..." value={newDeptLabel} onChange={e => setNewDeptLabel(e.target.value)} className="flex-1 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-xl p-2 focus:outline-none shadow-sm" />
                      <select value={newDeptColor} onChange={e => setNewDeptColor(e.target.value)} className={`text-xs font-bold rounded-xl p-2 border border-slate-200 dark:border-slate-700 shadow-sm focus:outline-none ${colorClassesMap[newDeptColor]?.badge || 'bg-white dark:bg-slate-800'}`}>
                        {Object.keys(colorClassesMap).map(c => <option key={c} value={c} className="bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200">{c}色</option>)}
                      </select>
                      <button type="submit" disabled={!newDeptLabel.trim()} className="bg-indigo-600 hover:bg-indigo-700 text-white disabled:bg-slate-300 dark:disabled:bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold shadow-md ml-1">登録</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
