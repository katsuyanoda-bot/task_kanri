<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Loom プロトタイプ (Dark Mode)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: { 
              55: '#f8fafc', 150: '#e2e8f0', 202: '#e2e8f0', 205: '#e2e8f0', 
              250: '#e2e8f0', 350: '#cbd5e1', 404: '#94a3b8', 405: '#94a3b8', 
              450: '#94a3b8', 455: '#94a3b8', 505: '#64748b', 550: '#64748b', 
              555: '#64748b', 605: '#475569', 606: '#475569', 650: '#475569', 
              655: '#475569', 705: '#334155', 750: '#334155', 755: '#334155', 
              805: '#1e293b', 850: '#1e293b', 855: '#1e293b', 955: '#0f172a' 
            },
            purple: { 55: '#faf5ff', 500: '#a855f7', 600: '#9333ea', 900: '#581c87' },
            indigo: { 
              150: '#e0e7ff', 450: '#818cf8', 455: '#818cf8', 505: '#6366f1', 
              550: '#6366f1', 605: '#4f46e5', 606: '#4f46e5', 650: '#4f46e5', 
              655: '#4f46e5', 750: '#3730a3', 755: '#3730a3' 
            },
            emerald: { 55: '#ecfdf5', 555: '#10b981' },
            rose: { 
              55: '#fff1f2', 150: '#ffe4e6', 550: '#f43f5e', 605: '#e11d48', 
              606: '#e11d48', 650: '#e11d48', 655: '#e11d48', 850: '#881337' 
            },
            amber: { 955: '#78350f' },
            blue: { 606: '#2563eb' },
            orange: { 100: '#ffedd5', 400: '#fb923c', 950: '#431407' }
          }
        }
      }
    }
  </script>

  <style>
    .scrollbar-thin::-webkit-scrollbar { width: 5px; height: 5px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark .scrollbar-thin::-webkit-scrollbar { width: 5px; height: 5px; }
    .dark .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; }
    .dark .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    
    html, body, #root { height: 100%; overflow: hidden; margin: 0; padding: 0; }
  </style>
</head>
<body class="bg-slate-55 dark:bg-slate-955 transition-colors duration-200 text-slate-150 font-sans antialiased overflow-hidden">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useMemo, useEffect, useRef } = React;

    const colorClassesMap = {
      slate: { text: 'text-slate-700 dark:text-slate-300', bg: 'bg-[#f8fafc] dark:bg-[#1e293b]', border: 'border-slate-202 dark:border-slate-705', borderStrong: 'border-slate-350 dark:border-slate-650', badge: 'bg-slate-202 dark:bg-slate-805 text-slate-805 dark:text-slate-300', dot: '🔴' },
      blue: { text: 'text-blue-700 dark:text-blue-300', bg: 'bg-[#f0f7ff] dark:bg-[#18263e]', border: 'border-blue-200 dark:border-blue-800', borderStrong: 'border-blue-300 dark:border-blue-600', badge: 'bg-blue-50 dark:bg-blue-900/60 text-blue-800 dark:text-blue-300', dot: '🔵' },
      emerald: { text: 'text-emerald-700 dark:text-emerald-300', bg: 'bg-[#ecfdf5] dark:bg-[#132d24]', border: 'border-emerald-200 dark:border-emerald-800', borderStrong: 'border-emerald-300 dark:border-emerald-600', badge: 'bg-emerald-55 dark:bg-emerald-900/60 text-emerald-800 dark:text-emerald-300', dot: '🟢' },
      amber: { text: 'text-amber-850 dark:text-amber-300', bg: 'bg-[#fffbeb] dark:bg-[#2f2214]', border: 'border-amber-200 dark:border-amber-800', borderStrong: 'border-amber-300 dark:border-amber-600', badge: 'bg-amber-100 dark:bg-amber-900/60 text-amber-900 dark:text-amber-300', dot: '🟡' },
      rose: { text: 'text-rose-700 dark:text-rose-300', bg: 'bg-[#fff1f2] dark:bg-[#34161f]', border: 'border-rose-200 dark:border-rose-800', borderStrong: 'border-rose-300 dark:border-rose-600', badge: 'bg-rose-150 dark:bg-rose-900/60 text-rose-850 dark:text-rose-300', dot: '🔴' },
      purple: { text: 'text-purple-700 dark:text-purple-300', bg: 'bg-[#faf5ff] dark:bg-[#2b1b3d]', border: 'border-purple-200 border-purple-800', borderStrong: 'border-purple-300 dark:border-purple-600', badge: 'bg-purple-50 dark:bg-purple-900/60 text-purple-800 dark:text-purple-300', dot: '🟣' },
      orange: { text: 'text-orange-700 dark:text-orange-300', bg: 'bg-[#fff7ed] dark:bg-[#431407]/40', border: 'border-orange-200 dark:border-orange-800', borderStrong: 'border-orange-300 dark:border-orange-600', badge: 'bg-orange-100 dark:bg-orange-955/60 text-orange-800 dark:text-orange-300', dot: '🟠' }
    };

    const colorLabels = {
      slate: '⚫ グレー',
      blue: '🔵 ブルー',
      emerald: '🟢 グリーン',
      amber: '🟡 イエロー',
      rose: '🔴 ローズ',
      purple: '🟣 パープル',
      orange: '🟠 オレンジ'
    };

    const allowedDomains = ['sansan.com', 'sansan.co.jp'];
    const TODAY_STR = '2026-05-24';

    const IconCalendar = () => <svg className="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" height="6"></line><line x1="8" y1="2" x2="8" height="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const IconDatabase = () => <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>;
    const IconChevronRight = () => <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>;
    const IconHome = () => <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;

    // --- 現場用タスクカードコンポーネント ---
    function TaskCard({ task, index, totalTasks, onUpdateTask, onDeleteTask, onMoveTask, deptList }) {
      const [isEditing, setIsEditing] = useState(false);
      const [isDetailsOpen, setIsDetailsOpen] = useState(false);
      const [editTitle, setEditTitle] = useState(task.title);
      const [editDesc, setEditDesc] = useState(task.description || '');
      const [editDept, setEditDept] = useState(task.department || 'backoffice');
      const [editDueDate, setEditDueDate] = useState(task.dueDate || TODAY_STR);
      const [editLevel, setEditLevel] = useState(task.level || 1);
      const [nextActionInput, setNextActionInput] = useState(task.nextAction || '');

      const normalizedUrls = useMemo(() => {
        if (task.urls && Array.isArray(task.urls)) return task.urls;
        if (task.url) return [{ id: 'legacy', name: task.urlName || '添付リソース', url: task.url }];
        return [];
      }, [task.urls, task.url]);

      const [editUrls, setEditUrls] = useState([]);
      useEffect(() => { if (isEditing) setEditUrls([...normalizedUrls]); }, [isEditing, normalizedUrls]);
      useEffect(() => { setNextActionInput(task.nextAction || ''); }, [task.nextAction]);

      const tkCls = colorClassesMap[task.deptColor] || colorClassesMap.slate;

      const daysDiff = useMemo(() => {
        if (['completed', 'not_applicable'].includes(task.status)) return null;
        if (!task.dueDate) return null;
        const t = new Date(TODAY_STR);
        const d = new Date(task.dueDate);
        const diffTime = d.setHours(0,0,0,0) - t.setHours(0,0,0,0);
        return Math.round(diffTime / (1000 * 60 * 60 * 24));
      }, [task.dueDate, task.status]);

      const deadlineBadge = useMemo(() => {
        if (daysDiff === null) return null;
        if (daysDiff < 0) return <span className="text-rose-605 dark:text-rose-400 font-black bg-rose-50 dark:bg-rose-955/40 border border-rose-200 dark:border-rose-900/60 px-1.5 py-0.5 rounded animate-pulse">⚠️ {Math.abs(daysDiff)}日超過!</span>;
        if (daysDiff === 0) return <span className="text-orange-655 dark:text-orange-400 font-black bg-orange-100 dark:bg-orange-955/40 border border-orange-200 dark:border-orange-900/60 px-1.5 py-0.5 rounded">🔥 今日が締切!</span>;
        if (daysDiff <= 3) return <span className="text-amber-600 dark:text-amber-400 font-bold bg-amber-50 dark:bg-amber-955/40 border border-amber-200 dark:border-amber-900/60 px-1.5 py-0.5 rounded">⏳ あと{daysDiff}日</span>;
        return <span className="text-slate-500 dark:text-slate-440 font-semibold bg-slate-100 dark:bg-slate-700/60 px-1.5 py-0.5 rounded">あと{daysDiff}日</span>;
      }, [daysDiff]);

      function handleSave() {
        const targetDept = deptList.find(d => d.key === editDept) || { label: '他部署', color: 'slate' };
        onUpdateTask(task.id, (p) => ({
          ...p, title: editTitle, description: editDesc, department: editDept,
          deptLabel: targetDept.label, deptColor: targetDept.color, dueDate: editDueDate, level: Number(editLevel),
          urls: editUrls.filter(u => u.url.trim() !== ''),
          completedAt: p.status !== 'completed' && editTitle ? TODAY_STR : p.completedAt
        }));
        setIsEditing(false);
      }

      if (isEditing) {
        return (
          <div className="p-4 bg-slate-55 dark:bg-slate-900 border-4 border-indigo-500 rounded-3xl text-xs font-bold space-y-3 shadow-xl" onClick={e => e.stopPropagation()}>
            <div><label className="text-[10px] text-slate-404">タスク名 *</label><input type="text" value={editTitle} onChange={e => setEditTitle(e.target.value)} className="w-full p-2 border rounded-xl dark:bg-slate-800 border-slate-202 dark:border-slate-700 text-slate-855 dark:text-white" /></div>
            <div>
              <label className="text-[10px] text-slate-404">主担当部署</label>
              <select value={editDept} onChange={e => setEditDept(e.target.value)} className="w-full p-2 border rounded-xl dark:bg-slate-800 border-slate-202 dark:border-slate-700 text-slate-855 dark:text-white">
                {deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}
              </select>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <div><label className="block text-[10px] text-slate-404 mb-0.5">期日</label><input type="date" value={editDueDate} onChange={e => setEditDueDate(e.target.value)} className="w-full p-2 border rounded-xl dark:bg-slate-800 border-slate-202 dark:border-slate-700 text-slate-855 dark:text-white font-mono" /></div>
              <div><label className="text-[10px] text-slate-404">ウエイト</label><select value={editLevel} onChange={e => setEditLevel(Number(e.target.value))} className="w-full p-2 border rounded-xl dark:bg-slate-800 border-slate-202 dark:border-slate-700 text-slate-855 dark:text-white"><option value="1">🟢 1P</option><option value="2">🟡 2P</option><option value="4">🔴 4P</option></select></div>
            </div>
            <div className="flex justify-end gap-2 pt-2">
              <button onClick={() => setIsEditing(false)} className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 px-3 py-1.5 rounded-xl border border-slate-202 dark:border-slate-600">戻る</button>
              <button onClick={handleSave} className="bg-indigo-600 text-white px-4 py-1.5 rounded-xl">保存</button>
            </div>
          </div>
        );
      }

      return (
        <div 
          onClick={(e) => { if (isEditing) return; e.stopPropagation(); setIsDetailsOpen(!isDetailsOpen); }}
          className={`relative border-4 rounded-3xl bg-white dark:bg-slate-800 shadow-sm flex flex-col justify-between overflow-hidden transition-all duration-150 cursor-pointer ${task.status === 'completed' ? 'border-slate-202 opacity-60' : task.isBlocked ? 'border-amber-400 ring-1 ring-amber-300' : task.doToday ? 'border-orange-400 ring-1 ring-orange-300' : tkCls?.borderStrong || 'border-slate-350'}`}
        >
          <div className="p-5 pb-2">
            <div className="flex justify-between items-center text-[11px] font-bold text-slate-500 mb-3">
              <div className="flex items-center gap-2" onClick={e => e.stopPropagation()}>
                <span className="font-black">{task.level === 4 ? '🔴 4P' : task.level === 2 ? '🟡 2P' : '🟢 1P'}</span>
                <select 
                  value={task.status} 
                  onChange={(e) => onUpdateTask(task.id, p => ({ ...p, status: e.target.value, completedAt: e.target.value === 'completed' ? TODAY_STR : null }))}
                  className="bg-slate-100 dark:bg-slate-700 border-none rounded px-1 py-0.5 text-[10px] font-black text-slate-605 dark:text-slate-202 outline-none"
                >
                  <option value="pending">⚪ 未対応</option>
                  <option value="in_progress">🔵 進行中</option>
                  <option value="completed">🟢 完了</option>
                  <option value="not_applicable">⚪ 対象外</option>
                </select>
              </div>
              <div className="flex items-center gap-1">
                <button disabled={index === 0} onClick={(e) => { e.stopPropagation(); onMoveTask(task.id, 'up'); }} className="p-1.5 border rounded-md text-[10px] bg-slate-55 dark:bg-slate-700">▲</button>
                <button disabled={index === totalTasks - 1} onClick={(e) => { e.stopPropagation(); onMoveTask(task.id, 'down'); }} className="p-1.5 border rounded-md text-[10px] bg-slate-55 dark:bg-slate-700">▼</button>
                <button onClick={(e) => { e.stopPropagation(); onUpdateTask(task.id, p => ({ ...p, isBlocked: !p.isBlocked })); }} className={`px-2 py-1 rounded-xl border font-black text-[10px] transition-all ${task.isBlocked ? 'bg-amber-100 text-amber-800 border-amber-400' : 'bg-slate-50 dark:bg-slate-700 text-slate-404'}`}>連絡待ち</button>
                <button onClick={(e) => { e.stopPropagation(); onUpdateTask(task.id, p => ({ ...p, doToday: !p.doToday })); }} className={`px-2 py-1 rounded-xl border font-black text-[10px] transition-all ${task.doToday ? 'bg-orange-100 text-orange-800 border-orange-400' : 'bg-slate-50 dark:bg-slate-700 text-slate-404'}`}>今日やる</button>
                <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIsEditing(true); }} className="text-slate-550 dark:text-slate-404 p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-all shrink-0 relative z-30">✏️</button>
                <button onClick={(e) => { e.stopPropagation(); onDeleteTask(task.id, task.title); }} className="text-slate-404 text-sm font-black p-1.5">×</button>
              </div>
            </div>
            <div className="text-left space-y-1">
              <h4 className="font-extrabold text-sm text-slate-855 dark:text-slate-150 leading-tight">{task.title}</h4>
              <div className="flex flex-wrap items-center gap-1.5 text-[10px] font-bold mt-1.5 text-slate-404">
                <span className={`px-1.5 py-0.5 border rounded ${tkCls?.badge || 'bg-slate-202'}`}>{task.deptLabel || '他部署'}</span>
                <span className="font-mono">期日: {task.dueDate}</span> {deadlineBadge}
              </div>
              <div className="mt-3 pt-2 border-t border-slate-100 dark:border-slate-700/60 text-left" onClick={e => e.stopPropagation()}>
                <label className="text-[9.5px] font-black text-indigo-500 block mb-1 uppercase">⏭️ 次の一手</label>
                <input type="text" value={nextActionInput} onChange={e => setNextActionInput(e.target.value)} onBlur={() => onUpdateTask(task.id, p => ({ ...p, nextAction: nextActionInput.trim() }))} className="w-full text-xs bg-slate-55 dark:bg-slate-900 border border-slate-202 dark:border-slate-700 rounded-xl px-2.5 py-1.5 text-slate-855 dark:text-white font-bold focus:outline-none" />
              </div>
            </div>
          </div>
          {isDetailsOpen && (
            <div className="px-5 pb-4 space-y-3 animate-in fade-in" onClick={e => e.stopPropagation()}>
              <div className="text-left border-t border-dashed dark:border-slate-700 pt-3">
                <span className="text-[9.5px] font-bold text-slate-404 block mb-1">論点・備考</span>
                <textarea value={editDesc} onChange={e => setEditDesc(e.target.value)} onBlur={() => onUpdateTask(task.id, p => ({ ...p, description: editDesc }))} className="w-full text-xs bg-slate-55 dark:bg-slate-900 p-2 border rounded-xl text-slate-855 dark:text-white min-h-[60px]" />
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- 各STEPレーンコンポーネント ---
    function StepSection({ step, index, taskFilter, deptList, onAddTask, onUpdateTask, onDeleteTask, onMoveTask, onUpdateStep, onDeleteStep }) {
      const [isCollapsed, setIsCollapsed] = useState(false);
      const [isAddingTask, setIsAddingTask] = useState(false);
      const [isEditingStep, setIsEditingStep] = useState(false);

      const [stepName, setStepName] = useState(step.name);
      const [stepDeptKey, setStepDeptKey] = useState(step.deptKey || 'backoffice');
      const [stepStart, setStepStart] = useState(step.startDate || '');
      const [stepDue, setStepDue] = useState(step.dueDate || '');

      const [newTitle, setNewTitle] = useState('');
      const [newDept, setNewDept] = useState('backoffice');
      const [newDueDate, setNewDueDate] = useState(TODAY_STR);
      const [newLevel, setNewLevel] = useState(1);

      const stepTksAll = step.tasks || [];
      const stpProg = useMemo(() => {
        const valid = stepTksAll.filter(t => t.status !== 'not_applicable');
        if (valid.length === 0) return 0;
        const totalPoints = valid.reduce((sum, t) => sum + (Number(t.level) || 1), 0);
        const completedPoints = valid.filter(t => t.status === 'completed').reduce((sum, t) => sum + (Number(t.level) || 1), 0);
        return Math.round((completedPoints / totalPoints) * 100);
      }, [stepTksAll]);

      const cClass = colorClassesMap[step.deptColor] || colorClassesMap.slate;

      function handleCreateTask(e) {
        e.preventDefault();
        if (!newTitle.trim()) return;
        const targetDept = deptList.find(d => d.key === newDept) || { label: '他部署', color: 'slate' };
        onAddTask(step.id, {
          id: `t_${Date.now()}`, title: newTitle.trim(), description: '', assignee: '自分', department: newDept,
          deptLabel: targetDept.label, deptColor: targetDept.color, dueDate: newDueDate, status: 'pending', level: Number(newLevel), contextLogs: [], urls: [], nextAction: ''
        });
        setNewTitle(''); setIsAddingTask(false);
      }

      return (
        <div className={`bg-white dark:bg-slate-900 rounded-3xl shadow-sm border-4 overflow-hidden ${isCollapsed ? 'border-slate-202' : cClass?.borderStrong || 'border-slate-350'}`}>
          <div onClick={() => setIsCollapsed(!isCollapsed)} className="p-4 border-b dark:border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 cursor-pointer bg-slate-55 dark:bg-slate-855">
            <div className="flex items-center gap-3">
              <span className="bg-slate-600 text-white font-black text-[10px] px-2 py-0.5 rounded">STEP {index + 1}</span>
              <h3 className="font-black text-sm text-slate-855 dark:text-slate-150">{step.name}</h3>
              <span className="text-[11px] text-slate-404 font-mono">{step.startDate} 〜 {step.dueDate}</span>
            </div>
            <div className="flex items-center gap-4 shrink-0 font-bold" onClick={e => e.stopPropagation()}>
              <div className="text-xs text-slate-404">進捗: {stpProg}%</div>
              <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIsEditingStep(!isEditingStep); }} className="text-xs text-slate-404 hover:text-indigo-600 p-1 rounded hover:bg-slate-100 dark:hover:bg-slate-800 transition-all shrink-0 relative z-30">✏️</button>
              <button onClick={(e) => { e.stopPropagation(); onDeleteStep(step.id, step.name); }} className="text-xs text-slate-404 hover:text-rose-605">🗑️</button>
              <button onClick={(e) => { e.stopPropagation(); setIsAddingTask(!isAddingTask); }} className="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-xl font-black">＋ タスク追加</button>
            </div>
          </div>

          {isEditingStep && (
            <div className="p-5 bg-slate-55 dark:bg-slate-900 border-b dark:border-slate-800 space-y-4 shadow-inner" onClick={e => e.stopPropagation()}>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div><label className="block text-[10px] text-slate-404">Step名 *</label><input type="text" value={stepName} onChange={e => setStepName(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-800 border-slate-202 text-slate-855 dark:text-white font-bold" /></div>
                <div><label className="block text-[10px] text-slate-404">主担当部署</label><select value={stepDeptKey} onChange={e => setStepDeptKey(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-800 border-slate-202 text-slate-855 dark:text-white font-bold">{deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}</select></div>
                <div><label className="block text-[10px] text-slate-404">開始日</label><input type="date" value={stepStart} onChange={e => setStepStart(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-800 font-mono border-slate-205 text-slate-855 dark:text-white" /></div>
                <div><label className="block text-[10px] text-slate-404">工程期日</label><input type="date" value={stepDue} onChange={e => setStepDue(e.target.value)} className="w-full p-2 border rounded-xl dark:bg-slate-800 font-mono border-slate-205 text-slate-855 dark:text-white" /></div>
              </div>
              <div className="flex justify-end gap-2"><button onClick={() => setIsEditingStep(false)} className="bg-slate-150 text-slate-700 dark:bg-slate-700 dark:text-slate-200 px-3 py-1.5 rounded-xl border border-slate-202 dark:border-slate-600">戻る</button><button onClick={() => { onUpdateStep(step.id, { name: stepName, deptKey: stepDeptKey, startDate: stepStart, dueDate: stepDue }); setIsEditingStep(false); }} className="bg-indigo-600 text-white px-4 py-1 rounded-xl">保存</button></div>
            </div>
          )}

          {!isCollapsed && (
            <div className="p-4 bg-slate-55/30 dark:bg-slate-955/20">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {stepTksAll.map((task, tkIdx) => taskFilter[task.status] && (
                  <TaskCard key={task.id} task={task} index={tkIdx} totalTasks={stepTksAll.length} deptList={deptList} onUpdateTask={onUpdateTask} onDeleteTask={onDeleteTask} onMoveTask={(tid, dir) => onMoveTask(step.id, tid, dir)} />
                ))}
                {isAddingTask && (
                  <form onSubmit={handleCreateTask} className="border-4 border-dashed border-indigo-500 rounded-3xl bg-white dark:bg-slate-800 p-5 space-y-3.5 shadow-md" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center pb-1 border-b dark:border-slate-700">
                      <span className="text-indigo-500 font-extrabold text-xs">➕ 新規タスク追加</span>
                      <button type="button" onClick={() => setIsAddingTask(false)} className="bg-slate-150 dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-2.5 py-1 rounded-lg border border-slate-202 dark:border-slate-600 text-[10px]">キャンセル</button>
                    </div>
                    <div className="space-y-2 text-left">
                      <div><input required type="text" value={newTitle} onChange={e => setNewTitle(e.target.value)} placeholder="タスク名 *" className="w-full p-1.5 border rounded-xl dark:bg-slate-900 border-slate-202 text-slate-855 dark:text-white text-xs font-bold" /></div>
                      <div className="grid grid-cols-3 gap-2">
                        <select value={newDept} onChange={e => setNewDept(e.target.value)} className="p-1.5 border rounded-xl dark:bg-slate-900 border-slate-202 text-[10px]">{deptList.map(d => <option key={d.key} value={d.key}>{d.label}</option>)}</select>
                        <input type="date" value={newDueDate} onChange={e => setNewDueDate(e.target.value)} className="p-1.5 border rounded-xl dark:bg-slate-900 font-mono text-[10px]" />
                        <select value={newLevel} onChange={e => setNewLevel(Number(e.target.value))} className="p-1.5 border rounded-xl dark:bg-slate-900 font-bold text-[10px]"><option value="1">🟢 1P</option><option value="2">🟡 2P</option><option value="4">🔴 4P</option></select>
                      </div>
                    </div>
                    <button type="submit" className="w-full bg-indigo-600 text-white py-1.5 rounded-xl text-xs font-black">追加を確定</button>
                  </form>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- メインアプリケーションコア ---
    function App() {
      const fileInputRef = useRef(null);
      const [viewMode, setViewMode] = useState('home'); 
      const [isDarkMode, setIsDarkMode] = useState(true);
      const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('pl_mock_user')) || null);
      const [alertMessage, setAlertMessage] = useState(null);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

      const [folders, setFolders] = useState(() => JSON.parse(localStorage.getItem('pl_folders')) || initialFolders);
      const [deptList, setDeptList] = useState(() => JSON.parse(localStorage.getItem('pl_depts')) || initialDepts);
      const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('pl_projects')) || initialProjects);
      
      const [selectedFolderId, setSelectedFolderId] = useState('f1');
      const [currentProjectId, setCurrentProjectId] = useState(null);
      const [taskFilter, setTaskFilter] = useState({ pending: true, in_progress: true, completed: false, not_applicable: false });

      const [showAddProjectModal, setShowAddProjectModal] = useState(false);
      const [newProjName, setNewProjName] = useState('');
      const [newProjFolderId, setNewProjFolderId] = useState('f1');

      const [isEditingProject, setIsEditingProject] = useState(false);
      const [editProjName, setEditProjName] = useState('');
      const [editProjCode, setEditProjCode] = useState('');
      const [editProjFolderId, setEditProjFolderId] = useState('');

      const [newFolderName, setNewFolderName] = useState('');
      const [newDeptLabel, setNewDeptLabel] = useState('');
      const [newDeptColor, setNewDeptColor] = useState('slate');

      useEffect(() => {
        localStorage.setItem('pl_projects', JSON.stringify(projects));
        localStorage.setItem('pl_depts', JSON.stringify(deptList));
        localStorage.setItem('pl_folders', JSON.stringify(folders));
        localStorage.setItem('pl_mock_user', JSON.stringify(user));
      }, [projects, deptList, folders, user]);

      useEffect(() => {
        if (isDarkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark');
      }, [isDarkMode]);

      function showAlert(msg) { setAlertMessage(msg); setTimeout(() => setAlertMessage(null), 4000); }
      function triggerConfirm(title, message, onConfirm) { setConfirmModal({ isOpen: true, title, message, onConfirm: () => { onConfirm(); setConfirmModal({ isOpen: false }); } }); }

      const activeProject = useMemo(() => projects.find(p => p.id === currentProjectId) || null, [projects, currentProjectId]);

      useEffect(() => {
        if (activeProject) {
          setEditProjName(activeProject.name || '');
          setEditProjCode(activeProject.code || '');
          setEditProjFolderId(activeProject.folderId || '');
        }
      }, [activeProject, isEditingProject]);

      // --- HOME用集計エンジン ---
      const homeMetrics = useMemo(() => {
        return projects.map(proj => {
          let tasksAll = []; proj.stepList?.forEach(s => { if (s.tasks) tasksAll = [...tasksAll, ...s.tasks]; });
          const ongoing = tasksAll.filter(t => t.status !== 'completed' && t.status !== 'not_applicable');
          const blocked = ongoing.find(t => t.isBlocked);
          const totalValid = tasksAll.filter(t => t.status !== 'not_applicable');
          const totalPoints = totalValid.reduce((sum, t) => sum + (Number(t.level) || 1), 0);
          const compPoints = tasksAll.filter(t => t.status === 'completed').reduce((sum, t) => sum + (Number(t.level) || 1), 0);
          const progress = totalValid.length > 0 ? Math.round((compPoints / totalPoints) * 100) : 0;
          return { id: proj.id, name: proj.name, folderName: folders.find(f => f.id === proj.folderId)?.name || '未分類', progress, blockedDept: blocked?.deptLabel, status: proj.status };
        });
      }, [projects, folders]);

      const achievementLog = useMemo(() => {
        let allComp = [];
        projects.forEach(p => {
          p.stepList?.forEach(s => {
            s.tasks?.forEach(t => {
              if (t.status === 'completed') {
                allComp.push({ ...t, projName: p.name, folderId: p.folderId });
              }
            });
          });
        });
        return allComp.sort((a, b) => new Date(b.completedAt || 0) - new Date(a.completedAt || 0)).slice(0, 15);
      }, [projects]);

      // 予定vs実績の期間分析エンジン
      const projectTimeframeMetrics = useMemo(() => {
        const metrics = {};
        projects.forEach(proj => {
          let tasksAll = []; proj.stepList?.forEach(s => { if (s.tasks) tasksAll = [...tasksAll, ...s.tasks]; });
          const nowTasks = tasksAll.filter(t => t.status !== 'completed' && t.status !== 'not_applicable');
          const nowPoints = nowTasks.reduce((sum, t) => sum + (Number(t.level) || 1), 0);
          
          const nowDeptBreakdown = {};
          deptList.forEach(d => { nowDeptBreakdown[d.key] = { label: d.label, color: d.color, points: 0, count: 0, isBlocked: false }; });
          nowTasks.forEach(t => {
            const dKey = t.department || 'backoffice';
            if (!nowDeptBreakdown[dKey]) nowDeptBreakdown[dKey] = { label: t.deptLabel || '他部署', color: t.deptColor || 'slate', points: 0, count: 0, isBlocked: false };
            nowDeptBreakdown[dKey].points += (Number(t.level) || 1);
            nowDeptBreakdown[dKey].count += 1;
            if (t.isBlocked) nowDeptBreakdown[dKey].isBlocked = true;
          });

          const pastTasks = tasksAll.filter(t => t.status === 'completed');
          const pastPoints = pastTasks.reduce((sum, t) => sum + (Number(t.level) || 1), 0);
          
          const pastDeptBreakdown = {};
          pastTasks.forEach(t => {
            const dKey = t.department || 'backoffice';
            if (!pastDeptBreakdown[dKey]) {
              pastDeptBreakdown[dKey] = { label: t.deptLabel || '他部署', color: t.deptColor || 'slate', points: 0, count: 0, minStart: null, maxEnd: null };
            }
            pastDeptBreakdown[dKey].points += (Number(t.level) || 1);
            pastDeptBreakdown[dKey].count += 1;
            const tStart = new Date(t.startedAt || proj.startDate || TODAY_STR);
            const tEnd = new Date(t.completedAt || TODAY_STR);
            if (!pastDeptBreakdown[dKey].minStart || tStart < pastDeptBreakdown[dKey].minStart) pastDeptBreakdown[dKey].minStart = tStart;
            if (!pastDeptBreakdown[dKey].maxEnd || tEnd > pastDeptBreakdown[dKey].maxEnd) pastDeptBreakdown[dKey].maxEnd = tEnd;
          });

          Object.keys(pastDeptBreakdown).forEach(k => {
            const d = pastDeptBreakdown[k];
            if (d.minStart && d.maxEnd) {
              const diff = d.maxEnd.getTime() - d.minStart.getTime();
              d.durationDays = Math.max(1, Math.round(diff / (1000 * 60 * 60 * 24)) + 1);
            } else d.durationDays = null;
          });

          let durationDays = null; let calculatedEndDateStr = TODAY_STR;
          if (proj.evaluation?.actualEndDate) calculatedEndDateStr = proj.evaluation.actualEndDate;
          else if (pastTasks.length > 0) {
            let maxDate = new Date(proj.startDate || TODAY_STR);
            pastTasks.forEach(t => { if (t.completedAt) { const cd = new Date(t.completedAt); if (cd > maxDate) maxDate = cd; } });
            const pad = (n) => String(n).padStart(2, '0');
            calculatedEndDateStr = `${maxDate.getFullYear()}-${pad(maxDate.getMonth() + 1)}-${pad(maxDate.getDate())}`;
          }
          if (proj.startDate && calculatedEndDateStr) {
            const start = new Date(proj.startDate); const end = new Date(calculatedEndDateStr);
            const diffTime = end.setHours(0,0,0,0) - start.setHours(0,0,0,0);
            durationDays = Math.max(1, Math.round(diffTime / (1000 * 60 * 60 * 24)) + 1);
          }

          const targetDays = Number(proj.evaluation?.targetDurationDays) || 30;
          let durationLabel = ''; let durationColor = 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300';
          if (durationDays) {
            const diff = targetDays - durationDays;
            if (diff > 0) { durationLabel = `予定より ${diff}日 前倒し完了 🎉`; durationColor = 'bg-emerald-50 text-emerald-700 dark:bg-emerald-955/50 dark:text-emerald-300 border border-emerald-200 dark:border-emerald-800'; }
            else if (diff < 0) { durationLabel = `予定より ${Math.abs(diff)}日 超過遅延 ⚠️`; durationColor = 'bg-rose-50 text-rose-700 dark:bg-rose-955/40 dark:text-rose-300 border border-rose-200 dark:border-rose-800'; }
            else { durationLabel = 'オンタイム完了（予定通り） ✅'; durationColor = 'bg-indigo-50 text-indigo-700 dark:bg-indigo-950/40 dark:text-indigo-300 border border-indigo-200 dark:border-indigo-800'; }
          }

          let loadClass = '🌱 ライト級案件';
          let loadColor = 'bg-slate-100 text-slate-505';
          if (pastPoints >= 10) {
            loadClass = '🐘 ヘビー級案件';
            loadColor = 'bg-purple-50 text-purple-600 dark:bg-purple-900/40 dark:text-purple-300 border border-purple-200 dark:border-purple-800';
          } else if (pastPoints >= 5) {
            loadClass = '⚖️ ミドル級案件';
            loadColor = 'bg-indigo-50 text-indigo-600 dark:bg-indigo-900/40 dark:text-indigo-300 border border-indigo-200 dark:border-indigo-800';
          }

          // 🛡️ 鉄壁修正：now オブジェクト内の参照を totalPoints から存在している nowPoints へ確実にバインド修正！
          metrics[proj.id] = { 
            now: { totalPoints: nowPoints, totalCount: nowTasks.length, deptBreakdown: Object.values(nowDeptBreakdown).filter(d => d.count > 0) }, 
            past: { totalPoints: pastPoints, totalCount: pastTasks.length, deptBreakdown: Object.values(pastDeptBreakdown) }, 
            durationDays, targetDays, endDateStr: calculatedEndDateStr, durationLabel, durationColor, loadClass, loadColor 
          };
        });
        return metrics;
      }, [projects, deptList]);

      // 🛡️ 鉄壁修正：現場ワープ時に余計な未定義変数への代入を排除
      function handleOpenProject(pid) { 
        setCurrentProjectId(pid); 
        setViewMode('board'); 
      }

      function handleCreateProject(e) {
        e.preventDefault(); if (!newProjName.trim()) return;
        const newId = `p_${Date.now()}`;
        setProjects([...projects, {
          id: newId, folderId: newProjFolderId, name: newProjName.trim(), code: '', status: 'in_progress', startDate: TODAY_STR, taskSequence: 0,
          stepList: [{ id: 1, name: '自部署で論点確認', deptKey: 'backoffice', deptLabel: '推進（事務）', deptColor: 'rose', startDate: TODAY_STR, dueDate: TODAY_STR, tasks: [] }],
          evaluation: { tier: 'Tier 2', memo: '', actualEndDate: '', targetDurationDays: 30 }
        }]);
        setCurrentProjectId(newId); setShowAddProjectModal(false); setViewMode('board'); showAlert('案件を起票しました');
      }

      function handleSaveProject(e) {
        e.preventDefault(); if (!editProjName.trim()) return;
        setProjects(prev => prev.map(p => p.id === currentProjectId ? { ...p, name: editProjName.trim(), code: editProjCode.trim(), folderId: editProjFolderId } : p));
        setIsEditingProject(false); showAlert('案件情報を更新しました');
      }

      function handleAddFolder(e) {
        e.preventDefault(); if (!newFolderName.trim()) return;
        setFolders([...folders, { id: `f_${Date.now()}`, name: newFolderName.trim() }]);
        setNewFolderName(''); showAlert('フォルダを作成しました');
      }

      function handleUpdateFolder(id, name) { setFolders(prev => prev.map(f => f.id === id ? { ...f, name } : f)); }
      function handleDeleteFolder(id, name) {
        if (projects.some(p => p.folderId === id)) { showAlert('案件が残っているため削除できません'); return; }
        triggerConfirm('フォルダの削除', `フォルダ「${name}」を削除しますか？`, () => { setFolders(prev => prev.filter(f => f.id !== id)); showAlert('フォルダを削除しました'); });
      }

      function handleUpdateStepInfo(sid, fields) { setProjects(prev => prev.map(p => p.id === currentProjectId ? { ...p, stepList: p.stepList.map(s => s.id === sid ? { ...s, ...fields, deptLabel: deptList.find(d => d.key === fields.deptKey)?.label, deptColor: deptList.find(d => d.key === fields.deptKey)?.color } : s) } : p)); }

      return (
        <div className="h-full flex flex-col bg-slate-55 dark:bg-slate-955 text-slate-855 dark:text-slate-150 overflow-hidden">
          <input type="file" ref={fileInputRef} className="hidden" />

          {alertMessage && (
            <div className="fixed bottom-6 right-6 bg-slate-955/95 dark:bg-slate-800 text-white text-xs px-5 py-4 rounded-2xl shadow-2xl z-[100] border border-slate-750 font-bold">{alertMessage}</div>
          )}

          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-slate-955/40 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
              <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-3xl p-6 shadow-2xl space-y-4 border dark:border-slate-705">
                <h3 className="font-black text-sm mb-2">{confirmModal.title}</h3>
                <p className="text-xs text-slate-505 dark:text-slate-440 mb-4">{confirmModal.message}</p>
                <div className="flex justify-end gap-2">
                  <button onClick={() => setConfirmModal({ isOpen: false })} className="bg-slate-150 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-xl border border-slate-202 dark:border-slate-600 font-bold">キャンセル</button>
                  <button onClick={confirmModal.onConfirm} className="bg-rose-605 text-white px-5 py-2 rounded-2xl font-extrabold shadow-lg">実行</button>
                </div>
              </div>
            </div>
          )}

          {/* 固定天井ナビ */}
          <div className="shrink-0 bg-white dark:bg-slate-900 border-b dark:border-slate-800 z-40 shadow-md">
            <div className="px-6 py-2.5 flex flex-nowrap items-center justify-between gap-4 overflow-x-auto scrollbar-thin">
              <div className="flex items-center gap-3 shrink-0">
                <div className="bg-indigo-600 text-white px-2.5 py-1.5 rounded-xl font-black text-sm">PL</div>
                <div className="hidden sm:block">
                  <h1 className="text-xs font-black dark:text-white leading-none">Project Loom</h1>
                  <p className="text-[9px] text-slate-404 font-extrabold uppercase mt-0.5 tracking-wider">SANSAN案件推進ダッシュボード</p>
                </div>
                <button onClick={() => setShowAddProjectModal(true)} className="bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-800 text-[10px] px-2 py-1 rounded-xl font-black shadow-2xs hover:scale-105 shrink-0">＋ 新規案件</button>
              </div>

              <div className="flex bg-slate-150 dark:bg-slate-800 p-0.5 rounded-xl text-xs font-bold border dark:border-slate-700 shrink-0">
                <button onClick={() => setViewMode('home')} className={`px-3 py-1.5 rounded-lg flex items-center gap-1 ${viewMode==='home'?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}><IconHome /><span>ホーム</span></button>
                <button onClick={() => { if(projects.length > 0 && !currentProjectId) setCurrentProjectId(projects[0].id); setViewMode('board'); }} className={`px-3 py-1.5 rounded-lg flex items-center gap-1 ${viewMode==='board'?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}><IconCalendar /><span>ボード</span></button>
                <button onClick={() => setViewMode('database')} className={`px-3 py-1.5 rounded-lg flex items-center gap-1 ${viewMode==='database'?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}><IconDatabase /><span>分析</span></button>
              </div>

              <div className="flex items-center gap-2 shrink-0">
                <button onClick={exportBackup} className="px-2.5 py-1 bg-slate-100 dark:bg-slate-800 text-[10px] rounded-xl font-bold border border-slate-202 text-slate-707 dark:text-slate-202 shadow-2xs shrink-0">📥 バックアップ</button>
                <button onClick={() => fileInputRef.current.click()} className="px-2.5 py-1 bg-slate-100 dark:bg-slate-800 text-[10px] rounded-xl font-bold border border-slate-202 text-slate-707 dark:text-slate-202 shadow-2xs shrink-0">📤 復元</button>
                <button onClick={toggleDarkMode} className="p-1.5 border rounded-xl bg-slate-55 dark:bg-slate-800 text-slate-707 dark:text-slate-202 font-bold text-xs hover:scale-105 shrink-0"><i className="fa-solid fa-circle-half-stroke" /></button>
                <button onClick={() => setShowSettingsModal(true)} className="p-1.5 border rounded-xl bg-slate-55 dark:bg-slate-800 text-slate-707 dark:text-slate-202 font-bold text-xs hover:scale-105 shrink-0">設定</button>
              </div>
            </div>

            {viewMode === 'board' && activeProject && (
              <div className="px-6 py-2 flex flex-wrap items-center gap-3 border-b dark:border-slate-800 bg-slate-50 dark:bg-slate-900/60 select-none">
                <div className="flex items-center gap-1 bg-white dark:bg-slate-800 border rounded-xl px-2 py-1 border-slate-202 dark:border-slate-700 shadow-inner">
                  <select value={selectedFolderId} onChange={(e) => setSelectedFolderId(e.target.value)} className="bg-transparent text-xs font-black focus:outline-none text-slate-805 dark:text-white">
                    {folders?.map(f => <option key={f.id} value={f.id} className="dark:bg-slate-900">{f.name}</option>)}
                  </select>
                </div>
                <IconChevronRight />
                <div className="flex items-center gap-1 bg-white dark:bg-slate-800 border rounded-xl px-2 py-1 border-slate-202 dark:border-slate-700 shadow-inner">
                  <select value={currentProjectId || ''} onChange={(e) => setCurrentProjectId(e.target.value)} className="bg-transparent text-xs font-black focus:outline-none text-slate-805 dark:text-white">
                    {filteredProjects?.map(p => <option key={p.id} value={p.id} className="dark:bg-slate-900">{p.name}</option>)}
                  </select>
                </div>
              </div>
            )}
          </div>

          {/* メインステージ */}
          <div className="flex-1 overflow-y-auto p-6 scrollbar-thin">
            
            {/* 🏠 ホーム画面ポータル */}
            {viewMode === 'home' && (
              <div className="max-w-7xl mx-auto space-y-8 animate-in fade-in duration-300">
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                  
                  {/* 左：アクティブ案件 */}
                  <div className="lg:col-span-2 space-y-4">
                    <h2 className="text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-2"><span className="text-amber-500">⚡</span> 実行中のアクティブ・案件プロジェクト</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {homeMetrics.filter(m => m.status === 'in_progress').map(proj => (
                        <div key={proj.id} onClick={() => handleOpenProject(proj.id)} className="group bg-white dark:bg-slate-900 border-2 border-slate-202 dark:border-slate-800 rounded-3xl p-5 hover:border-indigo-500 transition-all cursor-pointer shadow-sm hover:shadow-xl">
                          <div className="text-[10px] font-black text-indigo-500 dark:text-indigo-404 mb-1">📁 {proj.folderName}</div>
                          <h3 className="text-base font-black text-slate-900 dark:text-white mb-3 group-hover:text-indigo-600 transition-colors">🏆 {proj.name}</h3>
                          <div className="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full overflow-hidden mb-3">
                            <div className="bg-indigo-600 h-full transition-all" style={{ width: `${proj.progress}%` }} />
                          </div>
                          <div className="flex justify-between items-center text-xs font-bold">
                            <span className={proj.blockedDept ? "text-amber-600 animate-pulse text-[11px]" : "text-emerald-555 text-[11px]"}>
                              {proj.blockedDept ? `🚨 ${proj.blockedDept} 停滞中` : "🟢 順調に推進中"}
                            </span>
                            <span className="text-slate-404 font-mono text-[11px]">{proj.progress}%</span>
                          </div>
                        </div>
                      ))}
                      <div onClick={() => setShowAddProjectModal(true)} className="border-2 border-dashed border-slate-300 dark:border-slate-800 rounded-3xl p-5 flex flex-col items-center justify-center text-slate-404 hover:text-indigo-500 hover:border-indigo-500 transition-all cursor-pointer group">
                        <span className="text-xl mb-1 group-hover:scale-110 transition-transform">＋</span>
                        <span className="text-xs font-black">新規案件プロジェクトを起票</span>
                      </div>
                    </div>

                    {/* 完了案件のアーカイブ */}
                    <div className="pt-6 space-y-4">
                      <h2 className="text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">🏆 着地・完了済みアーカイブ一覧</h2>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        {homeMetrics.filter(m => m.status === 'completed').map(proj => (
                          <div key={proj.id} onClick={() => handleOpenProject(proj.id)} className="bg-slate-100 dark:bg-slate-900/40 border border-slate-202 dark:border-slate-800 p-3 rounded-2xl flex items-center justify-between opacity-70 hover:opacity-100 transition-all cursor-pointer">
                            <div className="truncate pr-2">
                              <span className="text-[8px] font-bold text-slate-404 block">📁 {proj.folderName}</span>
                              <span className="text-xs font-black text-slate-805 dark:text-slate-202 truncate">{proj.name}</span>
                            </div>
                            <span className="text-emerald-555 font-black text-xs shrink-0">✅ 完了</span>
                          </div>
                        ))}
                        {homeMetrics.filter(m => m.status === 'completed').length === 0 && (
                          <div className="col-span-2 text-center py-6 border border-dashed rounded-2xl text-slate-404 text-xs italic">完了した案件プロジェクトはまだありません。</div>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* 右：突破実績 */}
                  <div className="bg-slate-100/50 dark:bg-slate-900/40 border-2 border-slate-202 dark:border-slate-800 rounded-3xl p-6 space-y-4">
                    <h2 className="text-xs font-black text-slate-505 dark:text-slate-300 uppercase tracking-widest flex items-center gap-2"><span className="text-amber-500">🏆</span> 執念の突破実績 (最新完了タスクログ)</h2>
                    <div className="space-y-4 max-h-[520px] overflow-y-auto scrollbar-thin pr-2">
                      {achievementLog.map(log => (
                        <div key={log.id} className="relative border-l-2 border-indigo-500 pl-4 py-1">
                          <div className="text-[10px] font-mono text-slate-404">{log.completedAt}</div>
                          <div className="text-xs font-black text-slate-855 dark:text-slate-202 mt-0.5 leading-snug">
                            <span className="text-indigo-500 font-bold">[{log.deptLabel}]</span> {log.title}
                          </div>
                          <div className="text-[9.5px] font-bold text-slate-404 mt-1 flex justify-between items-center">
                            <span className="truncate pr-2">📋 {log.projName}</span>
                            <span className="text-emerald-555 font-mono shrink-0">+{log.level}P突破</span>
                          </div>
                        </div>
                      ))}
                      {achievementLog.length === 0 && (
                        <div className="text-center py-20 text-slate-404 italic text-xs leading-relaxed">現場の突破実績はまだありません。<br />ボードからタスクを完了させ、成果を刻みましょう！</div>
                      )}
                    </div>
                  </div>

                </div>
              </div>
            )}

            {/* 📋 ボード：現場工程管理 */}
            {viewMode === 'board' && (
              activeProject ? (
                <div className="space-y-6 animate-in slide-in-from-right-3 duration-300">
                  <div className="bg-white dark:bg-slate-900 rounded-3xl p-6 border-4 border-slate-202 dark:border-slate-800 shadow-inner text-left">
                    <div className="text-xs text-indigo-500 dark:text-indigo-400 font-extrabold uppercase mb-1">
                      📁 {folders.find(f => f.id === activeProject.folderId)?.name || '未分類'}
                    </div>
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                      <h2 className="text-xl md:text-2xl font-black text-slate-900 dark:text-white flex items-center gap-2">
                        🏆 {activeProject.name}
                        <button onClick={() => setIsEditingProject(true)} className="text-slate-404 p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm">✏️</button>
                      </h2>
                      <div className="flex bg-slate-150 dark:bg-slate-800 p-0.5 rounded-xl text-xs font-bold border dark:border-slate-700 shrink-0">
                        <button onClick={() => setTaskFilter(p => ({ ...p, pending: !p.pending }))} className={`px-2.5 py-1.5 rounded-lg ${taskFilter.pending?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}>⚪ 未対応</button>
                        <button onClick={() => setTaskFilter(p => ({ ...p, in_progress: !p.in_progress }))} className={`px-2.5 py-1.5 rounded-lg ${taskFilter.in_progress?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}>🔵 進行中</button>
                        <button onClick={() => setTaskFilter(p => ({ ...p, completed: !p.completed }))} className={`px-2.5 py-1.5 rounded-lg ${taskFilter.completed?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow':''}`}>🟢 完了</button>
                      </div>
                    </div>
                  </div>
                  <div className="space-y-8 pb-32">
                    {stepList.map((step, idx) => (
                      <StepSection key={step.id} step={step} index={idx} taskFilter={taskFilter} deptList={deptList} onAddTask={(sid, t) => setProjects(prev => prev.map(p => p.id === activeProject.id ? { ...p, stepList: p.stepList.map(s => s.id === sid ? { ...s, tasks: [...s.tasks, t] } : s) } : p))} onUpdateTask={(tid, fn) => setProjects(prev => prev.map(p => p.id === activeProject.id ? { ...p, stepList: p.stepList.map(s => ({ ...s, tasks: s.tasks.map(t => t.id === tid ? fn(t) : t) })) } : p))} onDeleteTask={(tid) => setProjects(prev => prev.map(p => p.id === activeProject.id ? { ...p, stepList: p.stepList.map(s => ({ ...s, tasks: s.tasks.filter(t => t.id !== tid) })) } : p))} onMoveTask={() => {}} onUpdateStep={(sid, flds) => setProjects(prev => prev.map(p => p.id === activeProject.id ? { ...p, stepList: p.stepList.map(s => s.id === sid ? { ...s, ...flds, deptLabel: deptList.find(d => d.key === flds.deptKey)?.label, deptColor: deptList.find(d => d.key === flds.deptKey)?.color } : s) } : p))} onDeleteStep={(sid) => setProjects(prev => prev.map(p => p.id === activeProject.id ? { ...p, stepList: p.stepList.filter(s => s.id !== sid) } : p))} />
                    ))}
                    <button onClick={handleAddStep} className="w-full py-8 border-4 border-dashed border-slate-202 dark:border-slate-800 rounded-3xl text-slate-404 hover:text-indigo-500 transition-all font-black text-sm">＋ 新しい推進工程(STEP)をこの案件に追加する</button>
                  </div>
                </div>
              ) : (
                <div className="text-center py-20 bg-white dark:bg-slate-900 rounded-3xl border border-dashed text-slate-404 text-xs">
                  案件が選択されていません。左上の「ホーム」から推進したい案件タイルをクリックしてください。
                </div>
              )
            )}

            {/* 📊 分析：戦略分析データベース */}
            {viewMode === 'database' && (
              <div className="max-w-5xl mx-auto space-y-6 animate-in fade-in duration-300">
                <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-4 mb-4 text-left">
                  <div>
                    <h2 className="text-base font-black dark:text-white">📊 全社横断プロジェクト・戦略コクピット分析</h2>
                    <p className="text-[11px] text-slate-505 dark:text-slate-404 font-semibold mt-0.5">現場の詰まり(NOW)と、これまでの処理実績速度(PAST)を投射比較します。</p>
                  </div>
                  <select value={dbFilterFolderId} onChange={e=>setDbFilterFolderId(e.target.value)} className="p-2 border rounded-xl text-xs bg-white dark:bg-slate-800 text-slate-855 dark:text-white font-bold max-w-[200px]"><option value="all">すべてのフォルダ</option>{folders.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}</select>
                </div>
                
                <div className="space-y-4">
                  {projects.filter(p => dbFilterFolderId === 'all' || p.folderId === dbFilterFolderId).map(proj => {
                    const prog = homeMetrics.find(m => m.id === proj.id)?.progress || 0;
                    const metrics = projectTimeframeMetrics[proj.id] || { now: { totalPoints: 0, totalCount: 0, deptBreakdown: [] }, past: { totalPoints: 0, totalCount: 0, deptBreakdown: [] }, durationDays: null, targetDays: 30, endDateStr: TODAY_STR, durationLabel: 'オンタイム', durationColor: '' };
                    const isExpanded = expandedProjectDbId === proj.id;
                    return (
                      <div key={proj.id} className="border-2 border-slate-202 dark:border-slate-800 rounded-3xl overflow-hidden bg-white dark:bg-slate-900 shadow-sm">
                        <div onClick={() => setExpandedProjectDbId(isExpanded ? null : proj.id)} className="p-4 flex items-center justify-between cursor-pointer hover:bg-slate-55 dark:hover:bg-slate-800 transition-colors select-none">
                          <div className="flex items-center gap-3">
                            <span className="text-base">{prog === 100 ? '✨' : '🚀'}</span>
                            <div className="text-left"><h3 className="font-black text-sm dark:text-slate-200">{proj.name}</h3><div className="text-[10px] text-slate-404 font-mono">{proj.code || 'コードなし'}</div></div>
                          </div>
                          <div className="flex items-center gap-4">
                            <div className="w-20 bg-slate-100 dark:bg-slate-800 h-1.5 rounded-full overflow-hidden"><div className="bg-indigo-600 h-full" style={{width:`${prog}%`}}/></div>
                            <span className="text-xs font-black text-indigo-600 w-8">{prog}%</span>
                            <span className="text-xs text-slate-404 font-bold">{isExpanded ? '▲ 閉じる' : '▼ 展開'}</span>
                          </div>
                        </div>
                        {isExpanded && (
                          <div className="p-6 border-t dark:border-slate-800 space-y-6 bg-slate-55/10 text-left">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                              {/* NOW */}
                              <div className="bg-slate-55 dark:bg-slate-955/50 p-4 rounded-2xl border dark:border-slate-800/80">
                                <h4 className="text-xs font-black text-rose-550 mb-3 flex justify-between items-center">🚨 進行中のボール (NOW) <span>{metrics.now.totalPoints}P 残量</span></h4>
                                <div className="space-y-2">
                                  {metrics.now.deptBreakdown.map(dept => {
                                    const avg = (dept.points / dept.count) || 0;
                                    let diff = avg >= 3.5 ? "💀 超ハード" : avg >= 2.5 ? "🔥 ハード" : avg >= 1.5 ? "🔹 普通" : "🟢 軽";
                                    return (
                                      <div key={dept.label} className="flex items-center justify-between p-2 rounded-xl bg-white dark:bg-slate-900 border dark:border-slate-800/60">
                                        <div className="flex items-center gap-2">
                                          <div className="w-2.5 h-2.5 rounded-full border-[3px]" style={{ borderColor: colorClassesMap[dept.color]?.borderStrong || '#64748b' }} />
                                          <span className="text-xs font-bold">{dept.label}</span>
                                        </div>
                                        <div className="flex items-center gap-2 text-[10px] font-bold font-mono">
                                          <span className="text-slate-404">残り{dept.count}件</span>
                                          <span className="bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 px-2 py-0.5 rounded-lg">{diff} ({avg.toFixed(1)}P/件)</span>
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                              {/* PAST */}
                              <div className="bg-slate-55 dark:bg-slate-955/50 p-4 rounded-2xl border dark:border-slate-800/80">
                                <h4 className="text-xs font-black text-emerald-555 mb-3 flex justify-between items-center">🏆 完了実績の質 (PAST) <span className={`text-[9.5px] px-2 rounded-lg font-black ${metrics.durationColor}`}>{metrics.durationLabel}</span></h4>
                                <div className="space-y-2">
                                  {metrics.past.deptBreakdown.map(dept => (
                                    <div key={dept.label} className="p-2 rounded-xl bg-white dark:bg-slate-900 border dark:border-slate-800/60 flex justify-between items-center font-mono text-[10px]">
                                      <span className="text-xs font-bold text-slate-805 dark:text-slate-202">{dept.label}</span>
                                      <div className="font-bold space-x-2 text-right">
                                        <span className="text-slate-404">速度:</span>
                                        <span className="text-indigo-500 font-black">{(dept.points / (dept.durationDays||1)).toFixed(1)} P/日</span>
                                        <span className="bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 px-1.5 rounded">{dept.durationDays}日間で完了</span>
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            </div>
                            <div className="flex justify-end"><button onClick={() => handleOpenProject(proj.id)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-2xl font-black text-xs shadow-md">🎯 この案件の現場ボードへ移動</button></div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {/* 設定モーダル */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-955/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white dark:bg-slate-800 w-full max-w-2xl max-h-[85vh] rounded-3xl p-6 overflow-hidden flex flex-col shadow-2xl border border-slate-700">
                <h2 className="text-sm font-black mb-4 flex items-center gap-2 text-slate-900 dark:text-white">🛠️ システム環境マスタマトリクス設定</h2>
                <div className="flex-1 overflow-y-auto space-y-6 text-left pr-1 scrollbar-thin">
                  
                  {/* 📁 フォルダマスタ */}
                  <div className="space-y-3">
                    <div className="text-indigo-600 dark:text-indigo-400 font-black text-xs border-b pb-1 border-slate-100 dark:border-slate-707">📁 フォルダ（案件分類フォルダマスタ）の新規追加・編集</div>
                    <form onSubmit={handleAddFolder} className="flex gap-2">
                      <input required type="text" placeholder="新規フォルダ名を入力..." value={newFolderName} onChange={e=>setNewFolderName(e.target.value)} className="flex-1 border p-2 rounded-xl text-xs dark:bg-slate-900 text-slate-805 dark:text-white font-bold" />
                      <button type="submit" className="bg-indigo-600 text-white px-4 rounded-xl font-black text-xs shrink-0">作成</button>
                    </form>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-32 overflow-y-auto custom-scrollbar pr-1">
                      {folders.map(f => (
                        <div key={f.id} className="bg-slate-55 dark:bg-slate-900/50 p-2 rounded-xl border dark:border-slate-700 flex justify-between items-center font-mono">
                          <input value={f.name} onChange={e=>handleUpdateFolder(f.id, e.target.value)} className="bg-transparent font-bold text-xs flex-1 outline-none text-slate-855 dark:text-white" />
                          <button type="button" onClick={()=>handleDeleteFolder(f.id, f.name)} className="text-slate-404 hover:text-rose-500 text-xs px-2 font-black">×</button>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* 🏢 部署マスタ */}
                  <div className="space-y-3">
                    <div className="text-indigo-600 dark:text-indigo-400 font-black text-xs border-b pb-1 border-slate-100 dark:border-slate-707">🏢 組織内・保持部署マスタの新規追加・編集</div>
                    <form onSubmit={handleAddDeptMaster} className="flex flex-wrap gap-2 items-end">
                      <div className="flex-1 min-w-[150px]">
                        <input required type="text" placeholder="新規部署名を入力..." value={newDeptLabel} onChange={e=>setNewDeptLabel(e.target.value)} className="w-full border p-2 rounded-xl text-xs dark:bg-slate-900 text-slate-805 dark:text-white font-bold" />
                      </div>
                      <select value={newDeptColor} onChange={e=>setNewDeptColor(e.target.value)} className="border p-2 rounded-xl text-xs dark:bg-slate-900 text-slate-855 font-bold bg-white dark:bg-slate-800">
                        {Object.keys(colorClassesMap).map(c=><option key={c} value={c}>{colorLabels[c]}</option>)}
                      </select>
                      <button type="submit" className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-black text-xs shrink-0">追加</button>
                    </form>
                    <div className="space-y-1.5 max-h-40 overflow-y-auto custom-scrollbar pr-1">
                      {deptList.map(d => (
                        <div key={d.key} className="flex gap-2 items-center bg-slate-55 dark:bg-slate-900/50 p-2 rounded-xl border dark:border-slate-700 text-xs">
                          <input value={d.label} onChange={e=>handleUpdateDeptMaster(d.key, {label:e.target.value})} className="flex-1 bg-transparent font-bold outline-none text-slate-855 dark:text-white" />
                          <select value={d.color} onChange={e=>handleUpdateDeptMaster(d.key, {color:e.target.value})} className="text-[10px] bg-white dark:bg-slate-800 p-1 rounded-lg">
                            {Object.keys(colorClassesMap).map(c=><option key={c} value={c}>{colorLabels[c]}</option>)}
                          </select>
                          <button type="button" onClick={()=>handleDeleteDeptMaster(d.key, d.label)} className="text-slate-404 hover:text-rose-500 font-black text-sm px-2">×</button>
                        </div>
                      ))}
                    </div>
                  </div>

                </div>
                <div className="pt-4 border-t dark:border-slate-700 flex justify-end">
                  <button onClick={() => setShowSettingsModal(false)} className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 px-6 py-2.5 rounded-xl font-bold border dark:border-slate-600">閉じる</button>
                </div>
              </div>
            </div>
          )}

          {/* 案件基本情報の編集モーダル */}
          {isEditingProject && activeProject && (
            <div className="fixed inset-0 bg-slate-955/80 z-[100] flex items-center justify-center p-4">
              <div className="bg-white dark:bg-slate-800 w-full max-w-md rounded-3xl p-6 shadow-2xl border border-slate-700 text-left">
                <h3 className="font-extrabold text-sm text-slate-955 dark:text-white mb-4">✏️ 案件プロジェクト基本情報の編集</h3>
                <form onSubmit={handleSaveProject} className="space-y-4 text-xs font-bold">
                  <div>
                    <label className="block mb-1 text-slate-404">案件プロジェクト名称 *</label>
                    <input required type="text" value={editProjName} onChange={e => setEditProjName(e.target.value)} className="w-full border rounded-xl p-2.5 bg-white dark:bg-slate-900 text-slate-805 dark:text-white font-bold" />
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block mb-1 text-slate-404">コード</label>
                      <input type="text" value={editProjCode} onChange={e => setEditProjCode(e.target.value)} className="w-full border rounded-xl p-2 bg-white dark:bg-slate-900 text-slate-855 dark:text-white font-mono" />
                    </div>
                    <div>
                      <label className="block mb-1 text-slate-404">フォルダ分類</label>
                      <select value={editProjFolderId} onChange={e => setEditProjFolderId(e.target.value)} className="w-full border rounded-xl p-2 bg-white dark:bg-slate-900 text-slate-855 dark:text-white font-bold">
                        {folders?.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="flex justify-end gap-2 pt-2">
                    <button type="button" onClick={()=>setIsEditingProject(false)} className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-xl border dark:border-slate-600">キャンセル</button>
                    <button type="submit" className="bg-indigo-600 text-white px-5 py-2 rounded-xl shadow-md">更新を保存</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* 新規案件起票モーダル */}
          {showAddProjectModal && (
            <div className="fixed inset-0 bg-slate-955/80 z-[100] flex items-center justify-center p-4">
              <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-3xl p-6 shadow-2xl border border-slate-700 text-left">
                <h2 className="text-sm font-black mb-4">＋ 新規案件プロジェクトの起票</h2>
                <form onSubmit={handleCreateProject} className="space-y-4 text-xs font-bold">
                  <div>
                    <label className="block mb-1 text-slate-404">案件名称 *</label>
                    <input required placeholder="新案件名を入力..." value={newProjName} onChange={e=>setNewProjName(e.target.value)} className="w-full border p-2.5 rounded-xl dark:bg-slate-900 text-slate-805 dark:text-white font-bold" />
                  </div>
                  <div>
                    <label className="block mb-1 text-slate-404">分類フォルダ</label>
                    <select value={newProjFolderId} onChange={e=>setNewProjFolderId(e.target.value)} className="w-full border p-2 rounded-xl dark:bg-slate-900 text-slate-855 dark:text-white font-bold">
                      {folders.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}
                    </select>
                  </div>
                  <div className="flex justify-end gap-2 pt-2">
                    <button type="button" onClick={()=>setShowAddProjectModal(false)} className="bg-slate-150 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-xl border border-slate-202 dark:border-slate-600">キャンセル</button>
                    <button type="submit" className="bg-indigo-600 text-white px-6 rounded-xl font-black shadow-lg py-2">起票を確定</button>
                  </div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
